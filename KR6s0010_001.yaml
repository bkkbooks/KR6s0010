body:
  text: 翻經沙門玄應撰大方廣佛華嚴經大方等大集經大集日藏分經大集月藏分經大威德陁羅𡰱經法炬陁羅𡰱經大方廣佛華嚴經第一卷摩竭提或云摩竭陁亦言默偈陁又作摩伽陁皆梵音訛轉也正言摩揭陁此譯云善勝國或云无𢙉害國一說云摩伽星名此言不𢙣主十二月也陁者𠁅也名為不𢙣𠁅國亦名星𠁅國也揭音渠謁反華梵言俱蘇摩此譯云華摩羅此譯云音蠻案西國結師多用蘇摩那華行列結之以為條貫無問男女貴賤皆此㽵嚴或首或身以為飾好則諸經中有華市天寶等同其事也字體從髟音所銜反臱聲臱音然反經文作𩭈非體也踰摩字書作逾同𢈔俱反字林踰越也廣疋踰度也言摩𡰱者訛也正言末𡰱謂珠之捴名也罣礙字略作罫同胡卦反礙也下古文硋同五代反說文礙止也又作閡郭璞以為古文礙字說文閡外閉也經文作㝵音都勒反業衛宏詔定古文官書㝵得二字同體說文㝵取也尚書高宗夢㝵說是也㝵非此義盧舍那或云嚧柘那亦言盧折羅此譯云照謂遍照也以報佛淨色遍周法界故也又日月燈光遍周𠁅亦名盧舍那其義是也迴復又作洄澓二形同胡瓌𭷀福反三蒼洄水轉也澓深也亦迴水也深也癡𥌒公戶反三蒼無目謂之𥌒𥼶名云𥌒目者眠眠然目平合如皷皮也切𠛴又作擦同音察梵言差多羅此譯云土田經中或言國或云土者同其義也或作剎土者存二音也即剎帝利名字田主者亦是也案𠛴書无此字即㓼字略也㓼音初一反浮圖名剎者訛也應言剌瑟𦙁剌音力割反此譯云竿人以柱代之名為剎柱以安佛骨義同土田故名剎也以彼西國塔竿頭安舍利故也沮壞才與反三蒼沮漸也壞敗也經文作俎側呂反貯醢器也一日置肉几也俎非此用第二卷安跱字詁古文峙今作跱同直耳反廣疋峙止也謂亭亭然獨止立也第三卷攔揗又作闌同力寒反下食允反說文闌檻也通俗文闌檻謂之楯王逸注楚辝云從曰檻撗曰楯楯閒子曰𢹝案蘭楯殿上臨邊之飾也亦所以防人墜墮也今言鈎蘭是也群萌古文垊同麦耕反萌芽也廣疋萌始也案萌冥昧㒵也言眾庶無知也漢書氓氓群𥠖是也綸力旬反周布也易云綸天地之道注云廣也綸經理也第四卷煥明字書亦奐字同呼換反煥亦明也謂光明炳煥也旗幡極基反𥼶名云熊虎為旗者軍將所建者象其猛如虎與眾期其下也諧雅胡皆反諧和也謂閑雅雍容音聲和也雅素也亦從容妖麗也寮觀力堯反寮窓也蒼頡篇寮小空也說文寮穿也經文有從手作撩或從木作撩二形並非今用也第五卷眾祐于救反祐助也謂眾德相助成也舊經多言眾祐者福祐也今多言世尊者為世所尊也此盖隨義立名耳仇對渠牛反仇怨也匹也三蒼頡篇云怨耦曰仇廣疋仇𢙣也憤毒扶粉反說文憤懣也方言憤盈也謂憤怒氣盈滿也亦情感也懣音亡本反煩也驚駭胡騃反蒼頡篇駭亦驚也廣疋起也名遏古文閼同安曷反蒼頡篇遏遮也詩傳曰遏止也亦絕也翳目韻集作瞖同於計反瞖目病也說文目病生翳也並作翳韻集作瞖近字也經文有作曀陰而風日曀曀非此義孤煢古文惸儝二形同渠營反無父曰孤無子曰獨無兄弟曰煢煢單也煢煢无所依也字從卂從營省聲卂音雖閏反第六卷毗嵐力含反或作毗藍婆風或作鞞嵐婆或云吠藍婆或作隨藍或言旋藍皆是梵言此譯云迅猛風也𦗤聵古文類聵二形今作顏又作𦗿同牛快反國語聵不可使聽賈達日生𦗤曰聵一云𦗤無識曰聵經文從肉作膭胡對反𦘺也膭非經義噬諸時制反三蒼解話云噬齧也字林噬啗也啗音徒敢也滌穢徒的反說文滌洒也亦除也謂盪滌洒除去垢穢也滌亦除也盥掌公緩反說文盥澡手也春秋傳曰奉迤盥案凡澡洒物皆曰盥字體從手臼水臨皿上也臼音居六反經文有更從水作𤃗非也迤餘支反似勺抦中有道所以注水也發趾音止字林趾足也𥼶名云足一進一止因以名焉園圃補五反江東音布二音蒼頡解詁云種樹曰園種菜曰圃也詩云無踰我園傳曰有樹也又云折柳樊圃傳曰菜圃也皆其義矣衰耄字體作𤸬同所龜反說文𤸬减也亦損也礼記年五十始𤸬𤸬懈也今皆作衰下古文耄二形今作耗同莫報反礼記八十曰耄鄭玄曰耄惽忘也亦乱也甲冑古文䩜同除救反廣疋兜鍪也中國行此音亦言鞮鍪江南行此音鞮音仾鍪莫侯反第七卷八梵八種梵音者案十住断結經云一不男音二不女音三不強音四不䎡音五不清音六不濁音七不雄音八不雌音愽綜子送反綜習也三蒼綜理經也謂機綱紀領絲者也第八卷僅半古文㝻廑二形同渠鎮反僅劣也僅猶纔也錠光大徑反又音殿三蒼無樹曰錠有柄曰鐙一云無跗曰錠有跗曰鐙亦即然燈佛也諸經中作提洹竭佛梵言也第九卷渾濁後昆後袞二反渾亂也說文渾水流聲一曰洿洿音一胡反𮨇䀎眠見反說文邪視也蒼頡篇旁視也方言自開而西秦晉之閒謂視為䀎也第十二卷惠施胡桂反周礼施其惠鄭玄曰賙衣食曰惠孟子曰分人以財謂之惠是也說文惠仁也詩傳云惠愛也貧窶瞿庾反蒼頡篇無財曰貧無財俻礼曰寠詩云終窶且貧傳曰窶無礼是也字書窶空也貧陋也福伽羅經論中或作富伽羅或作富特伽耶舊譯云人應云補特伽羅此云數取趣也恃怙古文㤄同時止反下胡古反恃頼也尒疋怙恃也韓詩无父何怙怙頼也無母何恃恃負也妖𧰟又作同於驕反三蒼妖妍也謂少壯妍好之㒵也下又作艶同余贍反說文好而長曰𧰟美也方言秦晉之閒謂美色為𧰟𧰟美也字從豊音匹弓反盍聲第十三卷摩㝹奴侯反正言摩奴末耶此云意生身言諸天等從意化生也不殉旬俊反尚書殉于貨色注云殉求也亦營也第十四卷六親漢書以奉六親應邵曰六親者父母兄弟妻子也蒼頡篇親愛也𥼶名云親𭣋也言相隱𭣋也侮慢古文侮同亡甫反廣疋侮輕也說文侮㑥也謂輕㑥玩弄也𮞏相古文递同徒礼反尒疋迭也郭璞日更易也迭音徒結反饌又作𦿉同仕眷反說文𬾨具飲食也論語先生饌馬融曰饌飲食也老邁莫芥反說文遠行也廣疋邁歸徃也詩云日月其邁是也第十六卷沃焦烏木反迦延云沃焦者無限生死案郭璞注江賦云大𭐋在東海外焦海所瀉源水注𠁅也第十八卷相扣哭後反論語以林扣其脛注云扣擊也三蒼作也六瘤力周反通俗文肉胅曰瘤三蒼瘤小腫也尾即無瘤經文作流注之流非也胅音徒結反或遺余季反廣疋遺與也尒疋胎遺也謂相饋遺也遺猶贈也經文從貝作𧸽近字也冠冕眉辯反世本云黃帝作冕周礼弁師掌王之五冕鄭注云冕延上覆也謂大夫以上冠也噍牙譙笑反蒼頡篇噍咀嚼也說文噍嚼也第二十卷七仞如振反說文仞謂申一尋也取論語夫子之牆數仞苞咸曰七尺曰仞今皆作刃非也第二十一卷禪頭是戰反梵言禪豆或言禪兜或言繕都此譯云眾生也第二十六卷攏㩜力東反下胡𪒠反三蒼攏所以盛禽獸㩜闌也廣疋攏牢也謂養禽獸之所也說文攏㩜也㩜圈也圈音渠遠反捫摸莫奔莫本二反捫亦摸也詩云莫捫朕舌傳曰捫撫持也謂執持也經中有作摩捉日月是也僉皆且廉反僉咸也小尒疋僉同也方言自開而東五國之都謂皆為僉循身古文作𢓈同似遵反三蒼𢓈遍也尒疋率循也注云又為循行也循亦巡也巡歷也循自也第二十七卷蠱毒公戶反說文蠱腹中虫也謂行虫毒也經文從䖝作蛄音古胡反螻蛄蟪蛄也蛄非此義溉灌歌賚反說文溉灌注也泥潦郎道反說文雨水也謂聚雨水為洿潦也第二十八卷密迹梵言散那此譯云密主密是名以知佛三密功德故也主者夜叉主也案梵本都无迹義當以示迹為神故譯經者義立名耳䎡中而兖反梵言沒栗度此云䎡通俗文物柔曰䎡三蒼䎡柔弱也第二十九卷胞胎補交反說文胞兒生裹也尒疋胎始養也軻梨口佐反應云軻地羅此譯云軻者空也地羅者破也名空破山也由𠃵巨焉反大論作揵陁羅山此譯云由揵者雙陁羅者持名雙持山也第三十三卷眩惑古文姰迿二形同侯遍反字林眩乱也漢書𥟖靬條支國善眩案眩亦幻也靬音居言反第三十四卷齗𪘽牛斤反說文齒肉也𪘽又作腭咢二形同五各反齒內上下肉也伊𡰱延或云㖶𡰱延皆訛也正言黳𡰱延此鹿王名也㖶音烏賢反黳烏奚反第三十七卷兩闢脾赤反說文闢開也經文有作僻疋赤反避也又作辟卑亦反辟法也理也辟非此義第四十卷藉草茨夜反案藉猶薦也𥼶名云所以自薦藉也或級羇立反礼記級次也左傳加勞賜一級又云斬首二十三級案師旋斬首一人賜爵一級因名賊首為級也第四十三卷罪舋𦏁鎮反舋罪也亦瑕隟也過也字體從𬼉分聲㸑省血祭也象祭竈也第四十四卷澍法之喻上句二反時雨也謂潤生百穀者也說文上古時雨所以澍生万物者是也拜署時去反署位也謂署置之𧆛敬也國語大位政之建也署位之表也謂表識也署所以朝夕𧆛君命也字從四者聲第四十五卷達𭣋义覲反案尊婆湏蜜論亦作檀𭣋此云財施解言報施之法名曰達𭣋導引福地亦名達𭣋復次割意所愛成彼施度於今所益義是檀𭣋又西域記云正言達𭣋拏或云䭾器𡰱以用右手受他所施為其生福故從之立名也第四十八卷池沼之遶反說文沼池也梵言賀邏䭾捴言池水也第五十一卷舩舶音白埤蒼舶大舩也通俗文吴舩曰艑晉舩曰舶大者長二十丈載六七百人者是也艑音蒲反門閫又作梱同苦本反三蒼梱門限也礼記外言不入於閫是西阿於何反韓詩云曲亰曰阿阿謂山曲隈𠁅也周羅此譯云小寶也吉由羅應云枳由邏寶此云纓絡呵羅應云珂羅此云金帶舟又作檝同子獵反易云黃帝剡木為檝通俗文擢謂之艥𥼶名云也撥水使舟疾也宣敘古文愃同雪緣反宣通也尒疋宣遍也說文敘次第也第五十三卷讌集又作𡩷燕二形同於薦反小會也國語親戚𡩷饗賈逵曰不脫履外堂曰𡩷經文有從酉作醼嚥二形並非也第五十四卷斑下案古書或作頒同補姧反頒遍也尒疋斑遍賦與也巖崿又作礹同牛衫反說文巖峯也亦峻險也下又作𨺨同五各反通俗文重曰𨺨音言甑也山如重甑曰𨺨第五十五卷囹圄力丁反下魚呂反獄名也周礼三王始有獄廣疋夏曰夏臺殷曰𮊢里周曰囹圄皆獄之別名也𮊢音弋夂反榜笞蒲衡反下又作抬同丑之反字書榜棰也說文笞擊也流𡰱亦名嵐毗𡰱園名也諸經或作此云解脫𠁅亦云断亦云滅正言藍軬𡰱此云鹽即上古守園婢名也因以名園飯那此云林也軬音扶晚反瞿夷或言曇正言𠳮荅此云明女十二遊經云明女第五十六卷殞滅為愍反聲類云殞沒也滅盡也消絕也繒纊自陵反下今作絖同音曠說文繒帛也纊綿也絮之細者曰纊淵渟狄經反廣疋渟止也埤蒼水止曰渟字書水滯也第五十八卷亘生歌鄧反詩云亘之秬𥝣傳曰亘遍也經文有作絙音桓綬也又作公曾反大索也並非經意𥝣音披鄙反𭺙裂冝作攫九縛居碧二反說文攫瓜持也攫扟也蒼頡篇攫持也淮南子云獸窮則攫是也摩伽羅魚亦云摩竭魚正言麼迦羅魚此云鯨魚謂魚之王也風土記云海中有鯨魚長數千里穴𠁅海底出則潮下入則潮上入出有時故有上下無軛又作枙同於革反犁枙也亦車軛也壓牛領者也大方等大集經第一卷降注之喻反說文注灌也瀉也經文從雨作霔非也厭人於舟反鬼名也梵言烏蘇慢此譯言厭字苑云厭眠內不祥也蒼頡篇云伏合人心曰厭字從厂厂音呼旱反猒聲山東音於反第四卷迦陵頻伽經中或作歌羅頻伽或云加蘭伽或言羯羅頻迦或言毗伽皆梵音訛轉也迦陵者好毗伽者聲名好聲鳥也命命梵言耆婆耆婆鳥此言命命鳥是也良祐力張反良善也亦賢也下胡救反字林祐助也多伽羅香此云根香多摩羅跋香此云藿葉香育坘花坘音直尸反此譯云相應花也第六卷七卓知角反卓越也釋名言舉脚有所卓越也燎力燒反鄭玄注周禮云樹於門外曰大燭於內曰燎經文作錠鐐二形又作𤊟並非也摩夷正言摩怛理迦此云本母理為教本故以名焉第八卷不肖先妙反小尒雅云不肖不似也謂不似其先故曰不肖謂儜𢙣之類也字從𠬦小聲煒爗于匪反下為獵反說文煒盛明皃也方言曄盛也經文作瑋曄非體也耐磨奴代反謂堪能任耐也耐能也蒼頡篇耐忍也穿押古狎反尒雅押輔也謂束也經文作甲非也第九卷援助于眷反謂依援護助之言也窯師餘招反說文燒瓦竈也通俗文陶竈曰窯也村屯徒昆反字書屯亦村也廣雅屯聚也聚音才句反摩納或云摩納婆或云摩那婆或云那羅摩那皆是梵音訛轉耳此譯云年少淨行亦云人也第十二卷揵椎直追反經中或作揵遟案梵本臂吒揵稚臂吒此云打揵稚所打之木或檀或桐此無正翻以彼無鐘磬故也但椎稚相濫所以為誤已久羅差或言洛沙訛也應云勒义此譯云紫色也憍奢耶此譯云虫衣謂用野蝅絲綿作衣也應云俱舍此云藏謂蝅藏在蠒中此即野蝅也趍走又作趨同且瑜反釋名疾行曰趍疾趍曰走圊廁七情反廣雅圊圂屏廁也皆廁之別名也褱異又作傀褻二形同古廻反傀美也廣雅傀偉奇玩也禦之古文敔同魚舉反禦當也亦止也尒雅禦禁也娑咩尒反嘍濘洛口反下奴定反婆坵丁礼反囉緹他礼反婆踟直知反第十五卷劫波育或言刼具者訛也正言迦波羅高昌名㲲可以為布𦋺賓已南大者成樹已北形小狀如土葵有聲剖以出如柳絮可紉以為布也紉女反僂𣦢力矩反僂曲也下方尺反𣦢不能行也字從止跛蹇又作同補我反下居免反字林跛蹇行不正也窊靣一瓜反廣雅窊下也經文作洿一胡反洿池也櫨欂来都反下蒲麦反三蒼柱上方木也山東江南皆曰枅自陜以西曰㭼枅音古奚反怡懌古文同翼之反下以石反尒雅怡懌樂也經文作津液之液非也監領古文同公衫反方言監察也亦覧也經文作鑒非體也輨轄古緩反下又作𡍦鎋二形同胡瞎反方言開之東西曰輨亦曰轄謂軸頭䥫也鎋鍵也經文從竹作管非體也𨍊紖又作䊶絼二形同直忍反謂牛鼻繩也旒幢字書作統同呂周反謂旌旗之垂者也天子十二旒諸侯九旒是第十六卷焦悸古文痵同其季反字林心動也說文氣不定也笑充之反蒼頡篇輕侮也經文從口作嗤非體也第十七卷郁鳩於六反鳩攡力知反蔚耆於費反曬婆力訃反第二十卷唏隸呼凡反嘍梨力口反經文作娶非也斫啾子由反膝伽私七反經文作非也提蘘而羊反陁徒多反經文作馳非也茂睼吐奚反經文作㖷非也遁走今作遯𨔵二形同徒頓反遁逃也廣雅遁避也第二十一卷刀戟居逆反字林有枝兵器也長六尺确盡苦角反孟子曰确薄地也今亦取此确瘦苦角反通俗文物堅硬謂之确今取其義奎星口携反婁星力侯反𭥦星立鈍反觜星子累反第二十二卷嘻隸盧基反究侜竹流反婆𨥌昌氏反陁睼吐反滛婆以鉗反經文作非也至朎胡躭反經文作𤚥一非也仳他父萎反薜荔浦細反下力計反正言閇麗多此譯云祖父或言餓鬼是餓鬼中㝡劣者也尼鞀徒刀反䉛廁於云反陁𠲸或作諵喃二形同女咸反𥇔那丑上反經文從口作𫪛非也兵革古核反軍旅之事曰兵革謂兵器雜有皮革也第二十三卷啅啅陟角反兜仇都侯反下渠牛反囉𥿫丑賜反鞞哹疋尤反噢南於六反伽悢力尚反囉丁奚反經文作䩯非也埏埴尸延反下時力反埏擊也和也埴土也第二十六卷手探他含反說文手遠取曰探也伶俜歷丁反下疋丁反三蒼伶俜猶聡翩也孤獨皃也第二十八卷脰蘘翼之反下而羊反𠸹呿於六反下見庶反經文從豆作或非也膃摩一兀反蹶比日月反第二十九卷迦睇他第反一音徒計反依字傾視曰睇霖雨力金反雨自三日已上為霖係心古文繫継二形同古詣反係綴也繫束也大集日藏分經第一卷僧伽藍舊譯云村正言僧伽羅磨云眾園也生挑他堯反聲類挑抉也謂以手抉取物也抉音烏決反俱蘭吒花或云拘蘭荼花此譯云紅色花也第二卷逋沙布吾反又作補婁沙或言富留沙皆訛也正言富盧沙此言士夫或言丈夫經中或作甫訛也仳必疋視反羅麼莫可反復䫂都我反馺跛蘇合反娑郵无反㖶因賢反摩爹徒可反鉢郎力可反囉栘是奚反三姥亡古反咥㖑丑一反下呼戒反𢙣踦居綺反窣朱乘伇反迃嘍一禹反下勒口反伊儸力歌反系毗下弟反第三卷唵句烏感反眵提充支反那梯他反頻婆人案佛本行經云頻婆羅此數當十兆也第四卷培鞞蒲口蒲来二反阿紉女反坒絰扶必反下徒德反姧宄居美反廣雅宄盜也左傳在內曰姧在外曰宄第五卷䫫頷又作髏同力侯反埤蒼頭骨也下胡感反方言頷頥頷也腥臊又作胜同先丁反下又作鱢同乘勞反通俗文魚臭曰腥假臭曰臊猳音加第六卷𮊵瘠古文膌同才亦反說文膌瘦瘠亦薄也蠅蛆千餘反三蒼蠅乳𠬦中曰蛆經文從虫作蛆子餘反蝍蛆蜈蚣也又作疽久癕也二形並非經義得臛呼各反王逸注楚辝云有菜曰羹无曰臛蔔又作同子奚反醬属也醢醬所和細切曰全物為葅今中國皆言江南悉言葅脊檀相傳力甚反正言棟居屋中也亦言梁牚柱𠡠庚耻孟二反今謂邪柱為牚也經文作棖非體也任娠書隣反懷胎為娠漢書孟康曰娠音身今多以娠作兩通也凍暍又作𤸎㷎二形同於歇反謂傷熱煩悶欲死也石撩力彫反撩擲也說文作摷相擊也第七卷𠜂那所姧反龍王名也依字聲類𠜂定也庰中蒲定反廣雅圊圂庰廁也乳哺蒲路反字林哺咀食也謂口中嚼食也不憚徒且反詩云豈敢憚行注云憚難也亦畏也第八卷人黶烏簟反黑子也說文中黑也翌夷軄反下之忍反北方宿名也翌亦作翼些吉蘇計乘餓二反比火天也姓些吉利多耶尼拓地古文祏二形今作同他各反𣪴魚既反說文𣪴有决也孔安國注尚書云煞為果致果為𣪴親昵又作暱同女栗反尒雅昵親近也又云昵亟也親昵亦數也炒粳古文鬻焣𤌉四形今作崔寔四民月令作炒古文奇字作㨎同初狡反方言熬焣火乾也慎儆古文憼儆二形今作警同居影反警戒慎也廣雅警不安也嘲戲又作啁同竹包反蒼頡篇云啁調也相調戲也第九卷蜎飛於全反字林虫皃也動也或作呼全反飛㒵也桁械胡郎反下胡戒反通俗文云拘罪曰桁械謂穿木加足曰械大械曰桁他恀音是又時移反依字尒雅恀怙恃也䯇䯇苦骨反廣雅䯇勤也埤蒼力作也喫噉口迹反謂喫食也第十卷燂身聲類作燂燖二形字詁古文鬻二形今同詳廉反通俗文以湯去毛曰經文作爓案說文等音皆余贍反又羊占反火爓爓也爓非經義嗽於又作欶同山角反欶吮也經文從口作𡂡俗字也刀砧又作椹二形同猪金反鈇砧也烙口力各反謂燒物著人曰烙經文作爍式酌反大集月藏分經第一卷囉𠯋烏礼反字又作䚷依字義廣雅䚷聲也掁觸說文作樘柱也隱音紂庚反字統作棖文庚反棖觸也嫽㲂觸亦作㲂音文𢖍反第二卷齊鼓今清樂中有此鼓鼓面安齊故云齊鼓也𭣠鼓力占反謂以瓦為革為兩靣用杖擊之者也經文作𥲥矛䂎又作𨥨𢦵二形同莫侯反說文矛長二丈建於兵車下千乱友廣雅䂎謂之鋋鋋矛也今江湘已南傒人工用䂎鋋音蟬傒音口奚反經文作非體也䏣倿千餘反謂䏣妬下奴定反諂媚也字從女從仁論語𢙣夫倿者此即從女之義左傳云寡人不倿不能事父兄比即從仁之義也登祚徂故反祚位也祿也亦福也祥也狡猾古夘反下胡刮反方言凡小兒多詐或謂之狡猾亦乱也三蒼猾黠𢙣也佛仍又作䚮䄧二形同而陵反廣疋云仍重也尒疋仍因也乃也第三卷塵曀古文㙪同於計反小尒疋云幽曀闇昧𡨋也尒疋陰而風日曀𥼶名云曀亦翳也使日不明淨也怨讎視周反三蒼怨偶日讎讎對也尒疋讎疋也螽鼠冝作鼨籀文作同之弓反尒疋鼨鼠說文即豹文鼠也經文作螽音終虫名也訓狐關西呼訓侯山東謂之訓狐即鳩𩿍也一名鵂鶹經文作勳胡非體也土梟古彫反𢙣鳴鳥也說文不孝鳥也經文作兔梟或作禿梟非也蔚茂於謂反蒼頡篇云草木盛㒵也廣雅蔚亦茂也翳也期尅渠基反下又作勉同口勒反言必當也經文作忌非也第四卷蕃息父袁反蕃滋也謂滋多也𥼶名息塞也言万物滋息塞滿也今中國謂蕃息為嬔息音疋万反同時一嬔亦作此字第五卷羅媲普結反系捍胡計反下公旦反海島古文隝同都道都皎二反說文海中有山可依止曰島𥼶名島到也人所奔到也亦言鳥人物所趣如鳥之下也迦利或名歌利王論中或作迦藍浮王正言羯利王此云𨶜諍王也第六卷佉伽婆沙又作渴伽皆訛也正言朅伽此譯云犀牛毗沙拏此云角朅音去謁反𦂅呵又作枲同息里反天童女名也依字又作枲籀文作𣙼謂牡麻有子者也陂濼筆皮反下匹莫反大池也山東名濼幽州名淀淀音殿今亦通名也經文從水作泊借音非體也第七卷純淨時均反謂專一不雜也方言純好也大也經文作醇說文不澆酒也又作淳濃之淳其義一也尸仛又作詫譇二形同𠡠嫁反𠃵闥婆名也黃鼬翼周翼赦二反此龍名也朚瞿莫光反儚伽霍𪪺反黚婆利九嚴反枲阿息里反黟乾一号反謫罰都𮧓反通俗文罰罪曰謫字林謫罪過也責也說文罪之小者罰討亦折伏也第八卷婆涑乘侯乘榖二反依字濯生練曰涑去舊垢曰浣一云以手曰涑以足曰浣也雷皷力廻反周礼雷皷皷神礼鄭玄曰雷皷八面者也第九卷讇鞞是反下蒲迷反國名也鄯善時戰反漢書本名樓蘭因傳永子斬其王復更名鄯善在焉耆國南胡國陽關外也黟羅烏奚反阿修羅王名也第十卷遮噠那𠡠轄反國名也依字韻集云咀噠語不正也曰虹胡公反江東俗音絳尒疋音義云雙出鮮盛者為雄雄曰虹暗者為雌雌曰蜺蜺或作霓霓音五奚反𪣀坼美反下恥格反尒疋𪣀毀也坼裂也尒疋𪣀覆也廣疋坼分也大威德陁羅𡰱經第一卷䁋眼又作𥍉同大涉反通俗文一目眨曰䁋謂眇目視白也眨音㽵狹反䁑眼式亦反說文目疾視也眇眼亡紹反說文一目小也𥼶名云目匡陷急曰眇眇小也矘眼他莾反字林目無精直視也亦失志㒵也𥈾眼一决反說文目深㒵也睽眼苦携反廣蒼目少精也說文目不相聽也睒眼式舟戈舟二反說文蹔視也睉眼子戈似弋二反字林小目也睍睴下反下胡本公困二反說文睍目出㒵也睴大出目也謂人目大而突出曰腪眣眼徒結反字書目出也又作凸字苑凸疑言經文作垤蟻堆也垤非經義眅多匹姧匹諫普板三反說文眼多白也春秋傳曰鄭游眅字子明是也繚戾力鳥反下力計反不正也謂相糺繚也經文作膫力彫反脂膫也膫非此義疑且漬反方言凡草木㓨人關西謂之燕朝鮮冽水之閒謂之𦯕懸臃又作𦡚同於反喉中𠬦也𥼶名云𦡚擁也謂氣至擁塞也經文作甕非也第二卷羶臭說文羴或作羶同失然反羊臭也惇直蒼頡解詁云古文敦同都乇反說文惇厚也方也惇信也謂誠㒵也亦擈也大也第三卷洲潬徒亶反尒疋潬沙出也謂水內淨堆也經文作埏音延埏道也埏非字體那唏呼几呼二反婆莆方禹反訢婆虛斤反第四卷百䂎倉乱鸞二反䂎擲也經文作炊字非也𢙢嚇呼嫁反詩云及子来嚇菚云距人曰嚇亦言恐赫或言恐猲皆一義也第五卷冊地楚責反黟荼一奚反虱䶩所乙反下竹皆反第六卷多霤車力救反星宿異名也第七卷勃嘍力口反毱豆㽞渠掬反經文作毬非體也嘔多烏後反阿履那此云山羊正言曷利拏捴言麞鹿等名也麼迦吒莫可反此云猴跋詫𠡠嫁反羅斃蒲計反利鈇方于反莝刃也亦云撗斧也蒼頡篇鈇莝鈇也謂撗斧也莝刃也說文鈇莝斫也謂莝刃也公羊傳云不忍加之鈇質是也嚘嘍於求反囉咤竹嫁反娑俞以朱反上嘶卑以反下斯奚反第八卷指麾字詁今作撝同呼皮反手指曰麾謂旌旗指麾眾也因以名焉因礼逮大麾於田夏后氏所建黝羅於糺一予二反從頻婆羅至黝羅破此數名也第十一卷狗齩又作䶧同五狡反中國音也又下狡反江南音也說文齩齧也經文作骹苦交反䏶膝骨也骹非此用毛𣮧布莽反謂毛布也字林𦋺之方文者曰𣮧通俗文織毛曰𦋺邪文曰𣮧經文作𣯟非也那娜刁可反歧蹬音登娑喃女咸反蜱犁梨反謩羅莫孤反第十二卷閹人於儉反說文閹豎宮中閹昬閇門者也周礼閹人鄭玄曰閹精氣閇藏者今謂之宮人也主閇門戶故曰閹覢電又作睒同式舟反說文蹔見也亦不定也經文作閃窺頭也第十三卷䏣戶且餘反通俗文肉中虫謂之䏣經文作蛆非也疽二形並非體也羅毦人志反廣疋㲥毦𦋺也織毛曰𦋺也㲥音唐第十四卷婆啉力南反依字啉聒也譙也呞食又作𪗪齝二形同𠡠之式之二反尒疋牛曰𪗪謂食已復吐出也第十五卷趂逐丑刃反謂相追趂也關西以逐物為趂也謇居展反下又作㰦同居乞反通俗文言不通利謂之謇吃易云謇難也聲類云吃重言也第十六卷評論皮抦反字書評訂也訂平議也訂音唐頂反䥫𭪿今作𠲿又作觜同子累反廣疋𭪿口也方言𭪿鳥喙也經文作𭉨非也𭉨音似䎡反鵂侯許牛反鵂鶹也亦名訓侯一名鉤鵅晝伏夜鳴者亦名恠鳥從𭔐又作𬝮薖二形同苦和反廣疋橧𭔐巢也小尒疋云雞雉所乳謂之𭔐在樹曰巢在曰𭔐也橧音則恒反第十七卷為捍又作扞同胡旦反說文扞止也亦蔽也衛也經文作翰高飛也長也翰非此用垂胡又作𩑶𠴱二形同戶孤反說文牛頷垂下也𥼶名胡在咽下垂者也經文作𧋌非體也第十九卷斤𣃆居勤反說文斤斫也斤钁也下古文𣃂同竹角反說文𣃆斫也經文作釿魚斤反釿㓵也釿非經義囊埤蒼作東觀漢記作排王弼注書作囊同皮拜反所以冶家用炊火令熾者也而蹶巨月居月二反說文蹶僵也廣疋僵仆也法炬陁羅𡰱經第一卷甝婆乎甘反致奴解反笳吹或作葭同古遐反今樂中有笳卷葉吹之因以名也第二卷阿蘭拏女加反或云阿蘭若或言阿練若皆梵言輕重耳此云空寂亦云閑寂閑亦無諍也蘭音借為力姧反經中有從口作囒義非也善馭今作御同魚據反駕馭也謂指麾使馬也凡言馭者所以驅之也內之於善也鑪鍋字體作又作同古和反方言秦地土釜也翱翔五高反迴飛也飛而不動曰翔𥼶名云翱敖也言敖遊也翔徉也言彷徉也埻的之允之閏二反通俗文射𡊤曰埻埻中木曰的說文射臬也射侯也以熊虎之皮飾其側方制之以為埻臬音牛列反橜也無垜徒果反射𡊤也經文作埵丁果反埵累也埵非此義𡊤音用僮隸力計反周礼男子入于罪隸鄭眾曰奴也賤也伇也僕也字從米聲字從又從崇音之反挾持胡頰反尒疋挾藏也方言挾護也第三卷寥廓或作寥同力彫反埤蒼寂寥無人也廣疋寥深也經文作遼遠之遼非體也停憩又作愒蒼頡篇作𡳅同墟例反尒疋憩息也舍人曰憩臥之息也磧中且歷反廣疋磧瀬也水淺見石者也說文水渚有石曰磧也暴曬蒲卜反下所懈反說文暴晞乾也字從日從出從丱米字意也艸又作拜同巨反兩手持也趣足千屢反趣猶纔也說文趣疾也經文作趍千反疾走也第四卷羇縶又作馵同猪立反詩云縶之傳曰縶絆也亦拘縶也坑穽古文阱汬二形同才性反說文大䧟也蒼頡篇穽謂掘地為坑張禽獸者也呵叱逸反叱亦呵也方言呵怒也陳謂之呵亦叱咄也第五卷阿梨耶此譯云出苦者亦言聖者舩擢又作掉同馳挍反𥼶名在旁撥水曰擢方言搰或謂之擢所以擢舩也帆挽又作颿𩗋二形同扶嚴扶泛二反三蒼颿舩上張布𢗌也𥼶名云舩隨風張幔曰帆謂施舩頭風吹以進也帊音普嫁反餱糧胡鉤反說文餱乾食也詩云乾餱以衍傳曰餱食也經文從米作糇非也為棍古本反棍轉也謂箜篌上轉繩也第六卷蜱羅尸㭪迷反或作閇尸此譯云肉團也猖狂齒楊反謂變易情性也亦狂騃也㽵子猖狂妄行是也㤿襲古文㦻褶二形同辝立反左傳凡師輕曰襲注云掩其不俻也又云夜戰曰襲第九卷舉措且故反蒼頡篇措置也又安也亦施也嘶聲又作𧬊𤺊二形同先奚反埤蒼聲散也亦悲聲也第十卷菅針賈顏反尒疋茅属也白華一名野菅也貪惏字書或作啉今亦作婪同力南反惏亦貪也楚辝眾皆競進而貪惏王逸曰愛財曰貪愛食曰惏桎梏之逸反下古木反在手曰桎在足曰梏蒼頡篇著曰桎㕘著曰梏苛暴賀多胡可二反說文苛尤劇也亦煩擾也剋急也礼記苛政猛於虎是也第十四卷偉壯埤蒼作瑋同于鬼反說文偉奇也䂎棓千乱反韻集䂎鋋也今江湘以南傒人工用䂎鋋音蟬下又作捧同蒲項反說文棓也謂大杖也音他活反第十七卷儕類士皆反字林儕等也儕猶軰類也左傳晉鄭同儕是也鵂鶹許牛反下力周反字書鵂鶹鉤鵅也廣疋鵂鶹鳩鵄也亦恠鳥也関西亦名訓侯山東亦名訓狐繤文云夜則拾人𤓰也甫此方父反𥼶名云甫始也又甫者男子美稱知子莫若於父父言子有用即為美稱故字從父從用父亦聲也田疇直流反國語田疇荒蕪賈逵曰一井為疇九夫為一井也左傳取我田疇注云並畔為疇蒼頡篇田種禾稼也疇耕地也第十八卷芟剉所巖反下千臥反芟𠚫草也芟除除剉猶斫也第二十卷黿虬魚袁反下渠周反黿大龜也廣疋有角曰虬龍熊氏瑞應圖曰虬龍黑身無鱗甲淮南云女媧之時服應龍驂青虬是也坘三蒼音仾下諸律中皆作迷謂大身魚也其類有四種此則第四種㝡小者也㸦相吞食也祁寒渠夷市尸二反尚書冬祁寒小民亦惟怨咨孔安國曰祁大也冬大寒民猶怨也多嘔又作歐同於口反歐亦吐也𥼶名云嘔傴也將有所吐脊典傴也
