body:
  text: 翻經沙門玄應撰大方廣佛華嚴經大方等大集經大集日藏分經大集月藏分經大威德陀羅𡰱經法炬陀羅𡰱經大方廣佛華嚴經第一卷摩竭提或云摩竭陀亦言默偈陀又作摩伽陀皆梵音訛轉也正言摩揭陀此譯云善勝國或云無惱害國一説云摩伽星名此言不𢙣主十二月也陀者𠁅也名為不𢙣𠁅國亦名星𠁅國也揭音渠謁反華梵言俱蘇摩此譯云華摩羅此譯云音蠻案西國結師多用蘇摩那華行列結之以為條貫無問男女貴賤皆此莊嚴或首或身以為飾好則諸經中有華市天寶等同其事也字體從髟音所銜反臱聲臱音然反經文作鬘非體也踰摩字書作逾同𢈔俱反字林踰越也廣匹踰度也言摩𡰱者訛也正言末𡰱謂珠之捴名也罣礙字略作罫同胡卦反礙也下古文硋同五代反説文礙止也又作閡郭璞以為古文礙字説文閡外閉也經文作得音都勒反業衛宏詔定古文官書得得二字同體説文得取也尚書高宗夢得説是也得非此義盧舍那或云嚧柘那亦言盧折羅此譯云照謂遍照也以報佛淨色遍周法界故也又日月燈光遍周𠁅亦名盧舍那其義是也回復又作洄澓二形同胡瓌𭷀福反三蒼洄水轉也澓深也亦回水也深也癡𥌒公戶反三蒼無目謂之𥌒釋名云𥌒目者眠眠然目平合如鼓皮也切剎又作擦同音察梵言差多羅此譯云土田經中或言國或云土者同其義也或作剎土者存二音也即剎帝利名字田主者亦是也案剎書無此字即㓼字略也㓼音初一反浮圖名剎者訛也應言剌瑟胝剌音力割反此譯云竿人以柱代之名為剎柱以安佛骨義同土田故名剎也以彼西國塔竿頭安舍利故也沮壞才與反三蒼沮漸也壞敗也經文作俎側呂反貯醢器也一日置肉几也俎非此用第二卷安跱字詁古文峙今作跱同直耳反廣匹峙止也謂亭亭然獨止立也第三卷攔揗又作闌同力寒反下食允反説文闌檻也通俗文闌檻謂之楯王逸注楚辝云從曰檻撗曰楯楯間子曰𢹝案蘭楯殿上臨邊之飾也亦所以防人墜墮也今言鈎蘭是也群萌古文垊同麥耕反萌芽也廣匹萌始也案萌冥昧貌也言衆庶無知也漢書氓氓群𥠖是也綸力旬反周布也易云綸天地之道注云廣也綸經理也第四卷煥明字書亦奐字同呼換反煥亦明也謂光明炳煥也旗幡極基反釋名云熊虎為旗者軍將所建者象其猛如虎與衆期其下也諧雅胡皆反諧和也謂間雅雍容音聲和也雅素也亦從容妖麗也寮觀力堯反寮窗也蒼頡篇寮小空也説文寮穿也經文有從手作撩或從木作撩二形並非今用也第五卷衆祐于救反祐助也謂衆德相助成也舊經多言衆祐者福祐也今多言世尊者為世所尊也此蓋隨義立名耳仇對渠牛反仇怨也匹也三蒼頡篇云怨耦曰仇廣匹仇𢙣也憤毒扶粉反説文憤悶也方言憤盈也謂憤怒氣盈滿也亦情感也悶音亡本反煩也驚駭胡騃反蒼頡篇駭亦驚也廣匹起也名遏古文閼同安曷反蒼頡篇遏遮也詩傳曰遏止也亦絶也翳目韻集作翳同於計反翳目病也説文目病生翳也並作翳韻集作翳近字也經文有作曀陰而風日曀曀非此義孤煢古文惸儝二形同渠營反無父曰孤無子曰獨無兄弟曰煢煢單也煢煢無所依也字從卂從營省聲卂音雖閏反第六卷毗嵐力含反或作毗藍婆風或作鞞嵐婆或云吠藍婆或作隨藍或言旋藍皆是梵言此譯云迅猛風也聾聵古文類聵二形今作顏又作𦗿同牛快反國語聵不可使聽賈達日生聾曰聵一云聾無識曰聵經文從肉作膭胡對反肥也膭非經義噬諸時制反三蒼解話云噬齧也字林噬啖也啖音徒敢也滌穢徒的反説文滌灑也亦除也謂蕩滌灑除去垢穢也滌亦除也盥掌公緩反説文盥澡手也春秋傳曰奉迤盥案凡澡灑物皆曰盥字體從手臼水臨皿上也臼音居六反經文有更從水作盥非也迤餘支反似勺抦中有道所以注水也發趾音止字林趾足也釋名云足一進一止因以名焉園圃補五反江東音布二音蒼頡解詁云種樹曰園種菜曰圃也詩云無踰我園傳曰有樹也又云折柳樊圃傳曰菜圃也皆其義矣衰耄字體作衰同所龜反説文衰減也亦損也禮記年五十始衰衰懈也今皆作衰下古文耄二形今作耗同莫報反禮記八十曰耄鄭玄曰耄惛忘也亦亂也甲胄古文胄同除救反廣匹兜鍪也中國行此音亦言鞮鍪江南行此音鞮音低鍪莫侯反第七卷八梵八種梵音者案十住斷結經云一不男音二不女音三不強音四不耎音五不清音六不濁音七不雄音八不雌音博綜子送反綜習也三蒼綜理經也謂機綱紀領絲者也第八卷僅半古文㝻廑二形同渠鎮反僅劣也僅猶才也錠光大徑反又音殿三蒼無樹曰錠有柄曰鐙一云無跗曰錠有跗曰鐙亦即然燈佛也諸經中作提洹竭佛梵言也第九卷渾濁後昆後袞二反渾亂也説文渾水流聲一曰汙汙音一胡反𮨇䀎眠見反説文邪視也蒼頡篇旁視也方言自開而西秦晉之間謂視為䀎也第十二卷惠施胡桂反周禮施其惠鄭玄曰賙衣食曰惠孟子曰分人以財謂之惠是也説文惠仁也詩傳云惠愛也貧窶瞿庾反蒼頡篇無財曰貧無財備禮曰寠詩云終窶且貧傳曰窶無禮是也字書窶空也貧陋也福伽羅經論中或作富伽羅或作富特伽耶舊譯云人應云補特伽羅此云數取趣也恃怙古文㤄同時止反下胡古反恃賴也爾匹怙恃也韓詩無父何怙怙賴也無母何恃恃負也妖𧰟又作同於驕反三蒼妖妍也謂少壯妍好之貌也下又作艷同余贍反説文好而長曰𧰟美也方言秦晉之間謂美色為𧰟𧰟美也字從豐音匹弓反盍聲第十三卷摩䨲奴侯反正言摩奴末耶此云意生身言諸天等從意化生也不殉旬俊反尚書殉于貨色注云殉求也亦營也第十四卷六親漢書以奉六親應邵曰六親者父母兄弟妻子也蒼頡篇親愛也釋名云親𭣋也言相隱𭣋也侮慢古文侮同亡甫反廣匹侮輕也説文侮易也謂輕易玩弄也𮞏相古文遞同徒禮反爾匹迭也郭璞日更易也迭音徒結反饌又作餕同仕眷反説文𬾨具飲食也論語先生饌馬融曰饌飲食也老邁莫芥反説文遠行也廣匹邁歸往也詩云日月其邁是也第十六卷沃焦烏木反迦延云沃焦者無限生死案郭璞注江賦云大𭐋在東海外焦海所瀉源水注𠁅也第十八卷相扣哭後反論語以林扣其脛注云扣擊也三蒼作也六瘤力周反通俗文肉胅曰瘤三蒼瘤小腫也尾即無瘤經文作流注之流非也胅音徒結反或遺余季反廣匹遺與也爾匹胎遺也謂相饋遺也遺猶贈也經文從貝作遺近字也冠冕眉辨反世本云黃帝作冕周禮辨師掌王之五冕鄭注云冕延上覆也謂大夫以上冠也噍牙譙笑反蒼頡篇噍咀嚼也説文噍嚼也第二十卷七仞如振反説文仞謂申一尋也取論語夫子之牆數仞苞咸曰七尺曰仞今皆作刃非也第二十一卷禪頭是戰反梵言禪豆或言禪兜或言繕都此譯云衆生也第二十六卷攏攬力東反下胡黯反三蒼攏所以盛禽獸攬闌也廣匹攏牢也謂養禽獸之所也説文攏攬也攬圈也圈音渠遠反捫摸莫奔莫本二反捫亦摸也詩云莫捫朕舌傳曰捫撫持也謂執持也經中有作摩捉日月是也僉皆且廉反僉咸也小爾匹僉同也方言自開而東五國之都謂皆為僉循身古文作徇同似遵反三蒼徇遍也爾匹率循也注云又為循行也循亦巡也巡歷也循自也第二十七卷蠱毒公戶反説文蠱腹中蟲也謂行蟲毒也經文從蟲作蛄音古胡反螻蛄蟪蛄也蛄非此義溉灌歌賚反説文溉灌注也泥潦郎道反説文雨水也謂聚雨水為汙潦也第二十八卷密迹梵言散那此譯云密主密是名以知佛三密功德故也主者夜叉主也案梵本都無迹義當以示迹為神故譯經者義立名耳耎中而兖反梵言沒栗度此云耎通俗文物柔曰耎三蒼耎柔弱也第二十九卷胞胎補交反説文胞兒生裹也爾匹胎始養也軻梨口佐反應云軻地羅此譯云軻者空也地羅者破也名空破山也由𠃵巨焉反大論作揵陀羅山此譯云由揵者雙陀羅者持名雙持山也第三十三卷眩惑古文姰迿二形同侯遍反字林眩亂也漢書𥟖靬條支國善眩案眩亦幻也靬音居言反第三十四卷齗齶牛斤反説文齒肉也齶又作腭咢二形同五各反齒內上下肉也伊𡰱延或云咽𡰱延皆訛也正言黳𡰱延此鹿王名也咽音烏賢反黳烏奚反第三十七卷兩闢脾赤反説文闢開也經文有作僻匹赤反避也又作辟卑亦反辟法也理也辟非此義第四十卷藉草茨夜反案藉猶薦也釋名云所以自薦藉也或級羇立反禮記級次也左傳加勞賜一級又云斬首二十三級案師旋斬首一人賜爵一級因名賊首為級也第四十三卷罪舋羲鎮反舋罪也亦瑕隟也過也字體從𬼉分聲㸑省血祭也象祭竈也第四十四卷澍法之喻上句二反時雨也謂潤生百穀者也説文上古時雨所以澍生万物者是也拜署時去反署位也謂署置之𧆛敬也國語大位政之建也署位之表也謂表識也署所以朝夕𧆛君命也字從四者聲第四十五卷達𭣋義覲反案尊婆須蜜論亦作檀𭣋此云財施解言報施之法名曰達𭣋導引福地亦名達𭣋復次割意所愛成彼施度於今所益義是檀𭣋又西域記云正言達𭣋拏或云馱器𡰱以用右手受他所施為其生福故從之立名也第四十八卷池沼之繞反説文沼池也梵言賀邏馱捴言池水也第五十一卷船舶音白埤蒼舶大船也通俗文吳船曰艑晉船曰舶大者長二十丈載六七百人者是也艑音蒲反門閫又作梱同苦本反三蒼梱門限也禮記外言不入於閫是西阿於何反韓詩云曲亰曰阿阿謂山曲隈𠁅也周羅此譯云小寶也吉由羅應云枳由邏寶此云纓絡呵羅應云珂羅此云金帶舟又作楫同子獵反易云黃帝剡木為楫通俗文擢謂之楫釋名云也撥水使舟疾也宣敘古文愃同雪緣反宣通也爾匹宣遍也説文敘次第也第五十三卷宴集又作𡩷燕二形同於薦反小會也國語親戚𡩷饗賈逵曰不脫履外堂曰𡩷經文有從酉作宴咽二形並非也第五十四卷斑下案古書或作頒同補姧反頒遍也爾匹斑遍賦與也巖崿又作礹同牛衫反説文巖峯也亦峻險也下又作𨺨同五各反通俗文重曰𨺨音言甑也山如重甑曰𨺨第五十五卷囹圄力丁反下魚呂反獄名也周禮三王始有獄廣匹夏曰夏臺殷曰𮊢里周曰囹圄皆獄之別名也𮊢音弋夂反榜笞蒲衡反下又作抬同丑之反字書榜捶也説文笞擊也流𡰱亦名嵐毗𡰱園名也諸經或作此云解脫𠁅亦云斷亦云滅正言藍軬𡰱此云鹽即上古守園婢名也因以名園飯那此云林也軬音扶晚反瞿夷或言曇正言喬答此云明女十二遊經云明女第五十六卷殞滅為愍反聲類云殞沒也滅盡也消絶也繒纊自陵反下今作絖同音曠説文繒帛也纊綿也絮之細者曰纊淵渟狄經反廣匹渟止也埤蒼水止曰渟字書水滯也第五十八卷亘生歌鄧反詩云亘之秬秠傳曰亘遍也經文有作絙音桓綬也又作公曾反大索也並非經意秠音披鄙反𭺙裂冝作攫九縛居碧二反説文攫瓜持也攫扟也蒼頡篇攫持也淮南子云獸窮則攫是也摩伽羅魚亦云摩竭魚正言麼迦羅魚此云鯨魚謂魚之王也風土記云海中有鯨魚長數千里穴𠁅海底出則潮下入則潮上入出有時故有上下無軛又作枙同於革反犁枙也亦車軛也壓牛領者也大方等大集經第一卷降注之喻反説文注灌也瀉也經文從雨作霔非也厭人於舟反鬼名也梵言烏蘇慢此譯言厭字苑云厭眠內不祥也蒼頡篇云伏合人心曰厭字從廠廠音呼旱反猒聲山東音於反第四卷迦陵頻伽經中或作歌羅頻伽或云加蘭伽或言羯羅頻迦或言毗伽皆梵音訛轉也迦陵者好毗伽者聲名好聲鳥也命命梵言耆婆耆婆鳥此言命命鳥是也良祐力張反良善也亦賢也下胡救反字林祐助也多伽羅香此云根香多摩羅跋香此云藿葉香育坘花坘音直尸反此譯云相應花也第六卷七卓知角反卓越也釋名言舉腳有所卓越也燎力燒反鄭玄注周禮云樹於門外曰大燭於內曰燎經文作錠鐐二形又作𤊟並非也摩夷正言摩怛理迦此云本母理為教本故以名焉第八卷不肖先妙反小爾雅云不肖不似也謂不似其先故曰不肖謂儜𢙣之類也字從硇小聲煒燁于匪反下為獵反説文煒盛明貌也方言曄盛也經文作瑋曄非體也耐磨奴代反謂堪能任耐也耐能也蒼頡篇耐忍也穿押古狎反爾雅押輔也謂束也經文作甲非也第九卷援助于眷反謂依援護助之言也窯師餘招反説文燒瓦竈也通俗文陶竈曰窯也村屯徒昆反字書屯亦村也廣雅屯聚也聚音才句反摩納或云摩納婆或云摩那婆或云那羅摩那皆是梵音訛轉耳此譯云年少淨行亦云人也第十二卷揵椎直追反經中或作揵遲案梵本臂吒揵稚臂吒此云打揵稚所打之木或檀或桐此無正翻以彼無鐘磬故也但椎稚相濫所以為誤已久羅差或言洛沙訛也應云勒義此譯云紫色也憍奢耶此譯云蟲衣謂用野蝅絲綿作衣也應云俱舍此云藏謂蝅藏在繭中此即野蝅也趍走又作趨同且瑜反釋名疾行曰趍疾趍曰走圊廁七情反廣雅圊圂屏廁也皆廁之別名也褱異又作傀褻二形同古回反傀美也廣雅傀偉奇玩也禦之古文敔同魚舉反禦當也亦止也爾雅禦禁也娑咩爾反嘍濘洛口反下奴定反婆丘丁禮反囉緹他禮反婆踟直知反第十五卷劫波育或言劫具者訛也正言迦波羅高昌名㲲可以為布𦋺賓已南大者成樹已北形小狀如土葵有聲剖以出如柳絮可紉以為布也紉女反僂躄力矩反僂曲也下方尺反躄不能行也字從止跛蹇又作同補我反下居免反字林跛蹇行不正也窊靣一瓜反廣雅窊下也經文作汙一胡反汙池也櫨欂來都反下蒲麥反三蒼柱上方木也山東江南皆曰枅自陜以西曰㭼枅音古奚反怡懌古文同翼之反下以石反爾雅怡懌樂也經文作津液之液非也監領古文同公衫反方言監察也亦覽也經文作鑒非體也輨轄古緩反下又作𡍦轄二形同胡瞎反方言開之東西曰輨亦曰轄謂軸頭鐵也轄鍵也經文從竹作管非體也𨍊紖又作紖絼二形同直忍反謂牛鼻繩也旒幢字書作統同呂周反謂旌旗之垂者也天子十二旒諸侯九旒是第十六卷焦悸古文痵同其季反字林心動也説文氣不定也笑充之反蒼頡篇輕侮也經文從口作嗤非體也第十七卷郁鳩於六反鳩攡力知反蔚耆於費反曬婆力訃反第二十卷唏隸呼凡反嘍梨力口反經文作娶非也斫啾子由反膝伽私七反經文作非也提蘘而羊反陀徒多反經文作馳非也茂睼吐奚反經文作啼非也遁走今作遁𨔵二形同徒頓反遁逃也廣雅遁避也第二十一卷刀戟居逆反字林有枝兵器也長六尺確盡苦角反孟子曰確薄地也今亦取此確瘦苦角反通俗文物堅硬謂之確今取其義奎星口携反婁星力侯反𭥦星立鈍反觜星子纍反第二十二卷嘻隸盧基反究侜竹流反婆鉹昌氏反陀睼吐反淫婆以鉗反經文作非也至朎胡耽反經文作𤚥一非也仳他父萎反薜荔浦細反下力計反正言閇麗多此譯云祖父或言餓鬼是餓鬼中最劣者也尼鞀徒刀反䉛廁於云反陀喃或作喃喃二形同女咸反𥇔那丑上反經文從口作𫪛非也兵革古核反軍旅之事曰兵革謂兵器雜有皮革也第二十三卷啅啅陟角反兜仇都侯反下渠牛反囉縻丑賜反鞞哹匹尤反噢南於六反伽悢力尚反囉丁奚反經文作䩯非也埏埴尸延反下時力反埏擊也和也埴土也第二十六卷手探他含反説文手遠取曰探也伶俜歷丁反下匹丁反三蒼伶俜猶聰翩也孤獨貌也第二十八卷脰蘘翼之反下而羊反𠸹呿於六反下見庶反經文從豆作或非也膃摩一兀反蹶比日月反第二十九卷迦睇他第反一音徒計反依字傾視曰睇霖雨力金反雨自三日已上為霖係心古文繫繼二形同古詣反係綴也繫束也大集日藏分經第一卷僧伽藍舊譯云村正言僧伽羅磨云衆園也生挑他堯反聲類挑抉也謂以手抉取物也抉音烏決反俱蘭吒花或云拘蘭荼花此譯云紅色花也第二卷逋沙布吾反又作補婁沙或言富留沙皆訛也正言富盧沙此言士夫或言丈夫經中或作甫訛也仳必匹視反羅麼莫可反復䫂都我反馺跛蘇合反娑郵無反咽因賢反摩爹徒可反鉢郎力可反囉栘是奚反三姥亡古反嘻㖑丑一反下呼戒反𢙣踦居綺反窣朱乘伇反迃嘍一禹反下勒口反伊儸力歌反系毗下弟反第三卷唵句烏感反眵提充支反那梯他反頻婆人案佛本行經云頻婆羅此數當十兆也第四卷培鞞蒲口蒲來二反阿紉女反坒絰扶必反下徒德反姧宄居美反廣雅宄盜也左傳在內曰姧在外曰宄第五卷髏頷又作髏同力侯反埤蒼頭骨也下胡感反方言頷頥頷也腥臊又作勝同先丁反下又作鱢同乘勞反通俗文魚臭曰腥假臭曰臊猳音加第六卷𮊵瘠古文膌同才亦反説文膌瘦瘠亦薄也蠅蛆千餘反三蒼蠅乳硇中曰蛆經文從蟲作蛆子餘反蝍蛆蜈蚣也又作疽久癕也二形並非經義得臛呼各反王逸注楚辝云有菜曰羹無曰臛蔔又作同子奚反醬屬也醢醬所和細切曰全物為葅今中國皆言江南悉言葅脊檀相傳力甚反正言棟居屋中也亦言梁牚柱敕庚耻孟二反今謂邪柱為牚也經文作棖非體也任娠書鄰反懷胎為娠漢書孟康曰娠音身今多以娠作兩通也凍暍又作𤵽暍二形同於歇反謂傷熱煩悶欲死也石撩力雕反撩擲也説文作摷相擊也第七卷刪那所姧反龍王名也依字聲類刪定也庰中蒲定反廣雅圊圂庰廁也乳哺蒲路反字林哺咀食也謂口中嚼食也不憚徒且反詩云豈敢憚行注云憚難也亦畏也第八卷人黶烏簟反黑子也説文中黑也翌夷職反下之忍反北方宿名也翌亦作翼些吉蘇計乘餓二反比火天也姓些吉利多耶尼拓地古文祏二形今作同他各反𣪴魚既反説文𣪴有決也孔安國注尚書云煞為果致果為𣪴親昵又作昵同女栗反爾雅昵親近也又云昵亟也親昵亦數也炒粳古文鬻焣炒四形今作崔實四民月令作炒古文奇字作㨎同初狡反方言熬焣火乾也慎警古文憼警二形今作警同居影反警戒慎也廣雅警不安也嘲戲又作啁同竹包反蒼頡篇云啁調也相調戲也第九卷蜎飛於全反字林蟲貌也動也或作呼全反飛貌也桁械胡郎反下胡戒反通俗文云拘罪曰桁械謂穿木加足曰械大械曰桁他恀音是又時移反依字爾雅恀怙恃也䯇䯇苦骨反廣雅䯇勤也埤蒼力作也喫噉口迹反謂喫食也第十卷燂身聲類作燂燖二形字詁古文鬻二形今同詳廉反通俗文以湯去毛曰經文作爓案説文等音皆余贍反又羊占反火爓爓也爓非經義嗽於又作欶同山角反欶吮也經文從口作嗾俗字也刀砧又作椹二形同豬金反鈇砧也烙口力各反謂燒物著人曰烙經文作爍式酌反大集月藏分經第一卷囉𠯋烏禮反字又作𧫦依字義廣雅𧫦聲也掁觸説文作樘柱也隱音紂庚反字統作棖文庚反棖觸也嫽𢿵觸亦作𢿵音文𢖍反第二卷齊鼓今清樂中有此鼓鼓面安齊故云齊鼓也𭣠鼓力占反謂以瓦為革為兩靣用杖擊之者也經文作𥲥矛䂎又作矛𢦵二形同莫侯反説文矛長二丈建於兵車下千亂友廣雅䂎謂之鋋鋋矛也今江湘已南傒人工用䂎鋋音蟬傒音口奚反經文作非體也䏣倿千餘反謂䏣妬下奴定反諂媚也字從女從仁論語𢙣夫倿者此即從女之義左傳云寡人不倿不能事父兄比即從仁之義也登祚徂故反祚位也祿也亦福也祥也狡猾古卯反下胡刮反方言凡小兒多詐或謂之狡猾亦亂也三蒼猾黠𢙣也佛仍又作䚮䄧二形同而陵反廣匹云仍重也爾匹仍因也乃也第三卷塵曀古文㙪同於計反小爾匹云幽曀暗昧𡨋也爾匹陰而風日曀釋名云曀亦翳也使日不明淨也怨讎視周反三蒼怨偶日讎讎對也爾匹讎匹也螽鼠冝作鼨籀文作同之弓反爾匹鼨鼠説文即豹文鼠也經文作螽音終蟲名也訓狐關西呼訓侯山東謂之訓狐即鳩𩿍也一名鵂鶹經文作勳胡非體也土梟古雕反𢙣鳴鳥也説文不孝鳥也經文作兔梟或作禿梟非也蔚茂於謂反蒼頡篇云草木盛貌也廣雅蔚亦茂也翳也期尅渠基反下又作勉同口勒反言必當也經文作忌非也第四卷蕃息父袁反蕃滋也謂滋多也釋名息塞也言万物滋息塞滿也今中國謂蕃息為嬔息音匹万反同時一嬔亦作此字第五卷羅媲普結反系捍胡計反下公旦反海島古文塢同都道都皎二反説文海中有山可依止曰島釋名島到也人所奔到也亦言鳥人物所趣如鳥之下也迦利或名歌利王論中或作迦藍浮王正言羯利王此云鬥諍王也第六卷佉伽婆沙又作渴伽皆訛也正言朅伽此譯云犀牛毗沙拏此云角朅音去謁反枲呵又作枲同息里反天童女名也依字又作枲籀文作𣙼謂牡麻有子者也陂濼筆皮反下匹莫反大池也山東名濼幽州名淀淀音殿今亦通名也經文從水作泊借音非體也第七卷純淨時均反謂專一不雜也方言純好也大也經文作醇説文不澆酒也又作淳濃之淳其義一也尸仛又作詫譇二形同敕嫁反𠃵闥婆名也黃鼬翼周翼赦二反此龍名也朚瞿莫光反儚伽霍𪪺反黚婆利九嚴反枲阿息里反黟乾一號反謫罰都𮧓反通俗文罰罪曰謫字林謫罪過也責也説文罪之小者罰討亦折伏也第八卷婆涑乘侯乘榖二反依字濯生練曰涑去舊垢曰浣一云以手曰涑以足曰浣也雷鼓力回反周禮雷鼓鼓神禮鄭玄曰雷鼓八面者也第九卷讇鞞是反下蒲迷反國名也鄯善時戰反漢書本名樓蘭因傳永子斬其王復更名鄯善在焉耆國南胡國陽關外也黟羅烏奚反阿修羅王名也第十卷遮噠那敕轄反國名也依字韻集云咀噠語不正也曰虹胡公反江東俗音絳爾匹音義云雙出鮮盛者為雄雄曰虹暗者為雌雌曰霓霓或作霓霓音五奚反𪣀坼美反下恥格反爾匹𪣀毀也坼裂也爾匹𪣀覆也廣匹坼分也大威德陀羅𡰱經第一卷䁋眼又作𥍉同大涉反通俗文一目眨曰䁋謂眇目視白也眨音莊狹反眻眼式亦反説文目疾視也眇眼亡紹反説文一目小也釋名云目匡陷急曰眇眇小也矘眼他莾反字林目無精直視也亦失志貌也𥈾眼一決反説文目深貌也睽眼苦携反廣蒼目少精也説文目不相聽也睒眼式舟戈舟二反説文暫視也睉眼子戈似弋二反字林小目也睍睴下反下胡本公困二反説文睍目出貌也睴大出目也謂人目大而突出曰腪眣眼徒結反字書目出也又作凸字苑凸疑言經文作垤蟻堆也垤非經義眅多匹姧匹諫普板三反説文眼多白也春秋傳曰鄭遊眅字子明是也繚戾力鳥反下力計反不正也謂相糾繚也經文作膫力雕反脂膫也膫非此義疑且漬反方言凡草木刺人關西謂之燕朝鮮冽水之間謂之𦯕懸臃又作𦡚同於反喉中硇也釋名云𦡚擁也謂氣至擁塞也經文作甕非也第二卷羶臭説文羶或作羶同失然反羊臭也惇直蒼頡解詁云古文敦同都乇反説文惇厚也方也惇信也謂誠貌也亦擈也大也第三卷洲灘徒亶反爾匹灘沙出也謂水內淨堆也經文作埏音延埏道也埏非字體那唏呼几呼二反婆莆方禹反欣婆虛斤反第四卷百䂎倉亂鸞二反䂎擲也經文作炊字非也恐嚇呼嫁反詩云及子來嚇菚云距人曰嚇亦言恐赫或言恐猲皆一義也第五卷册地楚責反黟荼一奚反虱䶩所乙反下竹皆反第六卷多霤車力救反星宿異名也第七卷勃嘍力口反毱豆留渠掬反經文作毬非體也嘔多烏後反阿履那此云山羊正言曷利拏捴言麞鹿等名也麼迦吒莫可反此云猴跋詫敕嫁反羅斃蒲計反利鈇方于反莝刃也亦云撗斧也蒼頡篇鈇莝鈇也謂撗斧也莝刃也説文鈇莝斫也謂莝刃也公羊傳云不忍加之鈇質是也嚘嘍於求反囉吒竹嫁反娑俞以朱反上嘶卑以反下斯奚反第八卷指麾字詁今作撝同呼皮反手指曰麾謂旌旗指麾衆也因以名焉因禮逮大麾於田夏后氏所建黝羅於糾一豫二反從頻婆羅至黝羅破此數名也第十一卷狗咬又作咬同五狡反中國音也又下狡反江南音也説文咬齧也經文作骹苦交反䏶膝骨也骹非此用毛𣮧布莽反謂毛布也字林𦋺之方文者曰𣮧通俗文織毛曰𦋺邪文曰𣮧經文作𣮧非也那娜刁可反歧蹬音登娑喃女咸反蜱犁梨反謨羅莫孤反第十二卷閹人於儉反説文閹豎宮中閹昏閇門者也周禮閹人鄭玄曰閹精氣閇藏者今謂之宮人也主閇門戶故曰閹覢電又作睒同式舟反説文暫見也亦不定也經文作閃窺頭也第十三卷䏣戶且餘反通俗文肉中蟲謂之䏣經文作蛆非也疽二形並非體也羅毦人志反廣匹㲥毦𦋺也織毛曰𦋺也㲥音唐第十四卷婆啉力南反依字啉聒也譙也呞食又作齝齝二形同敕之式之二反爾匹牛曰齝謂食已復吐出也第十五卷趂逐丑刃反謂相追趂也關西以逐物為趂也謇居展反下又作呿同居乞反通俗文言不通利謂之謇吃易云謇難也聲類云吃重言也第十六卷評論皮抦反字書評訂也訂平議也訂音唐頂反鐵𭪿今作觜又作觜同子纍反廣匹𭪿口也方言𭪿鳥喙也經文作𭉨非也𭉨音似耎反鵂侯許牛反鵂鶹也亦名訓侯一名鉤鵅晝伏夜鳴者亦名怪鳥從𭔐又作𬝮薖二形同苦和反廣匹橧𭔐巢也小爾匹云雞雉所乳謂之𭔐在樹曰巢在曰𭔐也橧音則恆反第十七卷為捍又作扞同胡旦反説文扞止也亦蔽也衛也經文作翰高飛也長也翰非此用垂胡又作胡𠴱二形同戶孤反説文牛頷垂下也釋名胡在咽下垂者也經文作蠹非體也第十九卷斤斫居勤反説文斤斫也斤钁也下古文斫同竹角反説文斫斫也經文作釿魚斤反釿鍔也釿非經義囊埤蒼作東觀漢記作排王弼注書作囊同皮拜反所以冶家用炊火令熾者也而蹶巨月居月二反説文蹶僵也廣匹僵仆也法炬陀羅𡰱經第一卷甝婆乎甘反致奴解反笳吹或作葭同古遐反今樂中有笳卷葉吹之因以名也第二卷阿蘭拏女加反或云阿蘭若或言阿練若皆梵言輕重耳此云空寂亦云間寂間亦無諍也蘭音借為力姧反經中有從口作囒義非也善馭今作御同魚據反駕馭也謂指麾使馬也凡言馭者所以驅之也內之於善也爐鍋字體作又作同古和反方言秦地土釜也翱翔五高反回飛也飛而不動曰翔釋名云翱敖也言敖遊也翔徉也言倣徉也埻的之允之閏二反通俗文射堋曰埻埻中木曰的説文射臬也射侯也以熊虎之皮飾其側方制之以為埻臬音牛列反橛也無垜徒果反射堋也經文作埵丁果反埵纍也埵非此義堋音用僮隸力計反周禮男子入于罪隸鄭衆曰奴也賤也伇也僕也字從米聲字從又從崇音之反挾持胡頰反爾匹挾藏也方言挾護也第三卷寥廓或作寥同力雕反埤蒼寂寥無人也廣匹寥深也經文作遼遠之遼非體也停憩又作愒蒼頡篇作𡳅同墟例反爾匹憩息也舍人曰憩臥之息也磧中且歷反廣匹磧瀨也水淺見石者也説文水渚有石曰磧也暴曬蒲卜反下所懈反説文暴晞乾也字從日從出從丱米字意也草又作拜同巨反兩手持也趣足千屢反趣猶才也説文趣疾也經文作趍千反疾走也第四卷羇縶又作馵同豬立反詩云縶之傳曰縶絆也亦拘縶也坑穽古文阱汬二形同才性反説文大陷也蒼頡篇穽謂掘地為坑張禽獸者也呵叱逸反叱亦呵也方言呵怒也陳謂之呵亦叱咄也第五卷阿梨耶此譯云出苦者亦言聖者船擢又作掉同馳挍反釋名在旁撥水曰擢方言搰或謂之擢所以擢船也帆挽又作帆帆二形同扶嚴扶泛二反三蒼帆船上張布怕也釋名云船隨風張幔曰帆謂施船頭風吹以進也帊音普嫁反餱糧胡鉤反説文餱乾食也詩云乾餱以衍傳曰餱食也經文從米作糇非也為棍古本反棍轉也謂箜篌上轉繩也第六卷蜱羅尸㭪迷反或作閇尸此譯云肉團也猖狂齒楊反謂變易情性也亦狂騃也莊子猖狂妄行是也㤿襲古文㦻褶二形同辝立反左傳凡師輕曰襲注云掩其不備也又云夜戰曰襲第九卷舉措且故反蒼頡篇措置也又安也亦施也嘶聲又作𧬊𤺊二形同先奚反埤蒼聲散也亦悲聲也第十卷菅針賈顏反爾匹茅屬也白華一名野菅也貪婪字書或作啉今亦作婪同力南反婪亦貪也楚辝衆皆競進而貪婪王逸曰愛財曰貪愛食曰婪桎梏之逸反下古木反在手曰桎在足曰梏蒼頡篇著曰桎參著曰梏苛暴賀多胡可二反説文苛尤劇也亦煩擾也剋急也禮記苛政猛於虎是也第十四卷偉壯埤蒼作瑋同于鬼反説文偉奇也䂎棓千亂反韻集䂎鋋也今江湘以南傒人工用䂎鋋音蟬下又作捧同蒲項反説文棓也謂大杖也音他活反第十七卷儕類士皆反字林儕等也儕猶輩類也左傳晉鄭同儕是也鵂鶹許牛反下力周反字書鵂鶹鉤鵅也廣匹鵂鶹鳩鵄也亦怪鳥也關西亦名訓侯山東亦名訓狐繤文云夜則拾人瓜也甫此方父反釋名云甫始也又甫者男子美稱知子莫若於父父言子有用即為美稱故字從父從用父亦聲也田疇直流反國語田疇荒蕪賈逵曰一井為疇九夫為一井也左傳取我田疇注云並畔為疇蒼頡篇田種禾稼也疇耕地也第十八卷芟銼所巖反下千臥反芟𠚫草也芟除除銼猶斫也第二十卷黿虬魚袁反下渠周反黿大龜也廣匹有角曰虬龍熊氏瑞應圖曰虬龍黑身無鱗甲淮南云女媧之時服應龍驂青虬是也坘三蒼音低下諸律中皆作迷謂大身魚也其類有四種此則第四種最小者也㸦相吞食也祁寒渠夷市尸二反尚書冬祁寒小民亦惟怨咨孔安國曰祁大也冬大寒民猶怨也多嘔又作歐同於口反歐亦吐也釋名云嘔傴也將有所吐脊典傴也
