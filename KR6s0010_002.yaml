body:
  text: 翻經沙門玄應撰大般涅經第一卷壽命視柳反案壽亦即命也壽取一期之名命取人之生分但異名耳說文壽久也𥼶名云生已久遠氣終盡也又音視溜反上壽也溜音力救反阿利羅跋提河泥洹經作熙連河皆訛也正言㕧剌拏伐底河㕧剌拏此譯云金伐底此言有名為有金河㕧音許梨反剌力曷反娑羅泥洹經作固林案西域記云此樹在㕧剌拏河西岸不遠有娑羅林其樹形類槲而皮青白甚光潤四樹特高是如來涅之所也等視字詁古文二形今作視同時𣅀時至二反廣雅視觀也說文視瞻也𥼶名云視是也言察其是非也羅睺胡鈎反正言曷羅怙羅此譯云障月但此人是羅怙阿修羅以手捉月時生因以為名也為作于危反下茲賀子各二反為作也又音于僞反二音通用晨朝食仁反尓匹晨早也𥼶名云晨伸也言其清旦日光復伸見也頗梨力私反又作黎力奚反西國寶名也梵言塞頗𦙁迦亦言頗𦙁此云水玉或云白珠大論云此寶出山石窟中過千年氷化為頗𪏭珠此或有也案西域暑熱無氷仍多饒此寶非氷所化但石之類耳𦙁音竹尸反馬腦梵言摩娑羅伽隸或言目娑邏伽羅婆此譯云馬腦案此寶或色如馬腦因以為名但諸字書旁皆從石作碼瑙二字謂石之次玉者是也號哭胡刀反尓匹號呼也大呼也𥼶名云以其善𢙣呼名之也號亦哭也字從號虎聲經文作嘷說文嘷咆也左傳豺狼所嘷是也嘷非此義又從口作呺俗僞字耳涕泣他禮反字林涕泣也無聲而淚曰泣哽噎古文鯁𦛟二形又作鯁同古杏反哽噎也聲類云哽食骨留嗌中也今取其義下於結反說文噎飯窒也詩云中心如噎傳曰憂不能息也嗌音益窒竹栗反經文多作咽於見於賢二反咽吞也咽喉也咽非字體震動之刃反公羊傳曰地震者何地動也周易震動也經文有從手作振掉也掉亦動也二形通用戰掉徒吊反字林掉搖也廣匹掉振動也經文作挑𠡠聊反挑抉也又作恌字與愮同音遙詩云憂心愮愮是也二形並非此義抉音於反逮得徒戴反說文逮及也經文多誤作逯力屬反說文逯謹也亦人姓也逯非經音漱口所溜反說文漱蕩口也經文有作嗽漢書通俗文皆所角反嗽吮也嗽非此用吮音似兖反解未古買反解猶𥼶也案解亦談說也又胡買反廣匹解散也解脫也紹三古文繫同市繞反尓匹紹繼也謂繼續先宗也諡法曰疏遠繼位曰紹充足子欲反足猶止也周備充足也足得也下子喻反足猶成也今謂足成於人也茤摩古文芻同測俱反正言菆摩菆音又句反此譯云麻衣舊云草衣案其麻形似荊芥花青也繒綵在綾反說文繒帛也謂帛之惣名曰繒轅居責反謂轅端頭曲木也𥼶名云軛也所以軛牛頭也經文從車作傳寫誤也廁填古文置同徒堅反三蒼廁雜也廣匹填塞也駿疾子閏先閏二反尓匹駿速也由旬或言由延或言俞旬或云踰闍那皆訛也正言踰繕那此云合也應也計合尓許度量同此方驛也自古聖王一日行也彼繕那亦有大小或八俱盧舍或四俱盧舍一俱盧舍謂大牛鳴音其聲五里昔來皆取八俱舍即四十里也悵悢𠡠亮反下力尚反說文悵望恨也廣匹悢悲也謂悢悢然愁悲也唼食字林子盍反謂蟲食曰唼亦唼血也所𢙣於路反禮記吾𢙣用吾情𢙣猶憎也樓櫓力侯反說文樓重屋也櫓又作櫓同音力古反𥼶名云櫓者露也謂城上守禦露上無屋也竅孔苦吊反竅亦孔也說文竅空也泥洹經作寮力雕反蒼頡篇寮小空也洟唾古文𪖦同𠡠計反三蒼洟鼻液也毀呰古文些㰣二形同子尓反說文呰呵也鄭玄注禮記云口毀曰呰是也惆悵𠡠周反悲愁也說文惆悵失志也廣匹惆悵痛也經文有作憀力雕反聲類憀且也憀非經義當斷古文二形同都緩反斷截也駟馬相一反說文駟一乘也穆天子傳曰獻良馬十駟郭璞曰四馬為駟謂四十匹也從廣足容反小爾匹云從長也廣撗也凡南北曰從東西曰撗此事之恆也多羅案西域記云其樹形如棕櫚極高者七八十尺果熟則赤如大石榴人多食之東印度界其樹最多甘膳上扇反說文膳具食也廣匹膳宍也周禮膳之言善也今時美物亦曰膳也字體從宍善聲經文有從食作膳傳寫誤也紺琉古暗反青赤色也謂青而含赤色也倚牀於蟻反說文倚猶依也廣匹倚因也謂因倚而臥也字從人經文多作猗一奇反美也猗非此義睒婆又作覢同式染反此譯云木綿樂香五孝反樂欲也言此香王愛樂於香也鬼𩲐古文魅𩲐二形同莫反通俗文山澤怪謂之魑魅說文𦒳物精也焚身古文炃燌二形同扶雲反焚亦燒也字從火燒林意也鳬鴈輔俱反下我諫反水鳥也字體從鳥從几音是反鴛鴦字林於袁反下烏廊反梵言斫迦羅婆迦鸚鵡於莖反䳇或作鵡同亡甫反梵言叔迦婆嘻欣基反依字嘻嘻和樂聲也蓊鬱烏孔反下於屈反蓊盛㒵也鬱樹木叢生作倡齒楊反說文倡樂也倡俳也謂倡俳戲笑也白鸖古文鸖今作雀同何各反古今注云白鸖千嵗則變蒼又千嵗則變黑所謂云鸖是也經文有作鵠胡哭反案黃志云鵠形似鸖色蒼黃也雕文古文彫雕二形今作雕同都堯反說文雕琢文也三蒼雕飾也字從彡今皆從佳作雕彡音先廉反欄楯力干反謂鈎闌也今皆從木作欄下音食允反說文楯闌檻也從曰檻撗曰楯是也矛矟古文𢦵鉾二形同莫侯反說文矛長二丈建於兵車也經文有作牟說文牟牛聲也廣匹牟遇也愛也牟非字體矟山卓反埤蒼矟長丈八尺也經文有作梢所交反木名也或作𣓞北人俗字也或作銏江南俗字也金椎直追反蒼頡篇椎打物也案說文䥫為黑金故名金椎也鉞斧古文戉同禹發反說文戉大斧也一云鉞鐄也音撗大釤也𦊰索三蒼古文作𦌾同古犬反聲云𦊰係取也恆垤他踔丑自反計唽唽陟轄反囉啅計曷勞魯交反魯隸摩訶曷勞魯隸阿羅長聲磨羅𭙴多賀反羅莎訶諛諂以珠反下又作讇同丑舟反不擇是非而言謂之諛希其意道其言謂之諂周書面從曰諛三蒼侫言曰諂是也經文有作諭古文諭今作喻同翼樹反喻告也譬諫也諭非經𣅀應時於甑反如響應聲也亦瑞應也魔醯字林呼奚反譯云大自在天也芬馥敷雲反方言芬和調也下𭷀福反字林馥香氣也為向許亮反說文向北出牖也玫瑰字林莫回反下胡魁反石之美好曰玫圓好曰瑰郭璞云玫瑰石珠也蝮蠍匹六反三蒼蝮蛇色如綬文文閒有猪鬣鼻上有針大者長七八尺有牙最毒史記蝮螫手即斷是也灑地所買反通俗文以水撿塵曰灑謂以水灑散之也第二卷除去墟與反去猶除去也沙𠧸力古反謂確薄之地也說文𠧸西方鹹地也𣑕又作枡橙二形同䒱上聲說文𣑕上舉也謂救助也消化呼瓜呼𧟶二反說文化變也謂變化無常先已蘇見反案先猶先也牧牛莫祿亡福二反三蒼牧養也方言牧𩚅也蠲除古玄反方言南楚疾愈謂之蠲郭璞云蠲除也所吞土根他田二反說文吞咽也廣匹吞咽滅也觀行古丸古玩二反說文觀諦視也𥼶名觀望也丸音完茤草古文芻同測俱反小尓匹云稈謂之茤所以飼獸曰茤家嗣古文孠同辝利反尓匹嗣繼也又續也乞匂古賴反蒼頡篇乞行請求也字體從人從言人亡財物則行求匂也蜂螫舒赤反說文蟲行毒也關西行此音又呼各反山東行此音蛆知列反東西通語也漂疾芳妙反漂猶流急也忉利此應訛略也正言多羅夜登陵舍天此譯云三十三也黿鼉魚袁反三蒼似鱉而大也字體從黽元鼉徒多反三蒼似蛟而大山海經云江水鼉郭璞曰似蚸蜴大者長一丈有鱗採皮可以為鼓囹圄力丁反下魚呂反獄名也案廣匹夏曰夏臺拘湯是也殷麥里紂拘文王是也周曰囹圄皆獄之別名也周禮三王始有獄𥼶云囹者領也圄者禦也謂領録囚徒禁禦之也禮記仲春省囹圄是也俾倪三蒼作䫌倪又作㪤堄二形字林普米吾禮反廣雅俾倪𡍕女牆也埤蒼云城上小垣也𥼶名云言於孔中俾倪非常事也亦言助城之高也或言女牆言其卑小比於城若女子之於丈夫也或言𡍕取其重疊之義也羇鎖今作䩭同居猗反𮧓絡馬頭曰羇𥼶名羇撿也所以檢持制之也鎖乘果反字從貝從水醒悟思思定二反字林醉除也眠眩說文作同見田二反下侯遍胡蠲二反廣雅眠眩惑亂也亦暗不明也經文作愐亡善反愐勉也勸也愐非此義巧出昌遂反案出亦出也毛詩出言有章是也頑嚚吳鱞反下魚巾反廣雅頑䤜也蒼頡篇嚚𢙣也左傳心不惻德義之經為頑口不道忠信之言曰嚚是也奉祿防用反奉與也所以奉百官也今皆作俸師範所飢反周禮師氏鄭玄曰教人以道之稱也諡法曰溫故知新曰師尊嚴能憚曰師下今作笵同音犯尓匹笵法也謂揩式法則也通俗文規摸曰範是也故字從竹泛聲說文古法有竹形以土曰型以金曰鎔以木曰模以竹曰笵四者一物材別也偶成字林伍口反偶合也尓匹遇偶也郭璞曰偶尓相值也麥夷職反麥穅也案諸書所無唯趙書有人姓姚名作此字飲餧猗鴆反餧說文作萎同於僞反廣匹飲也除愈古文愈同榆主反方言差愈也說文愈病瘳也第三卷責索阻𮧓反說文責求也經文作債阻懈反近字耳無所師呂反三蒼所𠁅也所猶據也在也經文有作彩案郭璞注尓匹於于皆語之韻絶辝也二形通用不汙於故紆莝二反字林汙穢也汙塗也脫故吐活反脫易也尓匹宍曰脫之剝其皮曰脫也屏隈蒲定反隈說文一𠙽反水曲隩也屏隈謂隱蔽之𠁅也欲又作頍同九吹反計也亦求也以法取之也教詔居效反下諸曜反三蒼教誨也效也詔告也廣匹教語也尓匹詔導也郭璞云謂教導之也勸勵力制反小尓匹云獎率勵勸也謂相勸勵也杪掠古文抄剿二形今作鈔同初效反下掠聲類作剠同力尚反字書抄掠也通俗文遮取謂之抄掠謂強奪取物也班宣案古書或作頒同補姦反頒遍也𧄼瞢徒登丁鄧二反韻集云失臥極也經作瞪沮壞才與反三蒼沮漸也敗壞也經文多作俎側呂反貯醢器也一曰置肉根也俎非此義第四卷深邃古文㥞同私醉反說文邃深遠也乳養而注反說文人及鳥生子曰乳廣匹乳生也嬰兒於盈反三蒼女曰嬰男曰兒𥼶名云人始生曰嬰兒前曰嬰抱之嬰前而乳養之故謂嬰兒也多含字林從玉作琀諸書從口作唅同胡紺反穀梁傳曰具玉曰唅謂資人含與也今取其義夭壽於矯反說文夭屈也廣匹夭拔也夭折也字從夭象形不申也不盡天年謂之夭取此義也甘嗜古藍反廣匹甘樂也嗜亦貪也甘嗜無猒也豪𨤲字體作𣮖力之反說文強曲毛也毫葂毫也十毫曰𣮖皮革古核反皮去毛曰革謂變更之故為皮革字也被服皮寄反謂被帶也經文有作披匹皮反披散也披張也伺鼠滑慈先吏二反字林伺𠋫也察也星宿思育反𥼶名云宿宿也言星各止住其所也種植時職反植謂根生之屬也蠱道功戶反聲類戈堵反蠱蟲病物害人也說文蠱腹中蟲也謂行蟲毒也摴蒲𠡠於他奴二反謂收擲也博物志云老子作之用卜今人擲之為戲滋𦽦古文孖稵二形同子夷反下無願反左傳無使滋𦽦服𧆛曰滋益也𦽦延也謂無使其𢙣益延長也經文作漫謨喚反方言漫敗也漫非經義淤泥於據反字林淤澱滓也今謂水中泥為淤是也素在蘇故反方言素本也素空也謂空虛也歷𥢶空外反字書穅也通俗文米皮曰𥢶陶家又作陶字林大牢反案西域無但露燒之耳史記陶瓦器也蒼頡篇陶作瓦家也舜始為陶諸書亦借音為姚林微梵言藍軬𡰱此云鹽即上古守園婢名也因以名園軬音扶晚反天祠似茲反爾匹祠祭也公羊傳曰春祭曰祠謂物始生思親繼嗣食也子璫都堂反𥼶名云穿耳施珠曰璫本出西戎也角力古文同古卓反禮記習射御角力廣匹角量也高誘注呂氏春秋云角試心月令角升角說文升斛也並單作角經文作捔古文粗字音在古反漢書班固敘傳云捔舉職寮韋昭音義曰捔略也周禮注音亦粗捔非此用木槍千羊反說文槍距也三蒼木兩專𨦣曰槍經文作鏘三蒼鏘鈴聲也鏘非正體專音端博奕古文方言博或謂之棊奕餘石反方言自關而東齊魯之間皆謂圍棊為奕燈爐字又作爐同力胡反火所居也謂凡盛火之器曰爐第五卷卷縮奇員反聲類亦觠字詩云有卷者阿傳曰卷曲也傅以方務反漢書皆傅脂粉傅附也謂塗附之也方言凡飲藥傅藥而毒剌皆是也經文作拊敷主反拊拍也拊非字體暖氣乃短反說文𤌢溫也字從火䎡聲清夷羊脂反說文夷平也字從大聲㽄又作𤺊同蘇奚反埤蒼㽄聲散也經文作嘶悲聲也嘶噎也嘶非此義蜱麻字冝作𦳈萞二形案三蒼布迷反草名也呂靜韻集云𦳈麻其生似樹者也經文作蜱音脾日暴蒲穀反暴曬也說文暴晞乾也字從日從出從草米亦字意也草又作拜音巨共反拱手也振爆方孝補角普剝三反聲類爆燌起也謂皮散起也泛長又作泛同匹劒反說文泛浮也又駃疾也莖幹工旦反枝主也廣匹幹本也三蒼枝幹也門閫又作梱同苦本反三蒼閫門限也三跳他豫達澆二反謂懸擲也穀𧂐子賜反埤蒼𧂐積也第六卷侵嬈乃了反郭璞云嬈弄也擾也謂嬈擾戲弄也妬憋古文嫳同脾滅反方言憋𢙣也郭璞云急性也稗子蒲懈反草之似穀者也讎隙古文𡭴同丘逆反隙舋也說文壁際孔也廣雅隙裂也字從從白上下小經文作鄀地名也聲類云鄀鄉在河內鄀非經𣅀儲君直於反儲𬾨也蔡雍勸學云儲副君也居又患反說文強而奪取曰尓匹取也盜任曰字從算從某音私𢎍君之法理無外聲故從某也算音蘇𡖉反弱冠古玩反禮云男子二十冠而字成人之道也案男子年二十加衣服始著冠為冠𥼶名云二十曰弱冠言雖成人而冠體尚弱也躃地脾伇反謂躃倒也什物時立反三蒼什十也什聚也雜也亦會數之名也謂資生之物也今人言家産器物猶云什物物即器也江南名什物此土名五行史記舜作什器於壽丘漢書貧民賜田宅什器並是也隄塘古文䧑同都奚反下徒郎反說文隄塘也爾匹隄謂之梁李巡曰隄防也障也漢書無隄之輿韋昭曰積土為封限也穿决周易藩决不𮊵王弼徐邈等音皆穴說文胡玦反下流也又音古反廣匹穿也謂穿破也淋漏力金反三蒼淋漉水下也耘除禹軍反除草也經文作藝字與蒷同草名也似苜蓿月令仲冬藝始生是也藝非經𣅀裁有在灾反裁僅也劣也不久也廣匹才暫也三蒼才微見也鄭玄注禮記周禮作裁東觀漢記及諸史賈逵注國語並作裁漢書作才隨作無定體衒賣古文眩𧗳二形同胡麵公縣二反說文行且賣也廣匹𧗳詃也第七卷娉妻今作𮜷同匹徑反問婚也說文聘訪尓匹𮜷問也釜鍑方目甫救二反方言鍑或謂之鬲郭璞曰鍑釜屬也說文鍑如釜而大口三蒼鍑小釜也散香蘇誕反說文散雜也謂散雜碎香者也憒𡗚公對反說文憒亂也丙女孝反𡗚猥也經文作閙俗字也治壓於甲反廣匹壓鎮也經文多作押非體也革屣古文𩌦𩎉二形同所綺所解二反大致徵吏反致至也說文送詣曰致三蒼致到也又與也常翹祇遙反廣匹翹舉也郭璞曰翹謂懸危也為屐巨逆反說文履屬也屐有草有帛者非止木也療治力照反止病日療謂治病也樂味閭咢反蒼頡篇樂喜也木筒徒東反三蒼筒竹管也說文筒斷竹也方言著筒也郭璞曰謂盛匕箸也經文作筒說文徒棟反謂無底蕭也今亦為筒字钁𣃆古文同竹角反𣃆削也說文𣃆斫也霸王今作𧟶同補駕反國語晉猶霸賈逵曰霸猶把也言把持諸侯之㩲也諸侯把王事臣道也故字從月䨣聲䨣音匹各也步屋纂文云吳人以步屋名乘闔方言尺蠖又名步屈是也闔古合反第八卷治目莫鹿莫六二反說文人眼也象形目視也亦見也造詣七到反說文造就也廣匹造詣也金椑案荀揩誥幼文字冝作篦音方奚反經文多作椑假借耳鵝鴈五諫反爾匹舒鴈鵝孫炎曰鵝一名舒鴈方言云江東呼為鴚鵝也鴚音加仿佛古文作眆䀟聲類作髣佛同芳往反下芳味反謂相似見不諦也大舶音白埤蒼舶大船也大者長二十丈載六七百人者是也愞弱三蒼奴課反亦弱也䆿言牛世反通俗文夢語謂之䆿說文眠言也聲類不覺妄言也經文多作讇案諸字書字與諂同侫言也今多以是鹽以占二反此或俗語假借耳未詳何證樘觸音隱紂庚反說文樘柱也何承大繤文云樘觸也又作敝敲二形也經文多作棠徒當反三蒼棠杜梨也爾匹杜甘棠是也棠非此義文字品字者文字之揔名梵云𢙣𠛴羅譯言無異流轉或言無盡無盡是字字在紙墨可得不滅借此不滅以譬常住凡有四十七字為一切字本其十四字如言三十三字如是合之以成諸字即名滿字滿者善義以譬常住半者𢙣義以譬煩𢙉雖因半字根本得成滿字乃是正字凡夫無始皆由無明得成常住乃是真實故字之為義可以譬道大涅經其義如此案西域悉曇章本是婆羅賀磨天所作自古迄今更無異書但點畫之閒微有不同耳悉曇此云成就論中悉檀者亦悉曇也以隨別義轉音名為悉檀婆羅賀磨天者此云淨天舊言梵天訛略也字音十四字𧙑烏可反阿一伊塢烏古反烏理重𨤲力之反黳烏奚反藹汗烏故反奧此十四字以為音一一聲中皆兩兩字同長短為異皆前聲短後聲長菴𢙣此二字是前𢙣阿兩字之餘音若不餘音則不盡一切字故復取二字以窮文字比聲二十五字迦呿伽𠷐其柯反俄魚賀反舌根聲凡五字中第四字與第三字同而輕重微異遮重車闍膳時柯反若耳賀反舌齒聲吒重咃丑加反荼組佇賈反拏上咢聲多他陀䭾徒柯反那奴賀反舌頭聲波頗婆婆去摩莫個反脣吻聲蛇重羅盧舸反羅李舸反縛奢沙娑呵此八字超聲金磺古文𮀑字書作礦同孤猛反說文礦銅䥫璞也經文作丱周禮丱人掌金玉之地劉昌宗侯猛反又音口猛反注云丱之言礦金玉未成器曰丱兩義大同仍以初體為正月蝕神職反周易云月盈即蝕𥼶名云日月虧曰蝕稍稍侵虧如蟲食草木葉也漢書云日月薄蝕韋昭曰氣往迫之曰薄虧毀日蝕也彗星蘇醉反字林囚芮反𥼶名云彗星星光稍稍似彗也爾匹彗星搶孫炎曰妖星也四曰彗郭璞曰亦謂之孛𥼶名云言其孛孛然似掃彗也音叉銜反槍叉行反第九卷廝下又作廝同思移反廣匹廝謂命使也字書廝伇也謂賤伇者也漢書廝與之卒張晏曰廝微也韋昭曰析薪曰廝炊烹曰養怖遽渠庶反廣匹遽畏懼也疾急也經文有作懅書史所無唯郭璞注爾匹𥼶言中淩懅也作此字二形通用咄善字林丁兀反說文咄相謂也字書咄叱也密緻又作𮉙同馳致反緻亦密也鬱蒸於物反爾匹鬱氣也李巡曰鬱盛氣也蒸之勝反說文蒸火氣上行也乳哺薄路反哺含食也謂口中嚼食也經文作餔字與晡同補胡反謂申時食也創皰古文創刃二形同楚良反說文創傷也經文作瘡近字耳又音楚悢反創始也非今所取皰又作靤同輔孝反說文皰面生氣也經文作疱猶俗字耳㿃下又作䐭字林同竹世反㿃赤利也閞中多音滯三蒼㿃下病也𥼶名云下重而赤白曰㿃言厲䐭而難差也經文作蜇字與蛆同知列反蟲螫也又作哲也又作哲了也智也二形並非經𣅀著後中恕反著之言𠁅也廣匹著補也亦立也第十卷祠祀徐理反祭無已也謂年常祭祀潔敬無已也爾匹祭祀也舍人曰祀地祭也禮記王者為群姓立七祀諸侯五祀大夫三祀士二祀庶人一祀或竈鄭玄曰此大神所祈大事者小神居民間伺小過作譴告者也輕躁又作躁同子到反周易震為躁躁猶動也躁擾也論語曰言未及之而言謂之躁鄭玄曰謂不安靜也口爽所兩反爽敗也楚人名美敗曰爽肴饌又作饌同士眷反說文饌具飲食也悵怏於亮反說文怏心不服也蒼頡篇怏懟也唐捐徒郎以專反案唐徒也徒空也說文捐弃也怡恱古文同弋之反爾匹怡樂也方言怡喜也說文怡和也姝大充朱反說文姝好也色美也方言趙魏燕代之閒謂好為姝異又作傀同古回反傀美也方言傀盛也說文傀偉也偉奇也廣匹傀偉奇玩也溉灌哥賚反說文溉灌也謂灌注也診之說文之忍反診視之也三蒼診𠋫也聲類診驗也恕己尸預反蒼頡篇恕如也聲類以心度物曰恕綜習子宋反三蒼綜理繼也謂機縷持絲文者屈繩制經令得開合也𮊵瘠古文𤹠𤶬三形同才亦反說文膌瘦也第十一卷習習經文從疒作㿇書無此字近人加之耳噦噎於越反說文噦氣悟也通俗文氣逆曰噦痲力金反聲類痲小便數痲也經文作淋說文水沃也廣匹淋漬也淋非此用懟恨古文譵字林同丈淚反爾匹懟怨也缺㰦又作呿同丘庶反通俗文張口運氣謂之缺㰦不御魚據反御侍也進也廣匹御使也蟠龍蒲寒反方言未升天龍謂之蟠龍廣匹蟠曲也蟠委也經文有作古字通用也劈裂匹狄反說文劈破也廣匹劈裂也亦中分也麒麟渠之理真反公羊傳麟仁獸也說文𪊽身牛尾一角角頭有宍經文作騏說文馬文如綦文驎力振反爾匹白馬黑脣曰驎二形並非字義僧坊甫房反字林坊別屋也脫能吐活他外二反廣匹脫可也脫尓也謂不定之辝也坐肆相利反肆陳也陳物𠁅也肆列也謂列其貨賄於市也氍毹渠俱反下山于反通俗文織毛蓐曰毹細者謂之毾㲪經文作氀力于反氀毾也氀非字體毾㲪他盍反𥼶名云施之大牀前小榻下所以登上牀者因以為名焉䩸衣三蒼而用反說文䩸鞍毳飾也或作㲨而容反謂古貝垂毛也或作毦人志反廣匹㲥毦𦋺也織毛日𦋺三形通取於義無失經文作茸而容反說文茸草茸也茸非此義子姊葉反案字詁古文今作接謂接木之子也經律中種子是也大威德經中作接子故南經本皆作接字但舊譯本中接多作如上文中節頭相是也字體從又從止巾聲經文從聿作聿非體也又音才妾反說文云疾也非今所取今有經本改作子音都計反取爾匹棗李曰之削瓜者之為證此乃並是治擇之名非言種也故鄭玄注禮云謂撗去其也又撿諸經中並無種冝從初讀為正枕案天笁無木枕皆以赤皮疊布為枕貯以兜羅綿及毛枕而且倚言其赤色也六博說文𡱈戲六箸十二棊也古者烏曹作博方言博或謂之棊或謂之曲道吳楚之閒或謂之箭或謂之博博亦箸名也拍毱古文𥷥今作鞠字林巨六反郭璞三蒼云毛丸可踏戲者曰鞠踏鞠兵勢也所以陳武士簡才力也劉向別録曰蹴鞠也新書二十五篇傳云黃帝所作云或起戰國時託云黃帝也擲石案漢書甘延壽投石拔距張晏注云飛石重十二斤為機發行三百步延壽有力能以手投之也卜筮時世反禮記龜為卜蓍為筮卜筮者所以决嫌疑定猶豫故疑即筮之字體從竹從巫筮者揲蓍取卦折竹為㕛故字從竹也揲音食列余列二反遍耳經文有作身字恐傳寫誤也第十二卷腦胲依字說文古才反足大指也恐非今用案字義冝作解音胡賣反謂腦解也案無上依經解三十二相中二如來頂骨無解是也諸經中作頂骨堅實同一義也或古字耳腨骨或作同時兖反說文腨腓腸也字從肉專聲柱髀古文䠋同蒲米反北人行此音又必尓反江南行此音𥼶名髀卑也在下稱也經文作跓䏶二形此並俗字非其體也髖骨或作臗同口丸反埤蒼臗尻也說文髖髀上也頷骨胡感反方言頷頜也郭璞云頷車也南楚之外謂之頷秦晉謂之頷也今亦通語耳𥼶名云正名輔車言其骨強所以輔持口也左傳云輔車相依姿態古文㑷字林同他代反意姿也謂能度人情㒵也視𪱄列子作瞬通俗文作眴同尸閏反說文瞚目開閇數搖也服𧆛云目動曰眴也因的古文㢩說文作的同都狄反的明也詩云彼發有的傳曰的射質也謂的然明見也今射𡊤中珠子是也箭中知仲反禮記射中即得為諸侯不中不得為諸侯是也撾打又作𥬸同竹瓜反撾撻也字體從木過聲楚撻楚一名荊也撻古文同他達反箠也廣匹撻擊也咳逆枯戴反說文咳逆氣也字林咳嗽也經文多作咳胡來反咳謂嬰兒也咳非今用𦫿白五蓋反爾匹𦫿𣲙臺言其色似𦫿也𧹞然奴盞反方言𧹞愧也小爾匹云面愧曰𧹞說文𧹞面慙赤也背僂力矩反廣匹云僂曲也通俗文曲脊謂之傴僂經文有作瘻音陋病也瘻非字義挑其他堯反說文挑抉也以手抉挑出物也螺王古文同力戈反螺𧉻也經文作䗍力西力底二反借音耳發撤除列反撤去也撤壞撤除也敷在古文敷同匹于反敷遍也小爾匹頒賦敷布也開剖普厚反剖猶破也蒼頡篇剖析也說文剖判也𨱞尾古文𨱨同莫高反說文𨱞髮也謂毛中之𨱞也經文有作騣子公反聰睿古文睿籀文作壡同夷歲反說文睿深明也通也廣匹睿智也字從取其穿也目取明也從谷省取響應不窮也音在安反撓大許高反說文撓擾也經文作㧌俗字也往討古文䚯同恥老反漢書音義曰討除也禮記注云討誅也第十三卷耽湎古文媅妉二形諸書作鴆沈二形同都含反說文媅樂也國語耽嗜也湎古文䤄同亡善反說文湎沈於酒也謂酒樂也瘜肉方言作𦞜同思力反說文奇肉也三蒼𢙣肉也蟲䏣字林千余反通俗文肉中蟲謂之䏣三蒼䏣蠅乳肉中也經文作蛆子余反蝍蛆又作疽久癕也二形非此義創痍羊之反三蒼痍傷也通俗文體創曰痍頭創曰瘍左傳曰生瘍於頭鬱特梵云鬱特迦此水之一異名也特音徒得反第十四卷矬人才戈反廣匹矬短也通俗文侏𪝥曰短經文作痤說文痤小腫也痤非經義生涎諸書作涎𣼞三形同詳延反字林慕欲口液三蒼作涎小兒唾也因燧正字作鐆同辝醉反火母也論語鑽燧改火孔安國注一年之中鑽火各異木是也世本曰造火者燧人因以為名因鑽子丸反又音子亂反說文所以用穿物者也因捊案詔定古文官書抱桴二字同體音扶鳩反謂鼓椎也道撿居儼反蒼頡篇撿法度也撿亦攝也𮨇亡見反說文邪視也方言自關西秦晉之閒曰䀎船舫甫妄反通俗文連舟曰舫併兩舟也炎旱于廉反炎熱也爾匹炎炎熏也謂旱氣熏𬉹人也薄祜胡右反爾匹祐福也天之福也又云祐厚也謂福厚也第十五卷儴佉爾羊反又霜傷二音梵言餉佉或云霜佉此譯云貝也亦云珂異名耳水渧此猶滴字耳音都歷反通俗文霝滴謂之渧音丁計反趍走且榆反趍疾行也爾匹門外謂之趍是也性戾字林力訃反乖戾也說文戾曲也字體從犬敦喻古文惇同都𦘴反爾匹敦勉也謂相勸勉也豌豆一丸反廣匹豌豆䝀豆也經文作又作𧯡一月反二形並非字體其鏃字林子木反鏃箭鏑也江南言箭鏑也江東言箭足𥼶名云箭本曰足古謂箭足為箭族爾匹金族箭羽是也覺寤居效反寤覺也蒼頡篇覺而有言曰寤經文作悎文字所無又作悟謂解悟之悟非眠後覺寤也第十六卷天笁或言身毒或言賢豆皆訛也正言印度印度名月月有十名斯一稱也良以彼土聖賢相繼開悟群生照臨如月因以名也一說云賢豆本名因陀羅婆他那此云主𠁅謂天帝也當以天帝所護故世人號之耳馳騁直知反下丑領反廣匹馳奔也騁走也私吒古文喥同竹嫁反依字吒噴也服𧆛云痛惜曰咤是也四衢懼虞反爾匹四達謂之衢郭𤩶曰交道四出也𥼶名云齊魯謂四齒把為懼㩴把地即有四𠁅此道似之因為名焉為臛呼各反王逸注楚辝云有菜曰羹無菜曰臛也刵劓如志反下古文劓同魚器反字林刵斷耳也劓刖鼻也尚書云無或劓刵人是也蚉𭪿今作𠲿又作觜同子纍反廣匹𭪿口也字書鳥喙也經文作𭉨撿諸經史無如也字傅毅七激云𭉨埴飲泉作此字音與吮同徐䎡反𭉨非字義憲制欣建反憲法也爾匹憲制法則也廣匹制梵也制亦法度也字從心從四害省聲熊羆胡弓反說文熊如豕山居冬蟄其掌似人掌名曰蹯羆彼冝反爾匹羆如熊黃白文郭璞曰似熊而長頭似馬有䭷高腳憨多力能拔木關西名猳羆蹯音扶袁反憨呼藍反猳音加唯仰語向反韻集云仰恃也謂取資於人曰仰仰亦望也編椽卑綿反蒼頡篇織也聲類似繩次物曰編謂取𣗥㓨編椽而臥也氀毼力于反廣匹氀毼𦋺也粗𦋺也聲類毛布也茹菜攘舉反廣匹茹食也茹食之也第十七卷畏省思井反省察也說文省視也詎有渠據反詎猶何也未也謂未知詞也第十八卷良祐古文𨳾二形同胡救反祐者助也天之所助者也撓濁乃飽乃挍二反說文撓擾也又曰撓亂也第十九卷無𦍬古胡反爾匹𦍬罪也禮義之罪也流惻聲類作𢝔同楚力反廣匹惻悲也說文惻痛也謂惻然心中痛也𦙁子又作同竹尸反母名也髡樹口昆反廣匹髠截也字體從髟兀聲左傳使人髠之深穽古文阱汬二形同慈性反廣匹穽坑也說文大陷也三蒼穽謂穽地為塹所以張禽獸者也潤漬在賜反說文漬漚也謂水浸潤物也怨讎視周反讎憎𢙣也讎對也爾匹𬽦讎匹也怨之匹也怨偶曰讎在弶渠向反字書施𦊰於道謂之弶其形似弓經文作俗字也而今作試同尸至反左傳自虐其君曰弒周易臣君子弒父非一朝一夕其所由來漸也𥼶名云下煞上曰伺也伺閒而後得其便也淫慝以針反說文淫私逸也小爾匹男女不以禮交曰淫下他則反禮記世亂即禮慝鄭玄曰慝穢也詩云死失靡慝傳曰慝邪也邠坘鄙旻反坘古文同直飢反梵言也正云阿那他荼陀阿那他此云無依亦名孤獨荼他此云團施言此長者好施貧獨因以名焉本名須達多判合古文胖又作牉同普旦反說文胖半體也周禮媒氏掌万民之判鄭玄曰判半也得偶而合曰判喪服云夫妻判合是也經文有作泮氷𥼶也泮非此義鄙悼補美反鄙恥也陋也悼徒到反悼傷也方言秦晉謂傷為悼悼亦哀也甲胄除救反說文胄兜鍪也字從月由聲閒閒上居莧反閒隔也爾匹閒代也謂錯相代也閒亂也下古間反間猶𠁅所也閒中也第二十卷星口携反爾匹降婁婁也李巡曰降婁白虎宿也經文有作金星太白星也冝從字讀圊廁字林七情反廣匹圊圂庰廁也皆廁之別名也𥼶名云或曰清言至穢之𠁅冝修治使潔清也或曰圂言溷濁也罪戾力計反爾匹戾罪也漢書有功無其意曰戾有其功有意曰罪戾定也逆津子鄰反論語云子路問津焉鄭玄曰津濟渡之𠁅也坐此慈臥反案坐罪也謂相緣罪也蒼頡篇坐𦍬也鹽䥫論曰什伍相連親戚相坐若引根本而及華傷小指而纍四體是也第二十一卷讖記楚蔭反說文讖驗也謂占後有效驗也𥼶名讖纖也其義纖微而效驗也不登都恆反登升也周禮以歲時登鄭玄曰登成也漢書云再登曰平第二十二卷恃怙胡古反爾匹怙恃也韓詩云無父何怙怙賴也無母何恃恃負也襯身且若叉覲二反襯至也近也坌之蒲䪺反通俗文𡋯土曰坌說文坌塵也回復三蒼作洄水轉也宣帝紀作澓回水也深也船筏扶月反桴編竹木也大者曰筏小者曰桴音匹于反江南名𥱼音父佳反經文從木作筏非體也第二十三卷連綴張衛反亦連也說文綴合著也難兾又作覬同居致反望也說文覬幸也餧𩚅石經今作食同囚恣反聲類𩚅哺也說文𩚅糧也從人仰食也謂以食供設與人也故字從食從人意也經文作飼俗字也瓨器下江反說文似罌長頸受十升也手抱說文作捊捊或作抱同步交反捊引取也通俗文作掊音蒲交反手把曰掊駃河三蒼古文使字或作駛同山吏反蒼頡篇駛疾也字從史經文從夬作駃古反駃騠駿馬也列女傳曰生三日超其母也駃非字義夬音古快反迦迦羅腳佉反是鳥聲也迦迦此云烏究究羅居求反此是雞聲也鳩鳩吒此云雞呾呾羅都達反此是雉聲也或言䳺鶉依梵音帝栗反第二十四卷怡懌音以之反怡懌樂也郭璞曰怡心之樂也懌意解之樂也燎力照反周禮供墳燭燎鄭玄曰墳大也樹於門外曰大燭於內曰燎第二十六卷逐塊古文凷同苦對反結土也土塊也黐𠡠支反廣匹黐黏也字書木也謂黏物者也溫故烏昆反論語溫故而知新何晏曰溫尋也禮記鄭玄注云後時習之溫經文作慍於問反慍恚也怨也恨也慍非字義第二十七卷我適尸赤反廣匹祗適也適近也始也鋒古文同無方反字林禾秒也謂其刃纖利如也哮吼古文同呼交呼挍二反通俗文虎聲謂之哮唬埤蒼哮嚇大怒聲也唬音呼家反毳衣尺鋭反三蒼羊細毛也說文獸細毛也第二十八卷立拒其呂反此外道瓶圓如瓠無足以三杖交之舉於瓶也諸經中或言執三奇立拒或言三叉立拒皆是也𤌢案韻集音古孝反酒酵也謂起麵酒也經文多作醪音勞三蒼說文皆云有滓酒也醪非字體雲表碑反三蒼表外也言此星在雲外也爐冶餘者反說文冶銷也三蒼治銷鑠也遭熱即流遇冷即合與氷同意故從氷也第二十九卷縵借音莫盤反謂內縵其指閒也傭滿𠡠龍反爾匹傭均也齊等也經文作𦟛俗字也粗自在古反粗略也粗也賦給古文同甫務反說文賦𣫍也廣匹賦稅也方言賦動也謂賦𣫍所以擾動也爾匹賦量也郭璞曰賦稅所以平量也奩底今作同力占反蒼頡篇盛鏡器名也謂方底者也憩駕說文作愒蒼頡篇作同却厲反爾匹憩息也注云憩止之息也苟能公厚反廣匹苟誠也苟且也韓詩苟得也婚姻今作昏說文婦嫁也禮云娶婦以昏時入故曰昏爾匹婦之父為昏姻古文姻二形今作因說文𦕓家也女之所因故曰因爾匹𦕓之父為姻𦕓音細第三十卷駿馬子閏反馬之美稱也說文駿馬之才良者也𣫍古文殮同力𧰟反衣尸也𥼶名云𣫍者𣫍也藏不復見也小𣫍戶內大𣫍於阼階是也孚乳通俗文𡖉化日孚音匹付反方言雞伏而未孚字林匹于反廣匹孚生也謂子之出於卯也說文𡖉孚也或曰孚伏也謂育養也乳而注反蒼頡篇乳字也養也謂養子也和液夷石反說文液津潤也廣匹酒滋液也第三十一卷得衷知冲反左傳楚僻我衷杜預曰衷正也衷中當也尚書衷善也蒼頡篇別內外之辝也經文作中平也隨作無在遺燼正字作同似進反說文火之餘木也菅草古顏反爾匹菅茅屬也詩傳曰白華野菅也經文作葌字書與簡字同葌蘭也說文葌香草也葌非此用甘鍋字體作所用古和反方言秦云上釜也字體從鬲聲今皆作鍋撓攪古卯反說文攪亂也詩云祇攪我心是也嘲調正字作啁同竹包反下徒豫反蒼頡篇云啁調也調相調戲也經文有作囈相承音藝未詳何出或作譺五戒反字林欺調也亦大調曰譺也賈客公戶反周禮商賈鄭玄曰行曰啇𠁅曰賈白虎通曰賈之言固也固其物待民來以求其利者也又音古匹反刖足古文跀𧾾二形同五刮魚厥二反刖斷足也周改作刖廣匹刖色也謂斷足即色也音扶忍反色音慈恱反盲瞽公戶反無目謂之瞽𥼶名云瞽目眠眠然目平合如鼓皮也第三十二卷如駝食蜜徒多反馲駝也蜜㓨蜜也羅毦仁志反通俗文毛飾曰毦矟上垂毛亦曰毦絍婆古文䋕同女林如深二反樹名也苦可煮為飲治頭痛也如此閒苦楝樹也言此蟲甘之耳棟音力見反瑕疵古文𤶬字林才雌反說文疵病也礠石徂茲反埤蒼礠石也謂召䥫者也灌綆或作觀同古亂反汲器也綆格杏反說文汲井繩也方言韓魏閒謂之綆𦊱礙又作罫同胡卦反字書礙也蘆蔔字林力何反下蒲北反似菘紫花者謂之蘆蔔第三十三卷粟𢇲字體作穈𪎭二形同皮反禾稔也關西謂之𢇲州謂之穄線磚字體作甎同脂緣反又音船毛詩載弄之凡注云紡專也詩中作專此由古字通用耳𭃰身烏官反字林𭃰也音一玄反挑也明字書作殼同口角反吳會閒音口角反𡖉外堅也案凡物皮皆曰殼是也淫佚今作妷同與一反佚樂也蒼頡篇佚惕也惕音蕩第三十六卷巴吒百麻反案阿含經此長者因國為名也經文作把比雅反亦是梵音訛轉耳坘三蒼音低下音迷律中坘皆作迷字應言帝祗羅謂大身魚也其類有四種此第四最小者也法炬經中低迷冝羅即第三魚也皆次第㸦相吞噉也䱜魚且各反𦵮珝異物志云鐇䱜有撗骨在鼻前狀如斧斤江東呼斧斤為錯故謂之鐇錯也此類有二十種各異名如鋸䱜等齒利如鋸即名鋸錯也鐇音府煩反珝音虛矩反惋手烏喚反謂驚異也未詳何義立名也刁長都堯反人姓也或可因事立名耳行般乎庚反此人利根無待勤行自能得滅成實論中不行滅人是也第三十七卷霑汙致廉反霑𣽈也三蒼霑濆也魍魎說文蜽從蟲字書從鬼同上強反下力掌反通俗文木石怪謂之魍魎言木石之精也淮南說狀如三歲小兒赤黑色赤目赤爪長耳美髮也第三十八卷煒燁上于匪反下為獵反方言煒燁盛㒵也三蒼光華也虎又作同徐里反尓匹兕似牛郭璞曰一角青色重千斤摶食徒官反說文摶圜也三蒼摶飯也經文作揣丁果初委二反揣量也揣非字義法厲古文礪同力制反磨石也細於礪皆可以磨刀刃也獷古猛反獷強也說文獷大不可附也經文作穬穀也穬非字體笑充之反蒼頡篇輕侮也笑私妙反字林笑喜也字從竹從犬聲竹為樂器君子樂然後笑刨須蒲交反案刨文字所無冝作抱又作棓齚齧古文齰又作咋同士白反通俗文䶧啖曰齚第三十九卷瞿又作你同女履反猶汝也謂尓汝如來姓氏也榛木仕巾反廣匹云木藂生曰榛草藂生曰薄也第四十卷車輿與諸反說文車輿也亦揔稱車曰輿一曰車無輪曰輿鉤餌正字作𧊗同如志反服𧆛云鉤魚曰餌欶乳又作嗽同所角反三蒼云欶吮也通俗文含吸曰嗽經文作𡂡此俗字也戶𨷲古文鑰同余酌反方言關東謂之鍵關西謂之𨷲文作籥字林書僮笞也文云關西以書篇為籥籥非此義笞赤占反婆嵐力含反案諸字部無如字唯應詩云嵐山寒折骨作此字賴締徒計反依字說文締結不解也
