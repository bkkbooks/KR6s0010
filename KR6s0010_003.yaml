body:
  text: 翻經沙門玄應撰摩訶般若波羅蜜經放光般若經光讚般若經道行般若經小品般若經明度無極經長安品勝天王般若經仁王般若經金剛般若經摩訶般若波羅蜜經第一卷婆伽婆舊云有大功德至聖之名也正言薄伽梵薄伽此譯云德梵此言成就義衆德成滿名薄伽梵又此一名捴攝衆德餘即不爾故諸經首皆置此名那伽此譯云龍或云象言其大力故以喻焉三昧莫蓋反此云等持等者正也正持心也持謂持諸功德也希望説文作睎同虛衣反睎望也海岱之間謂睎廣雅睎視也下無方反説文出望在外望其還也字從望省聲若音無放反説文月滿與日相望也字從月但此二字音體人多不辨故此兩釋心行下庚反謂遊履也光讚經云所趣所行大論云問云何𭜧知衆生心行答菩知衆生心種種法中𠁅𠁅行即維摩經云善知衆生往來所趣及心所行其義一也今有讀為下孟反誤也罣礙又作罫同胡卦反字書礙也礙止也剌那盧割反光讚經作羅鄰那竭菩譯云寶積舊維摩經漢言寶事放光經作寶來案梵本云曷剌怛那揭婆此云寶臺或云寶藏皆一義也經文有作𦋺居例反非也滿豫音餘與二音三蒼解詁云此與字梵言經中或作滿濡或作文殊師利或言曼殊尸利皆訛也或言敬首舊維摩經漢言濡首皆義譯也正言曼殊室利此云妙吉祥經中有作漙首案漙此古文普字疑譺也應作漙音而朱反但字形相濫人多惑耳繫念古文繫繼二形今作係同古帝反説文係結束亦連綴不絶也兩腨又作同時耎反説文脛腨也腨腸也經文踹丁管反蹀足也踹非此用兩髀古文髀同蒲米反説文股外也內髻古帝反梵言嗢瑟𡰱沙此云髻經文作結非也凞怡虛之反下與之反説文怡和恱也方言怡喜也湘潭之間曰紛怡或云凞怡經文有作嬉同虛之反嬉樂也嬉戲笑也嬉非今用得愈古文愈同榆乳反方言差愈也愈病瘳也恬然徒兼反方言恬靜也安也經文作怡與之反誤也不嬈字林乃了反三蒼嬈弄也説文嬈擾也謂擾弄也嬈亦惱也繽紛匹仁反下敷云反廣雅繽紛盛貌也阿鞞字書陛奚反此譯云不退住第七住也鳩摩正言究磨羅浮多究磨羅者是彼八歲已上乃至未娶者之捴名舊名童子浮多者舊云真言童真地也經順俗名以童摽八地以上菩也或云法王子者別號也知山縷反數計也其數曰數也燒時尸照反案燒亦燒也自然為燒以人為燒第二卷稻茅徒老反下亡包反稻謂有穀也經文有作竿音古寒反下諸夜反通俗文荊州出竿蔗或作甘柘一物也憎𢙣烏故反禮記吾𢙣用吾情𢙣猶憎也詩云𢙣無禮是也第三卷摩捫莫奔莫本二反捫摸也字林捫撫持也案捫持謂手把執物也故諸經中有作摩捉日月是也第七卷蒙昧字體作同莫公反下莫對反易云蒙者也謂覆不明廣雅昧者暗也謂暗蔽無知也易云蒙昧幼老謂不成求是也第八卷循身似遵反循行也亦遍也巡歷也視占之鹽反占亦候也凡相候謂之占占亦瞻也鏇師似反説文鏇圓爐也周成難字作擐謂以繩轉軸裁木為器者也經文作旋非體也胃脬普交反蒼頡解詁脬盛尿者也經文胞補交反胞裏也胞非此用淚洟古文𪖦同敕計反三蒼鼻液也周易齎咨涕洟自目曰涕經文從弟作涕他禮反涕淚也非今所用肪𦙽府房反下先安反廣雅肪珊脂也通俗文在腰曰肪在胃曰𦙽膖脹普江普絳二反埤蒼肨脹腹滿也肨音普降反青瘀於豫反説文瘀積血也經文有作淤水中泥也𭺙裂字冝作攫同九縛居碧二反説文攫瓜持也蒼頡篇攫持也淮南子曰鳥窮則博獸窮則攫也肋骨力得反説文脅骨也字從肉經文從革作勒馬頭絡銜者也曰暴蒲卜反小爾足暴曬也説文暴晞乾也礙易以鼓反易者不難之稱也第十二卷如貝補蓋反説文海介蟲也謂螺貝是也介甲也𦙽兜先安反即天主也此云正喜二云正知足兜率此云妙足也無央於良反梵言阿僧祇此言無央數央盡也經文作於兩反説文頸靻也非此義靻音之列反第十三卷邏字力賀反呿字丘庶反哆字説文殆可反字才何反鞞侈遮羅那上蒲迷昌是反此譯云明行足迦又作二形同蒲反此言世間解適生三蒼古文啇這二形同之尺反適近也始也乞匂古賴反蒼頡篇匂𠧒行請求也第十四卷蠱道公戶翼者二反説文蠱腹中蟲也謂行蟲毒也譴貴去戰反蒼頡篇譴呵也廣雅譴怒也經文有作詰責廣雅詰問也目瞽公戶反無目謂之瞽釋名云瞽目眠眠然目平合如鼓皮也第十五卷毒螫式亦呼各二反字林蟲行毒也紅縹匹繞反謂天縹也如帛之青白色也釋名云縹淺青色也有碧縹有青縹也第十九卷不汙於故紆莝二反字林汙穢也字書汙塗也釋名云汙汙也如汙泥也衰耄莫報反禮記八十曰耄注云耄惛忘也亦亂也第二十卷放牧莫祿亡福二反三蒼牧養也方言牧飼也郭璞曰謂牧養牛馬漢書公孫𪪺牧豕然牧者畜養之捴名也沮壞才與反三蒼沮漸也敗壞也詩云何日漸沮傳曰沮壞也經文作俎側呂反非也內几也亦貯醢器也俎非義也偃蹇居免紀偃巨偃三反左傳偃蹇驕傲也廣雅偃蹇夭橋也謂自高大貌也釋名偃偃息而臥不執事也蹇跛蹇也病不能作事今託似此也橋音几小經文從人作𠐻誤也傲慢五到反謂不敬也廣雅傲易也謂慢也字從人滋味古文孖稂二形同子夷反滋溢也潤經文從口作咨説文咨嗟也揆則渠癸反詩云揆之以日傳曰揆度也謂度量䡄法也第二十一卷但三從重反必頻但從也從空也助佑古文鬥佑二形同胡救反祐助也天之所助也第二十四卷有翅古文二形同施致反説文翅翼也被服皮寄反被謂被帶也服謂施用也第二十五卷唐受徒郎反唐徒也徒空也淩傷力繒反三蒼淩侵淩也字從水下或作剔今作易同以豉反説文易輕也蒼頡篇易慢也虜掠古文作鹵同力古反下力尚反漢書晉灼曰生得曰虜斬首曰獲掠略取也謂強奪取也第二十六卷徑夫居盛反説文徑強也字體從力巠聲恐又作同渠庶反畏懼也亦急也第二十七卷級其羇立反級階次也左傳首二十三級案師旋斬首一人賜爵一級因名賊首為級覺已居效反覺寤也謂眠後覺也蒼頡篇覺而有言曰寤經文作寤悎二形俗字也恃是時止反韓詩無母何恃恃負也恃亦賴也憒𡗚公對反下女孝反説文憒亂也韻集𡗚猥也猥衆也字從市從人經文從門作閙俗字也第二十九卷怨讎視由反讎對也爾匹仇讎匹也三蒼怨偶曰讎第三十卷駕駟相二反説文駟一乘也四馬為駟溉灌歌賚反説文溉灌也謂灌注也第三十四卷胞胎補交反説文兒生裹衣者曰胞也第三十五卷奩底今作同力占反説文鏡也謂方底者也蚊蚋而鋭反通俗文蜎化為蚊小蚊曰蚋蜎音渠兖反紺琉古暗反青赤色也釋名紺含也謂青而含赤色也輪埵丁果反小纍也今取其義經文從耳從玉作𦖋㻔二形非也堅著馳略反字書堅謂堅牢著相附著也委他又作逶迤同於危反下徒何反廣雅委他窊邪也窊音烏瓜反不橈乃飽反説文撓擾也廣雅撓亂也字從木第三十六卷毫犛又作豪同胡高反下古文犛綵二形今作同力之反漢書不失毫𤛆孟康注毫菟毫也十毫曰犛今皆作犛亦由古字通用也然非字體廬館力居反別舍也釋名云寄止曰廬案黃帝為廬以避寒暑春秋去之冬夏居之故云寄止也下古玩反客舍也周禮五十里有館館有委積以待朝𮜷之客字體從食官聲今亦作館經文作觀城門雙闕也觀非此義以樂力各反謂歡恱也下文樂佛及僧以樂衆人音讀皆同此也第三十九卷從廣又作摐同足容反小爾匹云從長也韓詩傳曰南北曰從東西曰撗是也街巷古鞋反説文街四通道也連綿古文聯同力錢反廣匹連續也合也綿亦連也謂相續不斷也字從耳耳聯於頰也從絲絲連不絶也相和胡臥反相也詩云唱豫和汝周易鳴鸖在渚其子和之是也適無都歷反謂主適也玫瑰字林莫回反下胡魁反石珠也説文石之美好曰玫圓好曰瑰經文作㻁非也綩綖一遠反下以旃反相傳坐蓐也未詳何語茵蓐又作鞇同於人反説文車中重席也下而欲反三蒼蓐薦也幃帶音韋蒼頡篇幃簾也經文或作惟于追反惆悵敕周反下敕亮反説文惆悵失志也亦悲愁也第四十卷祠天似茲反爾匹祠祭也春祭曰祠祠食也百乘古文𠓲二形同實證反廣匹乘駕也三蒼乘載也周禮四馬為乘其形曰車其數曰乘橋津子鄰反論語子路問津鄭玄曰津謂濟渡之𠁅也金牒徒頰反簡牒也説文牒禮小品經作金鍱鍱音以涉反娛樂字詁古文虞今作娛同牛俱反下力各反字林娛亦樂也白虎通曰虞樂言天下之人皆有樂也有棍孤本反謂轉絃者也今亦名關為棍子稽留古奚反説文稽留止也爾匹留久也來坌蒲䪺反通俗文𡋯土曰坌説文坌塵也窒丁結反或作富樓那多羅𡰱子正言富囉拏梅低夜富多羅富囉拏此云滿是其名也梅低夜此云慈是其母姓富多羅者子也兼從母姓為名故此云滿慈子或譯云滿願子一義也與佛同日而生放光般若經第一卷羅以拙反案阿闍世王經云羅祗晉言王舍城此應訛也正言羅揭梨醯羅義是料理以王代之謂能理料人民也揭梨𨢘此云舍中捴名王舍城在摩伽陀國中城名也那術經又作述同食聿反或言那由他當中國十万也光讚經云億那術劫是也案佛本行經云一百百千是名俱致此當千万百俱致名阿由多此當千億百阿由多名那由他此當万億此應上算也叵我普我反謂搖動不安也經文作𧿽𨁟或作𡶅峨並未見字出𠁅淡然徒濫反淡安也經文或作憺淡二形音訓並同沙訶又云娑訶樓陀或云娑婆皆訛也正言索訶此云能忍或言堪忍一言雜會世界習緒辝呂反緒餘也業也大集經云斷習氣緒是也迦羅越大品經中居士是也甫當方宇反甫始也當終也言初始發心終竟一切種智也我曹又作同自勞反史記十餘曹偱之如淳曰曹輩也阿須倫又作阿須羅或作阿修羅皆訛也正言阿素洛此譯云阿者無也亦云非素洛云酒亦云天名無酒神亦名非天經中亦名無善神阿惟三佛此言訛也正言阿毗三佛陀阿毗此譯云現三此云等佛陀此云覺名現等覺長安品經言威至佛大品經云一切法一切種同一義也六栽作才反經中亦名觸案觸能長養心心數法栽能長養枝花條其義相似因以名焉七痛又作痛癢癢音弋掌反經中名受是也謂能領納苦樂故名受也倚法於蟻反住也説文倚猶依倚也經文作猗非也婆若又言藝然或云婆若皆訛也云言伐若此譯云一切智也俞旬又作由旬或作由延又作踰闍那皆訛也正言踰繕那此譯云合也應也計合應尓許度量同此方驛邏也案五百弓為一俱盧舍八俱盧舍為一踰繕那即此方三十里也言古者聖王一日所行里數也珠璣居衣反説文珠之不圓者也字書一曰小珠也第二卷窗向許亮反詩云塞向墐戶傳曰向北出牖也蒼頡解詁云窗正牖也牖旁窗也所以助明也第三卷不惋烏喚反字略云惋嘆驚異也第四卷羇他居猗反釋名云羇撿也所以撿持制之也怛阿竭阿羅訶三耶三佛大品經作多他阿伽度阿羅訶三藐三佛陀同一名也此即十號中三號也但猶梵音輕重耳多陀阿伽度此云如來阿羅訶此云應供三藐三佛陀此云正遍知也薜荔蒲計反下力計反或言卑帝梨或云卑帝梨耶或言閇多或作俾禮多皆訛也正言荔多此譯云祖父鬼舊譯云餓鬼中最劣者也音補蔑反俾音卑寐反邠耨文陀𡰱子邠甫貧反又作分耨或作邠耨文陀弗應云富那曼陀弗多羅此譯云滿嚴飾女子明度經云滿見子僧那僧涅應云摩訶僧那僧涅陀舊譯云摩訶言大僧那言鎧僧涅言著亦云莊飾故名著大鎧大品經云大誓莊嚴是也一云僧那大擔僧涅自誓此皆訛也正言𦙽那訶此云甲𦙽捺陀或云被或云衣言被甲衣甲也衣音於既反不扺側買子爾二反謂取著也通俗文掣挽曰扺説文扺𪮮也謂𪮮撮取也大品經作不取是也第五卷叉以拙反或云夜叉皆訛也正言藥叉此譯云能噉鬼又云傷者謂能傷害人也遮迦越羅正言斫迦羅伐辣底遏羅闍此云轉輪王適莫都狄反下謨各反謂無人無相也適猶敵也言敵匹也莫猶慕欲也無態他代反窠窟苦和反猒該古來反皆三昧名也種稷古文𥟄同子力反稷粟也五穀之長也澆灒上又作澆同古堯反説文澆灌漬也下又作濺𠵖二形同子旦反説文灒相汙灑也史記五步之內以血濺大王衣作濺楊泉物理論云恐不知味而唾𠵖作𠵖江南行此音山東音湔子見反第六卷繁者薄何反蹉者何反峨者五歌反他者土何反嵯者昨何反虜扈力古反下胡古反案虜扈自大也謂蹤撗行也漢書音義曰扈跋扈也謂自縱恣也經文作怙恃也怙非此義經中言憍慢或作貢高是也揵陀羅巨焉反此云香神即𠃵闥婆也諧𫀽胡皆反尚書克諧以孝注云諧和也𫀽合也第七卷無耦吳口反耦對也匹也大品作等不等是經文作𧪓非也第八卷須炎或作須夜摩天此云妙善天又炎摩此云時分須炎摩此言善時分即天主也拘翼此言訛略也姓嬌尸迦即釋提桓因及天帝釋同一位名也道撿居儼反謂以道撿心故言道撿大品經云若入聲暗正位是也蒼頡篇撿法度也攝也四徼古吊反四門巷也即曆中四徼曰是其事也遏絶於曷反爾匹遏止也蒼頡篇遏遮也第九卷提和竭或言提和竭羅此云錠光亦曰然燈佛是也𡰱摩羅天或云須蜜陀天此云化樂天波羅𡰱蜜天或云婆舍跋提天此云他化自在天是也阿波會天此云光音天亦言極光淨天即第二禪第三天也經文有從言作譮音胡快反首訶既那天此云遍淨天是第三禪中第三天也以樂淨周普故名遍淨也惟于頗羅天此云廣果天即第四禪中第三天也凡夫果中此最殊勝故名廣果也項很胡講反謂很人強項難回因以名也即郁伽羅越問經云強項人無量清淨平等覺經云項很愚癡是也大品經中作增上慢經文有從元作頑音五鰥反頑鈍也頑非本字拔擢徒卓反蒼頡篇棹抽拔引擢出也摩祗長安品作摩蛇小品經作摩𨢘皆梵言也明度經作神丹此言也第十卷矛箭古文矛鉾矛三形同莫侯反方言楚謂戟為矛説文矛長二丈建於兵車也八惟無或作八惟務即八皆捨也洴沙蒲經反應訛也正言頻婆娑羅王或云頻毗此譯云形牢一云頻毗此云顏色娑羅此云端正或云色像殊妙隨耶利或云隨舍利或云隨舍種或言栗唱或言離昌或作梨昌或作離車或作律車皆梵言訛轉也正言栗呫婆此云仙族王種呫音昌業反之兆除矯反兆猶機也事先見也亦形兆也大品經作法沒者也揵沓和又云揵陀羅或作𠃵沓婆或云揵達婆或云𠃵闥婆舊名也今正言健達縛皆國音之不同也此云香亦云樂神一云食香舊云香神亦近也經中亦作香音神也甄陀羅之人反又作真陀羅或作緊那羅皆訛也正言緊捺洛此譯云是人非人摩睺勒又作摩休勒或作摩睺羅伽皆訛也言牟呼洛迦此譯云大有行龍也真越或作震越此應臥具也第十二卷梵迦夷天此言淨身天也梵淨也即初禪梵天也第十五卷挭歰歌杏反梗強也歰又作澀同所立反謂不滑也字從四止四止即不通字意也痱瘤又作痱同蒲罪反下力罪反小腫也今取其義已署時去反署位置也謂置之𧆛敬也夫位之表也謂表識也第十七卷牆者又作檣同才羊反字林帆柱也江南行此音關中多呼作竿牢𢻒盧刀反堅牢也下又作𭣙楟二形同丈鞕丈莖二反三蒼種也今之以木若鐵揰出孔中物更補之謂之敞經文作棠非體也莊算俎陽反聲類云莊嚴也下古文祘同桑亂反爾匹算數也長六寸計數者也字從竹從弄言常弄不誤也第十八卷狡戲古卯反方言凡小兒多詐而獪謂之狡猾也第十九卷和夷羅洹叉即執金剛神也手執金剛杵因以名焉第二十一卷雜糅古文粈粈二形同女救反説文糅雜飯也今謂異色物相集曰糅也旃陀羅或云旃荼羅此云嚴熾謂屠煞者種類之名也一云主煞人獄卒也案西域記云其人若行則搖鈴自摽或拄破頭之竹若不然王即與其罪也跛蹇又作同補我反下居免反字林跛蹇行不正也欲揰徒江反廣雅揰刺也揰猶擊也第二十二卷阿惟顏大品經作一生補𠁅是也十住經云第十阿惟顏菩法住是也盟誓靡京反禮記諸侯蒞牲曰盟周禮司盟掌盟戰之法鄭玄曰書其辝於册上煞生取血歃之加書於牲上而埋之著其信也大事曰盟小事曰誓左傳曰歃如忌歃音所甲反第二十三卷輕易以豉反説文易亦輕也慢也經文作劦胡頰反説文同力也亦急也劦非此義野馬猶陽炎也案莊子所謂塵埃也生乃是遊氣耳也大論云飢渴悶極見熱氣謂為水是也五兵周禮司兵掌五兵鄭衆曰五兵者戈戟矛無夷也步卒五兵則無無夷而有弓矢也第二十六卷須延頭佛或言須扇多佛晉言甚淨洞然徒貢反説文洞疾流也亦深邃之貌也經文作烔徒東反熱貌也亦旱貌也第二十八卷勸私律反説文誘也廣雅云謏也謏音先九反經文作恤又作恤同思律反恤憂也恤非今用第二十九卷波崘又作波倫此云常啼明度經云普慈皆一義也俾倪普米反下五禮反廣雅俾𢞌堞女牆也波曇又云波慕或云波頭摩或云鉢曇摩正言鉢特摩此云赤蓮花也分陀利或作芬此云白蓮花也句文羅又作拘勿陀又作拘牟頭或作拘勿頭此云拘者地勿陀者喜名地喜花也優鉢釗指遙反又作漚鉢羅此譯云黛花也鵁鶄音交精鳥名也一名鵁鸕此鳥出蔓聯山群飛如雌雞似鳬高足江淮畜之可以厭火是也第三十卷謙恪古文愙同苦各反字林恪恭也敬也謂謙虛敬讓也酷毒口斛反説文嚳急也甚也亦暴虐也寶於耕於成二反盛物器光讚般若經第一卷度無極或言到彼岸一義也梵言波羅蜜多是也不僥又作憿徼同古堯反漢書晉灼云徼遇也僥亦兾求也垓劫古文奒二形今作姟同古才反數名也風俗通曰十億曰兆十兆曰經十經曰姟姟猶大數也傅飾方務反傅猶塗附也傅藥傅粉皆是也扶蓉又作芙同附俱反下𢈔鍾反説文扶渠花未發者為蓞𧂄花已發開者為扶蓉其實曰蓮蓞音胡感反𧂄徒感反紛葩普花反盛美也説文葩華也飄揚餘尚餘章二反謂風所飛揚也晃煜又作焴同由掬反説文晃明也煜耀也八由行又作遊行又作道行或作直行或言八直道亦言八聖道或言正道其義一也漸漸才再反漸漸猶稍稍也經文作漸績疑也履襪古文襪或作抹二形同無發反是衣也經文從巾幭音工別反單蚾也帊也幭非字義然藎才刃反字林草名也本草云藎草可以染流黃作金色生蜀中之𧨏字詁古文𧨏今作義同冝寄反禮記𧨏者冝也制事冝也𧨏亦善也理也第二卷貧匱渠愧反禮記則財不匱乏也竭也嵩高又作嵩同思隆反爾匹山大而高曰嵩蚑行渠支反又音奇謂蟲行貌也蜎蜚一泉反字林蟲貌也動也或作蠉古文翾同呼泉反飛貌也下古書飛皆作蜚同音甫韋反蜚謂蜚揚也案漢注云正月爵大於鳩五色蜚過鄭二月後蜚過池陽是也慌忽呼晃反又作恍虛往反謂虛妄見也惟恍惟忽似有無也漢書音義曰慌忽眼亂也兩又作同扶忍反説文膝骨也膝蓋也第三卷四凶又作凶同許恭反放光經作四結猶四縛也謂貪欲瞋恚戒取見取惶慌胡光反謂虛妄見也荒虛也廣雅惶懼也遽也蒼頡篇惶恐也亦憂悼在心之貌也第四卷門閫又作梱同苦本反門限也説文門橛也不列子作瞬通俗文作眴同尸閏反説文演目開閇數搖也𢙣師於各反𢙣過也所為不善也經文從草作𦷢又從人作皆非也第五卷梨穢力私反方言色似凍梨也大品經云青想壞想是也恢大又作同苦回反蒼頡解詁云恢亦大也三跋致又作拔同蒲沫反晉言發趣是也第七卷頭顱又作顱同力胡反腦蓋也經文作臚呂居反腹臚也皮臚也臚非此義吒之竹嫁反經中作𨀸非也疸之丁佐反磋之且何反燕坐又作𡩷石經為古文燕同一見反説文𡩷安也第十卷疇匹除反楚辝誰可與匹儔王逸注曰二人為匹四人為疇疇亦類也今或作儔五旬或言般遮旬即五神通也案阿術達經云悉得五句是也大品等經云五神通同一也縛祗一種等首真人餘經作家家須陀洹命終道行般若經第一卷吁與許于反説文驚語也廣雅吁應聲也吁亦疑怪之辝也經文有作説與邠祁文陀弗府貧反下巨梨反或言富樓那多𡰱子是也邊幅甫鞠反幅猶邊際也謂際畔也無底都禮反猶無邊無限也經文作㸦非也第二卷因坘直尸反或言因提梨或云因陀羅正翻名天主以帝代之故經中亦稱天主或稱天帝釋者並位之與名也波那和提天新道行經云自在天也亦即梵天也伊沙天此云衆生主那提𠃵天此云天女等阿會亘修天長安品作阿陂亘差天即光音天也僻隈匹亦反僻邪僻也亦避也經中或作避避去也回也下烏鬼於回二反謂隱蔽之𠁅也經文作偯於豈反哭餘聲也偯非此義梵摩三鉢天此應天主名也新道行經云梵天王也和此云衆生猶是婆埵也般遮旬般遮此云五猶五神通也經中或作五旬在二音也天烏合反晉言有光壽天是第二禪中初天也亦名少光天以光少故也波摩那晉言無量光天即第二禪中第二天也以前光明轉勝轉妙故也諸經中有作阿波阿波摩那天是也應言阿鉢羅摩那婆鉢利多婆也須䠠天三蒼音帝郭訓古文奇字以為古文逝字漢書韋昭音徒計反案中陰經作須滯天或作須帶天亦言善見天定障漸微見極明微故名善觀也樓炭經作須天皆一也應言須達梨舍那此言善觀天音丁計反帶音帝依字風俗通姓氏亦有此姓經文從無從足作䟼音讀作武非也枝掖以石反相似也掖猶葉也此應外國語訛耳長安品作技掖般若是也第三卷狎習古文書或作狹同胡甲反狎近也狎易也謂輕易也經文從人作𠇺非也第五卷至奏子陋反奏進也為也明度經云三拔致此言發趣也經有作跋同蒲沫反一劫梵言劫簸此譯云分別時節經文有作音子反此語音訛也若牆又同才羊反帆柱也關中曰竿是也愍念字詁古文愍今作閔同眉殞反愍憐也第六卷裴服蒲來反此言訛也猶是被服也音皮寄反被帶袈裟也經文從文作斐音敷尾反詭𤲶又作恑同居毀反説文恑變作也謂變異也詐妄也經文從口作詭非也下又作𤲶三蒼音諾了反𤲶弄也惱也勇悍何且反蒼頡篇悍桀也勇也有力也字從心第七卷𠃵陀呵晝菩新道行作香象菩是也緹慢他禮反説文謂帛赤黃色也即縓色也自衒古文眩衒二形同胡麵反説文行且賣也詃也𠃵陀越國字或作揵應云𠃵陀婆那此譯云香林明度經云香淨國阿闍世女經云香潔一云香風皆一也第十卷貌健胡官反説文完全也完猶保守也儲水直於反儲貯也儲亦備也謂畜物以𬾨曰儲𭦟殊顏華又云𭦟殊沙此譯云攬花也鳩垣諸經或作鳩洹或作仇桓此譯云大身巫祝或俱反下之育反無形也謂事鬼神曰祭主贊詞曰祝反遺餘季反遺猶贈也廣雅遺與也亦加也有桴扶鳩反謂鼓椎也説文桴擊鼓柄也拊撫方主敷禹二反作亦敷禹反案拊猶拍也撫持也安也亦存恤也釋名云撫敷也敷手以拍之也小品般若經第一卷糟粕籀文作糟同子勞反下普各反淮南子云古人糟粕許叔重曰糟酒滓已盝糟曰粕也垣林宇煩反垣四周檣也釋名垣捊也第六卷監礙古文作譼同公衫反監察也言婦人有三監五礙者也躓䪺陟利反謂挫辱也廣雅躓踏也踏手䪺也第八卷加尸又作迦尸此譯云光言有光澤也瘡瘢薄寒反蒼頡篇瘢痕也經文作槃非體也金鍱餘攝反金也入品經作金牒是也明度無極經善業梵言須菩提或云藪浮帝或言蘇部底此譯云善實或云善業或云善吉皆一義也言空生者晉沙門康法邃雜譬喻經云舍衛國有長者名鳩産生一子字須菩提有自然福報食器皆空因以為焉所欲即滿後遂出家得阿羅漢道是也秋露子梵言舍利弗舊言舍利子或言奢利富多羅此譯云鴝鵒子從母為名母眼似鴝鵒或如秋露鳥眼因以名焉舊云身子者也身者舍梨與此奢利聲有長短故有斯誤或言優波提舍者從父名也不憚都割反通俗文旁驚曰憚經文作怛非也資貨子移反蒼頡篇資財也周禮通貨賄鄭玄日金玉曰貨布帛曰賄亦與資同經文作訾訾量訾非此用𪪺裕古文裕同瑜句反廣匹裕寬緩也饒也瑜以俱反昆弟又作晜同孤魂反爾匹昆後也郭璞曰謂兄後也方俗異言耳溝港古須反字略云港水分流也今梵言須陀洹是也此言至流或言入流經中或作道迹或言分布今云溝港取其義也經文作遘講非也開士謂以法開導之士也梵云扶又作扶或言菩是也緣一覺緣覺舊經云古佛又言辟支佛又言辟支迦或云貝支迦皆梵言轉也此云獨覺是也應儀道又云應真或言真人亦云無著果亦云阿羅訶今言阿羅漢皆是一也滿祝脂育脂授二反即富樓那是也除饉渠鎮反舊經中或作除士除女或言薰士薰女今言比丘比丘𡰱是也分別功德論云世人飢饉於色欲比丘除此愛饉之飢想故名除饉又案梵言比丘此云𠧒士即與除饉義同又康僧會注法鏡經云凡夫貪染六塵猶餓夫夢飯不知猒足人斷去貪染除六情飢故號出家者為除饉也第二卷倿𦾨奴定反諂媚也偽善也説文口材也下五竭反説文禽獸蟲蝗之怪謂之蠥經文作孽庶子也又作𦾨近字也第三卷姪夫古文佚今作姪又作劮同與一反蒼頡篇佚蕩也姪亦淫也將踧子六反踧踖敬畏也謂恭敬之貌也捔漢書斑固敘傳云捔舉職僚孟康注云捔古文粗字音才古反韋昭曰粗略也第四卷阿閦案閼文字所無相承又六反餘經作無怒亦云無動或云無怒覺皆義譯其名也僥幸又作憿徼二形同古堯反下音幸俗謂幸為僥幸非其所當而得之小尓匹非分而得謂之幸兾望得也徼遇也遇幸得也哀慟徒貢反論語顏回死子哭之慟馬融日慟哀過也帷幔筠龜反下莫且反字林在旁曰帷炫煌胡麵反下又作熿同胡光反光明盛貌也説文炫耀也煌光也法來梵云曇無竭或譯云法上亦云法鏡一義也毾壁他盍反毛席也施之於壁因以名焉經文作闒非體也長安品第一卷以索所格反蒼頡解詁云索盡也經有作却訛也無蚤音早義同早晚之早也古字通用耳如禮云孔子蚤作是也第五卷慊苦苦簟反慊猒也猒足也快也不啻施豉反蒼頡篇不啻多也勝天王般若經第一卷𡰱坘又作沶沍坻三形同直飢反治𦲭七入反通俗文覆蓋曰𦲭𦲭亦補治苫也喧撓乃飽乃教二反説文撓擾也廣匹撓亂也三𠍴古文㥶二形籀文作𮘧今作愆同去連反説文𮘧過也失也如矟山卓反埤蒼矟長一丈八尺也經文作槊俗字也如𥍽充容反廣蒼𥍽短矛也經文作衝非體也憤恚扶忿反説文憤悶煩也怒氣盈盛也情感也覆罩又作羄同陟挍反魚籠曰今取其義忽又作倏二形同書育反忽急疾貌也坑塪又作坎同苦感反埤蒼塪亦坑也敷啓又作啓孔尚以為古文啓同苦禮反啓開也懷憾胡紺反論語共弊之而無憾孔安國日憾恨也嘶喝又作𧬊同先奚反下又作喝同乙芥反方言𤺊喝噎也郭璞曰謂咽痛也楚曰𤺊秦晉或曰嘶婢蒼嘶聲散也廣匹聲之幽也欺侮古文侮同甫反侮猶輕慢也第二卷沾濡又作霑同致廉反廣匹沾漬也濡濕也資財子夷反説文資貨也資財也經文作資子斯反説文小罰以財自贖日資通俗文平財賄曰資案資亦與資義同也腥臊又作勝同先丁反下乘刀反腥臊臭也通俗文魚臭曰腥猳臭曰臊猳音加酤酒公胡反説文買酒也經文作沽水名也博奕古文同補莫反方言博或謂之棊下餘石反齊魯謂圍棊為奕犁軛又作枙同於革反謂轅端𡑅牛領者也盥灑公緩反説文盥澡手也凡澡灑物皆曰盥旱人呼旱反旱希也謂希疏也字從岡從干聲第三卷𠙽擲又作塊同口對反即土塊也毒又作憯同倉感反説文懆毒也痛也憂也縱誕徒亶反誕謾也亦欺也不實也不憚徒旦反憚難也亦畏也廣匹憚驚也穫胡郭反説文𠚫禾也草日𠚫穀曰穫第四卷很戾胡墾反下力計反很違也戾曲也字從戶從犬抑挫祖臥反説文挫摧也亦抑也衣無方反草也爾匹杜榮注云似茅皮可以為繩索履食芋于附反聲類大葉著根之菜見之驚人故曰芋大者謂之蹲𩿍甚可蒸食也炒穀初狡反方言熬焣煎𤐧火乾也𡰱連禪河應云𡰱連禪那或云熙連禪此譯云𡰱者不也連禪那者樂著也名不樂著河也加梨加龍又云迦羅迦龍此譯云黑龍也倒仆古文踣同蒲北反説文仆䪺也謂前覆也第五卷真胝又作脰二形同竹尸反此云善思惟天名也僕古文瞨同蒲木反廣雅僮僕伇使也隸附也簉多初枚反羺奴溝反裒多蒲溝反須摩那或云蘇磨那華其色黃白亦甚香不作大樹才高三四尺四垂似蓋者也瞻蔔伽或云旃簸迦正言占博迦形高太華赤甚香其氣逐風遠門堞又作同徒頰反廣匹堞女牆也猩猩又作狌同所京反知人名如豕人面犬吠也尸利沙即是此間合昏樹也其樹種類有二若名尸利沙者葉果則大若名尸利駃者葉果則小此樹時生人間關東下里家誤名娑羅樹是也第七卷荻林又作藡同徒歷反荻草也亦有荻竹不可治病也迦樓那摩訶此云大迦樓那此云悲如來功德以般若大悲二法為體咽𡰱又作咽同於堅於見二反此譯云鹿王𡰱拘應云𡰱拘盧陀此譯云無節亦云從廣樹也摩那陀果此譯云醉果頻婆果此譯云相思所縈一瓊反縈旋也緾也通俗文收績曰縈不愜苦頰反廣匹愜可之也字林愜快也始洎渠器反漢書左洎前七郡晉灼曰洎至也置懷之鼓反詩云置彼同行傳曰置置也祈請巨衣反詩云以祈爾爵傳曰祈求也甫爾方武反釋名甫始也廣匹甫衆也睦茨入反爾匹和也謂諧和也下又作穆同莫斛反睦敬也美也負笈奇急反風土記云笈謂學士所以負書箱如冠箱而卑者也謝承後漢書云負笈隨師是也驅傳知戀反謂轉次行也爾匹馹遽傳也郭璞曰皆傳車驛馬之名也馹音而逸反錫圭思歷反下古携反爾匹錫賜也謂賜與也尚書禹錫玄圭是也分陕式舟反公羊傳曰自陕以東周公主之自陕以西召公主之説文今𪪺農陕縣古之號國是也碩難市亦反詩云碩人俁俁傳曰碩大也小尓匹云碩遠也智昕虛殷反小尓匹昕明也尓匹昕察也彭匯胡罪反尚書東匯澤為彭蠡孔安國曰匯回也三蒼水回也萬駰於身於巾二反人名也猜焉古文猜二形今作猜同來反案猜亦疑也廣雅猜懼也仁王般若經上卷僉然七廉反小爾匹僉同也爾匹僉咸胥皆也方言自關而東五國之郊謂皆曰僉東齊曰胥窮源魚袁反水之本也説文作原鉾盾食尹反盾所以捍身蔽目也下卷什物時立反什聚也雜也資生之物也巨海其呂反方言齊宋之間謂大為巨尚殞字書作隕同于敏反聲類殞歿也殞墜也炕陽口盎反蒼頡篇炕乾極也鴻五行傳炕陽謂大旱也經文作亢胡剛反亢咽也盎音烏浪反釋器盎謂之金剛般若經羅什法師譯舍衛國十二遊經云無物不有國或言舍婆提城或言舍羅婆𭜧帝夜城並訛也正言室羅伐國此譯云聞者城法鏡經云聞物國善見律云舍衛者是人名昔有人居住此地往古有王是此地好故乞立為國以此人名號舍衛國一名多有國諸國奇皆歸此國也祇樹或言祗陀或云祗洹皆訛也應言逝多此譯云勝氏即憍羅國波斯匿王之子也給孤獨應言阿那他此云無親舊人義譯為孤獨荼馱寫耶此云摶與舊人義譯為給猶是修達多之別名修達多此云善與故得給孤獨名也舊言阿那邠坘或言阿藍訛略也飯食扶晚反案飯亦食也唯然弋誰于比二反説文唯諾也謂之敬辝也禮云唯而起鄭玄注云唯恭於諾也四維翼隹反廣匹維隅也淮南子云有四維是也頗有借音普我反謂語辝也筏喻扶月反方言𥱼謂之筏編竹木浮於河以運物者是也南生名𥱼北人名筏字從竹經文從木作筏非也𥱼音蒲佳反阿蘭那行或言阿斕拏正言曷剌䍲曷此云無剌䍲此云諍名無諍也亦言間間亦無諍也歌利王或言迦利王論中作迦藍浮王皆訛也正言羯利王此譯云𮤟諍王西域記在烏仗那國瞢揭𨤲城東四五里是其𠁅也舊云𢙣世無道王即波羅奈國王也金剛般若經菩提留支譯修伽陀或云修迦度此云善逝即如來德之一號也捫淚莫奔亡本二反聲類云捫摸字林椚持也經文有作抆亡粉反字林抆拭也言須菩提恨不早聞故涕淚悲泣今既得解所以捫淚而言也荷擔説文何古文𣒍同胡歌反廣匹何揭擔也又音胡可反何任也今皆作荷摩那婆或言摩納婆或云那羅摩那或云摩納皆是梵言訛轉也此譯云年少淨行或云人歌羅分如折一毛以為百分一分名歌羅分論以義翻名為力勝以無漏善法勝於有漏故也數分猶是數中轉微細者乃至少許猶不及一也論中義言不相似勝也言有為有形雖復少許與無為無形不相似也優波𡰱沙陀分論中義言因果不相似也以寶等但得三界果報無漏善得佛果也毛道此名誤也舊譯云婆羅必利他伽闍那此言小兒別生以癡如小兒不同聖生也論中作小兒凡夫是也正言婆羅必栗託仡那婆羅此云愚必栗託此云異仡那此云生應云愚異生以愚癡暗冥無有智慧但起我見不生無漏亦名嬰愚凡夫凡夫者義譯也案梵語毛言嚩囉愚名婆羅但毛與愚梵言相濫此譯人之失致有斯謬也法集等經言毛道頭凡夫或言毛頭凡夫者皆誤也仡音魚乞反金剛般若經真諦法師譯支提或言脂帝浮都此云聚相謂纍寶及石等高以為相也
