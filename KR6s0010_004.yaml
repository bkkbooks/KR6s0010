body:
  text: 翻經沙門玄應撰菩見實三昧經賢劫經華手經大灌頂經菩纓珞經佛名經月燈三昧經十住斷結經觀佛三昧經五千五百佛名經大方廣十輪經大方便報恩經寶雲經金光明經大雲經密迹金剛力士經菩𠁅胎經大集賢護菩經大方等陀羅𡰱經菩見實三昧經第一卷膺平又作應同於凝反蒼頡篇云乳上骨也說文膺胸也漢書韋昭曰胸四面高中央下曰膺原隰又作同詞立反爾匹下濕曰隰隰墊也寶磺古文𮀑字書作礦同孤猛反說文礦銅䥫璞也經文從金作𨥥非也旌鼓積盈反爾匹注旄首曰旌郭璞云載旄於竿頭者表也謂取其幖幟也第二卷旒蘇又作𦀠瑬二形同力周反門樞齒榆反爾匹樞謂之椳郭璞曰門戶扉樞也廣匹樞本也樞機制動轉之主也椳音五回反璫渠都唐反𥼶名云穿耳施珠曰璫埤蒼璫充耳也渠耳渠也西國王等多用金銀作之著耳匡中用以裝飾經中有作璩巨於反跋墀直尸反亦言婆稚是阿修羅名也舊譯云縛居在修羅前鋒為帝𥼶所縛因誓得脫故以名焉踟蹰腸知下又作跦同腸誅反廣匹踟蹰猶豫也躑躅也第三卷曲櫺力反說文櫺楯閒子也通俗文疏門曰櫺是也韁鞚或作韁同紀良反馬韁也下口弄反馬勒也鶬鵠音倉鶬鴰也似鴈而黑者也鴰音古活反下胡穀反黃鵠也形如鸖色蒼黃緘婆古函反天石名也依字緘索也束篋也麒麟渠之反下理真反仁獸也說文𪊽身牛尾一角角頭有肉經文作騏說文馬文如綦曰騏下力振反爾匹白馬黑脣曰驎二形並非此義𪊽居貧反第十一卷剜掘烏桓反下渠勿反廣雅掘穿也經文作擔都甘反此應誤也缺㰦又作呿同丘庶反埤蒼張口頻伸也第十二卷脬膜匹包反三蒼盛𡲘𠁅曰脬經文作胞音補交反餳哺似盈反方言凡飴謂之餳說文米𮒷煎也下蒲故反口中嚼食者也第十四卷隍城胡光反說文城池有水曰池無水日隍蒼頡篇城下坑也為隥當鄧反廣匹隥履也依之而上者也三蒼隥小阪也經文作蹬音登粳米俗作粳同加衡反不黏稻也江南呼粳為秈勺撓是斫反下呼高反聲類云撓攪也賢劫經第一卷光耀古文曜同餘照反廣匹曜照也明也不挾胡頰反爾匹挾藏也經文作𭜴和也協非此義稸積字書作蓄同𠡠六反蓄積也聚也痂痏古遐反下胡䡄反痂瘡也痏驅傷青黑腫也𮟵伴石經作邦𨚚三形同補江反准平說文作凖同之丑反准平也均也度也經文作垐才資反以土增道也垐非此用擲去他狄反擲剔也謂擲治之也亦取也第二卷三塗文作途徒二形同達胡反言三塗者俗書春秋有三塗危險之𠁅借此為名塗猶道也非謂塗炭之義若依梵本則云阿波那伽低此云𢙣趣不名𢙣道道是因義由履而行趣是果名已到之𠁅故不名𢙣道也躓礙古文䠟躓二形今作疐同猪吏反通俗文事不利曰躓限至曰礙居倫大哀經作拘輪譯云本際第一解法者也普曜經云俱鄰者解本際也阿若者言已知也正言解了拘鄰亦姓也第三卷怯弱如斫反弱尫劣也經文作愵奴的反思也傷也愵非此義第五卷鳩那羅此譯云𢙣人亦言不好人也第十三卷錫貢星的反爾匹錫賜也謂賜與也上與下之辝也好拂敷勿反拂拭也除塵也經文作𣭘𢂀二形非也都較古文攉同古學反較猶粗略也廣匹較明也亦比挍也趣谷古木餘玉二反爾匹水注溪曰谷經文作峪非也華手經第一卷和詫字又作𧩫同丑嫁反婆和詫者比丘名也第二卷杼氣時汝除呂二反廣匹抒舀也泄出也舀餘紹反第八卷猩猩所京反字林能言鳥也形如豕頭如黃雞第十卷姧詭居毀反不實也廣匹詭隨𢙣也亦欺誑也蟄民遲立反大魚名也蟄民伽羅應云低民祇羅譯云吞魚大吞小故也第十一卷圂豬又作溷同胡困反圊圂也言溷濁穢𢙣也栽㮆古文㩵㮆木三形同今作同五割反爾匹㮆餘也載也言木餘載生㮆栽也僶未又作黽同亡忍反僶俯強為之也第十二卷斃地古文斃弊二形今作弊同毗世反說文斃仆也大灌頂經第一卷錍提普提反山名也道軻口佐反嘻疑虛基反泥錍乃禮反喉棱力曾反掬林居六反經文又作𧨜同鞬陀記言反郁佡丘豉反經文作㑫非也迦偂此應備字繄梨於奚反賁沙補門反𡲎提此應陴字父支反𦪣吒羅波𥪫噴灑又作噴同普悶反通俗文作湓含水潠曰湓經文從水作濆音扶云反水名也濆非此義頞吱居梨反非正字劬離其俱反經文作叩音口此應誤也叩擊也漱漏所霤反經文從頁作瀨非也毒蠆丑芥反或名蠆或名蠍螫蟲也蠆音他達反音力達反五官謂生老病死及現在縣官拘録亦名五天使者翩翩匹然反說文疾飛也輕捷之貌也經文作偏非也第二卷𧴵力底反倪提音五禮反迦扶忍反臀頭徒敦反第三卷坘多直尸反苾闍蒲薎扶必二反戾揥𠡠細反拍長普格反廣匹拍擊也𥼶名拍摶也以手搏其上也經文從石作砶非也沃口烏穀反通俗文溉灌曰沃沃亦澆也漬也口噤又作吟同渠飲反閇口為噤也禪衣多安反說文衣不重也廣匹禪薄也白祫古洽反說文衣無絮也廣匹祫重也經文作悏古洽反𢃑也悏非此用又作夾非也第四卷𥧌鞮都奚反樓眸莫侯反經文作𫞳誤也櫨𤗶古黃反唾將逸反通俗文迮而吐之曰經文作𠵖音子且反架抄古暇反經文作談𦒿殳南反謣難呼故反較坘古學反䚷羅於禮反侘飢𠡠家反經文作𨀸非膒烏侯反獀玃字體作𤠙又作㹢同古遐反下居縛反說文大母猴也善𮨇䀎玃持人也爾匹玃父善𮨇郭璞曰猳玃也似猴而大色蒼黑也荐臻又作同在見反爾匹荐再也重也下側陳反臻至也第五卷優吵蘇答反掔俱苦間反經文有作拏女家反此梵言也壓笮於甲下側格反案笮猶𡑅也今謂笮出汁也茤陀字與芰同渠寄反𫈹又居玉反驚悸古文痵同其季反字林心動也說文氣不定也第六卷振且或言真丹並非正音應言支那此云漢國也又亦無正翻但神州之𢛌名也碑闞彼為反古制施鹿櫨以下棺今人述君父之功建於陌頭顯𠁅也𥼶名闕在門兩旁中間闕然為道也卸郵于鳩反鞞鞞蒲迷反萆梨方爾反恐愶虛業反方言愶䦧懼也謂以威力相恐懼也䦧音呼激反經文作㤼踏二形非也第七卷牛桊居院反字書桊牛𤘽也今江淮以北皆呼牛𤘽以南皆曰桊𢘉𢥈字且𪀌盧音烏甲反今謂黑貂為𪀌盧貂是也浡浡聲類亦郣字同蒲沒反廣匹浡盛也蔚多於貴反他穰而羊反尉伺第八卷檐邊字書作櫩同以占反謂屋梠也說文檐𣗽也汪池烏皇反通俗文亭水日汪池之泥濁者也第九卷麋麈莫悲反說文鹿屬也冬至解角者也下之𢈔反山海經云荊山多麈郭璞曰似鹿而大尾可為帚也梁翟徒歷反多禖莫來反陀俞以朱反愚憃丑絳反說文憃愚也生而癡騃童昏者也齚楊又作齰同仕白反齚齧也經文作咋㽵白反咋咋聲也咋非此用第十卷世享虛兩反享受也亦當也說文享獻也烔烔徒東反埤蒼烔烔然熱㒵也經文作燑非體也老叟又作叟叟二形同蘇走反方言叟父長老也東齊魯衛之閒凡尊老者謂之叟字從灾從又喧譁又作歡同虛無反下呼瓜反喧譁聲也三蒼喧言語䛬䛬往來也譁言語譊譊喧也䛬音徒刀反詵林又作甡辡莘三形同使陳反傳曰詵詵衆多也萍薄蒲丁反無根浮水上者也經文作䓑馬帚也歡娛疑區反說文娛樂也經文作顒非也姻媾於人反下古𠋫反白虎通日婦人因夫而成故曰姻姻親也國語今將婚媾賈逵曰重婚曰媾媾厚也惋恨烏喚反字略云惋嘆驚異也輱軻又作同口紺口感二反下口佐反坎軻不遇也楇𣐯思醉反說文神禍也謂鬼神作灾禍也懇惻古文𧨚同口很反通俗文至誠曰懇懇亦堅忍也下古文𢝔同楚力反廣雅惻悲也說文惻痛也如餉尸尚反廣匹餉遺也說文餉或作餉饋餉也結梳所於反說文梳理髮者也懊憹今皆作𢙉同奴道反懊憹憂痛也第十二卷維耶或言毗耶離或名毗舍離皆訛也正言鞞奢夜城在東印度境殑伽河北也或言中印度境瞢憒莫崩反三蒼瞢不明下公內反憒亂也亦煩也營衛又作營䁝𢥏三形同伇瓊反蒼頡篇營衛也部也厭禱於舟反下都道反伏合人心日厭求福日禱禱請也請於鬼神也蜚尸古書飛多作蜚同府韋反飛謂飛揚也尸有三尸邪忤吾故反通俗文得忤曰痾音苦駕反非體也蒺䔧茨栗反下力尸反爾匹螏蟍蝍蛆郭璞曰似蝗夭腹長角能食蛇腦也萎黃於危反聲類萎草烟也經作痿痿痺不能行也尫𮊵今作尫同烏黃反尫弱也通俗文短小曰尫也妖冝列反說文衣服歌謠之怪謂之妖禽獸蟲蝗之怪謂之𧒣𧒣灾也今皆作𦽆亦古字通用也菩纓絡經第一卷恭恪古文愙同口各反恪敬也字林恪恭也曩昔奴朗反爾匹曩久也猶往久古昔也塵曀又作㙪同於計反爾匹陰而風日曀曀亦翳也言奄翳日光使不明也第三卷亘然歌鄧反亘猶坦然也傳曰亘遍也羯毗或言羯隨或云迦毗或言加毗此皆梵音訛也此譯云迦毗聲伽羅者好名為好聲鳥也第六卷僥幸古堯反下胡耿反僥遇也幸慶也第七卷貪餮又作飻同他結反貪財曰叨貪食曰餮邠耨又作分耨曼陀弗譯云滿嚴飾女或言滿見子也第九卷苾芬又作飶馝咇𪏺四形同蒲結反埤蒼苾大香也鏟以又莧反說文一曰平䥫也蒼頡篇云削平也不泄思列反泄溢也亦發也廣匹泄漏也第十一卷超卓恥驕反跳上車也超越也出前也踰也下陟角反卓高也𥼶名云超卓也舉腳有所卓越也第十二卷分衛此言訛也正言儐荼波多儐荼此云團波多此云墮言食墮在鉢中也或言荼夜此云團團者食團謂乞食也鏗然又作㧶䡩二形同口耕反說文䡩堅也料量力條反說文料量也字從斗經文作科苦和反非也佛名經智曀一計反燎力雕反拘峻私俊反𥘡多止夾反刳心口胡反枲荷息里反鬱哆殆我丑加二反稊羅他奚反詢陀私旬反奚吼胡雞反月燈三昧經第一卷無爽所兩反爾匹爽羌也謂不同也不齊也糅以古文粈䏔二形同女救反說文雜飯曰糅第二卷如榜補莾反牌榜也謂摽榜其善𢙣示人也經文從木作榜補盲反弓弩輔也榜非此用脾蒲佳反第三卷剜身烏桓反埤蒼剜削也謂抉取肉也鼛鼖公勞反大鼓也𦒱工記鼛鼓長六尺有四寸注云以鼛鼓鼓伇事下又作䩿同扶雲反爾匹大鼓謂之鼖郭璞曰長八尺也雷霆定亭三音爾匹疾雷謂之霆霓蒼頡篇礔礰也說文雷餘聲所以出万物也亦雷金鉦之盈反說文鉦鐃也似鈴柄中上下通諸𥀷蒲雞反小鼓也亦騎鼓也簫筑張六反形如箏刻其頭而握之以頭筑人故謂之筑𪝥德而俱反說文𪝥柔也術士之稱也第七卷入匣今作柙同胡甲反說文匣匱也謂盛刀劒者也捿泊蒲各反泊止也今謂舟止為捿泊激切公的反激發也動也說文水疾急曰激也狡猾古卯反下胡刮反方言凡小兒多詐謂之狡猾第八卷臺榭辝夜反爾匹有木謂之榭郭𤩶日臺上起屋也廊廡籀文作𢋑同音武客舍也說文堂下周屋也𥼶名云大屋曰廡幽之人謂之庌庌五下反詹波之鹽反或作占波或作占婆即瞻蔔花也譯云金色花大論云黃花樹也第九卷瘳愈𠡠流反瘳差也尚書翌日乃瘳是也竚立或作佇同除呂反爾匹佇久也謂久立也動臉居儼反字略云眼外皮也臻萃徐醉反方言東齊海岱之間謂萃為聚萃集也媒著古文妉同都含反說文媅樂也嗜也今皆作𦕍第十卷俟用古文俟䇃三形同並事几反爾匹俟待也龍腦案西域記云羯布羅香樹松身異花果亦別初採既濕尚未有香木乾之後循理而折其中有香狀若雲母色如水雪此謂龍腦香者也如礪力制反磨石也細於礪也十住斷結經第一卷緾縺力前力字書縺縷不解也戢在側立反戢聚也𣫍也經文從手作擑非也漏疏蔭反盡也下漉曰亦竭也閹塞於儉反閇門人也冝作掩掩藏也蔽也第二卷密欵又作欵同口緩反蒼頡篇欵誠重也至也揮淚許歸反揮灑也說文揮奮也謂奮振去之也第三卷棚閣蒲萌反連閻曰棚經文作閛普耕反門聲也閛非此義嬈固乃了反下又作怘同古護反三蒼云嬈弄諸經有作𤲶或作𤲶音同嬈摩登伽經作擾蠱音古護反第四卷勗勉虛玉反謂勉勵也方言齊魯謂勉為勗也第五卷然呼馘反猶忽也義亦與𥑦字同音呼覔反𥑦然也馘音古麥反煻煨徒郎反下烏回反通俗文熱灰謂之煻煨經文作熅於文反鬱煙也熅非字體門閾古文𨵨同呼域反爾匹柣謂之閾郭璞曰即門限也柣音千結反第六卷或奣鴉猛反明也婆槎千何反或作婆義河亦云博義河大池西面河也馬口而出流入西海也𧄼瞢徒登丁鄧二反韻集失臥極也下亡登反經文有作躑憕懵並非體也第七卷六湮於仁反說文湮沒也爾匹湮落也亦下也第八卷水九愚反廣匹酌也說文挹也挹斟也經文作枸非體也或從酉作酙亦非也第九卷蚑行渠支巨冝二反謂蟲行㒵也周書蚑行喘息是也哂然字書作哂或作吹同式忍反三蒼小笑也禮記笑不至哂鄭玄曰齒本曰哂大笑則齒本見也愚戇都絳反說文愚癡也戇愚也聲類韻集音丑巷反第十卷遮迦越羅此譯云轉輪聖王正言斫迦羅此言輪伐剌底此云轉名轉輪王順此方語也觀佛三昧海經第一卷頭檀以拙反此譯云白淨王也或言淨飯王也伉儷苦浪反下又作㒧同履詣反伉敵也儷偶也伴也憾喜胡感反廣匹憾動也說文憾捶也𧎗斗苦禾反字書𧎗斗水蟲也爾匹𧎗斗蝦蟇子也蟠龍薄寒反禮記而蟠于地蟠委也廣雅蟠曲也踵相又作衝同之勇反說文相迹也亦追也往來㒵也四柧古胡反說文柧棱也經文作觚器名也觚非字義也關鍵又作𨵭揵二形同奇謇反方言關東謂之鍵閞西謂之𨷲開𨶩胡臘反說文闔閇也易曰闔門謂之坤是也顒顒今作喁同魚反詩云顒顒昂昂傳曰溫恭㒵也第二卷穹脊去弓反穹謂穹隆也穹亦窮也侜張說文作譸同竹流反爾匹侜張誑也亦幻惑欺誑也經文作輈車轅也輈非字體春秋傳挾輈以走喉嚨洛公反嚨亦喉也蒼頡篇喉咽也肺腴又作胇同敷反說文肺火藏也下𢈔俱反說文腴腹下𦘺也經文作俞膾二形非也肝隔歌額反隔障也經文或從肉作膈二字通用也蛔蟲又作蛔同胡魁反蛔腹中蟲也經文作𮓻尢二形非也團欒盧端反團圓也圓匝也敗績今作績同子歷反聲類云績功也矗然𠡠六反端直也又草木茂盛也霓冤於元反冤猶屈也雌曰霓經文作倇非體也髮杪繞反樹鋒曰杪今取其義謂髮鋒頭也雙眥在計反說文眥目崖也目際也第三卷兩吻無粉反蒼頡篇云脣兩邊也謂口際邊也蕛米達雞反爾匹蕛苵也郭璞曰似稗布地生穢草也龕室苦耽反方言龕受也廣雅龕盛也鼷鼠胡雞反說文小鼠也有毒者也或名甘口鼠春秋鼷鼠食郊牛角晃煜又作𥆄古文熿同胡廣反下又作烠同由掬反說文晃明也煜曜也光也晃煜盛也竭支或作僧祇支者皆訛也應言僧迦鵄此譯云覆腋若著瞿修羅則不著僧迦𩿍瞿修羅者此云圖也像其衣形而立名也第四卷摧茹而庶反摧折也茹弱也小螭𠡠知反廣匹無角曰螭有角曰虬螭若龍而黃者也樹秸音皆秸謂秸稈也字從禾從皆未詳何語疼痺又作痋𦙭二形同徒冬反廣雅疼痛也下併利反說文濕病也痺不能行也第五卷𢫫身力沒反𢫫謂揩𢫫也摷爭交反通俗文浮取曰摷廣匹摷取也直劈普狄反說文劈破也經文作劈脾伇反僻非此用䥫砧又作椹二形同猪金反鈇砧也經文作砧鈂二形非體也轢身力各力的二反蒼頡篇轢輾也說文車有踐者也癭瘇字詁今作腫同時勇反通俗文腫足曰瘇瘇腳病也經文從足作踵非也生聲類作燂燖二形字詁古文務今作同詳廉反說文熱湯瀹肉也䥫鉆奇沾反蒼頡篇鉆持謂取物者也經文作鉗束入䥫也鉗非今體瘭疽必遙反下千余反廣蒼癕成為瘭疽瘡名也經文作螵字與蜱同輔支毗遙二反螳螂子也螵非此用諸字亦作渠記反所以連綴簪記之也鑱㓨仕咸反以錐㓨物者也說文鑱𨦣也寱語牛世反夢語謂之寱聲類不覺妄言也磔口陟格反廣匹磔張也亦開也經文作挓未見第七卷攘臂而羊反攘除也謂除衣袂而出也袂世反毾㲪他盍反下得恆反𥼶名施之大牀前小榻上所以登上牀也因以名之榑噬補薄反下時制反搏𢲻也噬齧也啖也第八卷遘疾又作姤同古𠋫反爾匹遘逢遇也泯然忍賔二反爾匹泯盡也泯民也𢯯落直爾𠡠紙二反𢯯𡙸也五千五百佛名經第三卷怛娜乃可反袟帝除栗反聃婆他甘反黟闥一兮反魯盧口反怖霤力救反䭾嗽所書反眸路莫侯反𥅣陀女乙反迦辣力割反唵婦烏感反鱣那知連反佶易奇乙反晡囉補胡反吱駐竹住反婆匙徒奚反他庇補𥧌反呹帝第四卷詬㖑戒反揭薜渠謁反下蒲反地蜱音蜱瑟咤陟嫁反奚囒魯干反燠𨢘於六反㖶迦烏反涅㘕力暫反阿𡚼又作嫁同時紙反𬿆奴那側飢反頡利賢結反呵𠺕第五卷喑遇於林反經文誤作㗍也堙𨢘於鄰反第六卷秖多是支反捶擈都雷反毱多渠六反經文作毬非鯢羅五奚反大方廣十輪經第一卷浚流古文溶濬二形今作浚同雖閏反浚深也第三卷麝香是亦反又音神夜反爾匹似麋臍有香也田畯資峻反爾匹畯田夫也郭璞曰今之𭍠夫也第六卷舌𤘡又作䶖同其蔭反牛舌病也經文從病作𤴽非也大方便報恩經第一卷暉𧰟又作艷同餘贍反方言秦晉之閒謂美色為𧰟池湖戶孤反說文大陂也楊州有五湖旃叔或言甄叔迦或云緊叔迦樹名也其花赤色此寶似之因以名焉喑唶於禁反下子夜反聲類大呼說文大聲也微服無非反爾匹幽匿蔽微也注云謂逃竄也呼吸古文歙吸二形今作吸同義及反廣匹吸飲也引也挑目他堯反聲類云挑抉也謂抉出目也抉音烏穴反里程除荊反程猶限也禮云程量也詩云程法也掝眥呼麥反掝裂也下靜計反目頭曰眥淮南云瞋目裂眥是也經文從首作馘古獲反生獲斷耳曰馘馘非此義咆地蒲交反說文咆嘷也亦大怒也輸頭檀王正言首䭾那王此譯云淨飯或言白飯非也第二卷蟠蘭椿輪蒲寒反椿𠡠倫反言形狀也蒨練𭽀爛千見反言色彩鮮盛貌也眼眩胡蠲胡遍二反蒼頡篇云視不明也眩惑也迫愶補格反迫急也下虛業反謂以威相恐懼也財賄古文𧶅同呼罪反財貨也通俗文財帛曰賄周禮通貨賄鄭玄曰金玉日貨布帛曰賄兜鍪莫侯反廣雅兜鍪謂之胄經文作鉾非字體也乾曬所懈所寄二反謂暴乾物也歎波那食或云怛鉢那譯云也蒲闍𡰱食譯云可食佉陀𡰱食譯云可噉餐唵烏感反字林唵啖也以掌進食曰唵也嶔巖苦銜反又音欽廣雅嶔岑高也山阜勢也𮊵惙知劣反聲類惙短氣㒵也惙惙亦憂也毛詩傳云憂心惙惙也唼食子盍反字林蟲食曰唼唼血也經文作非也茹食攘舉反茹啖也爾匹啜茹也郭璞曰啜拾食之也擔揭說文作竭同其竭反負舉也竭擔也腨扶忍反說文膝骨也下又作踹同時兖反腨腸也炎旱雨廉反炎熱也爾匹炎炎熏也謂旱氣薰𬉹人也猥多烏罪反字林猥衆也廣雅猥䪺也噢噎於六反下一結反埤蒼噢咿內悲也謂痛悲之聲也噎塞也經文有作郁非體也爪攫居縛反說文攫扟也蒼頡篇攫搏也淮南子云獸窮則玃鳥窮則是也扟音居逆反單孑古折反案孑猶孤獨也說文無右臂曰孑喊㖑呼攬反下又作䛥欵二形同呼戒反方言喊聲也㖑呵也謂恚怒聲也經文或作闞音呼檻反二形通用也踏張唐盍反謂踏地張目也經文從口作吸悵非也曒然古文曒二形今作晈同公鳥反埤蒼曒明也淨也第三卷嫡嫡丁狄反字書嫡正也公羊傳曰立嫡以長者何嫡也謂夫人之子尊無與也耶維或言闍毗或言闍維亦言闍鼻多義是焚燒也蹎蹶又作𧽍二形同丁賢反下居月反蹎蹶猶䪺仆反倒也經文作㒹厥非體也仆音蒲北反㽃瓳字又作墦同普安反下侯徒反通俗文甎方大謂之㽃瓳今大方甎是也慨歎口代反慨歎大息也說文慷慨壯士不得志於心情憤恚也悒遲於急反字林悒不安也蒼頡篇悒悒不舒之㒵也煩冤於元反冤亦煩也屈也經文作宛惋二形非體也汪水烏黃反通俗文亭水曰汪經文作洸音光非也摩訶羅此譯云無知也或言老也第四卷瞤動而純反說文目動也經文作𥌎非體也蕃息輔袁反蕃滋也滋多也經文作繁盛也亦多也帷帳于追反字林在旁曰帷謂張帛障旁也幃圍也湍浪土桓反說文疾瀨也水流沙上曰瀨瀨淺水也𥉕盲莫公反有眸子而無見曰𥉕也目無眸子曰盲舉帆又作帆𩗋二形同扶嚴𢗲泛二反隨風張幔曰帆振濟脂刃反小爾匹振救也說文振舉也經文作賑之忍反隱賑富有也草䕓音察草蔖也亦芬也經文作濚非也蔖音千古反枯草也今陕以西言草䕓江南山東言草蔖虘音七故反哮嚇又作同呼交反下呼嫁反𧆞聲謂之哮嚇第五卷白虹古文𪲀同胡公反說文螮蝀虹也俗呼美人江東呼為𩁹𥼶名虹攻也純陽攻陰氣也劓刵又作劓同魚器反下讓記反劓割鼻也刵截耳也刖耳古文跀𧿁二形同魚厥五刮二反刖猶割也探摸他含反說文遠取曰探手抆為摸也禍酷古文嚳嚳焅三形同口䔍反說文酷急也亦暴虐也掊發說文作抱捊二形同步交反捊引取也第六卷牛呞正字作齝𪗪二形同𠡠之式之二反謂食已復出也跳枰皮兵反埤蒼抨榻也謂獨坐板牀也𥼶名云枰平也以板作之其體平正也須陀食或云修陀此天食也修陀此譯云白也隨相論云須陀此云善陀此言貞實也第七卷童齔初忍反古文音差貴反毀齒日齔說文男八月生齒八歲而為之齔女七月生齒七歲而毀齒字從齒從匕聲𥼶名云齔洗也毀洗故齒更生新也寶雲經第一卷頂古文䏤𦞤二形同先進先恣二反說文腦蓋額空也百葉尸涉反牛膍胵也經文作治輒反說文薄切肉也䐑非此義第二卷志逞丑井反逞極也快也亦疾也說文逞通也第三卷鮫魚今作蛟同古茅反說文海魚也山海經云漳水多鮫魚郭璞曰䱜屬也皮有珠文而堅尾長三四尺末有毒螫人皮可以飾刀劒也第六卷算擇乘管反謂簡擇也三蒼算選也穰草而羊反說文黍治竟者也經文作蘘蘘荷也非此用金光明經第一卷六卷蛭蟲之逸反謂入人皮中食血者也鎔銷鍾反說文治器法也漢書猶金在鎔應邵曰䥫形以捊扶鳩反說文捊擊鼓柄也則鼓椎也第三卷樓柅女履反駱懺盧各反訶嵐洛含反皤詈蒲何補何二反䊉婆蘇感反𠌃𠌃力救反苾頭蒲結反波扡土何反姥者莫補反瞢伽莫崩反遏部烏割反第四卷彗星囚苪蘇醉二反𥼶名云彗星星光稍稍似彗經文從手作㨹音于桂反廣匹㨹裂也㨹非字義竝現又作並同蒲茗蒲鯁二反說文竝併也亦俱也萆龍華補侍補婢二反依字鼠莞也似龍也𥼶草言萆鼠莞該那古來反末坘直尸反㗧乃結反娑瀰莫爾莫唘二反孛題蒲沒反婆㖃又作詬同居𠋫反脪帝虛衣反第五卷孤迸又作跰同補諍反字書迸散走也薨亡呼𪪺反爾匹薨死也諸侯死曰薨薨者䪺壞之聲也第六卷倣徉扶方以章反廣匹倣徉從倚也亦徘徊也字從彳以𩚅今作食同囚恣反廣匹𩚅餧謂以食供設人曰𩚅經文作飴古字通用耳鴿籀文作說文士虞反雞子也亦通名鳥子為睫瞤子葉反下如輪反說文瞤目動也睫目毛也大雲經第一卷揵度此言訛也正音娑揵此云聚也佛去世後別有姓迦旃延婆羅門道人作發智經有八揵度是也拘辨荼或言鳩槃荼或言弓槃荼甕形頗似冬瓜也錐銏此江南俗字也字體作矟山卓反埤蒼矟長一丈八尺也第四卷頭枑都麗反嗒兮冝作唅土合反蹴踏唐盍反說文踏踐也經文作㧙蒲必反方言柲椎也南楚名相椎搏曰柲廣匹柲擊也密迹金剛力士經第一卷匿訑又作䜏同湯和大可二反說文兖州謂欺曰詑詑不信也金痍與之反痍傷也金謂刀斧傷者也𤻲瘡翼灼反藥有毒有無毒者也三蒼病消𤻲也粗細且胡反廣匹大也人之警防亦曰鹿性食息自相背慮人獸之害警亦如之故從三鹿也鴉音於牙反白頸鴨鶋也開中名阿雅經文有作鵙古覔反伯勞也鴨鶋音上卑下居鵾雞又作鶤同古魂反狀如鸖而大者也麑鹿又作麛同莫雞反麞鹿之子也崎嶇丘冝反下丘愚反廣匹崎嶇傾側也埤蒼不安也經文從足作踦𨄅非體也俳說皮皆反說文俳戲也樂人所為戲笑以自怡悅者掌說文亦字之視反平也直也髦尾又作髳同莫高反又音蒙說文髦髮也髮中豪者也第二卷閒關古間反謂入出也亦設置之㒵也柯椑父支反抳犁女几反伊諧下皆反貫習經文作諧非也月支薄佉羅國應是也在雪山西北或云月氏丘慈或言龜茲正言屈支也屈音居勿反多出龍馬左傳云屈産之乘也于闐徒見反凶奴謂之于遁諸胡謂之豁且俗語言渙那梵言瞿旦那此譯云地乳國其地忽然隆起其狀如乳神童飲吮因以名焉諸麼莫可反麼猶小也通俗文細小曰麼也諸瘻字林力句反頸腫也謂此國人多有因從名焉第三卷車釭又作𨊧同古紅反說文車轂頭䥫也方言自關之西曰釭燕齊海岱之閒謂之鐹鐹音古和反秸草公八反秸槀也經文作非也今經中有作字音夷職反穀麥也赭衣之野反赭赤土也方言南楚東海之閒或謂赤為赭郭𤩶曰言衣赤也蘆蔔三蒼音羅音稍隱來都反下蒲北反經文作菜茯或作蘿蔔並非體也淳湩上音純下竹用都洞二反乳汁曰湩今江南亦呼乳為湩第四卷飈聚俾遙反暴風從上下者也第五卷奔馳古文𩦥今作奔同補門反奔走大㮯胡本反三蒼全物者也通俗文合心曰㮯菩𠁅胎經第一卷翅搜尸豉反下所流反案婆兜𥼶翅搜城即中天笁城也譯云婆兜此言住𠁅𥼶翅搜者能也謂能仁住𠁅城也經中或作𥼶氏瘦城或作舍夷城或云迦維羅衛或言迦毗羅城皆猶梵言輕重以名𥼶迦音訛故也自襞卑亦反襞褻也廣匹襞屈也褻音惵襯身字書或𥨾字同且若反又叉覲反襯至也近也唼嗽子盍反下又作欶同所角反通俗文含吸曰欶盍天諸經作廅天此譯云有光壽天也廅音烏合反相敦又作𢴤㲂棖三形同丈庚反謂相觸也橖拄也哊咽禹六反下於賢反廣匹哊吐也喉也經文作𡃴音墮誤也㗘㗱又作𪙍同補各反下子立反說文㗘㗱噍㒵也味口也第二卷鼻𡹼魚偃反通俗文云緩脣謂之𡹼磭磭音昌若反今同其事也經文作嵼魚産反㟞嵼也嵼非字義如篅市緣反說文竹圓以盛穀者也蒼頡篇篅圓倉也經文作簞音丹竹器名也簞非此義蛄蟥古胡反螻蛄也下胡光反蟥蛢甲蟲也大如虎豆緑色者也蛢蒲丁反第三卷勸私律反說文誘也經文作恤非也𢯇讓於入反平推也亦手小舉之也廣雅𢯇進陶冶徒高反下弋者反陶謂作凡器也冶爐銷者也陶化也冶消也僧那此譯云鎧甲言以被飾著大鎧也龜鼉徒多反三蒼似蛟而大山海經江水足鼉郭璞曰似蜥蜴大者長一丈有鱗彩可以為鼓經文從魚作𩵔非也利𭪿古文𭪿今作𠲿同子纍反字書𭪿鳥喙卛空居万反通俗文汲取曰卛說文抒漏也第四卷蟲蝗胡光胡蓋二反螽也謂蝗蟲也小曰蝩大曰蝗云魚子化作也蝩音鍾經文作蟥非體也宿之忍反亢宿苦浪反撩擲又作摷同力雕反謂相撩擲也擲相投也杖挃知栗反廣匹挃㓨也以指杖㓨者也大辟古文𠮃二形同尺反辟法也除也經文作邪僻之僻非也除所巖反刈草也詩傳曰除草也經文作釤所鑒反大鎌也釤非此用左傳夷薀崇之第五卷槍㓨且羊反說文槍距也通俗文剡木傷盜曰槍木槍䥫槍皆作此經文作鏘玉聲也又作錆非也八藏在浪反一胎化藏二中陰藏三摩訶衍方等藏四戒律藏五十住菩藏六雜藏七金剛藏八佛藏梵本名篋以藏替之也大集賢護菩經第一卷賢護案移識經云陀羅波梨此譯云賢護亦云賢守鄰聖曰賢固道稱守幻士經云陀此主仁賢是王舍城在家菩也第二卷區別去愚反區域也區以別矣異種區別也第三卷爐㰆又作排二形同蒲戒反謂煆家用炊火令熾者也咨詢私遵反詢問也左傳訪問於善為咨咨親為詢咨問善道詢問親戚之義也岌多此居士子名也依字魚及反岌高危也亦盛也篋笥枯挾反下𦙃吏反說文盛衣器曰笥第四卷罌水於耕反於成二反方言瓿甊罌也贊助子且反贊佐也亦導也鏗鏘又作銵同苦耕反下又作鎗傖二形同且羊反廣雅銵銵鏘鏘亦聲也大方等陀羅𡰱經第一卷㗣提第二卷動他古文𨔝同徒董反爾匹搖動作也經文從言作諥非也叱呵齒逸反蒼頡篇大呵為叱發豫翼諸餘煮二反爾匹豫我也案此亦與余字同也第三卷若僑渠消反說文高也廣匹僑才也字林寄客為㝯作㝯字廣匹羇旅㝯寄也單縫扶封反說文以針紩衣也經文從手作摓非也𧎗斗苦和反一名活東郭璞曰即蝦蟇子也𥆔瞎許交反下許轄反目盲也第四卷𪅌案爾匹作螏蟍蝍蛆也能食腦也耒木郎對反𥝷具曲木也
