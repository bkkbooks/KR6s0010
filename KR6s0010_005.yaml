body:
  text: 翻經沙門玄應撰海龍王經梵女首意經央掘魔羅經月明菩經觀察諸法行經滅十方冥經七佛神呪經出生菩提心經菩本行經普門經稱揚諸佛功德經心明經力莊嚴三昧經不思議光菩所説經須真天子經文殊師利問菩署經般舟三昧經德光太子經等目菩所問經施燈功德經超日明三昧經菩訶色欲經月上女經人本欲生經中陰經不必定入印經須藏經魔逆經佛華嚴八如來境界經濟諸方等學經諸佛要集經菩行五十緣身經文殊師利佛土嚴淨經勒菩所問本願經濡首菩分衛經堅固女經大乘同性經演道俗經阿閦佛國經寶經蓮華面經百佛名經迦葉經觀無量壽經孔雀王經不空索經發覺淨心經觀藥王藥上二菩經無上依經請觀音經移識經十一面觀世音經未曾有經觀世音菩授記經不思議功德經鹿母經大吉義呪經鹿子經菩夢經文殊問經溫室洗浴衆僧經密迹金剛力士經四不可得經東方最勝燈王經諸德福田經成具光明定意經虛空藏菩所問持幾福經太子須達拿經菩投身餓虎起塔因緣經太子墓魄經頻婆娑羅詣佛供養經須賴經羅國經金色王經天王太子辟羅經獨證自在三昧經阿陀鼓音陀羅𡰱經摩訶摩耶經八陽神呪經如來方便善巧呪經幻士仁賢經勝鬘經後出阿陀經須摩提經海龍王經第一卷安明由山即須山也亦言修迷樓山正言蘇迷盧山此譯言好光山亦言妙高山也潭然徒耽反潭深也楚人名深曰潭也悁戚於緣反聲類云悁憂也説文悁恚也第二卷闕眉間也釋名云闕在門兩旁中央闕然為道眉今像此因以名焉凥也苦勞反聲類凥臀也臀音徒昆反臏也又作臏同扶忍反説文膝骨也三蒼膝蓋也親昵又作昵同女栗反爾匹昵親近也昵亟也親昵亦數也晏然烏鴈反晏猶安也説文晏天清也亦鮮翠之貌也繁裔輔袁反繁多也盛也下古文裔同餘制反説文裔衣裾也以子孫為苗裔者取其下垂之義也字從衣從冏音女劣反第三卷姪態古文佚今作姪又作劮同與一反蒼頡篇佚蕩也亦樂也下又作態同他代反意恣也謂度人情貌也𠚫穫胡郭反説文𠚫禾也王逸注楚辭云草曰𠚫穀曰穫詩云十月穫稻是也第四卷吸氣古文歙吸二形今作吸同虛及反廣匹吸飲也説文內息也引也謂引氣息入也勸私律反誘教導也亦引也相勸也經文作恤憂也收也恤非此用蹉踖千何反下子亦反蹉跎也踧踖也踖應作錯七各反蹉跌不正也錯誤失也央掘魔羅經第一卷龜坼恥格反莊周云宋人有善不龜之藥者注云其藥能令人手不龜文坼裂者也烏伏扶富反謂蓲伏其卵及伏雞等亦作此字今江北通謂伏卵為菢江南曰蓲音央富反第二卷闞又作唬同呼交反下呼攬反説文虎怒聲也詩云闞如虎是也雄傑奇哲反傑特立也英傑也才能也智出千人曰傑興渠此言少訛也借音嫣蠅反出烏荼娑他那國彼土人常所食者也此方相傳以為藝薹者非也嫣音虛延反童真是沙別名式義此言學亦云隨順無違梵言究磨囉浮多究磨囉者是彼土八歲已上未冠者童子揔名也浮多此云真亦言實酣醉古文佄同胡甘反漢書應劭曰不醉不醒曰酣一云樂酒曰酣第三卷綿纊古文絖同音曠説文纊絮也小爾匹云纊也絮之細者曰纊津溜子鄰反下力救反津謂津液也蒼頡篇液汁也字書溜謂水垂下也第四卷維持翼住反維猶聯結也亦維持之也維繫也嬉謔上虛基反下虛虐反嬉戲樂也謔相戲調也驍摙古堯反廣匹健也亦勇急也震懾徒頰之涉二反爾匹懼也經文作疊非體也俯仰無辨反俯低頭也言閔默不已也卜筮時世反筮問也禮記龜為卜蓍為筮卜筮者決嫌疑定猶豫故疑即筮之字從竹杜門古文𡍨同徒古反國語杜門不出賈逵曰杜塞也塞閇也瞪直耕反埤蒼直視也下之欲反顛沛又作蹎䟺二形同都賢反下補昧反謂偃仆也經文從犬作狽非也觀察諸法行經第一卷撞弩徒江反廣匹云撞刾也説文橦戟搗也第三卷不槩古文扢同公礙公內二反扢量也廣匹扢摩也蒼頡篇云平斗斛曰槩第四卷鵁鶄二音交精腳高有毛冠可辟火災者也調戲徒吊反謂相嘲調也調弄也經文作恌非也七佛神呪經第一卷咻咻許流許主二反依字噢咻痛念之聲也五渾胡昆反謂五濁也渾亂也亂猶濁也亦水流聲也潢漾胡廣反下音養潢漾猶浩蕩也經文作洸音光非也㱇㱇所力反通俗文小怖曰㱇埤蒼㱇恐懼也字從欠經文作懎𭍠二形非體也目佡丘豉反制濘奴定反伊瞢莫𡶤反邲地扶必反目揥他細反湖利戶孤反侈丘豉反但泥乃禮反捶婆楚洽反陀咩紙反阿眵充支反癡噤渠錦反第二卷愆咎古文㥶二形籀文愆今作愆同去連反説文愆過也亦失也咎罪也撫恤又作恤同須律反爾匹恤憂也亦收也謂以財物與人曰振恤之也撈接祿高反通俗文沉取曰撈經文作牢固之牢非也搓摩何反依字搓挪也挪音那第三卷鞠育又作掬同居六反説文掬撮也鞠養也方言陳楚之間謂養為鞠也羖䍽功戶反下力的反三蒼羖䍽亦名羯也叨亂吐刀反叨亦貪也説文俗作叨字第四卷儼然冝撿反詩傳曰儼矜莊貌也爾匹儼敬也説文儼好貌也潠之蘇悶反通俗文水湓曰潠經文作潠非也白睆還板反許慎注淮南子云睆謂目內白翳病也經文作浣衣浣非也摎項又作摎同居茅反蒼頡篇摎束也説文摎縛煞之也摎即纏縛之名也蠆他達反下勒達反廣匹蠆蚳蠆蠍也經文作剌非體也厭蠱於舟反下姑護反春秋傳日疾如蠱惑非鬼非食或以喪志注云蠱惑疾也齆鼻一弄反埤蒼鼻病也搭眼方道喉痺俾利反癕痺暴厲之疾也亦言喉閇閇猶塞也菩本行經上卷軍持正言捃稚迦謂雙口澡灌也或譯云瓶也榖又作炒炒兼三形同初狡反方言炒火乾也牂羝祖郎反羊三歲曰牂牂然盛貌也下丁奚反羝羖羝羯羊也經文作丁禮反觸也非經用來抴又作曳同余世反説文抴引也謂牽引也羯羠囚几反聲類騬羊也徐廣曰羯羠並犍羊也慍心於問反慍怒也説文慍怨也蒼頡篇慍恨也璣鄯𡰱居衣反下音市戰反龍子名也刖其魚厥五骨二反刖猶割也經文作刓五桓反齊也上旋似緣反旋轉也經文作矩俱禹反方曰矩矩則也矩非此義耶旬或云闍維或云闍毗同一義也正言闍鼻多義是焚燒也中卷災禍又作災災災三形同則才反説文天火曰災蜴蜥以石反下斯歷反在草曰蜴蜥經文作蜴非也金拂敷勿反廣匹拂除也謂除去塵土也拂拭也經文從巾作𢂀或作𣭘非也下卷騷動蘇勞反説文騷擾也謂擾動也万岐又作郊二形同巨冝反謂道有支分者也晃焴又作晄古文熿同胡廣反説文晃明也廣匹晃暉也光也下又作煜同由掬反説文煜曜也埤蒼煜盛貌也瘡瘢薄蘭反蒼頡篇瘢痕也痕胡根反稱揚諸佛功德經下卷洞清古文同迵二形同徒貢反案洞猶通過也亦深邃之貌也經文從口作哃非也力莊嚴三昧經上卷氛氳冝作葐蒀扶云反字書作同於云反葐蒀盛貌也亦香也海島古文塢同都老反水中山曰島島到也人所奔到也須真天子經上卷鋒遬蘇木反䨴陀徒對反瞀呵云搆反中卷勇悍胡且反蒼頡篇悍禦也説文勇亦悍也弧弓戶都反説文木弓也周易黃帝作弦木為弧建箭居健反建立也亦樹也般舟三昧經中卷輕易又作𫾻今作易同以豉反蒼頡篇易慢也平易也鶡鴨胡葛反似雉鬪死不却故武人戴鶡冠以象之也出輝諸之山以其尾垂頭亦出上黨下古文鵪同烏甲反謗訕所姧反蒼頡篇訕非也謗毀也蛟龍梵言宮毗羅音交有鱗曰蛟龍抱撲子曰母龍曰蛟龍子曰虬其狀魚身如蛇尾皮有珠郭璞注山海經云蛟似蛇而四腳小頭細頸頸有白嬰大者數十圍卵生子如一二斛甕能吞人也㹢玃又作猳同古遐反下居縛反説文大母猴也善玃持人好𮨇䀎等目菩所問經上卷昺徹古文昺苪二形同今作炳同碧皿反廣匹昺明也徹通也三蒼昺著明也陶現徒高反詩云上帝其陶陶變也去藏才浪反積蓄也如庫藏也經文作非體也督住又作督同都木反爾匹督正也方言督察也理也懀然烏外反轉霍呼郭反案霍忽急疾之貌也霍然忽霍皆是也經文從火作霩胡沃反説文霩灼也霩非此用而此字習謬已久人莫辨正今詳其理義冝作共相二字輕佻聽遼反字書佻輕也廣匹佻佚也爾匹佻偷也苟且也經文從手作佻非體也下卷晴陰又作暒殅二形同自盈反聲類雨止曰晴焜煌胡本反下胡光反方言焜煌盛白也光暉也青紅且經反東方色也木生火從生丹丹青之信必然也經文作菁華之菁非也菁音紫盈反三蒼謂之英曰菁也超日明三昧經上卷懾伏聲類作㒤同止葉齒葉二反説文心服曰懾廣匹懾懼也綏恤私唯反爾匹綏安也恤收也弘又作同苦回反字林恢大也纖介家薤反周易悔若者在乎介韓康伯曰介纖介也劉瓛曰介微也譎詭又作噊同公穴反下又作恑同居毀反方言自關而東西或謂詐為譎恑譎恑亦奇怪也浮譁呼反歡譁也蒼頡篇譁言語譊譊也不挍古效反挍報也論語犯而不挍是也五兵周禮司兵掌五兵鄭衆曰五兵者戈殳戟矛無夷也步卒五兵則無無夷而有弓矢也左傳子𢙣出五甲五兵消殪古文作同於計反爾匹殪死也殪煞也亦盡也弘綽又作繛同昌若反説文綽緩也綽亦寬也下卷淖情女卓反三蒼昌若反又音徒歷反淖約好貌也分賦方句反賦布也爾匹賦也謂布與之也綢繆直流反下亡侯反詩傳曰綢繆緾綿也寇害口候反説文寇暴也廣匹寇抄也尚書寇賊姦宄范寧集解云寇群行攻剽者也字從完從攴剽音匹妙反躊躇腸反下腸誅反廣匹躊躇猶豫也亦躑躅也貙者恥俱反似狸而大爾匹今貙虎大於狗文如狸博物志云貙大能化為虎菀囿于救反三蒼養牛馬林木曰菀字林有垣曰菀無垣曰囿囿亦禁菀也謙沖説文作蠱同除隆反字書沖虛也亦中也屢聽力句反爾匹屢亟也數也亟音祛記反訾量又作𢋀同子移反訾亦量也思也説文思稱意也蹉跌千何反下徒結反蹉跎也失躡曰跌跌差也未孚字體作同芳務反禮云無麩往鄭玄注麩疾也廣匹麩行也一針聲類今作針同支諶反廣匹針刺也所以縫衣者也月上女經上卷脅嚇方言作鬩同呼𨽦反謂以威力恐人也呵喝火曷反廣匹喝怒也廣蒼云喝訶也經文作喝乙芥反嘶喝也雀垛徒果反謂城上女牆也經文作墮落之墮非體也寮窗力雕反蒼頡篇寮空也亦也藻棳又作同之恱反爾匹其上楹謂之棳注云侏儒柱也蒼頡篇棳𣚊也中陰經上卷𤸱天烏合反譯云有光壽天經中有作阿波天同一名也謂二禪初天少光天也須滯天除制反道行經作須𤴟天音徒計丁計二反又作須廗天音帝樓炭經作須天音帝皆梵言訛轉也此譯云善觀天即善見天也瘡疣字體作疣籀文作疣同有流反通俗文體目曰疣經文作痏音位理反蒼頡篇痏歐傷也斗藪又擻同蘇走反方言斗擻舉也周成難字斗擻也音都穀反下蘇榖反經文作抖捒二形音同極䇿並非字體下卷擲綿字詁古文線今作線同私賤反所以縫紩者也劒刎古文歾同亡粉反通俗文自刾曰刎須藏經上卷𭪩脂履反下昌制反憩多去例反婢諶市針反耶娜乃可反帝弭是反迷踦居蟻反下卷輸拒俱禹反安豸徒賣反牟芩渠金反囉喃奴咸反遮䶩竹皆反椑伽補反漩梨囚反迦㘕力暫反豍豆布迷反廣匹豍豆䝀豆也經文作蜱非也佛華嚴入如來不思議境界經下卷沙詑敕嫁反經中或作阿迦𡰱吒天是也池濼匹各反濼陂也山東名為濼幽州呼為淀徒見反經文作泊非體也諸佛要集經上卷墟聚去餘反廣匹墟居也人之所居曰墟也嘲囈又作啁同竹交反蒼頡篇嘲調也下牛世反囈言也文殊師利佛土嚴淨經上卷相棠借音丈庚反字冝作樘敦棖敝四形同文衡反謂相觸也恬惔徒兼反方言恬靜也下冝作淡徒濫反淡安也謂安靜也經文從心作惔徒甘反憂心如惔惔憂也惔非此用億垓古文作奒二形今作姟同古才反數名也風俗通曰十億曰兆十兆曰經十經曰姟姟猶大數也拜謁於歇反爾匹謁請也亦白也告也侜張陟留反爾匹侜張誑也經文作侏之儒反侏儒短人也塵埃烏來反蒼頡篇埃風揚塵也下卷交趺又作跗同府于反三蒼跗足上也謂交足而坐也經文從足作跤非也至湊且豆反廣匹湊最也湊競進也景則羈影反詩云介爾景福傳曰景大也則法也濡首菩無上清淨分衛經上卷底泓一宏反説文下深大也廣匹泓泓深也吹噭又作嘂譥二形同古吊反噭喚也呼也亦鳴也螫蟲書亦呼各二反説文蟲行毒也躇步腸於反説文躊躇猶豫也躑躅也錠燭殿定二音聲類云有足曰錠無足曰鐙鹿陬古文聚二形今作聚同才句反廣匹聚居也謂人所聚居村邑者也薅鋤又作薅薅二形籀文作𦷄或作茠同呼豪反説文除田草曰茠經文作䒵莇非也下卷慷慨正作慷愾同口葬反下苦代反慨大息也亦士不得志者也喟然又作㕟同口愧口怪二反三蒼喟歎息也歎聲也華孚或作荂説文或作同芳俱詡俱二反方言華荂盛也齊楚之間或謂之華或謂之荂玓瓅丁歷下字書作皪同力的反説文玓瓅明珠色經文作的非體也皓然又作杲同古倒反埤蒼白貌也亦明也灼然明白者也經文作晑音古螢反非也岐嶷巨冝反下語𣗥反詩傳云岐知意也嶷識別也言能匍匐則岐岐然意有所知也其貌嶷然有所別識也亦言六十歲也經文作奇非體也大乘同性經上卷澿然其錦反寒戰極也經文從心作𢙿非也崖隴力反説文天水大坂也下卷垂毦人志反以毛羽為毦飾若今刀鞘毦也織毛曰毦弓把百雅反單手為把説文把握也持也經文作弝近字也阿閦佛國經上卷提洹竭佛此譯云錠光又云然燈佛是也珠璣居衣反説文珠之不圓者也字書云一曰小珠也堊之烏各反白土也亦名白墠也廣匹堊塗也罷極今作疲同被羇反廣匹疲猶倦也亦勞也蓮華面經下卷摩俟事几反姞利奇乙反迦葉經上卷一盞又作盞盞盞三形同側限反方言盞杯也孔雀王神呪經上卷婪婢力含反黳離烏奚反祕擔蒲薎反哿梨古我反贉婆徒感反多鱣知連反蝤蛑才尤莫侯反躓利知利反覃婢徒南反叟婢蘇走反密渧都鍪反鷃哲烏諫反縕摩於雲反母所咸反剡埤以染反毗茤則俱反糝婆蘇感反揚哿以章反苾頭步結反𨢘鏃祖木反傖士行反中州人也恃音類刎闍無粉反歌羅古河反曝翅蒲木反居虞許力二反下卷血膋又作膫同力雕反家書膋脂膏也謂腸間脂也今中國言脂江南言膋腓髀扶非反字林脛腨也説文腓腨腸也下蒲米反股外也癲癇又作癲同都賢反廣匹癲狂風病也下核間反聲類小兒癲也頷車公答反方言頜頷也亦云輔車謂頥頷也腹髂又作髂髂二形同口亞反埤蒼腰骨也江南呼髀骨上接腰者曰髂那姥莫𡡅反嫣迃遇反多所反波跘平息反鯨龍巨迎反白鷺力故反天芉爾反醫羅烏奚反浡地蒲沒反蘊摩於粉反疽癩且餘反説文久癕也下力蓋反字亦作癘𢙣疾也癭瘤於井反字林頸瘤也下力洲反説文瘤腫也瘜肉也羅湜是力反蛷螋渠周求俱二反下所俱反生藤徒登反靄沙乙例一害二反博聳私勇反發覺淨心經下卷莖稈又作秆同古旱反稈稿也廣匹稻穰謂之稈籠古文羄罩對三形今作同挍反捕籠也籗音捉財購古候反説文以財有所求也廣匹購償也無上依經下卷無胲案字義冝作解胡賣反解謂縫解也委他又作逶蟡二形同於危反下又作迤同達何反詩云逶逶他他德之美貌也傳曰逶他者行可逶曲迹也亦自得之貌也窊邪也移識經上卷新𦠌又作枘同乃困反字菀𦠌柔脆也通俗文枘再生也經文作嫩近字也火浣布周書西域獻火浣布汙則燒之則潔妖冶於驕反下以者反周易冶容誨淫劉瓛曰冶妖冶也謂恣態之貌也卑遜蘇寸反字林遜順也亦謙恭也今作遜鞋襪又作同胡皆反下古文作襪今作襪又作怽襪二形同無發反足衣也經文從巾之幭音亡別反怕㡤也幭非此用腰髂口亞反埤蒼腰骨也經文作跨𦝣二形非字體也肪𦙽府房反下先安反通俗文在腰曰肪在胃曰𦙽廣匹𦙽脂肪也騙騎匹面反謂躍上馬也今俗謂不躡隥上馬為騙下卷咼戾口蛙反下力結反謂不正也經文作綟帛也綟非字體綟音力計反亦緑色也斑駮又作辨同補顏反蒼頡篇斑文貌雜色為斑也頿又作髭同子移反説文口之須者也字從須豌豆烏丸反豆名也經文作於月反或作𭓩並非也未曾有經上卷無恙以尚反爾匹恙憂也孫炎曰恙病之憂也案易傳云上古草居露宿恙蟲也善食人心凡相勞問無恙乎復因以為病也頑嚚吳鱞反下魚巾反廣匹頑鈍也蒼頡篇嚚𢙣也左傳心不則德義之經為頑口不道忠信之言為嚚蕑又作同餘説反説文蕑也亦挍也小爾匹撰具也乍得士嫁反廣匹乍暫也蒼頡篇乍兩詞也慌慌呼廣反慌忽眼亂也亦迷惑也下卷先喫口迹反謂喫噉食飲也經文作非也沛然普賴反三蒼沛水波流也亦大也經文作霈近字也不思議功德經下卷離癖字或作臂卑避反懼吒陟嫁反大吉義呪經上卷鼻𠯋烏禮反堙羅於仁反荼黔音炎反龍名也䉛尼於六反締知利反下徒計反苫婆式益反摩啅敕角反佛褅徒帝反咮羅齒朱反啁利陟交反下卷跂羅又作䞚同墟豉渠支二反跂登也履也𡹼鼻魚偃反通俗文騫緩也經文從山作嵃非也聸耳丁藍反説文耳垂也經文作耽都含反耳大也刪地所姧反地乘干反囒地洛干反羅蒲戒反談髀徒南反下蒲米反渒梨普計反嗘泥呵郅之逸反菩夢經上卷樺皮胡𧟶反木名也可以飾弓者也文殊問經上卷多弭氏反炮字父交反攞字力可反下卷底舸古我反山名律主居之芿山而證而二反又作艿律主居之舟航又作杭同何唐反方言自關而東或謂舟為航航渡也濟渡之舟也𦌘子恆反𦌘之捴名也樹四植束水以挂曰𦌘跨上苦𧟶反跨躡也字林跨渡也牛疾津反字略云牛名也波拖太何反密迹金剛力士經下卷錯勃蒲沒反勃然猶忽然也勃亦亂也逆也訓欣呼運反訓導也教也誡也下又作欣同虛殷反欣樂也東方最勝燈王如來經𫺳泥恀羅巨支上支二反呬呬火利反那哆徒反麼吒其可反成具光明定意經𦰚若又作沃同於縛反詩傳云若猶然也柔也濕也亦從下溜出也卓犖力角反謂奇異也左傳犖有力焉能投蓋于稷門瞢瞢莫登反瞢瞢然亂也悶也亦無光也真諺冝箭反俗言也言了別真言俗語無疑難也經文從口作唁非也裒訕補高反案裒猶揚美之也進也訕謗也剗貪又作鏟同初蕑反廣匹剗削也聲類云剗平也躓礙音致通俗文事不利曰躓限至曰礙經文作綴非也潭然冝作憺徒濫反憺猶安靜也深水曰潭音徒南反眉毛美飢反説文目上毛也經文作菴二形非也眼瞼居儼反字略云眼外皮也經文作睫眊二形非也諀訿上匹爾下資爾反通俗文云難可謂之諀訿經文或作啤呲瘦𠅸古文𠅸耄二形今作耗同莫報反禮記八十曰耄注云耄惛忘也亦亂也經文作𡬁𭓮二形誤也𪱽閣蒲萌反通俗文連閣曰𪱽𪱽亦閣也蒼頡篇樓閣也謂重屋復道者也妐姑又作伀同之容反釋名云俗謂舅章名伀言所見敬忌見之伀懼自肅齊也盥手公緩反説文澡手也案凡灑澡物皆曰盥不但手也字從臼水皿上意也太子須大拏經檀特山或言單多囉迦山或云檀陀山此譯云蔭山須大拏女加反或言須達拏或云蘇陀沙拏此譯云善與亦言善施蒼天錯郎反爾匹春為蒼天注云万物生蒼蒼然也愕然字書或作咢同五各反愕驚也為𢡠古文幟同尺志反幖也通俗文私記曰幟廣匹幟幡也墨子曰以為長丈五尺廣半幅曰幟也蜎蜚一泉反字林蟲貌也動也下古書飛皆作蜚同甫韋反蜚揚也左傳秋有蜚不為災嶔崟去銜去吟二反下語銜冝金二反廣匹嶔崟高貌亦山阜之勢也嵯峨才何反下我多反廣匹嵯峨高也楚辭注云山截峻敞曰為嵯峨三顀直追反説文額出也今江南言顀頭胅額乃以憔為後枕高胅之名也經文作膇未見所出脣䫂丁可反廣匹䫂醜貌也經文作哆充爾丑亞二反非今用也凸髖徒結反凸起也蒼頡篇作𥥌不平也經文作昳非體也下蛘餘掌反説文搔蛘禮記蛘不敢搔是也字從蟲今皆作癢近字也又作癢音似羊反病名也癢非字義市井子郢反周禮九夫為井方一里也白虎通曰因井為市故曰市井説文八家一井象搆韓形象㻾形太子墓魄經襲績古文㦻同辝立反襲受也廣雅及也亦合也仍也故質之逸反太玄經受質所疑宋忠曰質問也廣匹質問也謹也定也矇聵莫公反有眸子而無見曰矇下牛反生聾曰聵聵亦無知也空刓又作園同五桓反廣匹刓斷也楚辝刓方以為圓王逸曰刓削也噢咿於六反下於祇反埤蒼內悲也又痛念之聲也經文作哊郁郁三形並非體也𩥵駕忩含反説文駕三馬也居右而𩥵乘備非常也𩥵旁馬曰騑騑音妃顉頭牛感反説文低頭也廣匹顉搖也謂搖其頭也今江南謂領納搖頭為顉傪亦謂笑人為顉酌傪音蘇感反選耎而兖反案選耎猶須也吕氏云少選俗謂之選耎言推託不肯為也經文或作選蠕或作潠濡非也忸怩又作𧖷同女竹反下女反通俗文慙恥謂之忸怩才有在哉反廣匹才暫也亦僅也不久也何訾又作訾同子移反訾量也思也經文作訾財之資非體也須賴經跋跙才與反樹名也布施補故反分布也惠施也經文作𭢞非也過謫知革徒厄二反謂謫罰也方言謫怒也郭璞曰謂相責怒也謫譴也責也晝度宮知胄反晝度樹皆天上名也娛樂語俱反下力各反説文娛樂也樂喜也經文從女作㜰非也金色王經粔籹渠煮反下匿呂反蒼頡篇粔籹餅餌者也江南呼為膏糫音還字𮏑粔籹膏糫果也獨證自誓三昧經句潭徒南反或言瞿曇梵言輕重也趠第丑挍他吊二反上林賦趠稀間郭璞曰懸擲也説文趠遠也今贈在鄧反贈送也遺也説文以玩好之物相送曰贈也謳合又作嘔慪二形同烏侯反爾匹徒歌曰謳廣匹謳喜也鉢和蘭亦言鉢和羅梵言訛轉也此云自恣食也摩訶摩耶經涵潤胡反説文水澤多也詩云譖始既涵是也鎩翮字林山瘵反謂張翼也淮南子云飛鳥鎩翼許叔重曰鎩羽而飛也如來方便善巧呪經涪多蒲侯反摩錍普迷反唏詈呼几呼兾二反風齲又作齲同丘禹反説文齒也釋名齲朽也勝鬘經爾炎正字作熖以贍反梵言也此云所知末利謨鉢反案西域記此譯云奈因奈而得報者也阿踰闍弋朱反此譯云不可戰國須摩提經須摩提應云須摩耶此譯云好意或云好智滿碝字體作耎而兖反三蒼耎弱也物柔曰耎經文作碝而兖反次玉也碝非此體勗勉吁欲反下摩辨反勗勉勵也方言齊魯謂勉為勗勉猶自勸強也説文勉強也謂力所不及而強行事助又作埤朇二形同毗移比移二反説文裨增也益也亦補也梵女首意經入館古換反説文客舍也周禮五十里有候館案客舍逆旅名候館字從食今有從舍作館近字也無哲又作哲哲二形同知列反爾匹哲智也方言齊宋之間謂知為哲哲明了也月明菩經親理力紀反禮記天理滅矣鄭玄曰理猶性也又云樂者通倫理注云倫類也理分也今多作里二十五家為里居方一里之中滅十方冥經憂灼之若反灼謂憂懼也灼痛也出生菩提心經迦蘭陀或言迦蘭馱或言羯蘭鐸迦鳥名也其形似鵲鞞紐婆那此云竹林謂大竹也此鳥多拪此林昔有國王於此睡息蛇來欲螫鳥鳴覺之王荷其恩散食養鳥林主居士遂從此鳥為名名迦蘭馱迦舊安外道後奉如來俱致或言俱胝此言千万或言億而甚不同故存本耳䨲謨乃侯反下莫胡反紆伏哆衣于反系履下計反普門品經鞕五孟反字書鞕牢也下相傳胡浪反未詳字出滿脬普包反脬袋吹氣成也心明經山岡古郎反爾匹山脊岡郭璞曰謂山長脊者也囧灼俱永反蒼頡篇囧大明也亦彰也説文窗牖開明曰囧潷飯碑密反通俗文去汁曰潷江南言逼訛耳今言取義同也經文作上俗語不思議光菩所説經鴈鴝又作鸜同其俱反即鸜鵒也文殊師利問菩署經陂諟彼皮反下匙爾反比丘名也倪三五禮反下蒲沫反人名也提胳公諾反説文腋下也埤蒼在肘後也分畛之忍反婆羅門名也橋泉自宣反經文作𤱃泉二形非也黤黮烏感反下他感反不明也亦深黑也我齎又作賫子奚反説文齎持遺也德光太子經羯隨或作羯毗或作迦毗或作加毗皆一物也此云好聲鳥也經文從鳥作羯非也貧寠瞿矩反詩云終寠且貧傳曰寠者無禮也字書寠空也又作同苦交反下苦害苦曷二反三蒼敲相擊也經文作撓奴飽反槩古代反並非此用鸕力胡反下音慈爾匹云鷧郭璞曰即鸕也此鳥𭪿頭如鈎食魚者也中國或名水鴉此鳥胎生從口吐出一産八九也鋃鐺洛當反下都堂反説文鋃鐺鎖也通俗文錘頭曰鋃鐺施燈功德經𮊵瘠古文瘠𤶬膌三形同才亦反瘠瘦也支提又名脂帝浮此云聚相謂纍石等高以為相或言方墳或言廟皆隨義釋也菩訶色欲經鈇質方扶反書中鈇或音斧撗斧也古者煞人用斧下正體作㩫之逸反説文鈇莝斫也埤蒼㩫椹也公羊傳曰不忍加其鈇質何休曰斬要之罪也俎几側吕反字書俎肉几也俎亦四腳小槃也人本欲生經躡襈字體作同女輒反説文機下足所履也下仕眷反襈聚也不必定入印經採㨂又作𢽬或作練同力見反埤答㨂擇也禮記蕑棟英𮥸是也序文作挾胡頰反挾持也挾非此用寶冥古文寞今作填同徒見徒堅二反廣匹填塞也滿也𥭖多其俱反依字爾匹葋一名艼熒艼音他頂反拔身蒲沫反回也謂拔然回身也古字通用也魔逆經陽燧古文作鐆燧二形今作聲類或作燧同辝醉反取火者也鐆五石之銅精也圓以仰日即得火也搪揬徒郎反下徒骨反廣匹觸搪衝揬也字書揬揩也原赦魚袁反原猶放免也魏志特原不問罪是也下又作赦同書夜反説文赦寬免也三蒼赦舍也周禮掌三赦之法一赦幼小二赦老耄三赦愚蠢也濟諸方等學經彶彶居及反説文彶彶急行也廣匹彶彶遽也字從彳今皆從水作汲歔欷喜居反下虛既反字林涕泣貌也蒼頡篇泣餘聲也亦悲也菩行五十緣身經佛塔他盍反或云塔婆或作偷婆此云方墳亦言廟一義也經文從𮧓作鞈公匝反橐也亦防汗也鞈非此義勒菩所問本願經瑛吉祥於京反依字王光也此菩名也堅固女經號媵翼證反依字媵送也方言媵寄也亦託也演道俗經給贍或作贍同時焰反贍助也字書贍足也謂周足也譖入側禁反廣匹譖毀也亦讒也一云旁入曰譖寶經鎗鎗楚行反三蒼金聲也經文作𠏧誤也怵惕恥律反下又作愁同他狄反説文怵恐也惕驚也尚書怵惕唯厲孔安國曰怵惕懷懼也亦悽愴也百佛名經瞿嚧借音犖俱反婆瑳千我反媵德翼證反觀無量壽經鷹隼又作隼同思尹反詩云彼飛隼箋云隼急疾之鳥也説文隼祝鳩也不空羂索經逋多補胡反山名也逋多羅山也揭㢋昌是反皤補何蒲何二反荼麼莫我反多喃奴咸反粹多冝作窣所沒反梅窒丁結反吒於仁反地𧨱湯歷反頡利下結反馺皤乘合反下蒲我反卛恧女六反又奴故反阿姞其乙反詫詫敕嫁反䒊呼奚反依字黃病也婆哹匹尤反紫礦古猛反波羅奢樹汁也其色甚赤用染皮㲲等是也綜縷祖送反謂機縷紀領絲者也綜理也領理也觀藥王藥上二菩經磔翅竹格反經文作挓非也摩瞪徒萌反請觀音經舌噤渠飲反謂不能言也哆姪都餓反經文作跢蟾婆之鹽反番茶補槃反攝𥀷蒲迷反佉玎竹𥝷反磨靻之列反夜鑠尸藥反俱𢞗補迷反十一面觀世音經換衣胡灌反説文換易也謂更衣也經文作逭尓匹逭逃也逭非字體囤蘇徒反冝作榅烏悶反字林榅沒也囤猶俗語耳經文亦作塗八顆口火反顆數也亦單作果經文作堁於臥反塵也一日地名堁非此義觀世音菩授記經觀世音梵言阿婆盧吉低舍婆羅此譯云觀世自在舊譯云觀世音或言光世音並訛也又尋天笁多羅葉本皆云舍婆羅則譯為自在雪山以來經本皆云婆婆羅則譯為音當以舍婆兩聲相近遂致訛失也斒斕又作霖玢二形同補間反下又作𢿻同盧間反力寒二反埤蒼文貌也通俗文云文章謂之斒斕經文作斑爛二形非體也鹿母經弶中渠向反字書施𦊰於道曰弶也今田獵家施弶以取鳥獸其形似弓經文作俗字也烹俎普羹反烹煮也亦熟也下側吕反字書俎肉几也鹿子經煢悸古文惸儝二形同巨營反焭單也煢煢然無所依也下渠季反謂不定也亦心動也呦呦又作同音幽詩云呦呦鹿鳴傳曰鹿得草呦呦然而鳴相呼食也除恐災撗經溝巷胡絳反謂須陀洹人也此言入流或言至流今言溝巷者取其流水𠁅也經文作港古項反字略云水分流也即經中云分布果是其義也溫室洗浴衆僧經濕痺必二反風痺病也濕病也謂不能行也苾芬又作飶馝咇祕四形同蒲結反埤蒼大香也苾苾然芬香也梵摩三鉢天亦即梵天王也為纓於盈反纓絡也經文作瑛於京反玉光也瑛非此義四不可得經捻箭又作敜同乃協反謂以手指捻持也諸德福田經枯稿古文𭮡同苦道反字林木枯也迄今吁訖反爾匹云迄至也虛空藏菩所問持幾福經哆攡力支反目丘豉反首曬力計反菩投身餓虎起塔因緣經蜇螫知列反下呼各反廣匹蜇痛也螫蟲行毒也跖踐又作跖同之石反説文足下也躡也踐履也蒼頡篇踥躡也頻毗娑羅詣佛供養經頻毗此譯云顏色娑羅此云端正或言䓑沙王或言頻婆娑羅此云色像殊妙其義一也羅國經鳩夷羅鳥或言鳩那羅此譯云好眼鳥也屏營卑營反廣匹屏營忪懼也謂惶遽也天王太子辟羅經裾負居兩反博物志繈織縷為之廣八寸長丈二以約小兒於背上論語襁負其子是也阿陀鼓音聲陀羅𡰱經昵閭女乙反下力居反茂𨚎丁禮反八陽神呪經內噲口壞反國土名也依字咽也三蒼亦快字也幻士仁賢經陀經中或作軷跋拔三形同蒲沫反此譯云仁賢或言賢護謂鄰近於聖也普徽虛歸反爾匹徽善也尚書云慎徽五典王肅曰徽美也瓶又作焭同於耕反説文長頸瓶也或謂之儋音丁甘反自韙籀文作愇同于匪反左傳犯五不韙注云韙是也後出阿陀偈翕習吁及反翕合也亦斂也説文翕起也胳肩孤諾反説文腋下也埤蒼肘後日胳號懀於外反世尊名號也字書眉目間貌也
