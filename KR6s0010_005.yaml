body:
  text: 翻經沙門玄應撰海龍王經梵女首意經央掘魔羅經月明菩經觀察諸法行經滅十方冥經七佛神呪經出生菩提心經菩本行經普門經稱揚諸佛功德經心明經力㽵嚴三昧經不思議光菩所說經湏真天子經文殊師利問菩署經般舟三昧經德光太子經等目菩所問經施燈功德經超日明三昧經菩訶色欲經月上女經人本欲生經中陰經不必定入印經湏藏經魔逆經佛華嚴八如来境界經濟諸方等學經諸佛要集經菩行五十緣身經文殊師利佛土嚴淨經勒菩所問本願經濡首菩分衛經堅固女經大乘同性經演道俗經阿閦佛國經寶經蓮華面經百佛名經迦葉經觀無量壽經孔雀王經不空索經發覺淨心經觀藥王藥上二菩經无上依經請觀音經移識經十一面觀世音經未曾有經觀世音菩授記經不思議功德經鹿母經大吉義呪經鹿子經菩夢經文殊問經溫室洗浴眾僧經密迹金剛力士經四不可得經東方㝡勝燈王經諸德福田經成具光明定意經虛空藏菩所問持幾福經太子湏達挐經菩投身餓虎起塔因緣經太子墓魄經頻婆娑羅詣佛供養經湏頼經羅國經金色王經天王太子辟羅經獨證自在三昧經阿陁鼓音陁羅𡰱經摩訶摩耶經八陽神呪經如来方便善巧呪經幻士仁賢經勝鬘經後出阿陁經湏摩提經海龍王經第一卷安明由山即湏山也亦言修迷樓山正言蘓迷盧山此譯言好光山亦言妙高山也潭然徒耽反潭深也楚人名深曰潭也悁慼於緣反聲類云悁憂也說文悁恚也第二卷闕眉閒也𥼶名云闕在門兩旁中央闕然為道眉今像此因以名焉凥也苦勞反聲類凥臋也臋音徒昆反髕也又作臏同扶忍反說文膝骨也三蒼膝盖也親暱又作昵同女栗反尒疋昵親近也昵亟也親昵亦數也晏然烏鴈反晏猶安也說文晏天清也亦鮮翠之㒵也繁𧜟輔袁反繁多也盛也下古文裔同餘制反說文裔衣裾也以子孫為苗裔者取其下垂之義也字從衣從冏音女劣反第三卷妷態古文佚今作妷又作劮同與一反蒼頡篇佚蕩也亦樂也下又作㑷同他代反意恣也謂度人情㒵也𠚫穫胡郭反說文𠚫禾也王逸注楚辞云草曰𠚫穀曰穫詩云十月穫稻是也第四卷噏氣古文歙噏二形今作吸同虛及反廣疋吸飲也說文內息也引也謂引氣息入也勸私律反誘教導也亦引也相勸也經文作恤憂也収也恤非此用蹉踖千何反下子亦反蹉跎也踧踖也踖應作錯七各反蹉跌不正也錯誤失也央掘魔羅經第一卷龜坼恥格反㽵周云宋人有善不龜之藥者注云其藥能令人手不龜文坼裂者也烏伏扶富反謂蓲伏其𡖉及伏雞等亦作此字今江北通謂伏𡖉為菢江南曰蓲音央富反第二卷闞又作唬同呼交反下呼㩜反說文虎怒聲也詩云闞如虎是也雄傑奇哲反傑特立也英傑也才能也智出千人曰傑興渠此言少訛也借音嫣蠅反出烏荼娑他那國彼土人常所食者也此方相傳以為芸薹者非也嫣音虛延反童真是沙別名式义此言學亦云隨順無違梵言究磨囉浮多究磨囉者是彼土八歲已上未冠者童子揔名也浮多此云真亦言實酣醉古文佄同胡甘反漢書應劭曰不醉不醒曰酣一云樂酒曰酣第三卷緜纊古文絖同音曠說文纊絮也小尒疋云纊也絮之細者曰纊津溜子隣反下力救反津謂津液也蒼頡篇液汁也字書溜謂水垂下也第四卷維持翼住反維猶聯結也亦維持之也維繫也嬉謔上虛基反下虛虐反嬉戲樂也謔相戲調也驍摙古堯反廣疋健也亦勇急也震慴徒頰之涉二反尒疋懼也經文作疊非體也俛仰無辯反俛仾頭也言閔默不已也卜筮時世反筮問也礼記龜為卜蓍為筮卜筮者决嫌疑定猶豫故疑即筮之字從竹杜門古文𢾅同徒古反國語杜門不出賈逵曰杜塞也塞閇也瞪直耕反埤蒼直視也下之欲反顛沛又作蹎䟺二形同都賢反下補昧反謂偃仆也經文從犬作狽非也觀察諸法行經第一卷撞弩徒江反廣疋云撞刾也說文橦㦸擣也第三卷不槩古文扢同公礙公內二反扢量也廣疋扢摩也蒼頡篇云平斗斛曰槩第四卷鵁鶄二音交精脚高有毛冠可辟火灾者也調戲徒吊反謂相嘲調也調弄也經文作恌非也七佛神呪經第一卷咻咻許流許主二反依字噢咻痛念之聲也五渾胡昆反謂五濁也渾乱也乱猶濁也亦水流聲也潢瀁胡廣反下音養潢瀁猶浩蕩也經文作洸音光非也㱇㱇所力反通俗文小怖曰㱇埤蒼㱇恐懼也字從欠經文作懎𭍠二形非體也目佡丘豉反制濘奴定反伊𥌋莫𡶤反邲地扶必反目揥他細反湖利戶孤反侈丘豉反但坭乃礼反捶婆楚洽反陁咩紙反阿眵充支反癡噤渠錦反第二卷愆咎古文㥶二形籀文𠐨今作愆同去連反說文𠐨過也亦失也咎罪也撫恤又作䘏同湏律反尒疋恤憂也亦収也謂以財物與人曰振恤之也撈接祿高反通俗文沉取曰撈經文作牢固之牢非也搓摩何反依字搓挪也挪音那第三卷鞠育又作掬同居六反說文掬𢲻也鞠養也方言陳楚之閒謂養為鞠也羖䍽功戶反下力的反三蒼羖䍽亦名羯也饕乱吐刀反饕亦貪也說文俗作叨字第四卷儼然冝撿反詩傳曰儼矜㽵㒵也尒疋儼敬也說文儼好㒵也潠之蘇悶反通俗文水湓曰潠經文作𠹀非也白睆還板反許慎注淮南子云睆謂目內白翳病也經文作浣衣浣非也摎項又作𢷶同居茅反蒼頡篇摎束也說文摎縛煞之也摎即纏縛之名也𧓵他達反下勒達反廣疋𧓵蚳𧓵蠍也經文作剌非體也厭蠱於舟反下姑護反春秋傳日疾如蠱惑非鬼非食或以喪志注云蠱惑疾也齆鼻一弄反埤蒼鼻病也搭眼方道喉痺俾利反癕痺暴厲之疾也亦言喉閇閇猶塞也菩本行經上卷軍持正言捃稚迦謂雙口澡灌也或譯云瓶也榖又作炒㷅兼三形同初狡反方言㷅火乾也䍧𦍞祖郎反羊三歲曰䍧䍧然盛㒵也下丁奚反𦍞羖𦍞羯羊也經文作丁礼反觸也非經用来抴又作曳同余世反說文抴引也謂牽引也羯羠囚几反聲類騬羊也徐廣曰羯羠並犍羊也慍心於問反慍怒也說文慍怨也蒼頡篇慍恨也璣鄯𡰱居衣反下音市戰反龍子名也刖其魚厥五骨二反刖猶割也經文作刓五桓反齊也上旋似緣反旋轉也經文作矩俱禹反方曰矩矩則也矩非此義耶旬或云闍維或云闍毗同一義也正言闍鼻多義是焚燒也中卷災禍又作烖灾𤆎三形同則才反說文天火曰灾蜴蜥以石反下斯歷反在草曰蜴蜥經文作𧊤非也金拂敷勿反廣疋拂除也謂除去塵土也拂拭也經文從巾作𢂀或作𣭘非也下卷騷動蘇勞反說文騷擾也謂擾動也万岐又作郊二形同巨冝反謂道有支分者也晃焴又作晄古文熿同胡廣反說文晃明也廣疋晃暉也光也下又作煜同由掬反說文煜曜也埤蒼煜盛㒵也瘡瘢薄蘭反蒼頡篇瘢痕也痕胡根反稱揚諸佛功德經下卷洞清古文衕迵二形同徒貢反案洞猶通過也亦深邃之㒵也經文從口作哃非也力莊嚴三昧經上卷𣱦氳冝作葐蒀扶云反字書作同於云反葐蒀盛㒵也亦香也海島古文隝同都老反水中山曰島島到也人所奔到也湏真天子經上卷鋒遬蘓木反䨴陁徒對反瞀呵云搆反中卷勇悍胡且反蒼頡篇悍禦也說文勇亦悍也弧弓戶都反說文木弓也周易黃帝作弦木為弧建箭居健反建立也亦樹也般舟三昧經中卷輕㑥又作𫾻今作易同以豉反蒼頡篇㑥慢也平㑥也鶡鴨胡葛反似雉闘死不却故武人戴鶡冠以象之也出煇諸之山以其尾垂頭亦出上黨下古文鵪同烏甲反謗訕所姧反蒼頡篇訕非也謗毀也蛟龍梵言宮毗羅音交有鱗曰蛟龍抱扑子曰母龍曰蛟龍子曰虬其狀魚身如蛇尾皮有珠郭璞注山海經云蛟似蛇而四脚小頭細頸頸有白嬰大者數十圍𡖉生子如一二斛甕能吞人也㹢玃又作猳同古遐反下居縛反說文大母猴也善玃持人好𮨇䀎等目菩所問經上卷昺徹古文昺苪二形同今作炳同碧皿反廣疋昺明也徹通也三蒼昺著明也陶現徒高反詩云上帝其陶陶變也去藏才浪反積蓄也如庫藏也經文作非體也督住又作督同都木反尒疋督正也方言督察也理也懀然烏外反轉霍呼郭反案霍忽急疾之㒵也霍然忽霍皆是也經文從火作㸌胡沃反說文㸌灼也㸌非此用而此字習謬已久人莫辯正今詳其理義冝作共相二字輕佻聽遼反字書佻輕也廣疋佻佚也尒疋佻偷也苟且也經文從手作佻非體也下卷晴陰又作暒殅二形同自盈反聲類雨止曰晴焜煌胡本反下胡光反方言焜煌盛白也光暉也青紅且經反東方色也木生火從生丹丹青之信必然也經文作菁華之菁非也菁音紫盈反三蒼謂之英曰菁也超日明三昧經上卷懾伏聲類作㒤同止葉齒葉二反說文心服曰懾廣疋懾懼也綏恤私唯反尒疋綏安也恤収也弘又作同苦迴反字林恢大也纖介家薤反周易悔若者在乎介韓康伯曰介纖介也劉瓛曰介微也譎詭又作噊同公穴反下又作恑同居毀反方言自關而東西或謂詐為譎恑譎恑亦奇恠也浮譁呼反讙譁也蒼頡篇譁言語譊譊也不挍古効反挍報也論語犯而不挍是也五兵周礼司兵掌五兵鄭眾曰五兵者戈殳㦸矛無夷也步卒五兵則無无夷而有弓矢也左傳子𢙣出五甲五兵消殪古文作同於計反尒疋殪死也殪煞也亦盡也弘綽又作繛同昌若反說文綽緩也綽亦寬也下卷淖情女卓反三蒼昌若反又音徒歷反淖約好㒵也分賦方句反賦布也尒疋賦也謂布與之也綢繆直流反下亡侯反詩傳曰綢繆緾綿也寇害口𠋫反說文寇暴也廣疋寇抄也尚書寇賊姦宄范甯集解云寇群行攻剽者也字從完從攴剽音匹妙反躊躇膓反下膓誅反廣疋躊躇猶豫也亦躑躅也貙者恥俱反似狸而大尒疋今貙虎大於狗文如狸愽物志云貙大能化為虎菀囿于救反三蒼養牛馬林木曰菀字林有垣曰菀無垣曰囿囿亦禁菀也謙冲說文作蛊同除隆反字書冲虛也亦中也屢聽力句反尒疋屢亟也數也亟音祛記反訾量又作𢋀同子移反訾亦量也思也說文思稱意也蹉跌千何反下徒結反蹉跎也失躡曰跌跌差也未孚字體作同芳務反礼云无䴸徃鄭玄注䴸疾也廣疋䴸行也一鍼聲類今作針同支諶反廣疋鍼㓨也所以縫衣者也月上女經上卷脅嚇方言作䦧同呼𨽦反謂以威力恐人也呵𠿒火曷反廣疋𠿒怒也廣蒼云𠿒訶也經文作喝乙芥反嘶喝也雀垛徒果反謂城上女牆也經文作墮落之墮非體也寮窓力彫反蒼頡篇寮空也亦也藻棳又作同之恱反尒疋其上楹謂之棳注云侏儒柱也蒼頡篇棳𣚊也中陰經上卷𤸱天烏合反譯云有光壽天經中有作阿波天同一名也謂二禪初天少光天也湏滯天除制反道行經作湏𤴟天音徒計丁計二反又作湏廗天音帝樓炭經作湏天音帝皆梵言訛轉也此譯云善觀天即善見天也瘡疣字體作肬籀文作𪐤同有流反通俗文體目曰肬經文作痏音位理反蒼頡篇痏歐傷也斗藪又擻同蘇走反方言斗擻舉也周成難字斗擻也音都穀反下蘇榖反經文作抖捒二形音同極䇿並非字體下卷擲綿字詁古文線今作綫同私賤反所以縫紩者也劒刎古文歾同亡粉反通俗文自刾曰刎湏藏經上卷𭪩脂履反下昌制反憩多去例反婢諶市針反耶娜乃可反帝弭是反迷踦居蟻反下卷輸拒俱禹反安廌徒賣反牟芩渠金反囉諵奴咸反遮䶩竹皆反椑伽補反漩梨囚反迦㘕力蹔反豍豆布迷反廣疋豍豆䝀豆也經文作蜱非也佛華嚴入如来不思議境界經下卷沙詑𠡠嫁反經中或作阿迦𡰱吒天是也池濼匹各反濼陂也山東名為濼幽州呼為淀徒見反經文作泊非體也諸佛要集經上卷墟聚去餘反廣疋墟居也人之所居曰墟也嘲囈又作啁同竹交反蒼頡篇嘲調也下牛世反囈言也文殊師利佛土嚴淨經上卷相棠借音丈庚反字冝作樘敦棖敝四形同文衡反謂相觸也恬惔徒兼反方言恬靜也下冝作淡徒濫反淡安也謂安靜也經文從心作惔徒甘反憂心如惔惔憂也惔非此用億垓古文作奒二形今作姟同古才反數名也風俗通曰十億曰兆十兆曰經十經曰姟姟猶大數也拜謁於歇反尒疋謁請也亦白也告也侜張陟留反尒疋侜張誑也經文作侏之儒反侏儒短人也塵埃烏来反蒼頡篇埃風揚塵也下卷交趺又作跗同府于反三蒼跗足上也謂交足而坐也經文從足作跤非也至湊且豆反廣疋湊㝡也湊競進也景則羈影反詩云介尒景福傳曰景大也則法也濡首菩無上清淨分衛經上卷底泓一宏反說文下深大也廣疋泓泓深也吹噭又作嘂譥二形同古吊反噭喚也呼也亦鳴也螫䖝書亦呼各二反說文虫行毒也躇步膓於反說文躊躇猶豫也躑躅也錠燭殿定二音聲類云有足曰錠無足曰鐙鹿𨽁古文𨞮二形今作聚同才句反廣疋聚居也謂人所聚居村邑者也𢫩鋤又作薅𢫩二形籀文作𦷄或作茠同呼豪反說文除田草曰茠經文作䒵莇非也下卷慷慨正作忼愾同口葬反下苦代反慨大息也亦士不得志者也喟然又作㕟同口愧口恠二反三蒼喟歎息也歎聲也華孚或作荂說文或作同芳俱詡俱二反方言華荂盛也齊楚之閒或謂之華或謂之荂玓瓅丁歷下字書作皪同力的反說文玓瓅明珠色經文作的非體也暠然又作杲同古倒反埤蒼白㒵也亦明也灼然明白者也經文作晑音古螢反非也岐嶷巨冝反下語𣗥反詩傳云岐知意也嶷識別也言能匍匐則岐岐然意有所知也其貌嶷然有所別識也亦言六十歲也經文作奇非體也大乘同性經上卷澿然其錦反寒戰極也經文從心作㦗非也崖隴力反說文天水大坂也下卷垂毦人志反以毛羽為毦飾若今刀鞘毦也織毛曰毦弓把百雅反單手為把說文把握也持也經文作弝近字也阿閦佛國經上卷提洹竭佛此譯云錠光又云然燈佛是也珠璣居衣反說文珠之不圓者也字書云一曰小珠也堊之烏各反白土也亦名白墠也廣疋堊塗也罷極今作疲同被羇反廣疋疲猶倦也亦勞也蓮華面經下卷摩俟事几反姞利奇乙反迦葉經上卷一𧣴又作盞琖醆三形同側限反方言盞杯也孔雀王神呪經上卷婪婢力含反黳離烏奚反秘擔蒲薎反哿梨古我反贉婆徒感反多鱣知連反蝤䗋才尤莫侯反躓利知利反覃婢徒南反叟婢蘇走反密渧都鍪反鷃哲烏諫反縕摩於雲反母所咸反剡埤以染反毗茤則俱反䊉婆蘓感反颺哿以章反苾頭步結反𨢘鏃祖木反傖士行反中州人也恃音類刎闍无粉反謌羅古河反曝翅蒲木反居虞許力二反下卷血膋又作膫同力彫反家書膋脂膏也謂膓閒脂也今中國言脂江南言膋腓髀扶非反字林脛腨也說文腓腨膓也下蒲米反股外也癲癇又作瘨同都賢反廣疋瘨狂風病也下核閒反聲類小兒瘨也頷車公荅反方言頜頷也亦云輔車謂頥頷也腹髂又作䯊𩩱二形同口亞反埤蒼腰骨也江南呼髀骨上接腰者曰䯊那姥莫𡡅反嫣迃遇反多所反波跘平息反鯨龍巨迎反白鷺力故反天芉尒反瑿羅烏奚反浡地蒲沒反蘊摩於粉反疽癩且餘反說文久癕也下力盖反字亦作癘𢙣疾也癭瘤於井反字林頸瘤也下力洲反說文瘤腫也瘜肉也羅湜是力反蛷螋渠周求俱二反下所俱反生䕨徒登反䔽沙乙例一𡧱二反愽聳私勇反發覺淨心經下卷莖稈又作秆同古旱反稈槀也廣疋稻穰謂之稈籠古文羄䈇對三形今作同挍反捕籠也籗音捉財購古𠋫反說文以財有所求也廣疋購償也無上依經下卷無胲案字義冝作解胡賣反解謂縫解也委佗又作逶蟡二形同於危反下又作迤同達何反詩云逶逶佗佗德之美㒵也傳曰逶佗者行可逶曲迹也亦自得之㒵也窊邪也移識經上卷新𦠌又作枘同乃困反字菀𦠌柔脆也通俗文枘再生也經文作嫰近字也火浣布周書西域獻火浣布汙則燒之則潔妖冶於驕反下以者反周易冶容誨淫劉瓛曰冶妖冶也謂恣態之皃也卑愻蘇寸反字林愻順也亦謙恭也今作遜鞋韈又作同胡皆反下古文作韈今作袜又作怽𤿗二形同無發反足衣也經文從巾之幭音亡別反𢗌㡤也幭非此用腰䯊口亞反埤蒼腰骨也經文作跨𦝣二形非字體也肪𦙽府房反下先安反通俗文在腰曰肪在胃曰𦙽廣疋𦙽脂肪也騗騎匹面反謂躍上馬也今俗謂不躡隥上馬為騗下卷咼戾口蛙反下力結反謂不正也經文作綟帛也綟非字體綟音力計反亦綠色也斑駮又作辨同補顏反蒼頡篇斑文皃雜色為斑也頿又作髭同子移反說文口之湏者也字從湏豌豆烏丸反豆名也經文作於月反或作𭓩並非也未曾有經上卷無恙以尚反尒疋恙憂也孫炎曰恙病之憂也案易傳云上古草居露宿恙䖝也善食人心凡相勞問無恙乎復因以為病也頑嚚吴鱞反下魚巾反廣疋頑䤜也蒼頡篇嚚𢙣也左傳心不則德義之經為頑口不道忠信之言為嚚蕑又作同餘說反說文蕑也亦挍也小尒疋撰具也乍得士嫁反廣疋乍蹔也蒼頡篇乍兩詞也慌慌呼廣反慌忽眼亂也亦迷惑也下卷先喫口迹反謂喫噉食飲也經文作非也沛然普頼反三蒼沛水波流也亦大也經文作霈近字也不思議功德經下卷離䑀字或作臂卑避反懼咤陟嫁反大吉義呪經上卷鼻𠯋烏礼反堙羅於仁反荼黔音炎反龍名也䉛尼於六反締知利反下徒計反苫婆式益反摩啅𠡠角反佛褅徒帝反咮羅齒朱反啁利陟交反下卷跂羅又作䞚同墟豉渠支二反跂登也履也𡹼鼻魚偃反通俗文騫緩也經文從山作嵃非也聸耳丁藍反說文耳垂也經文作耽都含反耳大也𠜂地所姧反地乘干反囒地洛干反羅蒲戒反譚髀徒南反下蒲米反渒梨普計反嗘泥呵郅之逸反菩夢經上卷樺皮胡𧟶反木名也可以飾弓者也文殊問經上卷多弭氏反炮字父交反攞字力可反下卷底舸古我反山名律主居之芿山而證而二反又作艿律主居之舟航又作杭同何唐反方言自關而東或謂舟為航航渡也濟渡之舟也𦌘子恒反𦌘之捴名也樹四植束水以掛曰𦌘跨上苦𧟶反跨躡也字林跨渡也牛疾津反字略云牛名也波拕太何反密迹金剛力士經下卷錯勃蒲沒反勃然猶忽然也勃亦乱也逆也訓訢呼運反訓導也教也誡也下又作欣同虛殷反訢樂也東方㝡勝燈王如来經𫺳泥恀羅巨支上支二反呬呬火利反那哆徒反麼吒其可反成具光明定意經𦰚若又作沃同於縛反詩傳云若猶然也柔也濕也亦從下溜出也卓犖力角反謂奇異也左傳犖有力焉能投盖于稷門瞢瞢莫登反瞢瞢然乱也悶也亦無光也真諺冝箭反俗言也言了別真言俗語無疑難也經文從口作喭非也裒訕補高反案裒猶揚美之也進也訕謗也剗貪又作鏟同初蕑反廣疋剗削也聲類云剗平也躓礙音致通俗文事不利曰躓限至曰礙經文作綴非也潭然冝作憺徒濫反憺猶安靜也深水曰潭音徒南反眉毛美飢反說文目上毛也經文作菴二形非也眼瞼居儼反字略云眼外皮也經文作睫眊二形非也諀訿上匹尒下資尒反通俗文云難可謂之諀訿經文或作啤呲𤸃𠅸古文𠅸耄二形今作耗同莫報反礼記八十曰耄注云耄惽忘也亦乱也經文作𡬁𭓮二形誤也𪱽閣蒲萌反通俗文連閣曰𪱽𪱽亦閣也蒼頡篇樓閣也謂重屋複道者也妐姑又作伀同之容反𥼶名云俗謂舅章名伀言所見敬忌見之伀懼自肅齊也盥手公緩反說文澡手也案凡洒澡物皆曰盥不但手也字從臼水皿上意也太子湏大拏經檀特山或言單多囉迦山或云檀陁山此譯云蔭山湏大拏女加反或言湏達拏或云蘇陁沙拏此譯云善與亦言善施蒼天錯郎反尒疋春為蒼天注云万物生蒼蒼然也愕然字書或作咢同五各反愕驚也為𢡠古文𢂴同尺志反幖也通俗文私記曰幟廣疋幟幡也墨子曰以為長丈五尺廣半幅曰幟也蜎蜚一泉反字林虫㒵也動也下古書飛皆作蜚同甫韋反蜚揚也左傳秋有蜚不為災嶔崟去銜去吟二反下語銜冝金二反廣疋嶔崟高㒵亦山阜之勢也嵯峨才何反下我多反廣疋嵯峨高也楚辞注云山截峻敞曰為嵯峨三顀直追反說文額出也今江南言顀頭胅額乃以顦為後枕高胅之名也經文作膇未見所出脣䫂丁可反廣疋䫂醜㒵也經文作哆充尒丑亞二反非今用也凸髖徒結反凸起也蒼頡篇作𥥌不平也經文作昳非體也下蛘餘掌反說文搔蛘礼記蛘不敢搔是也字從虫今皆作癢近字也又作痒音似羊反病名也痒非字義市井子郢反周礼九夫為井方一里也白虎通曰因井為市故曰市井說文八家一井象搆韓形象㻾形太子墓魄經襲績古文㦻同辝立反襲受也廣雅及也亦合也仍也故質之逸反太玄經受質所疑宋忠曰質問也廣疋質問也謹也定也矇聵莫公反有眸子而無見曰矇下牛反生聾曰聵聵亦無知也空刓又作园同五桓反廣疋刓断也楚辝刓方以為圓王逸曰刓削也噢咿於六反下於祇反埤蒼內悲也又痛念之聲也經文作哊郁喐三形並非體也𩥵駕忩含反說文駕三馬也居右而𩥵乘俻非常也𩥵旁馬曰騑騑音妃顉頭牛感反說文仾頭也廣疋顉搖也謂搖其頭也今江南謂領納搖頭為顉傪亦謂笑人為顉酌傪音蘇感反選䎡而兖反案選䎡猶湏也吕氏云少選俗謂之選䎡言推託不肯為也經文或作選𧏦或作潠濡非也忸怩又作𧖷同女竹反下女反通俗文慙恥謂之忸怩纔有在哉反廣疋纔暫也亦僅也不久也何訾又作𤺒同子移反訾量也思也經文作訾財之貲非體也湏頼經跋跙才與反樹名也布施補故反分布也惠施也經文作𭢞非也過讁知革徒厄二反謂謫罰也方言謫怒也郭璞曰謂相責怒也謫譴也責也晝度宮知冑反晝度樹皆天上名也娛樂語俱反下力各反說文娛樂也樂喜也經文從女作㜰非也金色王經粔𥹡渠煑反下匿呂反蒼頡篇粔𥹡餅餌者也江南呼為膏糫音還字𮏑粔𥹡膏糫果也獨證自誓三昧經句潭徒南反或言瞿曇梵言輕重也趠第丑挍他吊二反上林賦趠稀閒郭璞曰懸擲也說文趠遠也今贈在鄧反贈送也遺也說文以玩好之物相送曰贈也謳合又作嘔慪二形同烏侯反尒疋徒歌曰謳廣疋謳喜也鉢和蘭亦言鉢和羅梵言訛轉也此云自恣食也摩訶摩耶經涵潤胡反說文水澤多也詩云譖始既涵是也𨭝翮字林山瘵反謂張翼也淮南子云飛鳥𨭝翼許叔重曰𨭝羽而飛也如来方便善巧呪經涪多蒲侯反摩錍普迷反唏詈呼几呼兾二反風齲又作𤘐同丘禹反說文齒也𥼶名齲朽也勝鬘經尒炎正字作熖以贍反梵言也此云所知末利謨鉢反案西域記此譯云奈因奈而得報者也阿踰闍弋朱反此譯云不可戰國湏摩提經湏摩提應云湏摩耶此譯云好意或云好智滿碝字體作䎡而兖反三蒼䎡弱也物柔曰䎡經文作碝而兖反次玉也碝非此體勗勉吁欲反下摩辯反勗勉勵也方言齊魯謂勉為勗勉猶自勸強也說文勉強也謂力所不及而強行事助又作埤朇二形同毗移比移二反說文裨增也益也亦補也梵女首意經入館古換反說文客舍也周礼五十里有𠋫館案客舍逆旅名𠋫館字從食今有從舍作舘近字也無喆又作哲悊二形同知列反尒疋哲智也方言齊宋之閒謂知為哲哲明了也月明菩經親理力紀反礼記天理滅矣鄭玄曰理猶性也又云樂者通倫理注云倫類也理分也今多作里二十五家為里居方一里之中滅十方冥經憂灼之若反灼謂憂懼也灼痛也出生菩提心經迦蘭陁或言迦蘭䭾或言羯蘭鐸迦鳥名也其形似鵲鞞紐婆那此云竹林謂大竹也此鳥多拪此林昔有國王於此睡息虵来欲螫鳥鳴覺之王荷其恩散食養鳥林主居士遂從此鳥為名名迦蘭䭾迦舊安外道後奉如来俱致或言俱𦙁此言千万或言億而甚不同故存本耳㝹謩乃侯反下莫胡反紆伏哆衣于反系履下計反普門品經鞕五孟反字書鞕牢也下相傳胡浪反未詳字出滿脬普包反脬袋吹氣成也心明經山崗古郎反尒疋山脊崗郭璞曰謂山長脊者也囧灼俱永反蒼頡篇囧大明也亦彰也說文牎牖開明曰囧潷飯碑密反通俗文去汁曰潷江南言逼訛耳今言取義同也經文作上俗語不思議光菩所說經鴈鴝又作鸜同其俱反即鸜鵒也文殊師利問菩署經陂諟彼皮反下匙尒反比丘名也倪三五礼反下蒲沫反人名也提胳公諾反說文腋下也埤蒼在肘後也分𤱏之忍反婆羅門名也橋泉自宣反經文作𤱃𡺙二形非也黤黮烏感反下他感反不明也亦深黑也我齎又作賷子奚反說文齎持遺也德光太子經羯隨或作羯毗或作迦毗或作加毗皆一物也此云好聲鳥也經文從鳥作羯非也貧寠瞿矩反詩云終寠且貧傳曰寠者無礼也字書寠空也又作同苦交反下苦𡧱苦曷二反三蒼敲相擊也經文作撓奴飽反槩古代反並非此用鸕力胡反下音慈尒疋云鷧郭璞曰即鸕也此鳥𭪿頭如鈎食魚者也中國或名水鴉此鳥胎生從口吐出一產八九也鋃鐺洛當反下都堂反說文鋃鐺鎻也通俗文錘頭曰鋃鐺施燈功德經𮊵瘠古文𤹠𤶬膌三形同才亦反瘠瘦也支提又名脂帝浮此云聚相謂累石等高以為相或言方墳或言廟皆隨義𥼶也菩訶色欲經鈇質方扶反書中鈇或音斧撗斧也古者煞人用斧下正體作㩫之逸反說文鈇莝斫也埤蒼㩫椹也公羊傳曰不忍加其鈇質何休曰斬要之罪也俎几側吕反字書俎肉几也俎亦四脚小槃也人本欲生經躡襈字體作同女輙反說文機下足所履也下仕眷反襈聚也不必定入印經採㨂又作𢽬或作練同力見反埤荅㨂擇也礼記蕑棟英𮥸是也序文作挾胡頰反挾持也挾非此用寶㝠古文寞今作填同徒見徒堅二反廣疋填塞也滿也𥯷多其俱反依字尒疋葋一名艼熒艼音他頂反拔身蒲沫反迴也謂拔然迴身也古字通用也魔逆經陽燧古文作鐆𤎩二形今作聲類或作燧同辝醉反取火者也鐆五石之銅精也圓以仰日即得火也搪揬徒郎反下徒骨反廣疋觸搪衝揬也字書揬揩也原赦魚袁反原猶放免也魏志特原不問罪是也下又作赦同書夜反說文赦寬免也三蒼赦舍也周礼掌三赦之法一赦幼小二赦老耄三赦愚惷也濟諸方等學經彶彶居及反說文彶彶急行也廣疋彶彶遽也字從彳今皆從水作汲歔欷喜居反下虛既反字林涕泣㒵也蒼頡篇泣餘聲也亦悲也菩行五十緣身經佛塔他盍反或云塔婆或作偷婆此云方墳亦言廟一義也經文從𮧓作鞈公帀反橐也亦防汗也鞈非此義勒菩所問本願經瑛吉祥於京反依字王光也此菩名也堅固女經号媵翼證反依字媵送也方言媵寄也亦託也演道俗經給贍或作𩟋同時焰反贍助也字書贍足也謂周足也譖入側禁反廣疋譖毀也亦讒也一云旁入曰譖寶經鎗鎗楚行反三蒼金聲也經文作𠏧誤也怵惕恥律反下又作愁同他狄反說文怵恐也惕驚也尚書怵惕唯厲孔安國曰怵惕懷懼也亦悽愴也百佛名經瞿嚧借音犖俱反婆瑳千我反媵德翼證反觀無量壽經鷹隼又作鶽同思尹反詩云彼飛鶽箋云鶽急疾之鳥也說文鶽祝鳩也不空羂索經逋多補胡反山名也逋多羅山也揭㢁昌是反皤補何蒲何二反荼麼莫我反多諵奴咸反粹多冝作窣所沒反梅窒丁結反咤於仁反地𧨱湯歷反頡利下結反馺皤乘合反下蒲我反卛恧女六反又奴故反阿姞其乙反詫詫𠡠嫁反𦫬呼奚反依字黃病也婆哹匹尤反紫礦古猛反波羅奢樹汁也其色甚赤用染皮㲲等是也綜縷祖送反謂機縷紀領絲者也綜理也領理也觀藥王藥上二菩經磔翅竹格反經文作挓非也摩瞪徒萌反請觀音經舌噤渠飲反謂不能言也哆姪都餓反經文作跢蟾婆之塩反𤳖茶補槃反攝𥀷蒲迷反佉玎竹𥝷反磨靻之列反夜鑠尸藥反俱𢞗補迷反十一面觀世音經換衣胡灌反說文換易也謂更衣也經文作逭尓疋逭逃也逭非字體𥫱蘇徒反冝作榅烏悶反字林榅沒也𥫱猶俗語耳經文亦作塗八顆口火反顆數也亦單作果經文作堁於臥反塵也一日地名堁非此義觀世音菩授記經觀世音梵言阿婆盧吉仾舍婆羅此譯云觀世自在舊譯云觀世音或言光世音並訛也又尋天笁多羅葉本皆云舍婆羅則譯為自在雪山以来經本皆云婆婆羅則譯為音當以舍婆兩聲相近遂致訛失也斒斕又作霖玢二形同補閒反下又作𢿻同盧閒反力寒二反埤蒼文㒵也通俗文云文章謂之斒斕經文作斑爛二形非體也鹿母經弶中渠向反字書施𦊰於道曰弶也今田獵家施弶以取鳥獸其形似弓經文作俗字也烹俎普羹反烹煑也亦熟也下側吕反字書俎肉几也鹿子經煢悸古文惸儝二形同巨營反焭單也煢煢然無所依也下渠季反謂不定也亦心動也呦呦又作同音幽詩云呦呦鹿鳴傳曰鹿得草呦呦然而鳴相呼食也除恐灾撗經溝巷胡絳反謂湏陁洹人也此言入流或言至流今言溝巷者取其流水𠁅也經文作港古項反字略云水分流也即經中云分布果是其義也溫室洗浴眾僧經濕痺必二反風痺病也濕病也謂不能行也苾芬又作飶馝咇秘四形同蒲結反埤蒼大香也苾苾然芬香也梵摩三鉢天亦即梵天王也為纓於盈反纓絡也經文作瑛於京反玉光也瑛非此義四不可得經捻箭又作敜同乃恊反謂以手指捻持也諸德福田經枯槀古文𭮡同苦道反字林木枯也迄今吁訖反尒疋云迄至也虛空藏菩所問持幾福經哆攡力支反目丘豉反首曬力計反菩投身餓虎起塔因緣經䖧螫知列反下呼各反廣疋䖧痛也螫虫行毒也蹠踐又作跖同之石反說文足下也躡也踐履也蒼頡篇踥躡也頻毗娑羅詣佛供養經頻毗此譯云顏色娑羅此云端正或言䓑沙王或言頻婆娑羅此云色像殊妙其義一也羅國經鳩夷羅鳥或言鳩那羅此譯云好眼鳥也屏營卑營反廣疋屏營忪懼也謂惶遽也天王太子辟羅經裾負居兩反愽物志繈織縷為之廣八寸長丈二以約小兒於背上論語襁負其子是也阿陁鼓音聲陁羅𡰱經昵閭女乙反下力居反茂𨚎丁礼反八陽神呪經內噲口壞反國土名也依字咽也三蒼亦快字也幻士仁賢經陁經中或作軷跋拔三形同蒲沫反此譯云仁賢或言賢護謂隣近於聖也普徽虛歸反尒疋徽善也尚書云昚徽五典王肅曰徽美也瓶又作焭同於耕反說文長頸瓶也或謂之儋音丁甘反自韙籀文作愇同于匪反左傳犯五不韙注云韙是也後出阿陁偈翕習吁及反翕合也亦斂也說文翕起也胳肩孤諾反說文腋下也埤蒼肘後日胳号懀於外反世尊名号也字書眉目閒㒵也
