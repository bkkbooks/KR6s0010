body:
  text: 翻經沙門玄應撰妙法蓮華經第一卷耆闍崛山或言伊沙崛山或言揭梨䭾羅鳩𦙁山皆訛也正言姞栗陀羅矩吒山此譯云鷲臺又云鷲峯言此山既拪鷲鳥又類高臺也舊譯云鷲頭或云靈鷲者一義也又言靈者仙靈也案梵本無靈義依別記云此鳥有靈知人死活人欲死時則群翔彼家待其送林則飛下而食以能懸知故號靈鷲也姞音渠乙反無復武于反謂非有也或作無說文古文奇字無也聲類云無虛無也復扶救反說文往來也謂往來復重也逮得徒戴反爾雅云逮及也方言自關之東西謂及曰逮經文多作逯說文力足反行謹逯也亦人姓也逯非經音目揵莫鹿反下叵焉反或言目伽略子者訛也正言沒特伽羅子或云毛䭾伽羅子此乃從母為名沒特伽此云緑豆羅此云執取或云挽取本名俱利迦或言拘多此從父名也舊云俱律陀不正也離婆呂知反案文殊問經云此譯言室星則北方宿也祠之得子仍以名焉正言頡伐多經中作梨波多或作婆多訛也即首楞嚴經中坐禪第一如離婆多者是也頡音賢結反殖衆時弋反蒼頡篇殖種也廣雅殖積也立也陀三蒼蒲達反梵言陀波羅經文作婆訛也此譯云賢守或云賢護大論云秦言善守謂鄰極於聖𪪺道能固者也梵天梵言梵摩此譯云寂靜或云清淨或曰淨潔葛洪字苑音凡泛反梵潔也取其義矣樂𠃵五孝反謂令人愛樂也案梵本云摩奴是若此云可意或云如意摩奴是若縛羅此云可意音即正法華云一名柔䎡天子二名和音天子是也𠃵闥婆此譯云香或云食香亦云香行大海中亦有屬於修羅婆稚古文稚二形今作同除致反正言跋稚迦此譯云團圓即正法華云一名最勝是也今有譯為縛者誤也案梵語跋陀名縛也加趺古遐反爾雅加重也今取其義則交足坐也除灾撗經毗婆沙等云結交趺坐是也經文作跏文字所無案俗典江南謂開膝坐為跘跨山東謂之甲趺坐也跘音平患反跨音口𠂢反三昧莫蓋反正言三摩地此云等持持諸功德也或云正定謂住緣一境離諸邪亂也舊云三摩提者訛也靡不密彼反爾雅云靡𠕀無也阿鼻正言阿鼻至譯云阿言無鼻至言閒無閒有二一身無閒二苦無閒也地獄梵言泥耶或言泥囉夜或云那落迦此云不可樂亦云非行謂非法行𠁅也或在山閒或大海邊非止地下言地獄者一義翻也𡰱吒古文喥同竹嫁反經中或作阿迦𡰱沙詫或言𡰱師吒或言二吒皆訛也正言阿迦抳瑟譯云阿迦言質礙抳瑟言究竟謂色究竟天也詫音𠡠嫁反抳女几反𠡠佳反修行下孟反施之名行即造修也舍利正言設利羅譯云身骨舍利有全身者有碎身者𠁅胎經云並在金剛剎際寶塔他盍反諸經論中或作藪斗波或作塔婆或云兜婆或言偷婆或言蘇偷婆或言脂帝浮都亦言支提浮皆訛略也正言窣都波此譯云廟或云方墳此義翻也或云大聚或云聚相謂纍石等高以為相也案塔字諸書所無唯葛洪字菀云塔佛堂也音他合反以偈其逝反梵言也正言伽他或云室盧迦謂三十二字等也此方當頌或云攝經中作伽陀訛也案偈字林丘竭反健也韋昭漢書音義其逝反又音竭詩云匪車偈兮音去謁反柔䎡而兖反廣雅柔弱也通俗文物柔曰䎡作䎡漢書軟不勝任者作軟二形通用經文多作濡案說文三蒼皆人于反水名也出涿郡東入漆又雲也或作乃本反說文湯也二形並非經義馬腦梵言謨羅揭婆謨羅此譯云杵揭婆此言藏或言胎者取其堅實也舊云摩娑羅伽隸或言目羅伽羅婆譯云馬腦案此寶或色如馬腦因以為名但諸字書旁皆安石作碼瑙二謂石之類也車乘齒耶反說文輿輪之總名也夏后氏奚仲所作古音居𥼶名云古者車如居言行所以居人也今曰車車舍也言行者所𠁅如舍也乘食證反廣雅乘駕也謂可乘者也周禮四馬為乘乘載也輦輿力展反說文挽車也在車前人引之也古者卿大夫亦乘輦自漢以來天子乘之輿與庶與諸二反說文車輿也一曰車無輪曰輿今之輦輿形制別於古也駟馬相二反說文駟一乘也謂四馬為駟也欄楯力干反謂鈎欄字體作闌說文門遮也經文作蘭香草也楯食允反說文楯闌檻也王逸注楚辝云檻楯也從曰檻撗曰楯華蓋胡反古今注云黃帝所與尤戰於涿鹿之野常有五色雲氣金枝玉止於帝上有花𧅅之像故因而作華蓋焉又音呼反案西域暑熱人多持蓋皆以花飾之諸經中多言幢幡華蓋是也涿音竹角反𧅅于彼反軒飾虛言反聲類云安車也說文曲輈轓車也飾謂以皮物㽵飾車也轓甫煩反飾從巾𩚅聲破魔梵言磨羅此云煞者是其位𠁅也斷慧命故名為魔也言魔波旬者訛也正言波卑夜此云𢙣者謂常有𢙣意成就𢙣法也或言𢙣魔波旬在二音也𡩷默石經為古文燕一見反說文𡩷安也謂安息㒵也未嘗視羊反小爾雅云嘗試也謂暫為之也捶打之蘂反下音頂說文以杖擊肴膳胡交反下上扇反國語云飲而無肴賈逵曰肴葅也凡非穀而食之日肴說文膳具食也周禮膳用六牲又云膳夫鄭玄曰膳之言善也今時美物亦曰膳廣雅肴膳肉也字體皆從肉肴善是聲經文有從食作飾膳二字撿無所出傳寫誤也教詔居效諸曜反字林詔告也爾雅詔導也郭璞云謂教導之也𥼶名云詔照也人暗不見事理即有所犯以此示之使照然知所由也塔廟塔婆或義譯為廟古文廟白虎通曰廟者㒵也先祖尊㒵也今取其義矣縱廣足容反小爾雅袤從長也韓詩傳曰南北曰縱東西曰橫是也周禮九州之地域廣輪之數鄭玄曰輪從也廣撗也露幔莫半反說文幔幕也在傍曰帷在上曰幕幕覆也露覆露也案諸經中珠交露蓋珠交露車同其事也經文有作縵說文繒帛無文者也縵非正體和鳴胡戈反說文音樂和調也謂音聲調和而鳴也詩云和鈴央央是也說應於興反字林應當也謂根法相稱曰應沙門舊云乘門或云喪門皆訛略也正言室摩那拿或言舍羅磨拏此言功勞言修道有多勞也又云勤勞言至誠也義亦名息以得法故暫寧息也舊譯云息心或言靜志是也頗梨力私反西國寶名也梵言塞頗𦙁迦譯云水玉或云白珠大論云此寶出山石窟中過千年水化為頗梨珠此或有也案西國極饒此物彼乃無水以何化也此但石之類耳適從三蒼古文作這同之赤反謂近也始也無礙古文硋同五代反說文礙止也廣雅礙閡也經文作閡亦古文礙字也小爾雅閡限也說文午代反外閡也又作㝵音得說文得取也尚書高宗夢傅說是也案衛宏詔定古文官書云㝵得二字同體㝵非此用方剎初轄反梵言差多羅譯言田田土田也或言國或言土者義言也案𠛴字書所無㓼字略也㓼說文楚乙反傷也字體從漆音七猶豫弋周反下弋庶反案說文隴西謂犬子為猶猶性多豫在人前故凡不决者謂之猶豫也又爾雅云猶如麂善登木郭璞曰健上樹也此輩補妹反蒼頡篇輩比也廣雅等𤳖輩亦類也字體從非𤳖音補槃反佳矣古崖反說文佳善也廣雅佳好也嫉姤古文𧪠嫉㑵三形同茨栗反下故反楚辝云故興心而嫉妬王逸曰害賢曰嫉害色曰妬但教徒亶反聲類云但從也徒空也瑕疵古文𤶬同才雌反瑕過也說文疵病也矜高居陵反尚書汝惟弗矜天下莫與汝爭能孔安國曰自賢曰矜禮記孔子曰不矜而㽵鄭玄矜謂自尊大也諂曲說文讇或作諂同田舟反諂倿也㽵周云希其意道其言謂之諂玫瑰說文莫回反胡魁反火齊珠也一曰石之美好曰玫圓好曰瑰郭璞曰玫瑰石珠也張揖曰玫瑰琅玕也出崑崙開明山木蜜字體作櫁字林亡一反香木也其樹似槐而香極大伐之五年始用若取其香皆當預斫之久乃香出鉛錫伇川反說文青金也尚書青州貢鉛是也錫銀鉛之閒也作樂五角反世本云黃帝世伶倫作樂說文五聲八音總名樂也禮記比音而樂之干戚羽毛謂之樂鄭玄曰八音克諧謂之樂鐃銅女交反如鈴而大者也廣雅鉌鑾鐃鐸鈴也歌唄蒲芥反梵言婆師此言讚歎或言唄匿疑訛也婆音蒲賀反案宣驗記云魏陳思王曹植曾登漁山忽聞巖岫有誦經聲清婉遒亮遠谷流響遂依擬其聲而製梵唄至今傳之是也唄亦近字耳𤛆牛亡交反說文西南夷長髦牛也今隴西出此牛也經文作貓猫二形今人家所畜以捕鼠者是也猫非經義南無或作南謨或言那莫皆以歸禮譯之言和南者訛也正言煩淡或言槃淡此云禮也或言歸命譯人義安命字第二卷不豫古文與同余據反爾雅逮及與也左傳公必與焉是也每作莫載反字林莫改反三蒼每非一定之辝也案每猶數也屢也等咎渠九反廣雅咎過也字體從人各人各相違即成過咎也演暢𠡠亮反廣雅暢達明也倫匹力均反廣雅同等輩倫匹也又倫類也匹配也深奧於報反爾雅西南隅謂之奧郭璞曰室中隱奧之𠁅也𥼶名云不見戶明所在祕奧也說文奧究也亦藏也叵思普我反三蒼云叵不可也反正為乏反可為叵皆字意也聚落廣雅聚落居也案聚聚也謂人所聚居也漢書無燔聚落是也衰邁莫芥反說文邁遠行也廣雅邁歸往也僮僕徒東反下古文同蒲木反說文男有罪為奴曰童廣雅童僕伇使也今皆作僮又僕亦附也謂附著人也梁棟爾雅𣏋廇謂之梁郭璞曰屋大梁也又梁亦通語也棟都弄反說文棟屋極也𥼶名云棟中也居屋之中也𣏋音亡廇力救反欻然吁勿反蒼頡篇欻猝起也焚燒古文炃燌二形同扶雲反廣雅焚燒也說文焚燒田也字從火燒林意也嬉戲說文作僖虛之反僖樂也蒼頡篇嬉戲笑也字從虘從戈虘音許冝反切已廣雅切近也迫也又亦割也字從刀七聲衣裓孤得反謂衣襟也玩古文貦同五喚反字林玩弄也廣雅玩好也尚書玩人喪德玩物喪志孔安國曰以人為戲弄則喪其德以物為戲弄則喪其志也經文作玩習元玩非體也適其尸亦反三蒼適恱也謂稱適也廣雅適善也謂事物善好稱人心也勇𨦣羊稅反廣雅𨦣利也說文𨦣芒也推排出唯土回二反蒼頡篇推軵也前也說文推排也排蕩也軵音而勇反四衢巨俱反爾雅路四達謂之衢郭璞曰交道四出者也𥼶名云道四達曰衢齊魯謂四齒杷為欋欋杷地則有四𠁅此道似之因以名焉綩綖諸經有作蜿𧑮二形字林一遠反下以旃反相承云坐縟也未詳何語立名耳丹枕案天笁無木枕皆以赤皮疊布為枕貯以兜羅綿及毛枕而且倚丹言其色赤也即諸經中朱色枕者同其事也姝好古文𡚾同充朱反字林姝好㒵也方言趙魏燕代之閒謂好為姝詩云靜女其姝傳曰姝色美也不匱今作匱同渠愧反禮記即財不匱鄭玄曰乏也詩云孝子不匱傳曰匱竭也保任補道反說文保當也任保也言可保信也頽毀古文頽隤二形今作隤同徒雷反說文隤墜下也廣雅隤壞也字從禿貴聲𪣀坼字林父美恥格反𪣀毀也坼裂也爾雅𪣀覆也廣雅坼分也𮖆落直紙𠡠爾二反廣雅𮖆也說文𡙸衣也字從衣聲經文作阤除蟻反方言阤壞也說文小𡶤曰阤阤亦毀也音奪音斯覆苫字林舒鹽反茅苫也爾雅白蓋謂之苫李巡曰白蓋編之以覆屋日苫也椽梠力語反方言屋梠謂之檐郭璞曰即屋檐也亦呼為連綿亦名㮰說文梠楣通語也㮰音毗周障之尚反說文障隔也通俗文隔曰障也音甫煩反鵄梟古文𩿍鵄二形今作鵄同兖尸反梵言阿梨耶案爾雅狂茅𩿍舍人曰狂一名茅𩿍喜食鼠大目也郭璞曰𩿍也又云怪𩿍也音亡項反鵰鷲籀文作鵰同丁堯反穆天子傳云爰有白梟青雕執犬羊食豕鹿郭璞曰今之鵰亦能食麞鷲音就梵言姞栗陀或言揭利闍此云鵰鷲案山海經景山多鷲說文鷲鳥黑色多子師曠云南山有鳥名曰羌鷲黃頭赤咽五色皆𬾨是也西域多此鳥蒼黃目赤食死尸也蚖蛇案字義古文作螈字林五官反蛇醫也崔豹古今注蠑螈一曰蛇醫大者長三尺其色玄紺善人一名玄螈漢書玄蚖韋昭曰玄黑蚖蜇蜴也經中言黑蚖疑此物也而不言毒害人未詳的是諸經多作虺吁鬼反蝮蠍匹六反案爾雅蝮虺博三寸首大如擘孫炎曰江淮以南謂虺為蝮有牙最毒音義曰說者云今蝮蛇鼻上有針一名反鼻虺三蒼蝮蛇色如綬文閒有鬣大者七八尺也擘音補麥反蜈蚣音吳公字林蝍蛆也甚能制蛇大者長尺餘赤足者良黃足者不堪用人多𬉹之令赤非真也蝍音即蛆子餘反蚰蜒弋周以旃反江南大者即蜈蚣也守宮此在壁者也江南名蝘蜓山東謂之𧋐𧐎陕以西名為壁宮在草者曰蜴𮔋東方朔言非守宮即蜴𮔋是也蝘音烏反蜓音𧋐此亦反狖貍古文雖字林余繡反江東名也又音余秀反建平名也山海經鬲山多雖郭璞曰似猴而大蒼黑色尾長四五尺似獺尾頭有兩岐天雨即自倒懸於樹以尾塞鼻江東養之捕鼠為物健尓雅雖仰鼻而長尾是也鼷鼠胡雞反說文小鼠也爾雅鼠郭璞曰有螫毒也食人及鳥獸雖至盡而不知亦不痛今謂之甘口鼠也野干梵言𭜧伽羅形色青黃如狗群行夜鳴聲如狼案子虛賦云騰遠野干司馬郭璞注並云射干能緣木射音夜廣志云巢於危巖高木也禪經云見一野狐又見野干是也咀嚼字林作齟說文作咀同才與反含味也蒼頡篇咀噍也通俗文咀齧曰嚼音才弱反字林蛆齰也經文作齚齧也齚音仕白反䶩齧相承在計反謂沒齒也經文或作䶩竹皆反通俗文齒挽曰䶩也摶𢲻補各反下字林七活反手小取也廣雅搏擊也𢲻持也𥼶名𢲻卒也謂暫卒取之也摣掣又作柤字林側加反𥼶名云樝又也謂五指俱往又取也經文有作䶥說文齒不正也䶥非此義掣或作𢊏同充世反字林掣拔也書掣牽也𥼶名云掣制也制䪺之使順己也嘊喍五佳仕佳反說文作齜謂開口見齒也埤蒼犬相啀拒也嘷吠古文嗥同胡高反說文嘷咆也吠犬鳴也魑魅說文作離三蒼諸書作螭近作魑同𠡠知反下古文魅二形今作同莫兾反說文老物精也通俗文山澤怪謂之魑魅正法華作妭魅魍魎古文蜽二形同亡強力掌反說文蜽山川之精物也通俗文木石怪謂之魍魎也孚乳通俗文𡖉化曰孚音匹付反字林匹于反廣雅孚生也方言雞伏卯而未孚是也下而注反蒼頡篇乳字也謂養子也蹲踞字林記恕反謂垂足實坐也蹲猶虛坐也舊經言箕坐也土埵字林丁果反聚土也擈令符剝反通俗文爭倒曰擈也𨶳看又作窺同丘規反字林小視也方言凡相竊視南楚謂之窺也爆聲古文㿺𦢊二形同方孝反又普剝反說文爆灼也謂皮散起也蓬勃蒲公蒲沒反廣雅勃盛也經文作熢㶿非也周章楚辝云聊翱翔兮周章王逸曰周章周流也謂周流往來也先因蘇見反案先亦先也告喻說文作諭同揄句反論語君子喻於義孔安國曰喻曉也蒼頡篇喻譬諫也灾火籕文作災同則才反左傳凡人火曰火天火曰灾𦽦莚西京云其形𦽦莚李洪音云怨餘戰反廣雅𦽦長也延遍也王延壽云軒檻𦽦莚謂長不絶也難𠁅乃安充與反詩云莫我皇𠁅傳曰𠁅居也禮記何以𠁅我鄭玄曰𠁅安也耽湎古文媅妉二形同都含反說文媅樂也耽亦嗜也湎古文䤄同亡善反說文沉於酒也繒纊在陵反下古文絖同音曠說文繒帛也纊絮也小爾雅通五色皆曰繒三蒼雜帛日繒是也又云纊綿也絮之細者日纊也茵蓐又作鞇同於人反說文車中重席也𥼶名六文鞇車中所坐者也用𧆞皮為之有文彩因以下與相連著也蓐三蒼薦也阿鞞陛兮反譯言不退住也此與𥀷字同諸經有作阿毗跋致或作惟越致皆是梵音訛轉耳𩑔瘦說文口沒反三蒼云頭禿無毛也通俗文白禿曰𩑔廣雅𩑔髻禿也今讀口轄反此非正音但假借耳梨黮案方言面色似凍梨也經文有作䵩力兮反字林黑黃也通俗文斑黑日黧黮說文杜感反一音𠡠感反乘椹之黑也今用於斬反者借音耳椹音甚觸嬈說文乃了反嬈擾戲也三蒼嬈郭璞云嬈弄也廣雅嫽誂擲嬈也嫽音遼誂徒了反𢙣賤於路反禮記吾𢙣用吾情𢙣猶憎也論語𢙣紫𡙸朱詩云𢙣無禮皆是也馲駝又作𩢵字書作𩧐又作橐字並力各反山海經音託郭璞云日行三百里負千斤知水泉所出也性別水脉以足掊地則泉出也經文作駱馬色也白馬黑𮤅曰駱駱非今義掊音蒲交反蟒身莫黨反爾雅蟒王蛇郭璞曰蛇之最大者故曰王聾騃五駭反蒼頡篇無知也方言癡騃也唼食古文㗱又作咂同子盍反通俗文入口曰咂字林庱血也亦蟲食曰唼矬陋徂戈反廣雅矬短也通俗文侏儒日短經文作痤謂痤癤也說文小腫也痤非此義背傴字林一父反通俗文曲謂之傴僂春秋宋鼎銘云一命而僂再命而傴三命而俯杜預曰俯恭於傴傴恭於僂身逾曲恭嗌加也經文作膒字林一侯反幽脂也非今所取又作𤹪未見所出疑傳寫誤也依怙胡古反爾雅怙恃也廣雅賴仰依負恃也醫道於其反說文治病工也醫之性得酒而使故字從酉殹聲古者巫彭初作醫殹亦病人聲也酒所以治病者藥非酒不散也殹音於奚反又作醫二形俗字也救療說文𤻲或作療同力照反三蒼療治病也瘖啞一金乙下反瘖不能言也埤蒼啞亦瘖也經文作喑一禁反字林喑唶也又作啞字林乙白反笑聲也易云笑語啞啞是也二形並非字體唶音子夜反強識渠良反強堅也蒼頡篇強健也好樂呼到五孝反好猶喜也樂猶欲也慶幸胡耿反小爾雅云非分而得謂之幸幸遇也亦望也皆非其所當而得之也字從𢆉從逃逝是世反說文逝往也廣雅逝行也逝亦逮也馳騁直知反下丑領反廣雅馳奔也騁走也𧆞魄匹白反廣雅𧆞魄珠名也漢書𦋺國有𧆞魄案博物志云松脂入地千年化為茯苓千年化為𧆞魄一名江珠廣志云𧆞魄生地中其上及旁不生草木深者八九尺大如斛削去上皮中成𧆞魄有汁初如桃膠凝堅乃成人用以為𭾅也啇估字體作齎始羊反說文行賣也估字書所無唯爾雅郭璞音義𥼶言注中商賈作此字下賈客公戶反說文柯戶反坐賣也周禮司市掌以商賈鄭玄曰通物曰商坐賣曰賈白𧆞通曰商之言商也商其遠近通四方之物以聚之也賈者固也言固物以待民來求其利也案賈亦通語也故左傳荀之在楚也鄭賈人褚中以出史記陽翟賈人往來販賤賣貴是也坦然他誕反說文坦安也廣雅坦平也傭賃興恭女反蔡雍勸學注云傭賣力也㽵子傭於人者孟氏曰傭伇也謂伇力受直曰傭說文賃傭也灑地所買反通俗文以水撿塵曰灑也出內昌遂反案出亦出也詩云出言有章是也肆力相利反廣雅肆伸也肆陳也謂伸陳伇力也豪貴古文𠢕同胡刀反說文𠢕健也淮南子曰智出百人謂之豪俞急弋朱反小爾雅云俞茲強益也又作愈爾雅愈急也躃地脾伇反躃倒也或作僻匹尺反邪僻也僻非此用醒悟思反字林醒醉除也憔悴三蒼作憔悴廣雅憔悴愁患憂也悴病也怪之古壞反怪異也驚怪也凡奇異非常皆曰怪字從左音口兀反塵坌蒲䪺反通俗文𡋯土日坌說文坌塵也汙穢字林於故反又音紆莝反汙塗也𥼶名汙汙也如汙泥也咄男丁兀反說文咄相謂也字書咄叱也自鄙補美反廣雅羞愧鄙恥也於某莫有反尚書云尓元𢬡某孔安國曰某名也臣諱君故曰某名也凡不知名不言名皆言某伶俜歷丁匹丁反三蒼云伶俜猶聮翩也案伶俜亦孤獨㒵也經文多作跉跰字林力生下補諍反字與迸同跉不正也迸散也二形並非今用蠲除古玄反方言南楚疾愈者謂之蠲郭璞云蠲除也毀呰古文些㰣二形同子爾反說文呰呵也禮云呰者莫不知禮之所生鄭玄曰口毀曰呰夙夜思六反爾雅夙晨早也注記竹句之喻二反廣雅注疏也識也字林注解也通俗文說物曰注今亦作注也眇目亡了反說文一目小也𥼶名云目匡陷急曰眇方言眇小也草庵一含反廣雅庵舍也小屋之名也經文作菴菴䕡草名也何負古文𢬲說文胡歌反何儋也諸書胡可反何任也今皆作荷第三卷誠如市盈反說文誠信也廣雅誠敬也溪谷苦奚古木反爾雅水注川曰溪注溪曰谷說文泉之通川曰谷卉木字林虛謂反爾雅卉草郭璞曰卉百草之惣名也又方言東越楊州之閒名草曰卉小莖胡耕反廣雅云莖本也謂枝本也等澍之喻上句二反三蒼時雨也百卉霑洽也說文上古時雨所以澍生万物者也普䨐又作洽同胡夾反說文洽霑也蒼頡篇洽遍徹也不務亡付反說文務趣疾也廣雅務遽也靉靆於代反下埤蒼音代廣雅靉靆翳薈也翳薈雲興盛㒵也通俗文雲覆曰為靉靆幽邃古文㥞同私醉反說文邃深遠也百穀古木反說文穀續也百穀總名也周易百穀草木麗于地是也苗稼說文草生於田者也蒼頡篇禾之未秀者也論語苗而不秀是也稼說文禾之秀實為稼莖節為禾一日在野日稼甘蔗之夜反案諸書或作竿蔗或作薯柘或作甘柘同一種也蒲挑博物志曰張騫使西域還得安石榴蒲桃胡桃是也廣志云蒲陶有白黑黃三種桃陶二形隨作無定體枯槁古文𣩅說文作槀字林苦道反槁木枯也一渧案此猶滴字音丁歷反通俗文靈滴謂之凝㴆音丁計反渧水下也瓦礫力的反說文小石也堆阜古文堆陮崔三形同都雷反堆高土也阜山庳而大者庳音父爾反丘坑古文𡊣說文土之高也非人所為也一日四方高中央下亦曰丘也知山縷反數計也閲其數曰數也長表梵言舍磨奢那此云也案西域僧徒死者或遺諸禽獸收骨燒之埋於地下於上立表纍甎石等頗似窣覩波但形而𢌿小也金剎梵言掣多羅案西域無別旙竿即於塔覆鉢柱頭懸旙今言𠛴者應訛略也涕泣他禮反毛詩涕泗滂沱傳曰目出淚曰涕說文無聲出涕曰泣也憺怕字書或作倓同徒濫反說文憺安也謂憺然安樂也憺亦恬靜也經文作惔徒甘反說文惔憂也惔非此義怕又作泊說文匹白反無為也廣雅怕靜也勉出古文勱同靡辨反國語云父勉其子兄勉其弟勉猶勸強也謂勸教之也小爾雅勉事力也羣萌古文珉同麥耕反萌芽也廣雅萌始也案萌冥昧貌也言衆無知也漢書珉珉群𥟖是也諷誦不鳳反諷謂詠讀也誦謂皆文也周禮教國子興道諷誦鄭玄曰倍文曰諷以聲節之曰誦億姟古文㚊奒二形今作姟字林古才反數名也風俗通曰十千曰万十万曰億十億曰兆十兆曰經十經曰姟姟猶大數也營從古文覺同伇瓊反蒼頡篇營衛也亦部也城郭世本𧣙作城郭公羊傳曰郭者何郭也經文有從土作墎非也𧣙音古本反第四卷溝壑呼各反說文溝水瀆也廣四尺深四尺爾雅流水深則成壑壑亦溝池也臺觀徒來反爾雅四方而高曰臺又云觀謂之闕孫炎曰宮門雙觀也𥼶名云觀者於上觀望莎伽先戈反梵言娑婆揭多此云善來唯然弋誰反說文唯諾也廣雅唯然也禮記父召無諾先生召無諾唯而起鄭玄曰唯有之敬辝也唯恭於諾也又借音弋水反亦語辝也親友于久反說文友同志也廣雅友親也禮記僚友稱其悌執友稱其仁鄭玄曰僚友同官也執友同志也艱難籕文作囏同古間反說文土難治也𥼶名艱根也如物根也難憚也人所忌憚也易莫𠋫反三蒼換易也交易物為字從貝徒卯蹈七徒到反說文蹈踐也踐履也𥼶名云蹈道也以足踐之如道也肴饌又作同仕眷反說文具食也饌飲食也齊室說文室實也案戶外為堂堂內為室論語云由也升堂未入於室是也句豆徒鬪反字書逗留也說文逗止也方言逗住也經文有作䛠竹𠋫反順言也䛠非經𣅀又作𧮡未見所出乾燥先老反𥼶名燥焦也說文燥乾也礙本作罫同胡卦反字書礙也說文礙止也見寶古現反案梵本云達梨舍那此譯云見也林藪桑苟反散木為林澤無水日藪各賫子奚反說文持遺也案賫亦持也字從昗亝聲關𨷲古文鑰同余酌反說文𨷲關下壯也方言關東謂之鍵關西謂之𨷲經文作籥字林書僮笘也何承天纂文云關西以書篇為書籥籥非此義笘赤占反無央於良反梵言阿僧祇此言無央數央盡也經文作鞅於兩反說文頸靻非此義靻音之列反所往羽岡反廣雅往至也經文有作住非也第五卷捐捨以專反說文捐棄也爾雅廢捨也郭璞曰捨放置也委政國語棄政伇非任也賈逵曰政猶職也左傳為政事庸力杜預曰在君為政在臣為事論語道之以政孔安國日政謂法教也推鍾直追反說文稚擊也字從木經文作捶直淚反關東謂之捶關西謂之持又作捶都回反捶摘也二形並非字義持音篪仁往而親反周禮六德一日仁鄭玄曰愛人以及物曰仁上下相親謂之仁諡法曰貴賢親親曰仁煞身成人曰仁𥼶名仁者忍也好生𢙣煞善𢙣含忍之也開闡昌善反廣雅云發闡開也闡明也頗有借音普我反諸書語辝也本音普多反於剎經文有作千剎那頃案梵本無千字此傳寫誤也芥子迦邁反字林辛菜也宗奉子肜反宗尊也說文奉承也誹謗字林方味反誹謗也謗毀也廣雅謗𢙣也國語左史謗之賈逵曰對人道其𢙣曰謗也罵詈力智反蒼頡篇詈罵也𡰱𠃵或作𡰱𠃵陀應言泥揵連他譯云不繫也𨒫路正言路迦譯云順世外道縛摩路迦也底迦此云左順世外道相扠字體作𠡠佳反以拳加人也扠近字耳旃陀羅此言訛也正言旃荼羅此譯云嚴熾又一云主煞人謂屠煞者種類之㹅名也其人若行則搖鈴自摽或杖破頭之竹若不然王則與罪田獵白虎通曰為田除害故曰田獵也漁捕古文或作䰻同言居反說文漁捕魚也屠兒達胡反說文屠刳也案屠分割牲肉也魁膾苦回下古外反魁師也魁首也膾切肉也未詳所出立名經文有作儈聲類儈合市人恐非此義𭛰賣胡麵反說文𧗳惑從玄作衒行且賣也詃也屏𠁅俾領反禮記左右屏而待鄭玄曰屏隱也詩云万邦之屏傳曰屏蔽也今借為蒲定反依初反讀亦不乘字義入里周禮五家為鄰五鄰為里謂二十五家也里居也𥼶名云五鄰為里方居一里之中也澡浴祖老反說文澡灑手也浴灑身也新染經文有作新淨正法華云淨潔被服也輕蔑字體作懱同莫結反說文相輕㑥也討伐古文䚯同恥老反漢書音義曰討除也禮記叛者君討鄭玄曰討誅也伐也左傳有鍾鼓曰伐白虎通日伐者何伐敗也欲敗去之也經文作罰說文罪之小者曰罰廣雅罰折伏也罰非此義巨身其呂反字林巨大也方言齊宋之閒謂大曰巨說文巨大作巨被精皮寄反被謂被帶也經文作披張之披方言披散也披非此義奮迅方問雖閏反廣雅奮振也鳥之奮迅即毛起而身大故從𨾮在田上𨾮音雖鳥也頭陀此應訛也正言杜多譯云洮汏音大灑也或云紛彈言去其塵穢也舊云斗藪一義也憒𠆴公對女孝反說文憒亂也煩也韻集𠆴猥也猥衆也字從市從人經文有作閙俗字也第六卷𥼶氏經中或作姓瞿曇氏案氏姓別也生也姓者所以繫統百世使不別也感靈而生也氏者所以別子孫之所出也或因地或因官爵也故世本云言姓即在上言名即在下年紀居擬反十二年為一紀紀記也拜跪字林丘委反跪拜也又音渠委反左傳跪而戴之也搗篩古文籭䔮二形聲類作篩同所佳所飢二反說文竹器也可以除取細也除愈古文愈同乳反方言差間愈也說文愈病瘳也億載則代反案算經皇帝為法數有十等謂億兆京垓壤𥞑溝澗正載及其用也有三謂上中下下數十万日億中數百万曰億上數万万曰億繽紛匹仁孚云反廣雅繽繽衆也紛紛亂也謂衆多亂下也字林繽紛盛貌也塔寺梵言毗訶羅此云遊行𠁅謂僧所遊履𠁅也今以寺代之言寺者說文𨑲也有法度者廣雅寺治也𥼶名云寺嗣也治事者相嗣續於其中也字體從寸出聲僧坊甫亡反字林坊別屋也多羅樹形如棕櫚極高長七八十尺花如黃米子大如針人多食之瞻蔔正言瞻博迦此云黃花樹花小而香西域多此林也瘡朎籕文作疹說文同居忍章忍二反唇瘍也三蒼云風腫也咼斜口蛙反說文口戾也通俗文邪戾曰咼是也字從口咼聲咼音古瓦反遍韻集方他奚反纂文云遍虛薄也今俗呼廣薄為遍關中呼𥏠𥏠補迷反經文作䐔䏲近字也曲戾字林力計反戾曲也字從犬從戶窊曲字林音隱窪或作窊同一瓜反廣雅窊下也撰集三蒼作同助臠反廣雅撰定也撰亦述也第七卷謦咳口冷反說文謦亦咳也蒼頡篇謦聲也經文作磬口定反樂器也磬非字體咳苦戴反說文咳逆氣也亦嗽也經文作咳胡來反嬰咳也咳非經義嗽音蘇奏反屬纍之欲反下力僞反屬託也說文屬連也廣雅委託纍也謂以事相屬纍也左傳相時而動無纍後人謂纍重也甄迦羅或云𠷐迦羅此當千万億百𠷐迦羅名頻婆羅此當十兆百頻羅名阿茤婆或名阿閦婆此當千兆我適三蒼古文作商同尸亦反爾雅適往也正法華云我往昔供養是也怨敵徒的反廣雅敵對當也爾雅敵匹也怨之匹也八百万正法華云一千八百万億梵本十八俱𦙁案百毗跋為一俱𦙁此數當兆數乃更多今經文有作百八万億非也動搖說文餘照反樹動也字從木䍃聲䍃音余周反甄𠦑譯云赤色寶字林已仙反案西域傳云有緊𠦑迦樹其花赤色形大如手此寶色似此花因以名焉宰官祖殆反聲類宰治也謂治邑吏也廣雅制也謂制事者也第八卷船舫甫妄反通俗文連舟曰舫併兩舟也漂墮匹消芳妙二反說文漂浮也案漂猶流也正法華經作流墮是也撿繫居儼反廣雅撿甲也撿括也謂括束也𥼶名撿禁也謂禁閇誨物不得開露也字林從木唐捐案唐徒也徒空也蒼頡篇云捐棄也祝詛說文作酬之授反酬詛今皆作呪下古文樝同側據反𥼶名云祝屬也以善𢙣之辝相屬著也詛阻也謂使人行事阻限於言也經文作咀才與反咀嚼也非合字體掣電昌制反陰陽激耀也關中名覢電今吳人名䃱磹音先念反大念反𥼶名云掣引也電殄也謂乍見即殄滅也降雹蒲角反鄭玄注禮記云陽為雨陰起脅之凝而為雹戒雷古文作誡同古薤反詩云豈不曰誡誡警𠡠也方言戒備也慈音梵云每怛利末那此云慈意經文作音誤也吉遮止奢反正言訖栗著譯云所作伺求廣雅埤蒼作覗同滑慈𦙃吏二反伺猶察也字林伺𠋫也廣雅伺視也三藏法師玄奘譯南無曷剌怛那怛那耶夜多垤他遏爾而割反一末尓同上二末泥去聲三求末泥同上四質帝五靳脂列反履帝六閃式染反䛧莫閇反七閃弭蜜尓反八多鼻扇重長帝九目帝十目答䛧十一三䛧十二阿毗三䛧十三三磨短三䛧十四素清磨三䛧十五𠛴重曳十六𢙣𠛴曳十七𢙣𠛴𭏊奴戒反十八扇帝十九閃䛧二十䭾剌力割反𡰱二十一阿路迦婆去聲娑波羅弗福泥反帝二十二鉢剌著知也反吠𠛴𭡱二十三涅奴反栗地瑟䶩以皆反阿蹁蒲眠反怛羅涅栗地瑟䶩二十四阿蹁怚邏波利秫尸聿反第二十五殟烏沒反矩二十六沒矩二十七阿剌躋二十八鉢剌䶩二十九輸式𢈔反迦差初理反三十阿三磨三䛧三十一勃陀毗盧枳帝三十二磨波利差低三十三僧伽涅伽去怚𡰱三十四僧伽涅具煞𡰱三十五跋耶重聲跋耶短聲毗輸達𡰱三十六𭦟㗌丁結反唎三十七𭦟多羅𠛴也低三十八胡魯低三十九摩訶胡魯多舉赦反設四十𢙣𠛴曳四十一𢙣𠛴伐拏多耶四十二阿跋四十三阿末若而夜反那多耶四十四蘇波訶第二多垤他十伐唎摩訶十伐唎塢計目計阿䶩去聲阿吒重伐底長涅同上栗䶩涅栗吒伐底同上第三伊緻抳女几反毗緻抳𣅀緻抳涅栗緻抳涅栗著稚耶反伐底短聲第四遏媄除皆反捺媄努捺媄阿捺厨雉俱反清捺遲俱捺遲第五阿揭搱揭搱具唎健䭾長唎旃荼唎摩隥祇卜重羯西僧矩常寠履勃盧抳阿揭𭜧底第六伊底䛧伊底䛧五遍你䛧你䛧五遍胡魯𨢘夫聲五遍蘇反䫂都可反䤈五遍𡑅油說文於甲反𡑅壞也鎮也周成難字作䆘䆘桚也經文作柙古文匣字說文押攬也論語虎兕出柙是也字從木又作柙音甲尓雅押輔也亦押束也字從手二形並非經義拶子曷反紺青古暗反說文帛染青而揚赤色也𥼶名云紺含也青而含赤色也珂貝苦何反螺屬出海中潔白如雪者也經文作軻口佐反說文接軸也亦坎軻不遇也軻非字義坎音口紺反怛垤他遏彈去聲媄徒皆反輕一彈荼重長鉢底丁履反伐帝二彈荼伐栗帝三彈荼伐栗怛𡰱彈荼拘舍四彈荼蘇達唎五蘇䭾長利六蘇䭾囉鉢底丁履反七勃陀重鉢設帝八嚩䭾剌𡰱阿伐栗怛泥去聲九嚩婆去莎所也反伐栗怛泥十蘇阿伐栗怛𡰱輕十一僧伽波唎剎𡰱依字十二僧伽涅伽怛𡰱十三達摩蘇波唎差初履反帝十四阿僧祇巨奚反十五僧伽波揭低十六怛唎阿特縛僧伽咄略上聲鉢羅弗補沒反帝十七縛僧伽三末底羯爛清長帝十八縛達摩蘇鉢理差初理反帝十九縛埵胡魯多重設略力迦反奴揭帝二十僧所繒反訶毗重訖唎雉帝二十一蘇波訶阿惰徒臥反案梵本云怛唎此云三阿特縛三十僧伽衆咄略同一種經文從有作㤢相承於六反撿無此字疑傳寫誤也繚戾力鳥反說文繚繞也繚緾也謂相緾繞也角睞力代反說文目瞳子不正也蒼頡篇內視曰睞也
