body:
  text: 翻經沙門玄應撰正法華經阿闍世王經悲華經等集衆德三昧經大悲分陀利經集一切福德經大方等念佛三昧經廣博嚴淨不退轉經念佛三昧經佛説阿惟越致遮經楞伽經勝思惟梵天所問經入楞伽經思益梵天所問經遮𡰱乾子經持心梵天所問經菩行方便境界經度世經大般泥洹經漸備經大哀經十住經虛空藏經如來興顯經阿差末經羅摩伽經無盡意經菩本業經寶女經諸菩求佛本業經菩淨行經道神足無極變化經無言童子經寶如來三昧經仛真阤羅𡰱經四童子經持世經方等般泥洹經𪪺道廣顯經哀泣經阿耨達龍王經慧上菩問大善權經普超三昧經文殊師利現寶藏經正法華經第一卷盧楴徒帝敕細反或作俱盧楴人名也此譯云賣姓焰明字詁古文焰今作爓三蒼作焰同餘贍反説文火行微焰然也經文作㷿許凡反埤蒼㷿味辛也字𮏑㷿𦳫也㷿非此義𦳫音力割反蒸民之外反爾定蒸衆也天生蒸民是也闊又作同苦回反字林大也闊遠也暨今聲類云古文作泉同其器反字林暨及也亦至也霍然呼郭反案霍然忽急疾之貌也經文作霩非體也修子卯反或作纘爾匹纘繼也謂繼修前業也煜爚又作焴同餘祝反光明盛貌也經文作昱鑠非體也斒斕又作霖斑二形同補間反下又作𢿻同力間反通俗文文章謂之斒斕經文作斑蘭非體也溥演匹古反此古文普字詩傳曰溥大也亦遍也較略古文攉同古學反較粗略也廣雅較明也明哲又作哲同知列反爾匹哲智也宋齊間語也若繕市戰反説文繕補也三蒼繕治也繕之言善也謿話竹交反下又作譮話二形同胡反聲類訛言也堊飾烏各反爾匹牆謂之堊郭璞云白土飾牆也鐃鏡奴交反下音竟未詳所出案周禮金錞以和鼓金鐃以正鼓應是錞音常均反拊抃麩主反拊拍也下又作拚同皮變反説文拊手曰抃也第二卷㣿惕之若反下他狄反㣿惕者謂憂懼也亦痛也未聆力丁反蒼頡篇聆聽也耳所聽曰聆也軒窗虛言反楚辝注云軒樓上扳障風曰者也鑠如書斫反閃鑠也言忽霍暫明也孚出又作䞯同芳務反孚疾也廣雅䞯行也慍恨於問反慍𭜨也説文慍怒也亦恚也帑藏湯朗反周成難字音蕩説文帑金幣所藏之府者也𭫲棟所龜反下都弄反爾匹桷謂之𭫲𭫲即椽也棟屋極也山東呼棟為𬃡音於靳反軒闥他曷反廣雅闥門也謂側門也虺蛇古文蟲螝二形今作虺同呼鬼反毒蟲也韓非子曰蟲有虺者一身兩口爭食相齕遂相煞也齕音齧也蝮螫匹六反下呼各反蝮有牙最毒鼻上有針是也經文作蝠誤也竄經文或作臿此應逋字補胡逋逃也廣雅逋竄也鳴呼火胡反字林呼外息也呼召也喚也經文作㖟啾唧子由反下資栗反蒼頡篇衆𡗚聲也經文作㗧乃結反怒也㗧非此義圂廁胡困反圂廁也亦豕所居也廁清也雜也窠窟又作薖萪二形同苦和反小匹云雞所乳謂窠菟之所息謂之窟經文作萂非也摣掣又作柤同側伽反摣又也經文作齹千何反齒參差也齹非此用齮齧丘奇反漢書韋昭音墾蒼頡篇云齊人謂齧咋為齮側齧也羯羠囚几反徐廣曰羯羠並犍羊也埌力宕反通俗文丘謂之壙埌鳩洹諸經或作鳩垣或作仇桓皆梵音訛也此譯云大身鬼拔扈蒲沫反下胡古反漢書音義曰扈拔扈也謂自縱恣也鐵喙又作顪同許穢反通俗文獸口曰喙喙亦通語也尸骸乎皆反骨之捴名也經文作骸非也燔燒又作同扶元反毛曰炮加火曰燔燔亦燒也恇娘丘方反下而羊反説文恇娘煩擾也謂煩恐惶遽經文從心作懹人向反懹憚也難也懹非此義烏殟烏沒反説文暴無知也聲類烏殟欲死也灰燼又作同似進反燒木餘曰燼經文作藎草之藎非體也又作誤也𬉹𬋘又作同力照反今江北謂𬉹手足為𬉹𬋘經文作燎非體也噉食又作啖啖二形同達敢反噉食也經文作骰骸二形並非也奔騖亡付反騖疾馳也廣雅騖奔也蜈蚣音吳公字林蝍蛆也甚能制蛇經文作非也蚔蛆渠支反下知列反説文蚔䖯也䖯蠆也毒蟲也廣雅蛆毒蟲也經文作螑非也䖯音圭盲聵牛快反生聾曰聵又無識曰聵經文作膭胡對反肥也膭非今用燒焫又作爇同而恱反蒼頡篇爇燒然也免𣸫又作濟同子第反濟渡也益也勱勵古文勱今作勉同靡辨反勱強也謂自勸強也下力制反相勸勵也勉力為勵擾馴如小如照二反擾安也説文牛柔謹曰擾故字從牛下似均反廣雅馴善也亦從也説文謂養鳥獸使服習謂之馴經文從手作擾下作偱非字體也縶紲又作𮩴同知立反下又作緤同息列反縶絆也拘執也紲馬韁也所以縶制畜畜牲者皆曰紲紲繫也謗訕所姧反蒼頡篇訕非也謗毀也蠱狐聲類弋者反書中多作野狐此古字通用也黤黮烏感他感反黤黮不明也經文作黕丁感丁甚二反垢濁也黕非今用痋燥又作疼疼二形同徒冬反聲類作癑説文痋動痛也下蘇倒反燥乾也經文作痋瘮非也癘瘡又作癩同力帶反字林𢙣疾也憂瘀於務反廣雅瘀病也瘀傷也經文作嗽非也喚哳陟黠反楚辝嘲哳鳥鳴也案字義冝作㕭烏交反江南以多聲為㕭咋咋音仕白反黧黮力奚反下敕感反通俗文班黑謂之黧黮好仵又作忤悟二形同吾故反觸仵也聲類忤逆不遇也第三卷靖聽又作𩇕竫靜妌四形同自井反謂安定無聲也葐蒀扶文反下紆文反葐蒀香氣也亦盛貌也經文作芬薀非也流宕達浪反説文宕過也通俗文迵過日宕是也僑停奇驕反字林僑寄也經文作僑高也才也僑非正體致印於振反印可也説文印王信也蒼頡篇印驗也嬉遊又作僖同虛之反説文嬉樂也戲笑也經文作繥非也祚胤在故反下與振反祚祿位也胤繼嗣也經文作𥽿非也飢餒奴罪反三蒼餒餓也經文作𩚛未見所出訾計又作𢋀同子反説文訾量也思也經文作資貨之資非字意也冝用榆共反蒼頡篇用以也經文作角非也卬卬又作昂昂同五反昂昂恭敬之貌也睹又作豬同陟驢反下除例反方言關之東西謂䐗為雞鶩音木爾匹野曰鳬家曰鶩鶩即鴨也經文作稚非也出內奴對反字書內入也經文從人作納非也煩冤古文作冤惌二形今作𭓩同於元反説文冤屈也廣雅冤枉也經文作婉非字體也𭍠口又作嗇同使力反衆貌也田夫謂之𭍠人亦積也剓身又作剺同力咨反三蒼剓劃也經文作𨤲身非字體林麓古文麓同力穀反謂林屬於山曰麓詩云瞻彼旱麓傳曰山足也樛木居虬反詩云南有樛木注云謂木枝下垂曲者也䅥䅥又作䅥同居竭反詩傳䅥䅥長也説文禾舉出苗也豐羡辝箭反周禮注云羡饒也亦餘也經文作薿非也㕮咀方父反又音撫下側呂反謂以物拍碎也胚胎普才反説文婦孕一月為胚二月為胎胎始也養也探本他含反説文遠取也探摸也宣叶又作協同胡𥇱反叶合也同也和也斐粲敷尾反詩傳曰斐文章貌也粲明也鮮盛貌也第四卷𧰟䀎又作艷同餘瞻反下莫見反艷美色也䀎邪𨁍也經文作醘盻二形誤也奕奕余石反奕奕光明之德也廣雅奕奕盛也字從大嗟嘆子邪反下敕且反嗟嘆謂大息也經文作非也開䦱又作䦱同于彼反字林䦱開也闢也經文作閙誤也𮊵又作二形同蒲戒反通俗文疲極曰疲劣也諄諄之閠之純二反説文告曉之熟也諄諄誠懇之貌也綺𡣶徂且反説文自好也聲類𡣶綺也通俗文服飾鮮盛謂之𡣶經文作纘非也第五卷解懌以石反爾匹怡懌樂也字林懌怡也不嫪力報反通俗文意若曰嫪説文嫪婟也謂戀不能去也裨體説文作埤或作同避移反埤增也厚也助也淳化時均反言專一不雜也三蒼淳濃也經文作享誤也求眺他吊反説文眺視也亦望也察也崖底丁禮反底猶下也經文作音直移反山名也又作𡵒子結反説文陬禺而高山之節也洮汏徒刀反下音太通俗文浙米謂之洮汏廣雅汏洗也浙音思歷反第六卷墟䧫丘魚反墟居也民之所居曰墟下古文聚二形今作聚同才句反廣雅聚居也謂人所聚居也潀流在公反詩云鳬鷖在潀傳曰水會𠁅也説文小水入大水也調馴似均反善也亦從也經文作裝偱非也敬達又作馗同奇龜反妙法華中大愛道是也第七卷音韶古文𪔓同視柖反舜樂名也韶之言紹也隿射今作弋同余力反弋繳射也獵也繳音之若反綢繆直周反下莫侯反詩傳曰綢繆猶緾綿也調譺吾戒反通俗文大調曰譺譺欺也蹉踖千何反下子亦反踧踖也踖字應誤冝作錯千各反蹉不正也錯誤失也勞廢府吠反廢退也罷止也經文作廄非也窺𨵦丘規反下弋珠反説文窺𨵦小視也稽古文同苦禮反下乘朗反稽至也額也謂額至地也詢法又作詢同思遵反左傳咨親為詢詢問親戚之議也貧窶瞿矩反詩傳曰窶者無禮也字書寠空也元元言元元者非一民也古者謂民曰善人因善為元故曰元經文作忨五喚反忨食也忨非今義悶幅普力蒲力二反幅億猶盈滿也薨殪呼𪪺反廣雅薨亡也諸侯曰薨下古文作同於計反謂一發而死曰殪殪亦死也第八卷𩚢糊徒奚反下戶孤反通俗文酪酥謂之𩚢糊經文作𮠺非也塞齆一弄反埤蒼鼻病也經文作非也𭪿鴉資髓反下於加反鴉鳥也經文從亞作鴉非也鵁鶄音交精似鳬而腳高毛冠人家養之以厭火災也嚾呼又作嚻喚二形同呼換反喚叫呼也享餼虛掌反下虛氣反享獻也儀禮以牲曰餼餼猶稟給也字書餼餉也經文作饗非字體也第九卷號咷徒勞反號咷大泣也經文作啅陟角反啅非字義厭鬼於舟反蒼頡篇云伏合人心曰厭亦眠內不祥也雜糅古文粈䏔二形同女救反今以異色物相參曰糅也寶瑛於京反廣雅水精謂之石瑛瑛亦玉光也叨餮古文叨叨二形同他勞反下又作飻同他結反貪財曰叨貪食曰飻第十卷謿囈相承魚世反此應作譺五戒反大調也生靤又作皰同蒲孝反説文皰面生氣也經文作皰庖二形非也悲華經第一卷郅之一反下奴禮反頞緹烏割反下他禮反羅陀經又從口作咃非也拏都禮反下奴加反經文作𣭄非也阿俾甫爾反由褅徒計反離絁式移反羅齲丘禹反褘陀於冝反多茤渠義反嗐哆敕轄反阿挮他第反大悲分陀利經第一卷波義或言毗留義訛也具言鼻溜波阿叉舊譯云雜語一義也正言醜眼西方天王名也提惔徒甘反𭣣蒲戒反螕以補奚反阿昵女乙反須抳女几反邏啜市恱反多眯莫禮反𦳄下毗典反一音便師薜蒲計反酣伽下甘反嗾咩所角反下爾反阿慉虛六反桔略音結第四卷鈗婆丈心反童子名也依字蒼頡篇鈗臿屬也第五卷嗒然土合反精靈失其所也莊子哈然似喪其偶是也鬻賣又作儥賣二形同餘六反周禮儥賣也言物有定價則買者來跨馬苦罵反字林跨踞也亦躡也大方等大集菩念佛三昧經第一卷楣棖靡飢反下宅庚反爾匹楣謂之梁謂門上撗梁也棖謂之揳注云門兩旁木也樞𨶩齒榆反下胡蠟反爾匹戶樞也説文𨶩閇也魁偉苦回反下于鬼反魁大也偉奇也應邵曰魁丘墟壯大之意也第二卷亭傳徒丁反陟戀反漢家因秦十里一亭亭留也傳驛也𤏖燼子廉反下似進反𤏖吳楚之間謂火滅為𤏖燼火餘也經文作𤒯第四卷無謇居展反方言謇吃也楚語也言不通利謂之謇吃第五卷㽄破又作𤺊同先奚反聲類㽄聲散也第六卷門闑又作臬同魚列反爾匹橛謂之闑即門限也廝伇新移反廝下也字書廝伇也謂賤伇也第八卷法鞉又作鼗鞀二形同徒刀反鞉如鼓而小持其柄搖之者也鏝陀莫反池名也依字泥鏝也第九卷烗熱口戒反廣匹烗熾也今人言烗譡亦作烗譡音都浪反第十卷黏汙又作糊同女沾反糊物相著曰粘也倉廩又作商同力甚反藏穀曰倉藏米曰廩印璽思紫反天子之玉印也璽信也亦神器也念佛三昧經第一卷剌夵盧曷反下陟家反聲聞弟子名也胄胤治又反下翼刃反胄後也胤繼也子孫相承繼也應邵曰胄緒也連續也字從八八引長之也云象世繼相重也第二卷氤氳一鄰反下紆文反元氣也謂天地未分之始氣也渟流狄經反埤蒼水止曰渟也沠別普懈反説文水之邪流別也廣雅水自汾出名沠也第三卷分衛此言訛也正言荼夜此云食團謂行乞食也京畿或作圻同渠衣反周禮方千里曰國畿畿限也懾伏徒頰反分匹懾懼也郭璞曰即恐懾也懾音之涉反楞伽阿跋多羅寶經第一卷楞伽山名也正言䮚迦䮚音力鄧反阿跋多羅寶此云入謂入此山中而住説此經也海濱父人反字林濱水崖也錯繢胡對反論語繪事後素鄭玄曰繪畫也五采也瞪矚直耕反通俗文直視曰瞪第四卷談婆徒南反今借為徒紺反謂西國食狗宍人也入楞伽經第三卷樚櫨又作轆轤二形同力木力胡反即今用之汲水者也因榍又作𢰟同先結反江南言櫼子林反𢰟通語也第四卷打摑書或作馘同古麥反此亦假借耳第八卷又作同乎戒反説文菜也似罝𮊁古文二形同子邪反爾匹兔謂之罝注云罝遮也遮取兔也𮊁音古也機發説文射發也機主發之機也經文作䚨收繳具也尸陀林正言尸多婆那此名寒林其林幽邃而寒因以名也在王舍城側死人多送其中今捴指棄死之𠁅名尸陀林者取彼名也第九卷莨𦿆力盎反下徒盎反埤蒼毒草也經文作蓎非體也珂乳枯何反螺屬也潔白如雪經文作髂軻二形非也大遮𡰱乾子經第三卷蟲螟莫瓶反爾匹食苗心曰螟食葉曰言蟲啖禾所在之名也音徒得反第四卷銛利息廉反廣匹銛利也刀鋭為銛也纖長思廉反方言纖小也細謂之纖經文作韯非也𫁒曲烏華反廣雅窪下也説文窪小水也熠耀弋入辝立二反下餘灼餘照二反熠鮮明也字林熠光盛也耀照菩行方便境界神通變化經中卷茲基書中作羡似箭反此草如細荻北方多饒此草大般泥洹經第一卷哀慟徒貢反論語顏回孔子哭之慟馬融曰慟哀過也澡漱所霤反説文漱蕩口也經文作嗽誤也寮孔力雕反蒼頡篇寮小空也經文作遼遠之遼非體也豪古文作𥝕同無方反謂其纖利如禾也經文作釯非也第二卷羅寇口候反尚書寇賊姧冗范寧集解曰寇謂群行攻剽者也説文寇暴也廣匹寇鈔也剽音芳妙反祖送宗古反爾匹祖始也詩云仲山自出祖祖者將行犯軷之祭也軷音蒲達反長訣古穴反訣絶也通俗文與死者辝曰訣訣亦別也第三卷狖鼠余繡反似猴而大蒼黑色能捕鼠為物健墋濁初錦反通俗文云沙土入食中曰墋第四卷瞿師案中本起經云瞿師羅者此譯云美音攘臂而羊反攘除也謂除衣袂出臂也袂音世反𡩷默石經為古文燕同一見反説文𡩷安也謂安息貌也經文作嘻虛基反痛聲也嘻非此用第五卷堅凷今作塊同苦對反説文堅土也三蒼土塊也來又作兕二形同音似又徐姊反爾匹似牛一角青色重千斤者烏奚反炮者烏高反第六卷猛烈力折反説文烈火猛也廣匹烈熱也爛也𦬣藥無往反正言莽草有毒出幽州人或搗和食置水中魚皆死浮出取食之無妨大哀經第一卷開䦱字詁今作䦱同于彼反廣匹䦱開闢也三蒼䦱小開門也淟池他典反字林淟垢濁也第二卷憺怕徒濫反下普白反憺安也怕靜也經文作憛他紺反憛豫愁也又作潭徒南反潭深也二形並非字義第四卷祈際渠機反説文地圻咢也經文從水作沂魚衣反粗澀且孤反下古文歰今作澀同所及反歰者不滑也第五卷晧昊胡老反廣匹晧晧明也爾匹晧光也下胡老反天氣廣大也蟲蟻又作蟻同魚綺反蟻一名蚍蜉經文作䗁非也䗁音其蟻反第六卷汜流又作渢泛二形同孚劒反説文汜濫也謂普也吹笙所京反世本隋作笙説文笙也象物貫地而生也經文作笙非搵取烏悶反説文搵沒也亦入也謂以物入中日搵也詹堂之鹽反此香樹出廣州煎作之彼土人和水浴衣亦堪和香第七卷攄其敕於反攄舒也廣雅攄張也虛空藏經第四卷咼面口蛙反通俗文邪戾曰咼經文從口旁作喎非字體也櫨欂力胡反下蒲麥薄各二反説文欂櫨柱上枅也廣雅欂謂之枅枅柱上方木也一名㭼亦名音子結反亦名㭓亦名槉廣異名也㭓音皮變反槉音疾枅音雞第五卷輨轄古緩反下又作牽轄二形同胡反方言轄亦轄轄也轄謂軸頭鐵也經文作管非字體也旒幢字書作統同吕周反旌旗之垂車者也經文作𦃓非也第八卷矖婆力計反叶婆胡頰反經文從田作誤也多咩亡婢反經文作啼非也阿差末經第一卷浩晧字林工早反燒也亦水大也下胡老反日出光也第四卷麼麼莫可反三蒼麼微也亦細小也謂微細小蟲也經文有作耒耒非也竪籀文作竪同殖𢈔反小兒也謂悖小人也侏倀冝作譸張又作酬嚋侜三形同竹尢反譸張誑也謂相欺惑也經文作侏音朱侏儒也下倀敕良反倀狂也並非字體第五卷怛然他祖反説文怛安也廣匹坦平也經文作憻非也眷戀居院反眷反脣視也經文作慻非也芬葩普花反説文芬芳也葩華也聲類取其盛貌也大猷餘周反方言東齊謂猷曰道又亦圖也若也順也第七卷誘𮗼餘首反下私律反誘𮗼教也引也相勸也經文作憂恤之恤非此義也村渃又作落同力各反廣雅落居也人所聚居也無盡意經第二卷䫌面普米反説文䫌傾頭也經文作俾非體也第四卷勸又作同都木反爾匹正也謂御正之也方言理也察也寶女經上卷餱糧胡溝反字林餱乾飯也經文從米作糇非體也下卷鞠閔居六反鞠養也愛也告也閔音眉殞反閔傷痛也侁侁所鄰反説文侁侁往來行貌也亦行聲也嫺睒胡間反説文嫺雅謂淹靜也今並為間字菩淨行經上卷恂恂私遵反恂恂溫恭貌也廣匹恂恂敬也爾匹恂恂戰栗也巇嶮又作隵二形同許奇反案嶮巇顛危也經文作嶬非也無言童子經上卷亹亹亡匪反亹亹猶微微也亦進貌也下卷荏若又作集同而甚反柔木也廣匹荏荏弱也亦溫柔也下字冝作弱伅真陀羅所問經伅真徒損反字又作屯徒門反此譯云神人也王名如意生王也虞樂今作娛同疑區反娛亦樂也廣雅虞安也白虎通曰虞樂言天下之民皆有樂也無請且領反廣匹請求問也經文作倩非體也四竇徒鬪反水道也竇決也空也經文作𤅋𠏡𠏡聲類俗仙字同私延反詩云屢舞𠏡𠏡傳曰𠏡𠏡醉舞貌也經文作誤也衣裓孤得反即衣襟也經文作𮖀非也其此字習誤已久冝作分布二字謂以黃金分布間錯其間也自呼火胡反謂氣息出曰呼經文作㖟非字體也般遮旬或言五旬般遮此云五即五神通也唵錍烏答反下普迷反和鞮都奚反蚑多巨儀反婆妿古何反姐眵子也反下充支反印駐治具徵具二反謂授記也蒼頡篇印信也駐止也説文駐馬立也持世經第三卷骨幹字體作幹同古岸反廣匹幹謂之肋謂脅骨也幹體也亦骸骨也𪪺道廣顯三昧經第二卷蔚有於謂反文章也廣匹蔚數也文綵繁數也景風居影反八風中南方曰景風風動蟲生也第四卷力贔古文奰𢘍㚕三形今作𠢥同皮反説文贔壯大也謂作力怒也詩云不醉而怒曰贔輕驫文音徒答反又音風幽反廣匹驫驫走也阿耨達龍王經質疑之逸反廣匹質問也經文從言作𡂒非也撓滅火高反説文撓擾也謂撓攪也經文作芼非也邵德時曜反説文邵高也日昳徒結反謂曰反也黶然於簟反謂無聲也普超三昧經上卷無圻魚斤巨機二反菩名也經文從水作沂音魚衣反歆慕許金反詩云無然歆羡傳曰歆羡貪羡也國語民歆而得之賈逵曰歆貪也喟而又作㕟同口怪口愧二反説文喟大息也歎聲也鏗然又作鏗賴二形同口耕反廣匹軵軵堅正也大魃蒲末反忽又作倐跾二形同書育反急疾之貌也怵惕敕律反下又作惕同他狄反怵惕悚懼也不歆許金反字林神食氣也祭祀鬼神也皆享虛掌反享受也亦當也震懾聲類作㒤同止葉反廣雅懾懼也滅莫荒反遠貌也經文有作𣉪呼晃反精核又作核今作核同胡𮧓反説文考實事也亦審核之也三篋苦協反謂聲聞緣覺菩為三也未孚匹于反字林孚信也亦生也堂堂漢書項岱曰堂堂高大貌也無棼扶雲反龍王名也依字棼屋棟也下卷四植直吏反柱也三蒼戶旁柱日㨁植亦懸薄柱也阿闍世王經上卷阿俞翼珠反鳩遬蘇穀反皆比丘名也唵嗒烏感反下他答反仳低匹視反三昧名也依字仳別也仳倠醜面也倠音許唯反下卷之垛徒果反謂土榻也文云吳人以積土為垛也奔走古文奔今作奔同補門反疾走也釋名奔變也有急變奔赴也金鈚又作錍鎞二形同普啼反義名也等集衆德三昧經上卷慷慨正作愾二形同苦莾反下苦代反大息也一云壯士不得志也那羅延晉言鉤鎖力士也移都計反亦言維摩羅移晉言離垢大力士名也觀銓又作硂同七泉反銓謂銓量輕重也稱謂之銓車釭又作釭同古紅反説文釭謂車轂口鐵也凶悖又作凶同許恭反下古文悖愂二形同蒲沒補潰二反悖亂也亦逆也功績今作績同子歷反聲類云績亦功也及遆又作遞遆二形同徒禮反謂更易交遆也典誥古到反爾匹誥告也亦謹也所以約謹戒衆也勞來説文作敕同力代反漢書勞來不怠也亦約敕也經文作賜賚之賚非字體也或作徠非也邀迭又作徼同古堯反又於遙反邀要也呼召也亦求也下徒結反更代也中卷播殖又作譒掬三形同補佐反播種也經文作番非也集一切福德經中卷蠆他達反下勒達反廣雅蠆蚔毒也經文作蜇非字體也蚔音巨冝反廣博嚴淨不退轉輪經第二卷蹎蹶又作蹎二形同丁賢反下居月反蹎蹶猶䪺仆也仆音蒲北反佛説阿惟越致遮經上卷櫳疏力公反廣匹房櫳舍也説文房室曰疏疏亦窗也中卷訥其又作訥同奴骨反訥遲鈍也説文訥訒難也戰𩑣字體作顫又作𢥇同之見反下又作𤴨同有富反説文顫𩑣謂掉動不定也經文作痏音于䡄反瘡也痏非今用下卷𤑏煮古文𤐧二形又作同扶逼又方言𤐧火乾也説文以火乾肉曰𤐧經文作烳逋古反火行也烳非此義勝思惟梵天所問經第六卷多軼徒結反摩䶩竹皆反摩忂求俱反樗離敕於反垔婆於仁反婆系胡詣反潛婆所姧反思益梵天所問經第四卷麑旨迷反梯他計反緹他禮反堙婆於仁反麴鴩徒結反提詫敕嫁反持心梵天所問經第一卷番黨補單反字林云番部也謂番類也又作般假借也第三卷桴筏又作艀同扶流反謂編木者也小泭曰桴大者曰筏也第四卷徯徑又作蹊同胡雞反通俗文邪道曰徯步道曰徑經文有作溪徑末踟直知反揥敕詣反咿扶許伊反錍拔普迷反揭提渠謁反䁥偈女乙反度世經第三卷擾搣子公反下音滅捉頭曰㨑除毀曰搣經文作揔非也唾濺又作灒𠵖二形同子旦反説文水汙灑曰濺也第四卷驂駕忩叄反説文駕四馬也旁馬曰𩥵居右為𩥵乘者𬾨非常也經文作參非體也鴹案漢書食貨志此亦翔字音似羊反飛而不動曰翔翔徉也倣佯也經文從𮧓作鷊非也第五卷剛靳古昂反下居近反剛堅鞕也靳柔韌也募索謨故武句二反説文廣求為募句誄力水反第六卷騙象匹面反字略云躍上馬也經文作䮠誤也都較古文攉同古學反粗略也廣匹較明也亦比校也羈絆又作羇同居猗反革絡馬頭曰羇羇撿也下音半馬絆也漸𬾨經第一卷慺慺力俱反字書慺慺謹敬之貌也屋宇古文宇籕文作宇同于甫反説文屋邊簷也釋名宇羽也如鳥羽翼自䨱蔽也左傳失其宇注云於國則四垂為宇宇亦屋溜也居也眇眇亡紹反眇眇遠也亦深大也經文作妙非體也篡逆義患反説文逆而奪取曰字從某音私算聲算乘管反蒼頡篇自營為某弒君之法理無外聲故字從某第四卷惶又作同莫荒反遽也人晝夜作無日用月無月用火常思明故字從明或曰人思天曉故字從明也婉戀力反詩傳曰婉戀美好貌也亦少貌也第五卷勤懿乙利反美也十住經第一卷攏檻力東反下胡黯反廣匹攏牢也攬圈也圈音渠遠反如來興顯經第二卷丘垤徒結反方言楚郢以南蟻土謂之垤郢以井反鳴呦於州反詩云鹿鳴是也經文作非也第三卷沆莫朗反下胡朗反通俗文水廣大謂之漭沆賄賂力故反賂遺也謂以物相請謁也鶱翥許言反下之庶反説文鶱翥飛舉也掏出徒勞反通俗文捾出曰掏捾音烏活反羅摩伽經上卷波育由掬反經中多作育字或言劫貝高昌名㲲西阿於何反詩云傳曰曲陵曰阿阿謂山曲隈𠁅也菩本業經不僑奇驕反經中多作不驕樂天見𨚎丁禮反説文屬國舍也蒼頡篇云𨚎舍也亦通語也諸菩求佛本業經盡儩又作澌同斯漬反方言儩盡也物空盡也𫗙遺古文餽同渠愧反説文饋餉也遺與也因坘直飢反帝釋名也或言因提梨同一義也梵言輕重耳道神足無極變化經第四卷𡻬嶽仕角反下語角反寶如來三昧經上卷銚鐄以招反冝作焜煌胡本反下胡光反方言焜盛也蒼頡篇煌光也言焜焜熾盛也煌煌光明也經文作銚溫器名也鐄非此義下卷枝棭以石反言相似也經文從玉作玻𤥿非也四童子經上卷惋歎烏喚反字略云惋歎驚異也噢咿於六反下於祇反埤蒼噢咿內悲也亦痛念之聲也垂䫂丁可反廣匹䫂醜貌也經文從足作跢都賀反跢倒也跢非此用蚍蜉音毗浮爾匹蚍蜉大者蟻蟻有赤蟻飛蟻方等般泥洹經上卷拍臏又作臏同扶忍反説文膝骨曰臏三蒼膝蓋也面側救反謂不褶也經文作借字也量迹又作迹迹二形同子亦反足迹也經文作跤非也潺撗仕山仕環二反水流貌也字書潺湲流貌也輔弼扶禹反輔助也下又作弼三形同皮筆反弼正也下卷卑冝作廝𭜧移反字書廝伇也謂賤伇者也廝微也下也經文作音斯福也非此義嵩貔思隆反下又作豼同婢尸反國名也阿插義甲反佛名也經文從禾作𥠞應誤也羯鴨案諸經皆作鶡鴨胡割反下又作鵪同於甲反鶡似雉而大青色有毛角若鬪死乃止也故武人戴鶡冠以象之也經文作羯音居謁反羊也此應誤也哀泣經上卷器械核誡反漢書制器械之品應劭曰內盛曰器外盛曰械一曰有盛曰械無盛曰器器亦用也如踞居御反踞蹲也有箕踞也經文作倨非體也勤仂六翼反字書仂勤也今皆為力字慧上菩問大善㩲經上卷振于古文𢈫拒二形同諸胤反小爾匹振救也説文振舉也亦發也贍反聲類或作贍同時熖反贍助也字書贍足也謂周足也過闋三蒼古文作𨶫同苦穴反説文事已曰闋𨶫亦止息也終也雨霽子詣反通俗文雨止曰霽今南陽人呼雨止為霽殫盡多安反尚書乃殫文祖注云殫盡也縲紲力追反下息列反縲繫也紲索也所以拘罪人也蔭庇又作同於禁反下方利反蔭草覆也庇自蔽也摧拉或作摺同力答反廣匹摺折也説文拉敗也偕偕古骸反詩云與子偕老傳曰偕俱也偕偕亦強壯之貌也迄今虛乞反爾匹迄至也四錠音定又音殿聲類云有足曰錠無足曰鐙下卷半粒音立通俗文穀曰粒豆曰皂皂音逼經文作廩非也文殊師利現寶藏經上卷騏驥渠基反下又作驥同居致反説文馬有青驪文似棊也驥千里馬也孫陽所相者也赤驥也曲枝旨移反樹枝柯也經文作掖誤也中卷蠹蟲丁故反字林木中蟲也穿食人器物者也𤲶固又作嬲諸經作嬈同奴了反𤲶擾戲弄也𤲶惱也摩登伽經作擾蟲謂厭蠱也經中有作脣非體也蠱音古字林音故
