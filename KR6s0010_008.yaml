body:
  text: 翻經沙門玄應撰維摩詰所說經阿闍世王女阿述達菩經維摩詰經尊勝菩陁羅𡰱經奮迅王菩所問經第一義法勝經大㽵嚴法門經大威燈光仙人問經順㩲方便經龍施菩本起經樂瓔珞㽵嚴方便經菩睒子經大雲輪請雨經了本生死經大雲請雨經稻稈經大方等大雲請雨經無所希望經象腋經德護長者經一切法高王經月光童子經申日經佛遺曰摩𡰱寶經善思童子經胎藏經大方等頂王經無垢賢女經法鏡經无量門密持經郁伽長者所問經阿難目佉陁羅𡰱經郁伽羅越問菩行經无量門破魔陁羅𡰱經无量清淨平等覺經舍利弗陁羅𡰱經阿陁經一向出生菩經无量壽經前世三世轉經虛空孕經太子刷護經虛空藏菩經善法方便陁羅𡰱經虛空藏菩神呪經金剛秘密善門陁羅𡰱經勒成佛經華積陁羅𡰱經勒来時經華聚陁羅𡰱經無量壽佛經解節經藥師如来本願經放鉢經正恭敬經拔陂經離垢施女經孔雀王經無垢施菩分別應辯經兜沙經无畏德女經維摩詰所說經上卷維摩詰或言毗摩羅詰亦言鼻磨羅鷄利帝此譯云无垢稱稱者名稱也或為淨名者其義一也毗耶離或作毗舍離或言維耶離亦云鞞奢隸夜皆梵言訛轉也正言吠舍𨤲在恒河南中天笁界七百賢聖於中結集𠁅也菴羅或言菴婆羅果名也案此果花多而結子甚少其葉似柳而長一尺餘廣三指許果形似梨而底鈎曲彼國名為王樹謂在王城種之也經中生熟難知者即此也舊譯云奈應誤也正言菴沒羅此菴沒羅女持園施佛因以名焉昔猴為佛穿池鹿女見千子𠁅皆在園側也為護于俾于偽二反尒疋為作也為助也友而于久反廣疋友親也說文友同志也礼記僚友稱其悌執友稱其仁鄭玄注云僚友同官也執友同志也紹隆市遶反尒疋紹胤継也注云紹継道也胤継世也隆盛也多也魔怨梵言魔羅此云煞者是其位𠁅第六天主也論中𥼶断慧命故名為魔又常行放逸而自𡧱身故名魔言波旬者訛也正言波卑夜是其名也此云𢙣者常有𢙣意成就𢙣法成就𢙣慧故名波旬經中作魔波旬者存二音也踰於又作逾同庾俱反踰過也越也廣疋踰度也等觀古桓反說文觀諦視也又音古翫反觀謂觀望也二音通用舊維摩經作正觀菩是也山相先羊反彼此二邊曰相舊經云石摩王菩諸經中作山相薄菩其義一也長者案天笁國俗多以商估為業遊方履險不憚艱辛積嵗年必獲珍異上者奉王餘皆入己財盈一億德行又高便稱長者為王輔佐彼土數法万万為一億也稱無齒證反名稱也尒疋稱好也注云物稱人意美善好也稽首古文同苦礼反蒼頡篇云稽首䪺首也周礼大祝辯九拜一曰稽首鄭玄曰稽至也謂頭至地也首頭也書云禹拜稽首是也不譏居衣反廣疋譏㓨也譏問也說文譏誹也仁者而親反周礼六德一曰仁鄭玄曰愛人及物曰仁上下相親曰仁𥼶名仁者忍也好生𢙣煞善𢙣含忍也深殖時力反蒼頡篇殖種也廣雅殖積也畜也純淑時均反下時六反純謂精一也尒疋純大也方言純好也經文或作淳亦專一也淑時六反淑善也美也弈古文薄同補各反世本云烏曹作愽說文愽𡱈戲也六箸十二棊方言自關而東齊魯之閒皆謂圍棊為弈也諧耦胡皆反下吳口反尒疋諧恊和也耦會合也酒肆相利反肆陳也列也謂陳列酒器於市店也周礼司市掌以陳肆辯物鄭玄曰肆謂物𠁅也物物異肆也化政之盛反礼記孔子曰政者正也謂宣法教子養万姓也論語導之以政是也不怙胡古反尒疋怙恃也詩云元父何怙怙頼也無母何恃恃負也撮摩字林七活反廣疋撮持也𥼶名撮卒也謂暫卒取之也宴坐石經為古文燕字同一見反廣疋宴安也謂寂然安息㒵也里巷周礼五家為鄰五鄰為里謂二十五家也詩云无踰我里里居也𥼶名五鄰為里方居一里之中也珊闍蘇安反子名也經文有作刪所姧反𦙘子又作同竹尸反母名也芒然莫唐反案芒然冥昧不眀也舊經作然豁然古文奯賊二形同呼活反廣疋豁空也阿摩勒果正言菴磨羅果其葉似小棗果如胡桃味酸而甜可入藥分也勿擾如紹反說文擾煩也廣疋擾亂也從方自龍反相隨從也尒疋從重也郭𤩶曰隨從所以為重疊也掃灑所賈反通俗文以水撿塵曰灑謂以水灑散之也嬈固乃了反字林嬈擾也文嫽嬈戲弄也嬈煩也亦𢙉也文殊現寶藏經等作𤲶固字或作嬲音同嬈固堅也今冝作厭蠱之蠱字林音故又音古厭音於舟反謂伏合人心也尒疋蠱疑也謂疑惑人也摩登伽經作擾蠱言此魔作擾乱厭蠱也諸經有作䫃非體也蟲在皿中為蠱字意也蟲音直中反俛仰無辯反謂自強為之也說文俛此俗頫字謂仾頭也仰謂舉首也冥者莫莫定二反冥夜也幽闇也冥窈也維摩經中卷酬對古文醻三蒼作詶同時周反尒疋酬報也聖𣅀字體作恉諸視反說文恉意也廣雅恉志也致問徵吏反三蒼解詁云致至也到也病愈古文瘉同乳反方言差閒愈也說文瘉病瘳也包容補交反廣疋包裹也容受也黿鼉魚袁反三蒼似鼈而大也下徒多反三蒼似蛟而大山海經江水足鼉郭𤩶曰似蚸蜴大者長一丈有鱗彩可以為鼓詩云鼉鼓逢逢是也字體從黽從單省聲吸著古文歙噏二形同義及反廣疋吸飲也蹴蹋千六反下徒盍反謂以足逆蹋之曰蹴蹋踐也福祐古文佑𨳾二形同胡救反祐助也瞻蔔蒲北反正言瞻愽迦大論云此言黃花其樹高大花氣遠聞案西國多有此林故以喻也周窮古文賙同之由反謂以財物與人曰賙詩云靡人不賙傳曰賙救也將救其急也字林賙贍也訥䤜又作吶同奴骨反訥遅䤜也說文訥難也糞壤如掌反無塊曰壤壤亦土也變言之耳以人所耕為樹藝焉則言壤壤和緩之㒵也之疇直流反疇類也等也王逸注楚辝云二人為疋四人為疇疇猶伴侶也飢饉古文𩚮又作饑同几治反尒疋穀不熟為飢𬞞不熟為饉凡草菜可食者通名𬞞也憒亂公對反說文憒亂也𡗚也邑中周礼四井為邑鄭玄曰方二里也廣雅五里為邑十邑為鄉左傳凡邑有宗廟先君之主曰都无曰邑以祐胡救反祐福也尒疋祐厚也謂福厚也不肖先妙反廣疋肖似類也說文骨肉相似曰肖字從肉小聲今言不肖者不似也謂骨肉不似其先故曰不肖礼記其子不肖是也謂儜𢙣之類也維摩經下卷𢤱戾諸經有作籠同公反下三蒼作㑦同力計反很戾也謂很戾剛強也不訟似縱反論語未見能見其過而內自訟者包氏曰訟猶責也所圖案詔定古文官書圖二形同達胡反廣疋圖度也議也圖亦計也貳吒如至反經中或作阿迦𡰱沙詫或言𡰱師吒皆梵言輕重也正言阿迦抳瑟𢯯此言色究竟天也詫音𠡠嫁反抳女几反𢯯𠡠佳反維摩詰經上卷一名佛法普入法門三昧經柰氏新維摩經云菴羅樹園是也其果似梨仇怨渠牛反三蒼怨耦曰仇廣雅仇𢙣也編髮三蒼古文辯字同蒲典反蒼頡篇編交織也經中言螺髻者亦是也蚑行渠支反又音奇謂䖝行㒵也周書蚑行喘息是也怳忽虛往反謂虛妄見也亦无形不繫之辝也說文怳狂㒵也字又作呼晃反漢書音義曰忽眼亂也勗勉吁欲反下又作勱同靡辯反謂自勸勵也方言齊魯謂勉為勗滋說文勉強也適莫都狄反下謨各莫故二反謂无人无相也安適主適也亦敵也言敵疋也莫猶慕也言慕欲也𠕀然无往反謂不稱適也𠕀𠕀然無知意也亦惶遽之㒵也經文從心作近字也阿夷恬徒兼反梵言也此譯云新學亦言新發意也榮為眀反榮猶光華也亦光𠖥也幸也牛湩竹用都弄二反通俗文乳汁曰湩今江南亦呼乳為湩也淳淑視倫反謂專一不雜也下時六反詩云淑女傳曰淑美也亦善也妖蠱於驕反下聲類弋者反周易作冶冶容誨淫劉瓛曰冶妖冶也謂姿態之㒵也露枰皮平反廣疋榻也辱来又作𢛚同而属反辱耻也耻愧来相問也巢窟仕交反謂住止𠁅所也通俗文鳥居曰巢獸穴曰窟也蹶取居月反埤蒼以為蹶起也礼記子夏蹶然而起也謂急疾之㒵也捉㧙蒲畢反方言㧙推也南楚凡相推摶曰㧙廣雅㧙擊也下卷真人此即阿羅漢也或言阿羅訶經中或言應真或作應儀亦云无著果皆是一也溝港古項反字略云水分流也謂湏陁洹也此言入流或言至流亦言分布果今言溝港者取其義也沮教才與反三蒼沮漸也敗也詩云何日斯沮傳曰沮壞也奚得胡啼反蒼頡篇奚何也恱懌餘石反尒雅恱懌樂也謂意解之樂也貧寠瞿矩反三蒼无財俻礼曰寠詩云終寠且貧傳曰寠者无礼也字書寠空也芙蓉又作扶同附俱反說文扶渠花未發為蓞𧂄花已發者為芙蓉莖華胡𥝷反字林枝主也亦小枝也諸經皆作芙蓉莖華今經文作蘅胡稉反香草也尒疋云杜蘅如葵臭如蘪蕪馬食之蘅非今用埤濕補支反助也字冝作卑蒼頡篇卑下也洿田一胡反大曰潢小曰洿說文濁水不流池也三蒼停水曰洿夜光于寶搜神記隋侯行見大虵傷救而治之虵後銜珠以報徑寸純白而夜光可以燭堂也徒隸達胡反礼記八曰徒徒隸也下力計反隸猶附著也隸奴也賤也僕隸也驂駕忩含反說文駕三馬也旁馬曰驂居右為驂乘者俻非常也三蒼馬曰駕譸張又作詶嚋侜三形同竹尤反譸張誑也謂相欺惑者也未孚又作䞯同芳務反礼云无䞯往鄭玄注孚疾也廣疋䞯行也棚閣蒲萌反通俗文連閣曰棚棚亦閣也重屋複道者也荒見呼黃反荒忽也虛也謂荒忽虛妄見也亦迷亂也以仂里翼反字書仂勤也今皆為力字也惶荒胡光反下光讚經作慌呼晃反謂虛妄見也惶𢙢懅也慌慌忽也今經作荒案荒荒忽迷亂也其義是同漢書云忽荒冥漠无形也非摸莫奴反亦摹字也摸法也謂掩取象也䂓摸也恒戢側立反說文戢藏也亦𣫍也聚也奮迅王菩所問經上卷怖嚇呼駕反及吊来嚇菚云距人謂之嚇方言作𢙢䦧音呼激反聾瘂於假反瘂亦瘖也經文作痾烏歌反病也痾非字體大㽵嚴法門經上卷晡沙布胡反經中或作逋沙又作補沙亦作富樓沙皆訛也正言富盧沙此云士夫亦言丈夫剛橛渠月反尒疋橜謂之杙杙樴也樴音徒得反鶬鵠又作𩀞同唐反尒疋鶬麋鴰郭𤩶曰即鶬鵠也鵠音胡哭反唯又作唼同所甲反埤蒼聲類皆作唼鴨食也離騷云鳬鴈皆唼梁藻兮上林賦云唼𠿚菁藻皆是也字書𠿚也書亦作歃所洽反謂以口吸之也亦歃血也下卷䏣蟲字林千餘反通俗文肉中䖝謂之䏣經文從虫作蛆子餘反蝍蛆蜈蚣也又作疽㿈也下今或作䖝同除中反尒疋有足謂之蟲不鑒字書作鑑同古鑱反廣疋鑒炤也鑑謂之鏡所以察形也順㩲方便經上卷麼虫莫可反通俗文細小曰麼三蒼麼也經文作尛近字也樂瓔珞㽵嚴方便經十佉去伽反案十佉盧為一佉利十佉利為一車經文作𠳞非也大雲輪請雨經姞寐渠乙反庇利補寐反哹患芳流反碪薜猪全反下蒲計反忡忡𠡠中反糅波女救反大雲請雨經篋笥苦俠反下𦙃吏反盛衣器也𪐭咥烏奚香利反擗咥毗亦反攲去冝反挮淡他計反唵婆烏感反紗俱所加反伽𠲸女咸反抴餘世反而注反䰅之忍反羅韶市饒反𠜂珠所姧反目宂而勇反㕧利香伊反坘抵丁礼反苔浮徒来反琛琛耻林反泥娜乃可反大方等大雲請雨經磤聲又作殷二形同於近反通俗文雷聲曰磤埤蒼砏磤大聲也亦聲豊𥕤也砏音普巾反𥕤普頼反滋味古文孖稵二形同子夷反滋益也滋潤也經文從口作嗟也又作孳似思子思二反說文孳孳汲汲也或作孜方言東楚之間雙生謂之𨤲孳師郗𠡠𨤲反翳咥丑一反戰澿其錦反寒戰極也經文作噤非字體也瞫鞞徒感反羅薜蒲閇反枳利居𣅀反嘻梨虛基反經文作𮚿非也盧簁所猗反鞮歌都奚反德護長者經上卷漏泄思列反廣雅泄溢也泄漏也亦發也下卷門閫又作梱同苦本反三蒼禮記外言不於閫鄭玄曰閫門限也廡廊籕文作𢋑同亡禹反說文堂下周屋也廊亦屋也紇多胡沒反神名也毗挃知栗反皆神名也脂𨚗國名也或言震旦或云真丹皆一也此言漢國也此無正翻直神州之捴名也月光童子經已索所格反蒼頡解詁云索盡也又亦儩也翳日於計反廣疋翳障也方言翳覆也滔天土高反尚書浩浩滔天孔安國曰滔澷也言水盛大若澷天也鷙鳥脂利反猛鳥也廣疋鷙執也謂能執服眾鳥也鳥之勇𨦣者曰鷙鷹鸇之類也經文從虫作蟄除立反虫獸蟄藏也蟄非此用慴徒頰反尒疋慴懼也郭𤩶曰即𢙢懾也遁藏又作遯𨔵二形同徒䪺反廣疋遁避去也說文遁遷也隱也蠅蠛亡結反尒疋蠛蠓郭𤩶曰小虫似蜹風春雨磑者也稽字詰古文同苦礼反說文下首也三蒼稽首䪺首也頟也白𧆞通曰所以稽首何稽至也言頭至地首頭也周礼太祝辯九拜一曰稽首是也俾倪或作䫌倪兩字又作𢽛堄二形字林同普米反下五礼反俾倪傾側不正也淮南子云左䫌右倪是也叵我普我反謂搖動不安也經文從足作𧿽𨁟或從山作𡶅峨並非也相𭣙古文㲂楟三形今作朾同丈衡反謂𭣙觸也緹𢢔他礼反說文帛赤黃色也赤緹縓色也一染為縓縓淺絳色也縓音遷反赤𭪿古文𭪿今作𠲿同子累反廣疋𭪿口也字書𭪿鳥喙也經文作𭉨書無此字唯諸集有此字音徐兖反又云或作吮霍然呼郭反霍謂急疾之㒵也經文作𭟙誤也探道他含反尒雅探取也說文遠取曰探又音他闇反探試也申日經申日此云首寂无垠又作泿同五巾反垠㕺也說文地垠岸也拘耆或言居枳羅鳥此云好聲鳥經文作誤也鶡鴨胡葛反下又作鵪同於甲反鶡似雉而大青色有毛角闘死乃止洪炎借音以贍反正字作焰又作燄光焰也說文火燄燄然也亘然歌鄧反亘猶恒然也亘亦遍也善思童子經上卷搦拳又作𢾼同女卓女革二反搦捉也說文搦按也大方等頂王經屈奇衢物反異也淮南云屈奇之服許叔重曰屈𭔰也奇長也經文從玉作㻕琦二形非也法鏡經上卷聞物國謂舍衛國十二遊經云无物不有國正言室羅伐國此譯云聞者城舊云舍波堤城或言捨羅婆𢘡帝城皆訛也勝氏樹謂祇陁林或云祇洹並訛也正言逝多憍羅國波斯匿王之子也除饉渠鎮反舊經中或言除士除女亦言熏士熏女今言比丘比丘𡰱也案梵言比丘此云乞士即與除饉義同除六情飢断貪欲染也以善法熏修即言熏士熏女也多𢙣於各反過𢙣也所為不善也經文從人作或從草作𦷢並非也除剔又作同他歷反通俗文去骨曰剔今借音他計反汝迺奴改反尒雅云迺乃也亦乃字也說文迺往也聲類迺至也樂法五孝反愛欲曰樂經文從人作𭀅非也應儀或云應真舊本无著果亦云阿羅訶今皆阿羅漢同一義也昆弟又作晜同孤魂反說文周人謂兄為昆尒疋兄昆也又云昆後也注云謂兄後也此方俗異言耳磋切何反本作瑳論語骨曰切象曰瑳言骨切象磋以成器譬人學問以成德也下卷蟆子音莫蚊類而小山南多饒此物群飛蔽日齧人痕如手許者也𦘺腴𢈔俱反說文腴腹下𦘺也腴亦腹也猳𤣓古遐反下居縛反說文大母猴也似猴而大色蒼黑善𤣓持人好䫃䀎經文作㹢𤞙非字體也肬贅籕文作𪐤今亦作疣同有流反下之苪反小曰疣大曰贅廣疋肬腫也說文肬贅也㽵子附贅懸肬是也經文作肬腨二形非也玷丁簟反玷亦也經文作玦音古穴反玦非此義也墜久直淚反墜墮也經文作㑁久非也庶得尸預反庶猶也望得也經文從言作謶之若反非此用也郁伽長者所問經郁伽此譯云威德謿譁今作嘲同竹包反蒼頡篇啁調也譁冝作話胡快反廣疋話調也牽抴苦曰反說文牽引也下又作曳同餘世反抴引也財賄古文𧶅同呼罪反財貨也周礼通貨賄鄭玄曰金玉曰貨布帛曰賄躑躅又作蹢同丈赤反下又作䠱同丈足反字林駐足不進也廣疋躑躅踟躕也郁迦羅越問菩行經強項胡講反謂戾人項強難迴也无量清淨覺云強項愚癡人是也大品經作增上𢢔人其義一也麈鹿之乳反似鹿而大尾可以為拂也山海經云荊山多麈是也无量清淨平等覺經上卷寶珥如志反蒼頡篇珠在耳也耳璫垂珠者曰珥焜煌胡本反下胡光反方言焜煌盛㒵也煌亦明也征彸之盈反下之容反方言征彸惶遽也項很又作佷同胡墾反項很也很人強項難迴也下文作蒙蘢愚癡國語很違也謂違戾也字從艮聲青瘦又作㾪同所景反眚瘦也病也釋名云眚痟也病者痟瘦也經文作省非體也𮮈盡亡皮反案麋散也亦碎也𤸱樓烏合反菩名也依字病短氣曰𤸱也雷霆達頂達丁二反蒼頡篇礔礰也尒疋疾雷曰霆霓注云雷之急激者也下卷有鉉胡犬反鉉亦繫也戾亮力計反事譊女交反譊譊讙呼也廣疋譊鳴也說文譊譊恚訟聲也屏營卑營反謂惶遽也廣雅屏營征彸也稸氣字書作蓄同𠡠六反稸謂積也聚也經文從心作慉許六反慉起也慉非經意各勱莫芥反埤蒼勱強也勉也勤也尚書用勱相我國家是也經文或作勱狂今作尪同烏皇反尪弱也通俗文短小曰尪尪亦𮊵黑也盼親普幻反下力再反說文盼目白黑分也𩓋內視也經文作䀎亡見反邪視也下作睞力代反瞳子不正也睞非此用韋較古胡反下又作攉同音角𦍬較固也大也較亦專也專略其利也言官家大固取酒利也喫酒口迹反謂喫噉也經文作非字體魯扈胡古反謂自大也亦縱撗行也自縱恣也漢書音義曰扈謂跋扈也睢吁許佳反說文所目出也聲類睢矅大視也謂張目𠮧呼也㴳澒莫董反下胡動反无知也通俗文泥塗謂之㴳澒經文作蒙空非體也湔洒子田反下蘇礼反字林湔浣也洒濯也雍和又作邕同於恭反尒疋雍雍優優和也𣦢蹇必赤反下居免反𣦢不能行也蹇跛也𣦢從止也阿陁經上卷阿陁此言无量壽湏楓音風羅倪三計反軷陁蒲達反扈斯胡古反滑攱居毀反賔顀胡溝反陁遬蘇木反蒒耶所飢反雄傑奇揭反詩云邦之傑兮傳曰傑特立也亦才能也智出千人曰傑英傑也牚柱恥孟反今謂邪柱曰牚也苕苕徒彫反苕苕亭㒵也亦遠也苕𨘬也下卷祝祝之育反祝祝猶專專也𧩟調痛反下徒痛反通俗文言過謂之𧩟詷文云𧩟詷急也蔡𮜨下倉𣗥反无量壽經上卷微瀾洛安反尒雅大波為瀾小波為淪享茲虛掌反享當也亦受也經文作嚮非體也煜𤓝由鞠反下弋斫反說文煜煜耀也𤓝火光也經文作昱爍非字體也該羅古来反該俻也方言該咸也吞土痕反又音天吞咽也下時制反齧也亦食也正作噬酖酒又作媅妉耽三形同都含反說文媅樂也亦嗜也糾舉居黝反糺正也糺察異之㒵也攝也舉也潢瀁胡廣反下以掌反楚辞潢瀁猶浩蕩也經文作滉虛空孕經上卷空孕古文同翼證反依字含實曰孕孕姪子也廣疋孕㑗也礓石居良反形如薑也通俗文地多小石謂之礓礫寶線古文綫同私賤反謂縫衣縷也為繐又作𦄑𦇀二形同思叡反說文蜀白細布也凡布細而䟽者謂之繐犀牛先奚反尒雅犀似豕三角好食𣗥也城隍胡光反三蒼城下坑無水曰隍下卷背大又作偝同蒲賚反相違背也謂棄捨相反也廣疋背北也後也經文從人作偝非也虛空藏菩經澄霽祖計反說文雨止曰霽霽晴也毦帶如志反通俗文毛飾曰毦如刀鞘飾也踣鈐蒲北反下巨炎反敺漏於厚反諾踦居綺反䫂隸都我反虛空藏菩神呪經皤蒲何補何二反依字皤白也𠺕牟勒成佛經泯然忍反字林泯然盡也廣疋泯絕滅也狼跡山案梵本言屈吒播陁山此云雞足山又云尊足山今迦葉居中者在菩提樹東也鷹鶻胡骨反亦鷹類也勒来時經倪鏠魚礼反下力底反鏠疋逢反龍名也汜羅敷劒反城名也无量壽佛經阿閦鞞又六反亦云何閦婆此譯云不動藥師本願經紕繆疋毗反下亡幼反礼記一物紕謬注云紕猶錯也謬猶亂也誤也經文從系作繆借字也方懲直陵反詩云寧莫之懲傳曰懲止也又革也案改革前失曰懲也正恭敬經蹀足徒篋反聲類云蹀躡也廣疋蹀蹋蹈也踔足丑白丑卓二反踸踔行脚長短也廣雅踸踔無常也離垢施女經邠耨文陁弗邠音甫貧反或言分耨文陁𡰱或言富那𭦟陁弗多羅此譯云滿嚴飾女子又言滿見子也笳竽或作葭同古遐反謂卷笳葉吹之者也因以名焉下禹俱反古史𦒱曰女媧作簧其後隋作竿三十六管无垢施菩分別應辯經沸星或云佛星或作孛星或言弗沙星皆音字訛也正音富沙依諸經云如来成道出家皆用二月八日鬼宿合時依日藏分經二月九日曙夜分属九日故也无畏德女經𦳈麻又作蓖同布迷反三蒼𦳈草也其生似樹者也阿闍世王女阿術達菩經五旬或言般遮旬般遮此譯云五即五神通也因堤都犁反菩名也䗍越力西反經中或言離越同一義也干蔗經文又作竿柘同諸夜反通俗文荊州竽蔗或言甘柘一物也蠱狐餘者反說文孤妭獸鬼所乘有三德其色中和小前大後死必首丘尊勝菩陁羅𡰱經泜曇之氏反目𨀣丘鼓反伽濘奴定反阿齒塩反阿𠹛殊㗧乃結反𠯋欣烏礼反娑攡力斯反阿𨆁又作圢同他反第一義法勝經成擔都濫反言蓬亂可擔揭也富特伽耶或名富伽羅或言福伽羅皆訛也正言補特伽羅此言數取趣大威燈光仙人問經瓶罐又作灌二形同古亂反汲器也葦町徒頂反湏町也說文田𠁅曰町蒼頡篇町田區也字愜苦頰反依字廣雅愜可之也字林愜快也龍施菩本起經嚶嚶烏耕反謂兩鳥鳴也尒疋丁丁嚶嚶相切直也悢悢力尚反廣疋悢悲也謂悢悢然愁悲也縷陳力主反絲縷也言數如絲縷多難陳也經文作屢非體也菩睒子經麋鹿亡悲反蒼頡篇云以冬至解角者說文鹿属也徬徨蒱光反下胡光反徬徨徘徊也埤蒼俳佪彷徉轉相𥼶也磼礏五合五闔二反埤蒼磼礏高㒵也磼音才合反經文作儼非也了本生死經苦懣古文同莫本反說文懣煩也蒼頶篇懣悶也亦憤也嘗啖又作噉同徒敢徒濫二反喫啖也箭笮側格反稻稈經生穗又作采同辝反說文禾成秀人所牧者也无所希望經𠻄如又作慌呼晃反漢書音義慌忽冥漠无形也不可測量之意也象腋經瞢伽莫𡶤反經文作非也摩仇渠牛反經文從口作㕤非也一切法高王經強伽舊名恒河是也亦名殑伽從阿耨大池東面象口流出入東海其沙細與水同流也坘三蒼音都奚反謂大身魚也其類有四種此㝡小者㸦相吞食也經文從魚作𩸹非也佛遺曰摩𡰱寶經儌又作僥說文從心作憿同古堯反僥希也遇也幸也天晴又作暒殅二形同徐盈反聲類雨止也經文作𩄆非體也蠹虫丁故反說文木中䖝也如白魚等食人物穿壞者也譁名呼𠂢反譁讙譁也蒼頡解詁云譁言語譊譊也䛕訑以珠反不擇是非謂之䛕下大可反文云兖州人以相欺為訑又音湯和反訑避也僻易疋尺反僻避也亦邪僻也胎藏經輟草張衛陟劣二反輟止也尒雅輟已也蚯蚓音丘引即曲蟺也亦名蜜蟺亦名寒蚓蟺音善無垢賢女經椑樓臂反長者婦名也胎藏經作捍疑字誤也无量門密持經放泆餘質反說文水所蕩泆也經文多作逸饒裕古文𫋴同榆句反神名也阿難目佉陁羅𡰱經阿攱居毀反羅捭譬反嘻羅香菳反楬棧仕簡反癉都餓反无量門破魔陁羅𡰱經䔮鞞所冝反昵闍女乙反頞抶𠡠乙反𨚗眵齒移反劬都計反經文作非也舍利弗陁羅𡰱經麂底居雉反陁弭亡婢反舸字古我反一向出生菩經阿膻又作同徒亶反啅帝丑角反𣑭子又白反前世三轉經无瘢薄寒反蒼頡篇瘢痕也經文作非字體也妊娠書隣之刃二反詩云大妊有娠傳曰娠動也謂懷胎孕名也身餒奴罪反論語餒在其中餒餓也又音於偽反謂以食散與鳥狩也餬口又作𩚩同戶姑反言寄食也江淮之閒謂寓食為餬尒雅餬饘也注云即麋也太子刷護經蠉飛又作翾同呼泉反飛㒵也橐駝又作馲同力各反又音託知水泉所出性別水脉掊地則水出也善法方便陁羅𡰱經誃直移反摩系胡計反金秘密善門陁羅𡰱經波泜直飢反桎致之逸反華積陁羅𡰱經侔𡰱莫侯反𭜧𠡠紙反訶於計反訶邐力尒反經文麗非也胵底上尢尸反奓竹加反下奴礼反沙挐女居反華聚陁羅𡰱經羅和胡戈反經文作唎非也𭈇帝虛几反咥挐𠡠一反解節經傷佉經中或作蠰佉又作儴佉正言勝佉此譯云貝辛辢力達反通俗文辛甚曰辢經文作剌非體也放鉢經𢜪頭又作惹同而者而斫二反佛剎名也依字方言惹語亂也粘惹也拔陂經拔陂蒱達反下彼皮反迦簍力主反皆菩名也拘暹私廉反國名也依字暹進取也謾淪麼諫反下力均反菩名也依字謾欺也淪沒也經文有作論盧昆反如𤞜又作狉豾二形同房悲反郭𤩶注尒雅貍狉狸也如景居影反光景也几陰景者因光而生故即謂為景葛洪作字苑始加彡作影常掔苦閑反尒疋云掔固也牢固之㒵也亦牽也擊也不跌徒結反通俗文失躡曰跌廣雅跌差也不宥于救反宥寬也周礼三宥一宥不識二宥過失三宥遺忘也相蹡又作𨄚同七羊反三蒼敬也容止皃也蹡動也孔雀王呪經掘土渠勿反說文掘搰也廣雅掘穿也經文作𣔭誤也兜沙經此譯云行業經周帀祖合反說文帀周也廣雅帀遍也字從倒出而帀也春生出地秋死入地還至本𠁅故曰帀或作匝近字也我曹又作同在勞反史記十餘曹偱如淳曰曹軰也儨提捨洹𨚗儨音質上方佛𠛴名也俱譚滑提徒南反諸佛名也經文作䜖𤸱天烏合反此言有光壽天是第二禪中初天也亦名少光天以光少故也𤸱波摩𨚗此言無量光天即第二禪中第二天也以前光明轉勝轉妙故也經中有作阿波摩𨚗天是也湏㿃音帝經中或作湏帶音同帝又徒計反中陰經作湏滯樓炭經作湏啑音帝皆梵言輕重也正言湏達梨舍那此云善觀天又言善見天定障漸見極明徹故名善觀也經文從無從足作𨅐舊音武非也軷陁蒲達反此云賢或云善是王舍城在家菩也大乘律單本優婆塞戒經佛藏經大方廣三戒經寶梁經梵經菩藏經法律三昧經菩內戒經淨業障經文殊淨律經重譯優婆塞戒經第四卷犁耨說文又作鎒同乃𠋫反除田器也𥼶名鎒似鋤薅耨禾也薅音火高反䫌靣普米反說文傾頭也蒼頡篇不正也廣雅䫌邪也淮南子云左䫌右倪是也自鍾止容反文鍾聚也共䞈又作𧵥同紀髲反廣雅䞈賭也耳鉋蒲貌反書无此字冝作掊抱捊三形同蒲交反今言掊刮也手曰掊江南音平溝反又平孝反第六卷長攡又作籬柂二形同力支反通俗文柴垣曰籬也鞭撻比反以革朴罪人者也下又作同他達反撻笞也以荊捶之曰撻經文從革作韃非也押頟又作笚同音甲押束也押籬押物皆作押字從手慲莫蘭反說文忘滿兜也佛藏經第一卷糟粕籕文作醩同子勞反不沛酒也下普各反酒滓也𥂖糟曰粕也大方廣三戒經上卷羱𦍞廣志作𦍘同語園五桓二反字林野羊也其角堪為鞍月小榼也出西方似吳羊而大角也角重於宍呼為羱𦍞下丁迷反牡羊也三歲曰𦍞也拘枳居紙反或名拘翅此或作瞿翅羅譯云鵶鷗鳥也烏雉古文𨿝同直里反經文作鴩餘詰徒結二反尒疋鴩鋪䜴也下卷蝗虫胡光胡孟二反毛詩䖝魚䟽云阜螽蝗也今人謂蝗子為螽子魚子化作張斐解晉律云小曰蝩大曰蝗也漆柈又作古文作鎜籕文作同蒲寒反圜器也鼓㰆又作𩏄排二形同蒲戒反謂鍜家用炊火者也寶梁經上卷逋生補胡反冝作穭力舉反謂田中不種自生禾豆者為穭生也釘磔竹格反說文磔張也開也經文作㭦俗字也下卷綻壞又作袒䘺二形同徒莧反說文綻補縫也梵經下卷茖䓗古額反尒疋茖山䓗注云茖一名山䓗并州以北多饒茖䓗也經文作革非體也𭷻狸古文蜼字林餘繡反江東名也又音餘季反建平名也似猴而大黑色江東養之捕鼠為物捷健也鑱㓨仕衫反廣疋鑱謂之鈹謂針㓨也說文鑱𨦣也經文作𠠤断也菩藏經十坩口甘反坩器也可以盛貯者也法律三昧經迂遠禹俱一禹二反迂避也亦遠也大也諀訿匹尒反下資尒反通俗文難可謂之諀訿經文作啤此聚蹙子六反蹙迫促也廣疋蹙急也經文作踧踖之跗非體也菩內戒經和闍或言和上皆訛也或言郁波弟耶夜亦言鄔波拕耶此譯云近誦近亦逐也小也以其年小不離於師常近受經而誦也亦言親教師也阿祇利或言阿闍梨皆訛也正言阿遮利耶或作夜此譯云正行或言䡄範師也著葌又作菅同古顏反說文葌香草也葌蘭也迦庇必利反謂如来名号功德也馭法又作御同魚據反言馭者所以驅之也內之於善也謂指撝使馬也淨業障經殞命又作隕同為愍反聲類殞沒也亦墜落也鼻揉古文粈䏔二形同女救反菩名也大乘律重譯文殊淨律經犇走古文𩦥今作奔同補門反奔走也燔燎又作㸋同扶袁反加火曰燔燔亦燒也下力吊反說文放火也又火田為燎放火也廣疋燎乾也怯愞又作㹤同祛業反多畏劣也下奴課反三蒼愞弱也乙巳歲高麗國大藏都監奉𠡠雕造
