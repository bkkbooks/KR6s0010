body:
  text: 沙門玄應撰大智度論第一卷莫候反三蒼換易也謂交易物為也幻術侯辦反説文幻相詐惑也案幻謂相欺眩以亂人目也術法也術亦道藝也又邑中大道名術術道四通今術亦爾無所不通也唐勞字詁古文舐𠴭三形同徒當反案唐徒也徒空也爾雅勞勤也勞力極也嬰咳於盈反嬰猶婜婗也蒼頡篇女曰嬰男曰兒釋名曰胸前曰嬰投之嬰前以乳養之故曰嬰兒咳古文孩同胡來反説文咳小兒笑也咳稚小也禮記世子生三月父執子之手咳而名之是也論文有從女作姟字林古才反姟大數也姟非此用嫕音烏奚反婗五奚反乳哺蒲路反哺含食也淮南子云含哺而許附重曰口中嚼食也今亦作餔嵐毗力含反或云流𡰱此譯云解脫𠁅名滅亦名斷嬉戲又作僖同虛之反説文僖樂也蒼頡篇嬉戲笑也爾匹戲譃也郭𤩶曰調戲也服御扶福反説文服用也爾匹服整也服御令齊整也御古文馭同魚據反廣匹御進也侍也蔡雍獨斷曰凡衣服加於身飲食入於口妃妾接於寢皆曰御御之所親愛則曰幸也唐突字體作搪揬二形同徒郎下徒骨反廣雅觸𭥗搪衝揬也字書揬揩也蹴踏千六反下徒盍反謂以足逆踏之曰蹴第二卷不倚於蟻反廣雅倚因也謂因物而依倚也又音渠蟻反謂倚立也汝曹又作曹同自勞反史記十餘曹循之如淳曰曹輩也詩云乃告其曹傳曰曹羣也師保古文賲𠍂三形同補道反禮記出則有保入則有師保安也謂以道安人也保守也説文保養也詭名俱毀反謂變詐也偶得吾苟反爾匹偶遇也郭𤩶曰偶爾相值也掣電充世反掣電陰陽激耀也驟墮仕救反國語驟救傾危以時賈逵曰驟疾也號咷徒勞反案號咷大泣也剖裂普厚反案剖猶破也蒼頡篇剖坼也彗星蘇醉囚芮二反妖星也言星光似掃彗也噢咿乙六於祁反埤蒼噢咿內悲也謂痛念之聲也論文作郁郁二形非體也溪谷苦奚古木反爾匹水注川曰溪通川者曰谷四疊徒頰反蒼頡篇疊重也積也論文又作褻音同疊説文重衣也二形隨作渾濁後昆後𫋴二反渾亂也説文渾汙也牛齝又作齝三蒼作齝詩傳作呞同丑之反韻集音式之反爾匹牛曰齝郭𤩶曰食已復出嚼之也廓然口郭反廣匹廓空也方言張小使大謂之廓毃門又作敲蒼頡篇作同苦交反擊也撗撾也第三卷蛇欶又作嗽同山角反通俗文舍吸曰嗽經文作嗾俗字也鞞侈陛奚昌是反秦言明行足伽又作憊𢞎二形同蒲戒反此言世間解舍喃正體作喃同女函反譯云人也黑黶於簟反謂面黑子也論文作黯於感反循環似均反謂旋繞往來也亦巡也遍也蕃息輔袁反蕃滋也謂滋多也息塞也言物滋息塞滿也刮刷又作刷同所劣反説刷拭也廣匹刷刮也罄竭古文罄同可定反説文器中空也爾匹罄盡也第四卷晡時補胡反淮南云曰行至于悲谷為晡時謂加申時也扣開祛後反廣匹扣舉也扣擊也植樹又作植同時職反植猶根生之屬也勞擾如紹反説文擾煩也廣匹擾亂也第五卷抒大除呂時汝二反説文抒挹也挹酌也廣匹抒泄也通俗文汲出謂之抒也內戚又作戚同且的反廣匹戚近也詩傳曰相親也扳稱又作攀𭷾二形同普姦布姦二反字林扳引也釋名云攀翻也連翻上及之言也五皰蒲孝反論文作皰疱二形未見所出也眼睫又作睫釋名作睫同子葉反説文目旁毛也幄猗角反幄謂大帳也小爾匹云覆帳謂之幄幄幕也跳小又作趠同他吊反謂跳躑也論文作踔敕格敕角二反跛者行踸踔也踔非論旨賈人公戶反坐賣也白虎通曰賈之言固也固物待民來以求其利也第六卷呵膢古文樓同力侯反依字三蒼八月祭名也忮羅之豉反依字詩傳云忮害也説文忮恨也訥口又作訥同奴骨反訥遲鈍也説文訥難也怨仇渠牛反怨偶曰仇爾匹仇讎匹也怨之匹也不槩古文扢同該礙反字林工內反謂平斗斛者也第七卷縹色匹繞反謂天縹也如帛之青白色也陰曀古文㙪同於計反釋名云曀翳也言雲氣暗翳曰光使不眀也齗齒牛斤反蒼頡篇齒根也説文齒肉也火㷮子勞反説文㷮燋也蒼頡篇燒木餘也手捫莫昆莫本二反聲類捫摸也字林撫持也蹈躤徒到自亦反廣匹蹈行也字書躤踐也第八卷伯仲謂兄弟也爾匹伯長也伯位之長也韓詩仲中也言位在中也禮記幼名冠字五十為伯仲周道𦋺那居例反秦言寶積經本或作刾那力達反第九卷龍蟠蒲寒反禮記而蟠于地蟠委也廣匹蟠曲也狂古文匆二形今作狷同俱面反狂者進取於善道者守節無為也潘澱蒼頡篇作𤃃同敷袁反江北名泔江南名潘澱古文同徒見反澱滓也江東呼為垽論文作淀水在新陽又如而淺亦曰淀淀非此義垽音魚靳反淀音殿長跽古文踑同奇几其矣二反説文跽長跪也釋名云跽忌也見所敬忌不敢自安也第十卷氐宿丁計都禮二反爾雅天根氐也角亢下繫於氐若木之有根也宿口携反爾匹降婁婁也白𮓜宿也觜宿子移反爾雅娵觜之口營室東壁也四星方似口因以為名也髑髏古文髑髏二形同徒木力侯反頭骨也襤褸古文懢又作同力甘反襤褸謂衣敗也論文作藍染草也藍非今義象廄古文二形同居宥反説文馬舍也釋名云廄鳩聚也牛馬之所聚也周禮云馬二百一十四匹為廄逸馬古文軼同余質反廣匹逸走去也奔逸也縱也捶壓又作磓同丁回反謂投下也壓於甲反自上加下也論文多作庘通俗文物欲壞曰庘㢒庘非此義㢒音仕加反考掠古文二形同力尚反蒼頡篇掠問也謂搒捶治人也戶排蒲皆反謂木鑰開戶者也如戶鈎等也揵坘直飢都犂二反譯言續親親且鄰反禮記親親以三為五以五為九蒼頡篇親愛也近也倓然徒闞反蒼頡篇倓恬也説文倓安也廣匹倓靜也謂倓然無為也黜而今作絀同敕律反黜放也廣雅黜去也退也以肅思六反肅嚴也謂嚴急之言也肅也戒敕也御寒古文敨同魚舉反廣匹禦止也當也爾匹禦圉禁也未有而豫防之也論文或作御毛詩亦以御冬傳曰禦禦也二形隨用草芥歌邁反草也漢書俯手拾芥是也第十一卷營從古文覮同伇瓊反蒼頡篇營衛也亦部也朝宗周禮春見曰朝夏見曰宗鄭玄曰諸侯見天子之文朝猶朝也欲其來之早也宗猶尊也能劈補革反説文劈裂也廣足劈分也論文作躃補赤反躃跛也又作僻匹尺反僻邪也二形並非此用第十二卷贈遺余季反廣雅遺也謂以玩好送人曰贈雅遺也悠遠弋周反悠長也爾雅悠遐也行之遠也疽瘡且余反説文疽久癰也第十三卷姞利渠帙反龍名也依字南燕姓也豪爽所兩反方言爽猛也廣匹爽眀也字從大大人必照眀故從大也繾綣祛善祛阮反猶緾綿不離散也憮然莫禹反三蒼失意貌也怪愕之辝也論語夫子憮然何晏曰為其不達己意而非之也漢書憮然韋昭曰意未言也鐵鐷余攝反説文齊謂鏶為鍱鏶音集也僶俯亡忍無辨反謂自強力也強為之妻汝且計反謂以女妻人曰妻論語以其子妻之是也毫𣮖古文犛綵二形今作同力之反漢書律曆志云不失毫犛孟康注云毫菟毫也十毫曰犛三蒼犛毛也論文作犛亦古字通用也適無都歷反謂主適也善府夫禹反説文府藏也三蒼府文書財物藏也風俗通府聚也公卿牧守文書財賄之所聚也翕響呼及反翕響揮霍謂奄忽之間也夷滅以之反廣匹夷滅也夷毀也委物紆詭反周禮少曰委多曰積是也謂積聚也輕泆今作溢同一反水所蕩泆也豪傑古文𠢕同胡高反可奇哲反淮南子云智出百人謂之豪十人謂之傑案豪猶俊也亦才能也論文作桀雞拪於杙為桀非此義第十四卷募人謨故武句二反説文廣求也蒼頡篇問求也控告枯洞反詩傳曰控引也韓詩控赴也賙救今作周同之由反周禮五黨為周使之相賙鄭玄曰賙調禮物不備相給足也詩傳曰賙救也將救其急也艇舟徒頂反釋名云二百斛已曰艇安措且故反字林措置也施也論文作曆且各反説文曆厲石也自替吐麗反爾匹替廢也李巡曰替去之廢也剛愎扶逼反左傳愎諫違卜愎戾也又曰強愎不仁愎恨也第十五卷勉勵靡辨反説文勉強也下吕制反謂自勸勵洋銅以涼反謂煮之消爛洋洋然也三蒼洋大水貌也爾雅洋溢也洋溢衆多也避隈避去也於回反説文一由反水曲隩也隱蔽之𠁅也論文偎烏回反愛也偎非此義幾失渠衣反幾近也言近失而不失也蜫蟲古文䖵同古魂反禮記蜫蟲未蟄鄭玄曰蜫眀也眀蟲者陽而生陰而藏者也夏小正曰蜫小蟲也蜫魂也魂魂然小蟲動也穿窬欲朱反三蒼云窬門邊小竇也説文門旁穿木戶也又音徒搆反禮記蓽門圭竇鄭玄曰竇門旁窬也穿牆為之其形如圭是也論文作踰越也度也踰非字體淫佚一反廣匹佚樂也蒼頡篇佚蕩也不睦又作穆同亡竹莫祿二反睦和也睦敬也邪僻匹尺僻邪也案僻者謂為事邪枉不中理也恍忽古文二形同呼晃反忽忘也宗族子同反所承也字林宗尊也亦主也廣匹宗本也楚辝同姓曰宗族藂祿反族類也周禮四閭為族鄭玄曰百家也第十六卷斐亹孚尾亡匪反如有也傳曰斐文貌也亹亹猶也卒無子律反爾匹𣨛終也病之終也事之已也恬淡徒兼徒濫反方言恬靜也廣匹淡安也呿提又作呿同丘庶反秦言虛空也則或作蹶同巨月居月二反説文僵却偃也廣雅敗也論文作蹶古文躗同居衛居月二反爾匹蹶動也案蹶驚駭急疾之意也蹶非此用間開謂崎嶇辛苦得達之貌也又亦設置也惈敢古禍反廣匹勇也蒼頡篇惈憨也煞為惈爾匹惈勝也惈決之勝也今亦作果憨音胡濫反第十七卷秋穫胡郭反説文穫𠚫禾也草曰𠚫穀曰穫也嫈嫇字林乙莖茫莖反心態也亦細視也論文作𥌽盲未見所出黃髯如廉反髯頰毛也論文有作髮字也叱之齒逸反蒼頡篇叱呵也逡巡且旬反爾匹逡退也郭𤩶曰逡巡却退也煜爚由掬弋灼反説文煜光耀也爚火光也廣匹煜熾也埤蒼煜盛貌論文作昱曰眀也爍式灼反字鑠同銷鑠也並非此義桎梏之實公篤反在手曰桎在足曰梏也填積古文填同徒堅反填滿也廣匹填塞也即厭於舟反字苑眠內不祥也山東音於業反𤑏煮古文𤐧二形同扶逼反方言𤑏火乾也關西隴以往謂之𤑏第十八卷著圂胡困反説文圂廁也蒼頡篇豕所居也字從口豕在其中也字意也論文作溷溷濁也亂也懸繩論文多作鉉胡犬反舉鼎也鉉非此用繩未見所出能決胡玦反説文下流也又穿決也燒烙力各反謂燒煮物著之也論文作爍式灼反銷也爍非字義雞鶩莫族反爾匹舒鳬鶩即鴨也野曰鳬家曰鶩一名舒鳬在野翼舒飛遠為鳬𭪿距今作觜同子纍反廣雅𭪿口也字書鳥也或作觜論文作𭉨撿諸經史無如此字唯傅𣪴七激云𭉨埴飲泉作此字音徐耎反𭉨非字義距古文詎岠二形同居吕渠吕二反説文雞足距也蚑蜂巨儀反通俗文矜求謂之蚑蛷也關西呼溲為蚑蛷音求溲所誅反聲類云多足蟲也鵂鶩許牛反爾匹怪鴟一名鵂鶹南陽鉤鵒㹢玃字體作或作猳同音加下居縛居碧二反爾匹玃父善𮨇郭璞曰猳玃也似猴而大色蒼黑善攫持人好𮨇䀎也古今注云猿五百嵗化為玃也抱朴子云猴八百嵗化為玃玃壽千嵗是也叨餮古文叨叨二形同他高反餮正字作飻同他結反説文貪也左傳縉雲氏有不才子貪于飲食𭥗於貨賄𣫍積不知紀極天下人民謂之叨餮杜預曰貪財曰叨貪食曰飻也眼陷陷沒也案陷猶墜入也論文作𥇌此應近字也蕩滌古文同徒朗反下徒歷反蕩滌謂灑器也鐵丳字苑初眼反今之𬉹肉丳字也論文作鏟鏟削也𭍲裂撿諸字書無如此字案字義冝作攫居碧九縛二反説文爪持也攫摶也度古文二形同補耕反拼謂振繩墨也摶截徒官反説文摶團也字林作剸論文作揣初委都果二反量也度也揣非旨六駮補角反爾匹駮如馬倨牙食虎豹駮多力狩也山海經云曲山有狩狀如馬白身黑首一角瓜音如鼓其名駮食虎豹可以禦兵詩云隰有六駮是也魏黃初三年六駮再見於野咬齧又作咬同五狡反説文咬齧骨也廣匹咬齧也䶩掣又作同竹皆反通俗文齧挽曰䶩廣匹齧也轢諸力各力的二反蒼頡篇轢輾也説文車所踐也如笮側挌反案笮猶壓也今謂以槽笮出汁也蹂場古文厹同仁求仁柳二反通俗文踐穀曰蹂蒼頡篇蹂踐也熟躡也赭色之野反三蒼赭赤土也烹肉普羹反烹煮也方言烹熟也嵩嶽以南陳𩓙之間曰烹儀禮凡煮於鑊中曰烹於鼎曰外燂䐗聲類作燂燖二形字詁古文鬻二形今作同詳廉反通俗文以湯去毛曰鬻論文作爓案説文諸詮之蜀都賦音皆余瞻反又羊占反説文爓火爓爓也爓非今義磔牛古文厇同知格反廣雅磔張也磔開也論文作挓未見所出猛𣪴牛既反尚書尚迪果𣪴孔安國曰煞敵為果致果為𣪴一曰有決也鐵杙佘職反爾雅𢴧謂之杙杙橛也論文有作鐵稜傳寫誤也𢴧徒得反踼突今作逖同徒郎反説文搶也蒼頡篇驅馳貌也亦失迹也聲類踼跌也案字冝作搪揬二形銅撅巨月反説文橛杙也論文作鐝通俗文云磨齊曰鐝鐝非今義發撤除列反廣匹撤壞也亦去也撤除也噤戰古文吟同渠飲反閇口不開為噤也浹泄下甲丈甲反浹泄謂水凍相著也論文作㳌非體也搒抬薄衡反下又作笞同丑之反搒捶也笞擊也忌憚渠記反廣雅忌恐畏也説文忌增𢙣也憚徒旦反憚難也蔚茂於胃反蒼頡篇草木盛貌也論文或作鬱於屈反説文木藂生曰鬱也第十九卷嚻塵古文囂同許朝反嚻護也護喧譁也左傳湫隘塵是也無援宇眷反案援者謂依據護助之言懷孕移證反懷子也論文有作懷妊如禁反妊孕也體胤振反爾雅胤繼也繼世也説文胤子孫相承續也謂番育之稱也麚麀古遐反牡鹿也説文以夏至解角也麋冬至解角也古文麀同於牛反爾匹牝鹿牝牸也有娠書鄰反娠謂懷胎也書中亦作身二形通用也軍持正言捃稚迦此譯云瓶也謂雙口澡灌也論文作鍕𨨲俗作也岐道古文岐岐二形同渠冝反謂枝別義也爾匹道二達謂之岐釋名云物兩為岐此道似之也搏鹿補各反案摶猶拊拍也手搏也又搏取之也第二十卷抨則又作拼同普耕反説文抨彈也猶言抨毛抨弓等也尺蠖烏郭於攫二反桑蟲也説文屈申蟲也爾匹蠖尺蠖也郭𤩶曰蝍蹴也音子力子六二反一名步屈也舍人曰宋地曰尋桑也第二十一卷衣以於欷反案以衣被之曰衣衣謂衣著也食以又作飼同囚志反謂以飯食設供於人曰食眵淚充尸反説文兜眵也莫結反論文作眵未詳結聹乃泠反埤蒼耵聹耳垢也俞多弋朱反廣匹俞益也小爾匹俞茲強益也崫起魚屈反埤蒼特立也史記崫然獨立是也第二十二卷骨幹字體作幹同歌旦反幹助也亦體也骸骨也視占之鹽反方言占視也亦候也凡相候謂之占占瞻也第二十四卷辝訣古穴反通俗文死者別謂之訣訣絶也祈請渠衣反廣匹祈求也爾雅祈云告也捍挌古文𢧀捍仠四形今作扞同胡旦反捍禦也格古文格同古額反格鬪也格歫也説文格擊也智鑒字書作鑑同古儳反廣匹鑒照也鑒鏡也刳腹口孤反方刳也案刳謂空其腹也灰燼似進才刃二反説文謂火之餘木也孅指古文攕字書作纖同思廉反説文攕好手貌也孅細鋭也㱇然所力反埤蒼恐懼也通俗文小怖曰㱇論文作懎近字耳又作嗇歰也𭍠非此義間跱古文歭同除理反言獨立也廣匹歭止也便晴藉盈反漢書天晴而見景星孟康曰晴精眀也第二十五卷豐渥烏學反詩云稍如渥赭傳曰渥厚也第二十六卷釀酒女悵反三蒼米麵所作曰釀洮沙徒刀反案洮猶清汏也論文作汰土蓋反通俗文浙米謂之洮汰廬館力居反小爾匹云廬寄也黃帝為廬以避寒暑春秋去之冬夏居之故云寄止也調投徒吊反廣雅調欺也調賣也啁調也淩易力升反廣匹淩暴也犯也侮也蒼頡篇淩侵也易又作𫾻同以䜴反蒼頡篇易慢也易輕也今亦作易第二十八卷吸風今作吸同羲及反廣匹吸飲也兵伍兵威也五刃為兵下吾魯反周禮五人為伍鄭玄曰伍衆也論文作仵吾古反逆也仵非字義謇吃古文𧪤謇二形今作聲類作謇又作同居展反方言謇吃也楚人語也論文作蹇跛蹇也蹇非此義吃古文吃同居乞反氣重言也通俗文言不通利謂之吃深濬古文濬濬二形今作浚同私閏反濬深也堅著治略反堅牢也相著也第二十九卷襞鬱卑赤反説文韏衣也廣匹襞屈也韏音丘阮反梁抨力將反謂撗梁也抨皮兵反埤蒼抨拓也謂獨坐板床也釋名云抨平以板作之其體平正也第三十卷大辟古文𨐨𠮃二形同脾尺反字林辟法也除也字從尸辛尸辛者制其罪口用法也論文作邪僻字非也祜利胡古反祜福也爾雅祜厚也觚枝古胡反案觚猶枝本也未詳何語也雷霆達頂達丁二反周易鼓之以雷劉瓛曰霆雷也震為雷離為電爾匹疾雷為霆霓郭𤩶曰雷之急激者也蒼頡篇霆躃𨇗也第三十一卷紹胄治又反字林胄胤也胤嗣也謂繼嗣先世也第三十二卷參倍錯耽反廣匹參三也方言參分也齊曰參郭𤩶曰謂分割也讖記楚蔭反三蒼讖祕密書也出河洛説文讖驗也謂占後有效驗也珠璣居沂渠氣二反説文珠之不圓者也字林小珠也錠光大徑反案聲類無足曰鐙有足錠然燈佛是也第三十三卷禮貺吁誑反爾雅貺賜也郭𤩶曰謂賜也萎爛於危反聲類草木煙也廣匹蔦萎煙也懾伏古文慹或作讋㒤二形同占涉反字林懾服也懾恐懼也懾猶怯惑也𥔧𭫑案字體冝作磫𥗫二形子容其俱反廣雅磫𥗫礪石也通俗文細礪謂之磫𥗫礛䃴治玉磫𥗫治金淮南子云待礛䃴而成器是也鹹鹵胡緘反説文鹵謂西方鹹地也不生物曰鹵溝塍古文𦪖塍二形今作塖同余陵反説文塍稻田畦也史記大曰隄小曰塍論文作非體也垣牆宇煩反垣謂四周牆也釋名云垣援也第三十五卷隱須正字作爰同於靳反説文有所據也第三十六卷錮石古護反説文錮鑄塞也拯拔上聲説文拯謂上舉也救助也出溺也第三十七卷痿熱又作𣨙同於媯反謂黃病也所古泫反取狩繩也論文作衒行賣也非今所用第三十八卷形兆除反兆見也形也案兆者猶機也事先見者也分解扶問胡賣反分謂分別解謂縫解也接中也作摸又作摹同莫奴反摸法也亦規也謂掩取象也第三十九卷庇其方利反方言庇寄也通俗文自蔽曰庇第四十卷福祚徂故反祚祿也又位也報也擲口他狄反案擲亦剔也謂挑剔也擲治之也擲除也第四十一卷玷中都簟反言文如玷也駑馬怒胡反廣雅駑駘也謂馬中者也伯樂云大頭短喙一奴也腳不開屈玄目二奴也小口短叉三奴也駘音待第四十二卷胞胎補交反説文胞兒生裏也蛇虺古文蟲螝二形同呼鬼反毒蟲也第四十三卷牡牝脾盡脾死二反説文畜母也雌也牡莫走反説文畜父也雄也詩傳曰飛曰雄雌走曰牝牡至於雉鳴求其牡則飛鳥亦有牝牡不但走者也第五十三卷鏇師難字作擐同囚反謂以繩轉軸裁木為器曰鏇經文作旋非體也肪𦝓先安反通俗文在腰曰肪在胃曰𦝓也鑽燧又作鐆同辝醉反火母也謂取火者也世本造火者燧人也因以為名尋繹夷石反方言繹理也三蒼繹抽也解也妖冶余者反謂鮮眀莊飾也傲雅自得也哆字借音都餓反依字説文殆可反張口也扡字太何徒可二反依字扡曳也拖船尾也醝字才何反依字通俗文白酒曰醝也濕麼莫可反秦言石論文作尛俗字也第五十五卷診病字林諸刃反診視也聲類診驗也謂看脈候也第五十八卷姣輸古文𡠀同古飽反詩云姣人嫽兮案姣猶妭媚不實也謂面從也第五十九卷薜荔蒲細來計反此譯言餓鬼也依字薜荔香草也其狀如生山石也箭鏑都狄反説文矢鋒也史記鋒鏑或作匙鍭鏑也釋名云鏑也可以禦也齊謂之鏃言其所中皆族滅也深峭今作峭或作𡌔同且醮反廣匹峭急也第六十二卷蠱道工戶反毒蠱蟲物病害人蠱在皿中字意也譴責去戰反蒼頡篇譴可也廣匹譴怒也説文譴謫問也文中有作詰責廣雅詰責問也瞢瞽亡登反瞢盲也周禮鄭玄曰瞢瞢無光也經文有作盲瞽瞽公戶反無目謂之瞽第六十三卷給恤又作恤同思律反振恤也謂以財物人也第六十七卷眼瞎正字作同火轄反字書一目合也手麾今作撝同呼皮反舉手曰麾謂手之指也以旌旗指麾衆因以名焉第七十二卷偃蹇巨偃居免二反廣匹偃蹇槗也謂自高大也釋名偃息而臥不執事也蹇跛蹇也病不能作事今託似此也第七十七卷庠序徐陽反下古文序同徐舉反舉也謂儀容有法度也周曰庠夏曰序白虎通曰庠之言詳也以詳禮儀之所也序者序長幼也機會居衣反説文主發之機也亦先見也周易摳機之發榮辱之主會古文合同胡外反爾匹會對也謂相當對也又會亦聚也合也虜掠力古反下力尚反虜獲取也戰而俘獲也掠劫財物也餌食如志反蒼頡篇餌食也案凡所食之物皆曰餌疹於近之忍反皮上小起痕迹也今俗亦謂肉斗腫起為疹或言䏖説文䏖瘢也音丈忍也論文作隱非體也第八十卷級其羇立反級次也謂階之等數名曰級師旋斬首一人賜爵一級因名賦首為級也是救字詁古文𧧷救二形今作救同居又反救助也第九十三卷委他於危反下徒何反爾匹委委他他美也美艷之貌也撓色乃飽反廣匹撓亂也説文撓擾也第九十五卷迂回禹俱一禹二反迂避也遠也亦廣大也石古文二形或作同呼嫁反説文裂也坼也謂石壁小開也第九十七卷躊躇又作懤同腸留反下或作同腸於反廣雅躊躇猶豫也躑躅也相和胡臥反相譍也周易鳴鸖在渚其子和之是也第九十九卷有掍孤本骨門二反謂繩之轉絃者也今亦名關為掍子字從昆又作批蒲結反廣匹批轉也字從毗音毗窳墯余乳反窳勞也勞苦者多墯窳也亦懶也潦水盧導反謂水雨泛潦也第一百卷窒古文懫同丁結豬栗二反秦言善知識依字窒塞也一本作多羅𡰱子亦是梵言訛轉耳
