body:
  text: 沙門玄應撰般若燈論大莊嚴經論攝大乘論十住毗婆沙論大乘莊嚴經論十地經論菩地持論菩善戒論菩提資糧論寶性論佛阿毗曇論百論發菩提心論三具足論寶髻菩論十二門論緣生論般若燈論第一卷如蔑眠結反埤蒼析竹膚也聲類蔑𥲑也今蜀土及關中皆謂竹蔑為𥲑音析音思歷反字從斤分木為析今俗作扸皆從片纈目賢結反謂以絲縛繒染之解絲成文曰纈檀札莊黠反三蒼柿札也今江南謂斫削木片為柿關中謂之札曰柿札音敷廢反第二卷鬻鬵聲類作甑又作籕文作鬻同子孕反下籕文作鬻同才心反字林甑炊器也鬵大釜也一曰鼎大上小下若甑也第三卷窯師以招反説文燒瓦竈也通俗文陶竈曰窯是也䂎逐千算七鸞二反䂎鋋也䂎擲也今江南傒人工用䂎鋋音蟬傒苦奚反嗢羯烏沒反下居謁反第四卷紫礦古猛反謂波羅奢樹汁也其色甚赤用染皮㲲等是也鈷利息廉反廣雅銛籤利也刀鋭曰銛也第五卷後攏力東反説文攏攬也三蒼所以盛禽獸闌攬也犎牛漢書西域傳有犎牛鄧展曰脊上有宍鞍如橐駝難字作犎音妃封反今有此牛小髆上有犎是也垂胡又作胡𠴱二形同戶孤反説文胡謂牛頷垂下者也論文作𬻫非體也第十卷生莞工端反又音桓此草外似蔥內似蒲而圓廣雅謂之蔥蒲可以為席生水中今亦名莞了也箭笴工旱反字林箭莖也論文作竿非也甐堅又作𥳞同力鎮力二反爾匹甐堅中郭𤩶曰甐竹名其中堅可以為席第十一卷眀忛又作帆帆二形同扶劒扶嚴二反釋名隨風張慢曰帆今或用布若簿若席為之也第十二卷蟾蜍之鹽反下以諸反爾匹蟾蜍郭𤩶日似蝦蟇居陸地淮南謂之去父此東謂之去蚥蚥音方可反江南俗呼蟾蜍音食餘反第十三卷迦逋補胡反此言白鴿地也大莊嚴經論第一卷懍厲力甚反下冝作悷力計反埤蒼懍淚悲吟貌也又懍者顏色懼貌也方言懍敬也攘袂而羊反攘除也下蔽反字苑云祀也衣袖也謂揎衣袒出臂為攘袂也間裕榆句反裕緩也廣雅裕寬也亦優足也愀然又作湫同在酒反禮記云孔子愀然作色謂顏色變動之貌也鵄鵂尺脂反下許牛反爾匹鵅忌欺郭𤩶曰今江東鵄鵂為鉤鵅音挌怪鳥也晝盲夜視關西名訓侯山東名訓狐也第二卷黔毗渠炎反依字黔黑首也儲積直於反説文儲偫也槒也待也偫直里反棖上宅庚反案棖猶柱也浮圖棖皆作此説文棖材也地跌徒結反廣雅跌差也字書跌失跖也跌蹶也匍匐步胡反下蒲北反説文匍匐手行也亦類盡力親昵又作昵同女乙反爾匹昵近又云昵焏也親昵亦數近也焏音祛記反倚俹於蟻反倚猶依也下烏訝反字書俹倚也今言俹息俹臥皆是也羂弶三蒼作𦌾又作同古犬反聲類以繩係取獸也下渠向反韻集云施於道弶今田獵家施弶以張鳥獸其形似弓者也論文作俗字也目擺字書作捭同補買反説文兩手掣也廣雅擺開也可祛丘居反廣雅祛除去也爆火方孝反普剝二反聲類爆燌起也郭𤩶注山海經云爆謂皮散起也愧踖子亦反踧踖也亦畏敬也謂恭敬之貌也第三卷剽掠芳妙反説文剽刺也廣雅剽剝也蒼頡篇剽截也下聲類作剠同力尚反抄掠也雊呼故豆反説文雄之鳴為雊也廣雅鴝鳴呼也掐傷枯狹反又作割口洽反通俗文爪按曰掐韻集作割入也江南今有寶器當作此惶悸古文痵同其季反説文氣不定也字林心動曰悸窳墯榆乳反懶惰也爾匹窳勞也郭𤩶曰勞苦者多上䀎莫見反蒼頡篇旁視也説文䀎邪視也瓌瑋又作瓌傀二形同古回反廣雅瓌偉奇玩也瑰美也盛也徑勇居盛反字林徑強也字從力鼻㨊初委反通俗文捫摸曰㨊論文作揣初委都果二反揣量也故揣也故音丁兼反揣非此用妖嬳又作同於驕反壯少之貌也説文妖巧也下於縛反今江南謂作姿名嬳伊山東名作嬳也逶迤又作委蟡二形同於為反下又作他同達何反廣雅委他窊邪也謂行可逶曲也窊於瓜反妖蠥魚列反災也説文衣服歌謠草木之怪謂之妖禽獸蟲蝗之怪謂之蠥論文作孽庶子也亦古字通用熠耀弋入反下弋灼反字林熠耀盛光照也詩傳曰熠耀鮮明也亦螢火也唧唧子栗反通俗文唧唧鼠聲也亦丙猥也論文作叱非也骨陷廣雅陷坑也陷沒也經文作𩓟非也煙瘦韻集一餘反今關西言煙山東言蔫蔫音於言反江南亦言𣨙𣨙又作萎於為反煙邑無色也今取其義論文未詳字出苦酷古文嚳焅三形今作酷同口梏反説文酷急也苦之甚曰酷亦暴虐也白虎通曰酷者極也教今窮極第五卷鄙褻古文絬𣊓泄四形同思列反褻鄙陋也褻黷也千亡北反沒猶抵觸也説文突前也今皆作𭥗陰晴又作暒殅二形同自盈反聲類雨止也論文作𩄆非體也第六卷愧䩙又作𩉥二形同胡犬反釋名懸也懸縛物也還襲古文㦻同辝立反襲重也因也受也合也及也相磋且何反詩云如切如磋傳曰治象曰磋謂治𤩶之名礭然字書作碻同口角反周易夫𠃵礭然注云礭堅貌第七卷瘳降敕流反瘳差也愈也尚書王翌曰乃瘳是也譖毀側禁反譖讒也一云旁入曰譖也廣雅譖毀也第八卷䫌面普米反説文䫌傾頭也蒼頡篇䫌不正也經文作俾非體也第十卷昞著又作昺炳苪三形同碧皿反廣雅昺明也著顯也聳翮古文竦悚慫三形今作聳同先勇反聳謂前上也下胡革反爾匹羽本謂之翮鳥羽根也説文羽莖也第十一卷樘觸丈庚反説文樘柱也又作棖棖觸又嫽𢿵𢿵觸亦作敞蜇螫知列反下式亦反字林蜇螫也説文螫蟲毒也又音呼各反山東行此音也杭衡苦浪反説文抗扞也強也衡平也瘠古瘠𤶬膌三形同才亦反説文瘠瘦也亦薄也第十二卷滲沒所蔭反廣雅滲盡也説文下漉也字從參蝗蟲胡光胡孟二反阜螽蝗也今人謂蝗子為螽子小曰蝩大曰蝗也論文作蟥非體也蝩之容反花茸而容反説文茸草茸也論文作毦而志反矟上垂毛曰毦第十三卷中喋又作䶍同丁計反蒼頡篇喋噴鼻也詩云願言即喋箋云汝思我心如是我即喋今俗文喋云人道我此亦古遺語也庭燎力燒反周禮供墳燭庭燎鄭玄曰墳大也樹於門外日大燭門內曰庭燎天子百公五十侯伯子三十也論文作𤊟錠二形下作鐐並非也香奩又作𭣠二形同力占反韻集云奩也收𣫍物也三蒼盛鏡器名也今粉奩棊奩皆是也鑱刺仕衫反下千亦反説文鑱鋭也今江南猶言鑱刺也論文作非體也第十四卷鼻衄汝六反説文鼻出血也今呼鼻血為衄鼻也第十五卷喧譁虛元反下呼派反三蒼歡言語䛬䛬也譁言語譊譊也䛬音徒刀反攝大乘論第一卷通敏眉殞反通洞也敏達也廣雅通明徹也敏捷疾也披餘説反簡也小匹具也具數於門中曰也成㲉又作同口角反吳會間音哭卵外堅也凡物皮皆殼尚在卵中謂之㲉出㲉以後名之𪅏音寇爾匹生哺氅郭𤩶曰謂須母飼也猒𢙣於焰反猒足也㤥也下於路反廣雅𢙣增也懀也懀音一外反㤥胡代反彼勿無鬱反詩云勿仕行救注云勿無也屬耳之欲反國語恐國人屬耳於我韋昭曰屬注也漢書音義曰屬近也詩云無易由言耳屬于垣是也第二卷胝柯又作同竹尸反鞞世陛奚反沉麝神夜是亦二反形如小麋齊有香也彎弓於關反小爾匹控彎挽引也第三卷所詮且全反通俗文擇言曰詮説文詮具也淮南子云詮言者所以譬類人事與相解喻也第五卷彰又作暲同諸揚反廣雅彰著也明也乍起仕嫁反廣雅乍暫也蒼頡篇乍兩辝也第六卷預立古文預忬二形今作豫同余據反先辦也預猶備也逆為之具故曰預也輕蔑字體作懱司莫結反説文懱輕易也第七卷練摩古文鍊漱練三形今作涷同力見反説文鍊治金也下古文劘攠二形同莫羅反易云堅柔相摩注云相切摩也爾匹石謂之摩郭𤩶曰玉石被摩猶人修飾也論文作磨磑也藤譬達曾反廣雅藤藟也今呼草蔓延如葛藟者為藤室家書逸反禮記三十壯有室鄭玄曰有室有妻也故妻稱室案室戶內房中也論語由也升堂未入於室是也家居也後登都恆反登外也進也亦成也善枙又作軛同於革反謂轅端𡑅牛領者曰軛軛槅也沮壞才與反蒼頡篇沮漸敗壞也論文多作俎側呂反貯醘器也又置肉機也俎非此義諧遂胡皆反諧和也説文諧合也遂成也成就也亦從第十一卷以𢰟又作榍同先結反説𢰟攕也音子林反今江南言𢰟通語也拙訥古文訥同奴骨反訥遲鈍也説文訥難也扣擊去後反扣亦擊也廣雅扣持也第十四卷蓄聚又作稸同耻六反蓄積也廣雅蓄聚也瘵其側界反爾匹瘵病也三蒼云今江東呼病皆曰瘵東齊曰瘼第十五卷所鎮知陳反説文鎮厭也亦安也乘除實外反乘計也亦外也除去也調都挺反如湯時伊尹也説文者三足兩耳和五味之寶器也案者所以烹飪飲食也十住毗婆沙論第一卷嘔血又作歐㖃二形同於口反歐欲吐也江南或謂歐為歐𠹍𠹍音容釋名云嘔也將有所吐脊曲傴也淋下力金反説文淋以水也郭𤩶注三蒼淋漉水下瘭疽俾遙反下且餘反廣雅瘭癰成也説文疽久癰也論文作𭼱非體也矛戟又作𢦵矛二形同莫侯反下居逆反説文首矛長二丈也戟有枝兵器也鐵剗又作鏟同初限反説文平鐵也廣匹剗削也聲類云剗平也方刃施柄者也鐵槍千羊反三蒼木兩專鋭曰槍説文槍歫也論文作鏘鈴聲也鏘非字體蒺䔧自栗反下力尸反爾匹薋蒺䔧即布地蔓生子有三角者也論文從金作𨪏鏫二形非也鐵臼渠九反易云黃帝斷木為杵穿地為臼論文作煆非體也狖鼠餘繡反似猴而大蒼黑色江東養之捕鼠為物捷健也㹢玃又作猳同古遐反下居縛反説文大母猴也善攫持人好𮨇䀎也蛟虬音交有鱗曰蛟龍其狀魚身如蛇尾皮有殊下渠周反廣雅有角曰虬龍無角曰螭龍謂黑身無鱗甲者也鴈鶩音木爾匹舒鳬鶩李巡曰野曰鳬家曰鶩鶩即鴨也慍恨於問反説文慍怨也論語人不慍何晏曰慍怒也第二卷異几小反假稱謂之嬌嬌詐也非先王之法曰嬌今皆作矯巉巖仕咸反下又作礹廣雅巉巖高也曲隈烏回反説文水曲隈也隈謂隱蔽之𠁅也峻峭又作峭或作琑同且笑反通俗文峻阪曰峭山陵險峻亦謂之峭也第五卷埤助或作朇同避移反説文埤增也厚也補也亦助也鱣魚知連反爾匹鱣大魚也口在頷下體無鱗甲大者二三丈江東名黃魚也第六卷傲誕五到反下徒亶反傲慢也謂不敬也輕易也誕謾也放誕欺也深榛仕巾反説文藂大也廣雅木叢曰榛是也如縶知立反詩云縶之維之傳曰縶一也謂拘執也兩足不相謂過之縶也第十卷符檄音扶字林符信也謂分而合之曰符字從竹漢制以竹長六寸分而相合為信竹耳歲寒不變以布德也又用銅君臣同心也下奚的反説文二尺書也檄書者所以罪責當伐者也又陳彼之𢙣説此之德曉慰百姓之書也檄者晈也明言此彼令晈然而識之也田塢烏古反説文小障也亦小城也第十四卷行旅閭舉反左傳羇旅之臣皆預曰羇旅寄客也填琉又作填同徒堅徒見二反廣雅填塞也亦滿也論文從王作瑱他見反瑱塞耳也大乘莊嚴經論第二卷讋怖章葉反懼也説文失氣也須潰古文殨同胡對反蒼頡篇潰旁決也説文潰漏也第六卷凹凸蒼頡篇作容𥥌同烏狹反下徒結反容墊下也𥥌突也字苑作凹陷也凸起也第十卷螽蟴古文同止戎反下徙移反詩云螽蟴羽傳曰螽蟴蜙也亦即蝗也俗名春𮮑今江北通謂螽蝗之類曰蝩亦曰簸蝩蝩音之凶反十地論第一卷芒然莫唐反案芒然冥昧不眀也莊子芒然無所見是也捭羅補奚反經中或作卑羅或作閇羅皆一也嘶字又作𧬊同先奚反言梵本嘶字如師子形相也依字埤蒼嘶聲散也亦悲聲也第四卷厚曀於計反釋名曀翳也言雲氣隱翳使不見物者瀑水蒲報反蒼頡解詁云水濆起曰瀑也第五卷捫摸莫奔莫本十捫撫持也案捫持謂手把執物也第八卷溉灌歌賚反説文溉灌也灌注也地持論第一卷𦒿宿巨伊反禮記六十日耆釋名𦒿指也謂十事使人不自執伇也宿久也倡伎齒羊反説文倡樂也蒼頡篇倡俳也俳戲也農啇古文農農二形同奴冬反説文農𥝷也眀哲又作哲哲二形同知列反爾匹哲智也方言齊宋之間謂智為哲哲眀了也悲惻聲類作惻同楚力反説文惻痛也謂惻然心中痛堪耐奴代反蒼頡篇耐忍也林藪蘇苟反散木曰林澤無水曰藪又大澤水希者也聽訟他定反聽謂察是非也訟急也周禮以五聲聽訟求情一形二色三氣四耳五目也術藝食聿反術法也亦道也字林邑中道曰術道術者通也言人達解者無所不通也第二卷訕大所姧反論中亦作刪陀迦延迦毗陵伽應云歌羅頻伽亦云迦蘭伽迦陵此云好毗伽此云音聲名好音聲鳥也巨細其呂反小匹巨大也方言齊魯之間謂大謂巨説文巨大從金作巨陀羅國拘𦒿羅或作拘翅羅梵言轉也譯云好聲鳥此鳥聲好而形醜從聲為名猿猴又作猿同禹煩反似猴而大臂長其色有黑有黃鳴聲甚哀五百歲化為玃玃壽千歲玃音居縛反抃舞又作拚同皮變反説文拊手曰抃拊擊拍也第三卷黍稷古文稷同姊力反五穀之長也説文稷粢也爾匹稷也注云粢一名稷稷粟也今江東呼粟為稷也師捲又作拳同渠員反指握為捲譬喻也言師之匠物不如捲之執握若而不説也論文有作疲倦之倦非也第四卷罰黜又作絀同耻律反廣雅黜去也亦放也退也振給古文辰拒二形同諸反小爾匹振救也説文振舉也第五卷奢耶亦云俱舍訛也此譯云藏舊譯云蟲謂蝅在此即野蝅也用野絲作衣者奢耶衣也第七卷偷婆經中或作兜婆或云塔婆或言藪斗波皆訛也正言堵波此云廟或言方墳皆義釋也支提又云脂帝浮圖此云聚相謂纍石等高以為相也求求羅香此譯云安息香也阿迦花應云阿羅歌花此云曰花𡰱𠃵子應言泥揵連他此云不繫其外道拔髮露形無所貯畜以手乞食隨得即噉者也第八卷𪣀䪺父美反落泊人也爾匹𪣀毀覆也䪺壞也官爵又作雀同豫藥反白虎通曰爵者盡也量其盡才也五等爵命也取其節節足足也謫罰知革反方言謫怒也郭𤩶曰謂相責怒也亦可呵也責也小非曰罰舌胝竹尸反㗩波相傳所及反第九卷率意所律反爾匹率偱自也郭𤩶曰自猶從也從自意也迦私此譯云先能發光樂也第十卷兩股又作骰同公戶反説文股髀也脛本曰股也兩臀徒昆反聲類臀尻也兩又作腨同時耎反説文腨腓腸也腓音肥江南言腓腸中國言腨腸或言腳腨波羅奈應言波羅奈斯此國名也從國名㲲也泥犁或云泥黎耶亦言泥黎迦此云無可樂或云無有卑下羅縠胡木反似羅而疏似紗而密者也有懞縠霧縠言細如霧也菩善戒經第二卷軍旅力舉反爾匹旅衆也字林四千人為軍五百人為旅也包車為軍字意也包音補交反第三卷童齔初忍反舊音差貴反毀齒曰齔説文男八月生齒八歲而齔女七月生齒七歲而毀齒字從七第九卷脣齶又作腭咢二形同五各反齒內上下賓也兩杈初嫁初家二反兩歧為杈木理亂曰杈亦作此論文作𮌋俗作也菩提資糧論第二卷談謔許虐反爾匹戲謔也謂相調戲也謔亦喜樂也寶性論第三卷歔欷喜居反下虛既反字林涕泣也蒼頡篇泣餘聲也亦悲也彯畫匹眇反彯文輕淺也佛阿毗曇上卷生萼又作㮙同五各反謂承花者曰萼也下卷閹人於儉反説文閹豎宮中閹昏閇門者也周禮閹十人鄭玄曰閹精氣閇藏者今謂之宮人也主閇門戶故曰閹捼不奴回奴和二反説文捼捼摧也兩手相功也紋身無分六謂繒有文章曰紋又作文古文青與赤為文説文錯畫也矮人於解反廣邪矮矬也氣觜冝作咳嗽咳音苦代反江南行此音又丘吏反山東行此音下蘇豆反説文嗽逆氣也上氣疾也蒼頡篇齊部謂嗽曰咳論文作氣非也枯癇核間反聲類今謂小兒癲曰癇也血瘻冝作瘻音漏癰屬也中有蟲頸胲隱𠁅皆有也或作漏血如水下也陰頺徒雷反釋名陰腫曰頺字林作膇重疾也腫血又作瘇上隴反爾匹腫足為腫今巴蜀極多此疾手臂有者亦呼為腫也瘤癖力州反説文瘤腫也聲類瘤瘜肉也噦吐於月反通俗文氣逆曰噦説文噦氣娪也毛冗如勇反散也冝作𦶇而容反謂古貝垂毛者毳飾也百論上卷僧佉此言訛也應言僧企耶此云數也其論以二十五根為宗舊云二十五諦衛世師此訛略也應言鞞崽迦論此云勝其論以六句義為宗舊云六諦也崽音所皆反下卷挻埴尸延反下時力反挻柔也和也擊也埴土也粘土曰埴發菩提心論卷上罝羅姊耶反兔曰罝罝遮也鳥曰羅羅截也盼親普幻反下力再反廣雅盼視也字書美目也目白黑分也説文親內視也論文作䀎邪視也下作睞力代反説文目瞳子不正也今俗云類眼是也𮨟盧對反睞非今用加誣武于反説云加言曰誣誣亦囚也妄也欺也三具足論船舶音白字林大船也今江南凡泛海船謂之舶昆侖及高驪皆乘之大者受万斛邏力賀反屬也謂遊兵以禦冠者亦偱行非違也恐哧呼嫁反相恐也方言作恐鬩鬩音呼隔反亦言恐赫亦云恐猲一義也猲音虛割反礓石居良反形如薑也通俗文地多小石謂之礓礫字從石論文從土作壃非體也寶髻菩經論洲灘徒亶反爾匹僤沙出郭𤩶曰今江東呼水內沙堆為灘洛陽北河中有中灘城是也論文作埏音延八埏之地也亦埏道也埏非此用陂池筆皮反山東名為濼濼音匹各亦名䴚䴚音公朗反髻又作螺同力戈反下古文作同音計經中或作編髮同一也十二門論機杼丈與反字林杼機持緯者今俗呼杼為筬筬音成埤蒼筬竹杼也口爽所兩反楚人名美敗曰爽爽敗也爾匹爽差也緣生論舌唌又作涎涎𣼞三形同似延反説文慕欲口液也箄尸補計反經中或作閇尸此云宍團唯識論修道不共他羺羊奴溝反通俗文羊卷毛者謂之䍲羺胡羊也䍲音女佳反利剌又作刺同千利反刺直傷也宍從刀東聲東音且賜反
