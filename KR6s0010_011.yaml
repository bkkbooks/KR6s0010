body:
  text: 翻經沙門玄應撰正法念經中阿含經增一阿含經雜阿含經正法念經第一卷䂎矛字詁古文䂎二形今作𥎤同亂反䂎小矛也矛或作鉾同莫侯反説文矛長二丈也經文作鐫𢷗二形又作牟並非體也鴳鳥又作鷃同烏諫反鴳雀也一名鳸一名鶬鴳文云關中以鷃為鷃爛堆是也第二卷恐嚇呼嫁反相恐也距人謂之嚇方言作恐鬩郭𤩶音呼隔反亦作恐赫亦言恐猲皆一義也猲音虛割反恐凹烏狹反字苑作凹陷也蒼頡篇作凹下也如古文羄罩二形同竹挍反捕魚籠也第三卷斗擻又作藪同蘇走反方言斗擻舉也周成難字云斗擻也音都穀反下蘇穀反經文作抖捒二形音同𣑕策並非字體堙羅古文垔二形今作同於仁反帝釋象王名也經中或名那婆那或言伊羅鉢多羅此譯云香葉身長九由旬高三由旬其形相稱也烏賢反第四卷攫九縛反説文攫扟也蒼頡篇攫摶也淮南子云獸窮則攫鳥窮則是也扟音居逆反水獺他曷他轄二反形如小犬水居食魚者也經文作狚都達反獦狚獸也如狼赤首狚非此義獦音古曷反激流公的反謂流急也説文水文凝耶疾急曰激也梯隥丁鄧反廣雅隥履也隥仰也謂山路仰登也經文作僜非也狗咬又作咬同五狡反説文咬齧也經文作骹苦交反膝骨也又作咬呼交反髐箭也二形並非此義善挾胡頰反爾匹挾藏也方言挾護也掩面於儼烏感二反廣雅掩覆也亦藏也經文作唵一感反謂掌進食也唵非此義排筒埤蒼作韛東觀漢記因水作排王弼注書云橐鞴囊作鞴同皮拜反所以冶家用炊火令熾者也第六卷射垜徒果反射堋也經文作埵丁果反埵纍也埵非今義堋音用鑱刺仕咸反説文鑱鋭也廣雅鑱謂之鈹音普皮反第八卷耎枘而兖反下乃困反字苑作柔脆也通俗文作枘再生也又作嫩近字也經文作濡又作始生並非體也腳痌字詁今作腫同時腫反通俗文腫足曰痌痌腳病也經文作踵非體也捩繩力結反謂轉捩也第九卷鐵砧又作椹二形同豬金反鈇砧也經文作文心反臿屬也非此義鐵錘直危反廣雅錘謂之㩲謂稱錘也方言錘重也鉸刀古卯反交刃刀也今亦謂之剪刀又謂剪馬為鉸刀釋名云鉸刀削刀皆隨時用作名也驅蹙子六反蹙迫也催促也廣雅急也經文作踧踧然避席也踧踖也踧非此義蜚墮古書飛多作蜚同府韋反鳥曰飛揚也案漢注云正月爵大於鳩五色蜚過鄭二月後蜚過池陽是也步靫楚佳反謂盛箭者也通俗文箭箙曰步靫釋名曰步人所帶以箭叉其中也蔔音扶福反第十卷寂聲又作鬩喌二形同情歷反方言寂安靜也寂嗼也舐手古文舐舐二形今作狧又作舐同食爾反以舌取食也經文作𭇇舐二形未見所出螕等補兮反通俗文狗虱曰螕經文作蜱扶卑反螳螂子也蜱非字義也洲灘徒亶反爾匹灘沙出郭𤩶曰今江東呼水中沙堆為灘謂經文作埏音延非字體也第十一卷作蛭之逸反謂入人皮中食血者也江東名蟣音巨幾反經文作螲音知栗反螻蛄也非此義也曲蟺音善古今注云丘蚓也一名蜜蟺江東名寒蚓善長吟於地中江東謂為歌女或謂鳴砌經文作蟬非體也鐵鉆奇廉反通俗文𨩷具曰鉆經文作鉗謂以鐵束人者也鉗非此用也第十二卷吒䶩正字作同竹皆反廣雅齧也經文作嚌在計反至齒也嚌非此義第十三卷鱯魚獲樺二音爾匹魾大者鱯孫炎曰鱯似鮎而大色白也魾音備飢反鮎奴兼反倒或作佹崎三形同去知反説文佹嶇傾側不安也字從危支聲也抒氣除呂時汝二反廣雅抒舀也泄出也説文抒挹也舀翼紹反攣縮力泉反爾匹攣病也亦拘攣也經文作癵二形並非體也壓拶烏甲反下子曷反周成難字作拶拶拶也經文作押攢二形音甲讚非今用也庰中蒲定反廣雅庰廁清圂也庰亦屏隈也第十六卷飄鼓公戶反鼓動也案凡動物皆謂之鼓經文從風作𮨲非也壓笮今作窄同側格反説文窄壓也謂笮出汁也䏣蟲且余反通俗文肉中蟲謂之䏣經文作蛆子余反蝍蛆也又作疽瘡也二形並非今用黤黮烏感敕感反下眀也亦黑也文云深黑也齆鼻一弄反埤蒼鼻病也妖蠥五竭反説文衣服歌謠草木之怪謂之妖禽獸蟲蝗之怪謂之蠥經文作孽庶子也又作𦾨近字也𮊵今作尪同烏皇反尪弱也𮊵纍也通俗文短小曰尪尪亦小也鼬等弋周由救二反字林似鼠赤黃而大者是也翱翔五高反回飛也飛而不動曰翔釋名云翱遨也言敖遊也翔徉也言倣徉也第二十一卷喑噫於禁乙戒反喑唶大呼也説文噫出息也經文作噎於結反咽塞也噎非此義擒䶗巨今反説文急持衣襟也字從金從手下苦加反今亦言口䶗也經文作非也第二十四卷䯉䯉於滑反通俗文大咽曰䯉説文咽中氣息不利也經文作唿唿非也相妨卜反字林手相摶曰也擈打也第二十五卷鱗距又作距距二形同渠呂居呂二反雞足距也字從角也第二十六卷輾諸女展反説文輾轢也蒼頡篇輾車行𠁅也帶𦶇字林而容反𦋺也或作茸草茸也第二十八卷諧𫀽胡皆吳口反諧和也耦合也經文作偕𧪓二形非體也革屣所綺反皮履也經文作鞋非也花勃蒲沒反廣雅勃勃盛也第三十一卷𥹺𦮽古木反通俗文禾𥢶謂之𦮽䅵䅵音奴穀反機發説文射發也機主發之機也謂制動轉之也溥天今作普同匹古反詩傳曰溥大也亦遍也第三十二卷涓流古玄反字林水小流也鄙𧃳古文絬媟𣊓泄四形今作褻同息列反褻黷也調話古文話譮䛋三形同胡快反合會善言也經文作譁音花喧譁也譁非字義麚音加説文牡鹿也以夏至解角也下又作同於牛反説文牝鹿也第三十七卷戄動胡郭况縛二反蒼頡篇云戄驚也第三十九卷閃誑字書或作同式舟反説文閃窺頭貌也邀利字書作徼同古堯反求也遮也亦要也楝樹古文同力見反子白而粘可以浣衣者也經文作練非體也第四十五卷常眨通俗文作䁋字苑作眨同莊狹反目數開閇也經文作睞子葉反目毛也睞非字體第四十六卷棗如兖反説文似柿而小也經文作濡非體也豆竹尸反廣雅種豆也第四十七卷稠穊古文蔇同居賈反説文稠多也穊亦稠也蜇蜴斯歷反下音亦山東名𧐒𧐎陕以西名辟宮在草者曰蜴蜥也經文作𧌥非體也𧐒音七賜反𧐎音覓第四十八卷垂挑借音他吊反謂天衣逈出也趫行丘昭綺驕二反説文善緣木之士也經文作挑敕堯反挑抉也挑非字義不肖先妙反小爾匹云不肖不似也經文作消非也犍割又作二形同紀言反通俗文以刀去陰曰也字從牛放習甫往反廣雅放效也亦依也比也經文作妨非也第五十六卷晏然烏鴈反説文天清也晏亦鮮翠之貌也經文從門作𨶁非體也第五十七卷詬又作同呼交反説文虎鳴也一曰師子也字從𮓜九聲也凸腹徒結反字苑作凸凸起也蒼頡篇作𥥌不平也詬㖑古文詬吽二形今作拘同呼苟反聲類吽嘷也下呼戒反韻集作㖑㖑訶也蒼頡訓詁作欸恚聲也通俗文作䛥大語也猶言㖑咄喚㖑皆是也第五十八卷鯢羅吳雞反諸經有作冝羅猶是梵音訛轉也舲舟歷丁反舠有窗牖者也字書船上有屋者曰舲也傴僂於矩力主反通俗文曲脊謂之傴僂經文作迂遱二形音宇俱反迂避也下力侯反説文連遱也並非字義笐𥬭胡當反下力折反説文竹吹也言竹有笐吹謂之笐𥬭也第六十四卷𢲞橰又作桔𢲞二形同古齧反下音高通俗文機汲也頑𤹝今作痺同婢利反説文足氣不至也痶瘓相承敕典敕斷反髮病也未詳音字所出第六十五卷瘭病字林方遙反瘭疽病也經文作螵脾遙反螵非字義或窳乳反惰懶之謂也爾匹窳勞也郭𤩶曰勞苦者多墯窳也瘦瘠古文𤶬瘠膌三形同才積反説文膌瘦也亦薄弱也顀起直隹反説文出額也經文作膇非也髁骨苦反腰骨也説文髁髀也字從骨果聲經文作幹古岸反幹也又作跨踞也並非此用直古文同敕頂反通俗文平直曰經文作非也錍羅普迷反成身名也梵言也第六十七卷蛔母又作蛔同胡瓌反蒼頡訓詁云蛔腹中蟲也呀骨呼家反蟲名也頻伽毗人反經文作𮜞二形撿無所出第六十八卷䲨鳥古文堆聲類或鴻字同胡公反鴻鵠也凹𥦃相承苦簟反未詳名義所出甄波居延反果名也甄波迦果也經文有從口作𭋡非也中阿含經第一卷鳥喙許穢反説文喙口也字從口彖聲彖音他亂反堊灑烏各反蒼頡篇云白土也爾匹牆謂之堊郭𤩶曰以白土飾牆也釋名堊亞也亞次也先泥之次以灰飾之秥豆女霑反豆名也蔗糖又作糖同徒郎反以甘蔗為糖也今沙糖是也第三卷尾髂古文髂今作髂同口亞反埤蒼腰骨也經文作骼歌額反骨枯曰骼骼非此義第四卷麗掣又作掣同昌制反正言麗𭪩毗此譯云細滑也魁取苦回反説文羹汁曰魁經文從木作櫆𣛣二形非體穄米子曳反蒼頡篇大黍也關西謂之糜是也雜穬古猛反説文芒穀也經中從麥作近字耳箭金箭鏃也關西名箭金山東名箭足或言鏑也撿撓奴教反撿押也撓曲也治箭之稱也有卒祖沒反説文隸人給事者曰卒古以染衣題識表其形也方言南楚東海之間或謂卒為赭郭𤩶曰言其衣赤也故字從衣剬割聲類作剸同之兖反説文剬斷首也亦截也第六卷祭餟古文裰聲類作醊同豬芮反説文餟酹也音力外反字林以酒沃地祭也方言餟饋也負摙力翦反淮南子槤載粟米而至許叔重曰摙擔之也今皆作輦第七卷細又作粗同錯孤反大也細小也經文作塵誤也腦根奴老反言腦後玉枕也拳搋又作捲同渠圓反下又作杈同敕佳反猶手桎也齶痛五各反齗齶也經文作𦞐腭二形非體也咳嗽口代蘇豆反説文咳逆氣也亦嗽也經文作咳欶二形非體也喝吐乙芥反説文喝渴也蒼頡篇吐棄也亦寫也喉閇閇猶塞也經文作痺俾利反醫方痺喉病也痔𧈟直理反下女力反後病也謂濕𧈟也中食後病也經文作匿非體也店肆今作坫同都念反肆陳也陳物賣買之𠁅也第八卷潢池胡光反潢池也積水曰潢也小曰汙大曰潢也碧玉廣雅碧玉青玉也今越嶲東山出碧玉也玳琩今作蝳蝟二形古文作𣫹二形同音代妹異物志云如龜生南海中大者如蘧蒢背上有鱗將欲用煮之其皮則柔隨意所作也赤石旋珠字冝作璿辝緣反穆天子傳曰舂山之寶有璿珠郭𤩶曰玉類也帝麑音迷經中或作低迷或作坘皆梵言轉耳第十一卷髦馬莫高反青紺色也頭如烏此馬寶也以毛飾故因以名焉皎潔古文皎二形今作晈同公鳥反埤蒼皎眀淨也第十二卷鏵鍬又作鐰同且消反方言趙魏間謂臿為鍬也鼠場治羊反埤蒼鼠垤也方言坘垤對場也豌豆一丸反豆名也經文作宛或作登並非體也豍豆布迷反廣雅豍豆䝀豆也經文作蜱非體也籮中音羅字林竹器也廣雅籮箕也火𤋲古文爇同而恱反通俗文燃火曰𤋲𤋲亦燒也攬彼又作攬攬二形同力敢反廣雅攬取也攬持也第十三卷莾助巾反説文木藂生曰榛衆草曰莾也僻𠁅匹赤反邪僻也亦隱僻也説文僻辟也猩猩所亰反字林能言獸也知人名也形如豕頭如黃雞今交址封溪有之聲如小兒啼捃拾古文攈同居運反方言捃取也第十四卷手拊敷主反拊猶拍也尚書擊石拊石是也煜爚由掬弋灼反説文煜耀也爚火光也經文作爍非體櫨鍱力都反説文柱上枅曰櫨謂柱端方木也櫨斗釋名櫨言都盧負屋也經文從金作爐非體也下冝作𥔫桑朗反説文𥔫柱下石即柱礎也經文從金作誤也礎音楚第十五卷都梁案盛𪪺荊州記六香蘭也都梁縣名有小山山上𭜧生蘭俗謂蘭為都梁即以縣為名也輿古郎反文字集略云相對舉物曰也罰錢自連反貨財也唐虞夏殷皆有錢經文作錣豬劣反謂杖端鐵非此用也不啻施鼓反蒼頡篇云不啻多也第十六卷蜱肆借音布迷反此譯云遣使也犁鑱仕監反謂有刃斫鑿者也斫音竹角反剔肉又作同他歷反刳也通俗文去骨曰剔也著蘅下庚反杜蘅香草也謂以草為言其𢙣也兩䡯又作𨍈同子孔反方言關西謂輪為𨍈釋名云䡯言輻捴入轂中也森森所金反説文多木長貌也今取其意耳自誇苦華反通俗文自矜曰誇諡法曰華言無實曰誇也第十七卷鹵簿字體作櫓櫓二形同力古蒲古反櫓太楯也蔡雍獨斷曰天子大駕出陳櫓簿是也𬅈又作同古犬反聲類云係取也第十八卷緘簏古咸反説文緘篋也字書木篋也經文從絲作緘非體也下又作篆同力木反竹器也第二十卷菘菁思碓反方言蕘蕪菁也郭𤩶注舊音蜂今江東音嵩字作菘陳楚間曰音豐魯齊之間謂之蕘關之東西謂之蕪菁蕘音饒輕閳字冝作團徒丸反字林團圓也第二十四卷如蘊紆文反謂聚草束之以然火也漢書束蘊乞火是也經文作蒀非葐蒀盛貌也非今所用第二十五卷破塢一古反字林小城也通俗文營居曰塢第二十九卷節纇力外反通俗文多節曰纇經文作戾非義也第三十卷縛繳之若反繳生絲縷也矰之射者也矰音子登反結繳於矢謂之矰牻色莫江反雜色也説文白黑雜毛牛曰牻也鵂狐許牛反鵂鶹也關西呼訓侯山東謂之訓狐也心悸古文痵同其季反字林心動也第三十二卷斫銼且臥反説文折傷也銼亦斫也麋鹿莫悲反説文鹿屬也以冬至時解角者也第三十三卷酒爐力胡反史記文君當爐韋昭曰酒肆也以土為墮邊高似爐也認過如孕反失物而記之也經中作仞八尺曰仞也第三十五卷沃溉古文𦰚同烏木反沃猶溉灌也沃亦漬也澆也㓢治古文㪾鉻二形同力各反通俗文去節曰㓢經文或作芟所巖反𠚫草也或作落非體也第三十七卷衣屧又作䕈同思俠反履屬也經文作𤓖𤓖和也𤓖非字義香陰於禁反言受胎具三緣三香陰見在前經文作除誤也第三十九卷抨乳普耕反抨彈也經文作軯音瓶車名非此用也地肥扶非反劫初地脂也經文作𦡕非體也淖蜜奴狡反通俗文和溏曰淖淖和也霏那孚非反梵言也此謂福德行也標榜補朗反謂物標記也字從片經文從木作榜非也第四十三卷説甌烏侯反三蒼瓦盂也字林小盆也説𣟁敕果反狹長器也蒼頡篇盛鹽物也淮南子云窺面於即圓於杯即𣟁是也第四十六卷從㘁又作同胡高反説文㘁咆也經文作詆都禮反字與詆同詆呵也詆非字義誣謗武于反説文加言也亦欺也以𢙣取善曰誣也及豺仕皆反爾匹豺狗足也有瓜牙迅捷善摶噬也第四十七卷圍罝古文二形同子耶反爾匹兔𮊁謂之罝郭𤩶曰罝遮也遮取兔也第五十卷荼帝徒加反經文或作𠻬㗫二形並非體也茠治或作薅薅二形籕文作薅同呼豪反説文除田草曰茠也㼲㼲又作𤮁同力頰反通俗文瓦破聲曰㼲説文蹈瓦聲躐躐也經文作誤也第五十三卷八稜又作楞同力增反三蒼稜四方也鐵槍千羊反蒼頡篇兩頭鋭也經文作鏘玉聲也鏘非此義第五十五卷因𨦶案字義冝作麩撫于反麥皮也經文作𨦶未見所出疑世言麩金遂從金作𨦶磨鋥相承宅諍反摩治也字無所出今冝作𭣙𭣙治也謂摩瑩飾也火排又作鞴同蒲拜反所以治煆家用炊火者也留邵時照反寶名也第五十七卷鼾眠胡旦反説文臥息聲也經文作哻鼾二形非也又作嚊普利反喘聲也嚊非此義𪱽閣今作同蒲庚反連閣曰𪱽經文作閛普𥝷反門聲也閛非此用第五十九卷敲戶苦交反説文撗撾也亦下擊也經文作撓非也磨輾女展反輾治也經文作搌音丑展反非此用第六十卷為摫又作槻同居隨反木名堪作弓者也為紵直吕反説文檾屬也亦草名也作布細而白者也檾音苦逈反箭笴工旱反字林箭莖也經文作幹古汗反枝幹也雞𣬹力經反謂𣬹羽也經文作鷅鶹力吉反下力周反謂黃鳥也又作𪅋此並應誤也為齊茨奚反謂齊𭣼也經文從金作鑇誤也為錍又作𨤽鎞二形同普迷反通俗文霍葉曰𨤽𨤽即大箭也不愜苦頰反謂愜可也字林愜快也增一阿含經第一卷脣䀎莫遍反説文邪視也三蒼旁視曰䀎也揮淚許歸反揮灑也説文揮奮迅也謂奮迅振去之也拘鄰毗耶娑問經作阿若居鄰此譯云阿若言已知正言解了拘鄰姓也大哀經作拘輪晉言本際第一解法者也普曜經云俱鄰者解本際也即經中尊者了本際是也此即憍陳如也第二卷滄蕩上音倉下堂浪反脬尿匹包反三蒼云盛尿𠁅曰脬經文作胞非也脂又作涎延二形同詳延反字林慕欲曰涎三蒼作涎涎唾也經文作涎非也第三卷耐辱奴代反蒼頡篇耐忍也字本從刀杜林改從寸讖𩿾又蔭反下薄𡶤反經文作識誤也隱曀於計反釋名云𪾼翳也言雲氣隱翳使不見也珕須力計反比丘名也依字珕蜄屬也蜄音市忍反第四卷眩惑古文迿眴二形同胡遍反廣雅眩惑亂也亦暗不眀也飯食古文飰同扶万反黃帝始炊穀為飯飯食也甘饌士眷反具食也亦飲食也第六卷屋廬力居反別舍也黃帝為廬以避寒暑春秋去之冬夏居之也猥多烏罪反字林猥衆也廣雅猥䪺也第八卷苦蔘説文作參同所金反苦草也其類有多種謂丹蔘玄蔘等也鍮婆又作鋀同他侯反或云藪斗波或云塔婆蜎飛一全反字林蟲貌也或作蠉呼全反飛貌也蠕動人尹反字林蟲動也通俗文搖動蟲曰蠕是也第九卷白疊字體作㲲古文𣮔同徒頰反毛布也經文作縶知立反縶絆也縶非經旨兩目力掌反説文兩再也廣雅兩二也經文從草作㒼亡安反㒼平也㒼非此義第十二卷矟刺所角反埤蒼矟長一丈八尺也經文作俗字也又作𨦫誤也又作𮡱江南俗字也轢其力各力的二反輾轢也説文車所踐也脊僂力矩反廣雅僂曲也經文作膢力侯反祭名也第十四卷軟愞而兖反下奴臥反軟柔也弱也顉頭五感反説文搖其頭也經文作儼非也第十七卷拘翅施豉反或作俱𦒿羅鳥梵言訛耳此鳥聲好形醜從聲為名也經文作𠍃鸝二形非也鷙鳥諸利反猛鳥也謂鷹鸇等類也鷙至執也謂所至能執服衆鳥也第十八卷占匐或作瞻正言瞻博迦大論云𥘿言黃花樹也其樹高大花氣遠聞經文作𭅇非也般磋古文同何反梵言也第十九卷毾㲪他盍反通俗文毛蓐細者曰㲪經文作毾非也勇悍胡旦反蒼頡篇悍桀也説文悍勇也有力也第二十卷資輸紫斯反資財也通俗文平財賄曰資也湊集倉候反字林水上人所會也湊亦聚也第二十二卷謫罰都革反罪小曰罰罰罪曰謫經文作𠐝非也五刻古文同苦則反刻削也刻畫也經言刀劒等刻削之是也經文作刓非也愁惋烏喚反字略云惋歎驚異也𧈪笑古文同尺詩反廣匹𧈪輕也謂相輕而笑也蕩鉢古文又作蕩同徒朗反蕩滌灑器也門閾古文侐同呼域反門限也第二十三卷一函胡緘反謂以木器盛物者也經文作臽音陷坑也臽非此義草薪大可析者曰薪經文作蓑蘇和反草衣也淡淡徒濫反下徒敢廣雅淡淡皆安也溺者字體作尿説文小便也字從水從尾經文作溺古字多假借耳第二十四卷顫𩑣古文膻又作䡀同之繕反下古文鈗𤴨𩑣三形今作疣同尤富反通俗文四支寒動謂之戰𩑣蒼頡篇云頭不正也經文作𣏞非也攢箭古文儹同徂丸反蒼頡篇攢聚也字體從木也草貯張呂反貯積也謂盛貯也經文作斫知略反擊也斫非此義所押音甲爾匹押輔也謂押束押障等皆作押也第二十五卷𦒿𦫿五蓋反禮記六十曰𦒿五十曰𦫿釋名云𦒿指也𦫿又也又治也指謂指事使人不自執伇也拘屢力句反經中或作拘樓皆梵言訛耳捻桎古文敜同乃頰反指持也下豬栗反挃刺也第二十六卷幢麾今作撝同呼皮反謂旌旗指麾衆也因以名馬金𮡻徒頂反𮡻銅鐵之𤩶未成器用者也第二十八卷眼睫又作睫同子葉反目毛也經文作睫睫二形非也干柘支夜反或作甘蔗或作竿蔗隨作無定體也替不他計反爾匹替廢也替滅也言滅絶也勞乎力高反爾匹勞勤也謂力極也經文作勞二形誤也第三十一卷凶暴又作凶同許顒反説文凶𢙣也下蒲報反暴猝也疾也擒獲又作鈘擒二形同渠林反三蒼擒手捉物也埤蒼擒捉也今皆作擒捽母存沒反説文持頭髮也經文或作撮租活反捉撮也豁悟古文奯𪾤二形同呼活反廣雅豁空也經文從心作𭟙未見所出第三十二卷將大紫羊反辟支名也經文作誤也鱣魚古文鱣同知連反大黃魚也口在頷下大者長二三丈當古堯反説文倒首也謂斷首倒懸於竿頭肆其𦍬也或作梟説文不孝鳥也冬至日捕梟磔之從梟頭在木上二形通用夷湍土端反人名也此譯云來或作專音端揚治古文𫾻揚二形同余章反説文揚飛舉也第三十三卷皰節又作靤同蒲孝反經文作疱皰𦡕三形非也金扉音非説文扇謂之扉經文作𨵈誤也第三十四卷家移招反通俗文陶竈曰燒瓦竈也如甛又作餂同徒兼反説文甛美也經文作䣶非也牙跂又作屐同渠逆反屐有木有帛有草非一種也警寤古文憼警二形同居影反警戒也經文作景非也搆牛古候反謂搆捋取乳也經文作粗古觸字誤也第三十五卷舊欵或作欵同口緩反廣雅愛也欵誠重也八窖古效反通俗文藏穀麥曰窖也蒼頡篇窖地藏也遏絶古文閼同於曷反爾匹遏止也謂逆相止也遏亦遮也第三十六卷自摑冝作攫俱縛反攫扟也摶也五捺乃曷反謂手五指捺也經中作摖千計反埤蒼挑取也摖非此用較之古文作攉同古學反廣雅較明也見也謂較然易見也經中有作挍比挍也自襞卑亦反説文韏衣也廣雅襞屈也韏音丘阮反第三十八卷戢在阻立反説文戢藏也亦聚也𣫍也第三十九卷俟彼古文俟俟三形同事几反爾匹俟待也猿猴今作猿同禹煩反似猴而大臂長其色有黑有黃鳴聲甚哀也經文作猿非也劈口補革反廣雅劈分也亦裂也恤民又作恤同須律反爾匹恤憂也亦𭠎也謂以財物與人曰振恤之也經中作恤未詳所出第四十六卷瘡痍與脂反通俗文體瘡曰痍頭瘡曰瘍也瘍音陽氣劣古文氣氣二形同墟既反氣息也下古文埒同力拙反劣弱也經文作劣誤也第四十七卷誦習辝立反謂積習數為也經文作謵丑俠反言不止也謵非字義抴電又作曳同余世反抴引也電殄也言暫引即殄滅也膿血古文盥膿二形今作癑同奴公反經文作䐦非也醇酒是均反不澆酒也亦十旬酒也㕮咀方父側呂反㕮咀拍碎也來鎮陟陳反説文鎮壓也經文作填徒顛反填滿也第四十八卷蜜提或作締音徒計反城名也經文作殢此吐字是翻音作吐梨反遂誤寫正也梴樹丑連反樹名也他支秦言財幢經文作咃吱從口取轉舌也為幟古文幟同尺志反幖也通俗文私記曰幟謂劒蓋等五物幖為記也𥘡崇諸時反爾匹𥘡敬也崇重也振給古文𢈫挋二形同諸胤反説文振舉也小爾匹振救也亦振發也經文作賑諸忍反爾匹賑富也謂隱賑富有也賑亦兩通鱞獨古頑反釋名云無妻曰鱞無子曰獨言鱞人愁悒不寐目常鱞鱞然如魚眼不閇故字從魚也酸酷古文嚳焅嚳三形同口木反酷急也謂暴虐也纂修古文同子卵反字或作纘繼也繼前修者也第四十九卷禱謝都道反求福曰禱請也請於鬼神也謝辝也抱不又作菢同蒲報反方言燕朝鮮之間謂伏雞曰菢江東呼嫗經文作菢未詳字出僥幸又作僥同古堯反下音幸俗謂幸為僥幸言被其德澤也望得遇也謂非其所得而得之者曰僥幸而烙音力各反謂燒物著之曰烙也掬抱又作鞠同居六反説文掬撮也抱持也第五十卷綺語墟蟻反不正也經文作䛴非體也攘厭而羊反攘除也却也下於舟反臥厭不悟者欶乳又作嗽同山角反含吸曰欶經文作嗾俗字也饋遺古文餽同渠愧反説文饋餉也遺與也稟食補錦反説文稟賜也廣雅稟與也陽聾餘章反通俗文作詳虛辝也漢書作陽謂不真也經文作佯音似羊反佯弱也佯非此義也蝗蟲胡光胡孟二反毛詩蟲魚疏云阜螽蝗也今人謂蝗子為螽子云是子化作張斐解晉律云小曰蝩大曰蝗蝩音之容反雜阿含經第二卷獲泅正字作汓同似由反説文浮水上也不憚徒旦反廣雅憚驚也憚畏也亦忌也第四卷恐怛都達反怛懼也廣雅怛憂也今或為驚憚字也若鏵古文莫或作鋘同胡瓜反犁刃也經文作鑱非也啾啾子由反蒼頡篇衆聲也説文小兒聲也掠詆又作詆古文詆同都禮反廣雅詆欺也亦呵也第五卷拔芺補達反説文草根也方言東齊曰芺或曰杜也剽剝芳妙反廣雅剽削也蒼頡篇云剽截也説文剽刺也第七卷剬割又作剸同之兖反説文剬斷也截也經文作鉛鉛錫之鉛非也尪瘵側界反尫弱也瘵病也東齊曰瘼惛悴呼昆反下古文悴悴二形今作瘁同茨邃反惛亂也亦癡也悴傷也亦憂也病也蹁蹮古文倣同蒲眠反下蘇眠反廣雅蹁蹮盤姍也亦旋行也經文作蹁跣非體也贔屓古文奰𢘍二形今作𠢥同皮反下今作呬同義反西亰云巨鼇贔屓薛綜注云作力怒也説文壯大也詩云不醉而怒也奰從三目從大三目益大也屓説文亦臥息也字從尸從自聲經文作𮥭欷非也第十卷蔭鷚於禁反下力救反蔭覆也通俗文暮子曰鷚發荄古來反説文草根也方言東齊謂根為荄也火㷮音遭字林㷮燒木焦也經文作他念反第十九卷指蹴千六反以足逆踏之曰蹴經文作掓非體也顛沛又作䟺同浦昧反謂偃仆也經文作狽非體也探其他含反爾匹探取也説文手遠取也脯臘胥亦反周禮脯臘鄭玄曰乾肉薄析之曰脯小物全乾曰臘臘猶昔謂久昔也第二十一卷亹亹亡匪反亹亹猶也亦進貌也涕泗息利反自鼻出曰泗案泗即洟也洟音他計反第二十四卷迅飛雖閏反爾匹迅疾也經文作深濬字非也易韻于閏反言聲音和韻也今取其義也第二十五卷封緘古咸反字林束篋也廣雅緘索也亦閇也排湯託唐反謂湯突也經文作攩都朗反推也第二十六卷因釭又作釭同古紅反説文釭轂口鐵也迦椑臂反西國樹名也第三十卷猘狗昌制反文云猘狂犬也第三十三卷詵陀所巾反經中或作訕馱所姧反又作散桑讚反或作𨅖字無所出也第三十六卷犎牛周成難字作犎音妃封反此牛形小上有犎漢書西域傳踈勒獻師子犎牛音封第三十九卷䏣蠅且余反乳肉中也經文作疽蛆二形非也大帆又作帆古文帆同抶嚴扶泛二反聲類船上帳也釋名船隨風張曰帆帆泛也便風疾泛泛然也第四十三卷縫紩馳栗反説文縫衣也廣雅紩納也亦縺衣也若昵今作昵同女栗反爾匹昵近也亦親也相親近也茅荻又作藡同徒歷反蒹荻草也蒹音古銜反浚輪古文溶濬二形今作浚同雖閏反浚深也毿毿蒼頡篇作同蘇南反毛垂貌也通俗文毛長曰毿毿經文作參非體也四層徂登反説文重屋也亦重也第四十七卷皸坼居雲去雲二反通俗文手足坼裂曰經文或作龜坼匕首補履反劒名也周禮考工記云匕首劒身長三尺重二斤一兩輕而便用也其頭似匕因曰匕首史記荊軻右執匕首揕其胸是也揕音知禁反字從手第四十八卷由相今作塊同苦對反説文堅土也土塊也姦狡古卯反謂姧偽狡猾也字從大經文從女作姣非也乙巳歲高麗國大藏都監奉敕雕造
