body:
  text: 翻經沙門玄應撰長阿含經別譯阿含經賢愚經起世經雜寶藏經普曜經修行道地經生經陰持入經中本起經興起行經達摩多羅禪經義足經毗耶娑問經那先比丘經長阿含經第二卷防禦魚舉反防備也亦禁放逸也爾匹禦禁也乘桴又作艀同扶流反編木者也小泭曰桴也泭音敷眀哲古文哲哲二形今作哲同知列反爾匹哲智也亦了也嘆咤古文嘆雞二形同他旦反嘆吟也吒又作喥同竹嫁反通俗文痛惜曰咤也填塞又填同徒堅反廣匹填塞也亦填滿也并𩞚人名也相承音飽未詳所出案古文𩜓二形今作飽飽猶滿也此應𩞹字誤作也𩞹音於焰反第三卷轟轟今作輷字書作𨋮同呼萌反說文轟轟群車聲也倣徉房羊二音廣匹倣徉徙倚也亦俳佪也聲聒公活反喧也蒼頡篇擾耳孔也喧語也第四卷歔欷古文唏同欣居欣既反蒼頡篇泣餘聲也亦悲也終措且故反措安也亦置也施也淪曀力均反淪沒也曀翳也謂淪沒翳暗也虜扈力古胡古反謂縱橫行也亦自縱恣也又勇健之㒵也漢書音義曰扈跋扈也自大也瑕隙古文同丘逆反舋也亦別也壁際孔也經文作郤非體也隙字從上下小從白也企望古文𧿧二形同墟豉反通俗文舉跟曰企也第七卷隊隊古文䃍同徒對反言羣隊相隨逐也為𥵨土支反字林竹篾也經文或作蔑義同今蜀土關中皆謂竹蔑為𥵨經文作𥵞誤也磽確苦交胡角反通俗文物堅鞕謂之磽確孟子曰磽確瘠薄之地也第八卷穢稻於廢反謂不潔清也亦穢𢙣也經文有從禾或從酉作𥠆醎二形非也第十一卷排擠子詣反推𢬿謂之排擠廣雅擠排也經文作濟誤也𢬿音而勇反不媟息列反相狎習謂之媟亦媟嬻也𢢔也門閫又作梱同苦本反三蒼梱門限也第十二卷諦婆經中有作諯婆依字㐬至二反相讓也陛提蒲米反經中有從比下木作誤也具幾經文有作泉渠反㨬頭或作𥰟同禹煩反依字籰也音于縛反枇那扶迷蒲蔑二反依字廣雅枇第十三卷鞘中小爾匹作鞘蒼頡篇作削誚反盛刀者也方言劒室也瀨𢘡力蓋反依字字林水流沙上持㦸居逆反㦸矟也𥼶名云㦸有枝㦸也經文從金作𮣃非也第十五卷桎梏之實古祿反周禮在手曰桎足曰梏謂杻械也援助禹卷反謂依據護助之言也第十八卷金桄又作輄同音光謂車及梯輿等撗木者也中級居及反級次也謂階級而外一級二級是也夾道古洽反在兩邊也亦夾持也三蒼夾輔也佉酬古文譸葛二形同是由竹鳩二反叢林名也汜汜古文泛同孚劒反廣雅泛泛浮㒵也亦汜濫也渟水狄經反埤蒼水止曰渟泥淖奴孝反蒼頡篇云深埿也亦溺也濕也第十九卷槌𥑐古文磓同都回反投下也下於甲反自上加下也經文作推押二形非體也從咽又作同於賢反咽喉也經文作咽未見所出蓬勃蒲公蒲沒反廣雅勃盛㒵也奔馳古文𩦥今作奔同補門反疾走也扡抴太何反下又作曳同余世反扡曳牽引也凍古文𤷚同知録反謂手中寒作瘡也拼之古文抨同補耕反謂彈繩墨為拼也經中作絣字林無文綺也絣非此用也哮呼又作同呼交反通俗文𧆞聲謂之嚇嚇音呼嫁反𬋘身又作同力鳥力照二反字林𬋘𬉹也蹌踣七羊反踣今作仆同蒲北反蹌動也仆前覆也有篅視專反字林判竹為之盛穀者也蒼頡篇作圖時緣反員倉也經文作簞音單器名啞或於假反埤蒼啞亦瘖也經文作痾於何反病也又作啞音乙白反笑聲也並非字義如縆古恆反通俗文大索曰縆縆亦繩也經文作縆絙非也絙音胡官反第二十卷石𨹃徒果反通俗文積土曰𨹃經文作墯非也拚舞又作抃同皮變反說文拊手曰抃也醯嵬五回反忉利諸天子名也第二十一卷㳙澮古玄古會二反㳙㳙水小流也澮山水出溝廣二尋深二仞也蛇池實遮反池名也經中作𥝀誤也穴泉古文作泉同絶緣反水自出為泉經中作或作湶非體也呼哈古文欱𪘁二形同呼合反說文欱啜也第二十二卷梓柏又作榟同資里反木名也可為琴瑟也梓亦揪也別譯阿含經第一卷駏驉渠語反下許居反謂似騾而小牛父馬子是也晞乾許機反方言晞𤍜也北燕海岱之閒謂暴乾為晞郁多於六反或作鬱多七條衣也第二卷蟒蛇莫朗反爾匹蟒王蛇經文作蜽之非也才全在灾反廣匹才暫也亦僅也經文作諧非也食口咸反謂而食也經文作貪或作龕皆非也第三卷鑿穽才性反蒼頡篇云坎坑曰穽廣雅穽坑也㮯煮古文䚠同胡昆反通俗文合心曰㮯纂文云未判為㮯經中作渾濁之渾非此義也總布音忩通俗文輕絲曰總總赤青白色也牂羖郎反下音古羊三嵗曰牂牂然盛㒵也羖𦍞羯也第四卷滑湒又作同思入史及二反字林沸鬲也亦雨聲也第五卷荼毒達胡反廣雅荼毒痛也亦行𢙣也鼷鼠胡雞反說文小鼠也言有毒者也亦言甘口鼠也髻髮古文髻二形今作括同古活反字林髻潔髮也第七卷瘳損𠡠流反尚書王翌曰乃瘳瘳猶差也亦愈也第九卷桁械胡郎反通俗文拘罪者足曰桁械胡戒反械亦桁類也經文作核非也拘紖幾愚反埤蒼桊牛拘也下丈忍反說文牛系也經文作倨靷非體也桊音居院反㨑摵子公反捉頭曰㨑下音滅滅除也入疏蔭反盡也下漉曰竭也第十卷都澌又作瀃同相離反字林水索也亦盡也扢土古文杚扢二形今作槩同公㝵反杚量也廣匹杚摩也亦平也平斗斛曰杚也第十一卷毗細女九反經文作𪜫非也一踔丑㒵反謂半步曰踔也字體作𧻧第十五卷兩須思于反謂鎖須也經文作三蒼𭜧於反黎也非此義得咽古文同一見反謂吞𠰸也第十九卷麻縕一問反說文縕亂麻也經文作蘊紆文反謂束草𤑔火也薀非字體也第二十卷𧄼瞢徒登丁鄧二反韻集云失臥極也下亡登反經文作䠬非體也布穀方言布穀自關而東梁楚閒謂之鴶鵴周魏之閒謂之擊穀自關而西或謂之布穀郭𤩶曰今江東呼為穫穀也鴶音古八反鵴居六反截所巖反刈草也詩傳曰除草也賢愚經第一卷懇惻古文同口很反通俗文至誠曰懇懇亦堅忍也下古文𢝔同楚力反廣匹惻悲也說文惻痛也剜𬉹烏桓反謂以刀抉肉曰剜𬉹灼也灼𤑔也王薨呼𪪺反廣匹薨亡也釋名大夫曰卒諸侯曰薨薨亦䪺壞聲也白𧆞通曰𡶤薨皆周制也悒悒於急反字林悒不安也蒼頡篇悒悒不舒之㒵也失跨苦𧟶反躡也字林跨踞也經文作𨅓直加反行不前也𨅓非字義口噤古文吟同渠錦反通俗文口不開曰噤是也諺言冝箭反說文傳言也謂傳世常言也昞著古文昺苪二形今作炳同碧皿反廣匹曰昺眀也第三卷澡盥公緩反說文澡手也凡盥洗物者亦曰盥也斠格今作角同古學反角試也角力也格量度也字從木舋張𦏁鎮反爾匹獸曰舋郭𤩶口言自奮迅也𦘺脆青嵗反說文少血易斷也亦耎也經文作𦠆饌二形非體也欽羡辝箭反欽敬也說文羡願欲也經文作誤也具騰杜登反說文騰傳也騰亦乘也廣匹騰奔也第四卷眩䁌胡遍莫報反國語有眩𥈆之疾賈逵曰㒹䁌也叵我普我反謂搖動不安也經文作𧿽𨁟或作𡶅峨皆非也為臛呼各反說文肉羹也謂有菜曰羹無菜曰臛也猒㤥胡代反通俗文患愁曰㤥㤥亦苦也恨也今猶言患㤥以有所苦也激切公的反楚辝或清激事無所通王逸曰激感也如掊蒲交反通俗文手把曰掊經文作刨近字也𦶇衣而容反字林毛𦋺也文云𦶇以毛為飾也搔蛘乘勞反說文搔刮也搔亦抓也經文作瘙乘到反疥也下餘掌反說文搔蛘也今皆作癢經文作癢似羊反字林癢病名也癢非此義第五卷癇病核閒反聲類小兒癲也說文風病也倱伅又作混沌同胡徒反通俗文大而無形曰倱伅也第七卷妐言之容反𥼶名云言是己所敬見之伀伀自齊肅也鎮煞陟陳反說文鎮壓也經文作填音田填非此義忠恪古文愙同苦各反恪敬也字林恪恭也銜穗又作同辝醉反說文禾成秀人所𭠎者也槁宕徒浪反宕猶上也高昌人語之訛耳上古文䏤𦞤二形同先進先恣二反說文頭會腦蓋也額空也經文作囟未見所出第八卷析體思狄反析猶分析也字從木核身胡革反核㝵也經文作擊口吊反擊擊也擊非此義第九卷卓犖力角反謂奇異也騷騷蘇勞反說文騷擾也亦大疾也經文作搔非體㱇然所力反埤蒼恐懼也通俗文小怖曰㱇也第十卷勦了仕交反便捷也謂徑速勦健也說文作捷也疾也挫捩祖臥反挫折也謂折其鋒也說文挫摧也捩音力結反麼小莫可反細小曰麼經文作尛近字也叉股楚佳公戶反脛本曰股取其義也繼邁古帝莫敗反繼續也邁往也謂相續而往也咆哮蒲交呼交反說文咆㘁也哮驚也亦大怒也第十一卷㣿惕之若耻擊反㣿憂懼也亦痛也惕愁也亦憂也第十二卷孤焭古文惸儝二形同巨營反焭單也無兄弟曰焭也施𮊁孤戶反𮊁也經文或作𦊨子邪反亦也二形隨作𤳖比補丹反翻類也經文作般假借也淹水乙釤反謂搵入水中也淹沒也第十三卷斒斕又作霖玢二形同補閒反下又作同盧閒反埤蒼文㒵也文章成謂之斒斕經文作斑蘭非體也健辟脾伇反謂便辟捷勇也第十四卷拼譡卑政都浪反謂掃除也廣匹拼除也𩇕然又作靖竫妌靜四形同自井反謂安定也息也亦無聲曰靜說文𩇕飾也𩇕潔也腹潰古文殨同胡對反說文潰漏也亦旁决曰潰也跳牆他吊反跳躑也韻集跳越也經文作超非體也蜂蟲又作螽同匹凶反或作香蟲經文作乘此應誤也奕奕余石反廣匹奕奕盛也字體從大經文作奕非也第十六卷賖貰始遮反下時夜反說文貰買也貰貸也廣匹貰賖也長弋成反字林有餘也廣匹益也今皆作盈陶演徒刀反詩云憂心且陶陶暢也暢達也荼迦徒加反經文從足作𨃓非也起世經第一卷壘堞又作壘同力癸反軍壁曰壘壘亦重也下又作堞同徒頰反字書女牆也閻浮提或名剡浮洲或言譫浮洲或云贍部洲閻浮者從樹為名提者略也應言提鞞波此云洲譫音之含反埤蒼多言也鬱單越或名鬱怛羅越或言鬱多羅拘樓或言郁多羅鳩留正言鬱怛羅究琉此譯云高上作謂高上於餘方也亦言勝鳩留此云作亦云姓也弗婆提或名弗于逮或云弗婆毗提呵或云逋利婆鼻提賀逋利婆此譯云前鼻提賀此云離體或云弗婆提或言毗提呵者並訛也瞿陀尼或名俱耶尼或名瞿耶尼或名瞿伽尼皆是訛轉也瞿此譯云牛陀尼夜此云取與以彼多牛用牛市易如此閒用錢帛等或云有石牛也薔薇在羊反下無飛反重葉花者也淋甚古文瀶同力金反三蒼淋漉水下也礓石居良反形如薑也字從石經文從土作壃非也攀攬又作攬攬二形同力敢反說文撮持也攬取也搦取又作𢾼同女卓反搦猶捉取也說文搦按也第二卷馬名婆羅訶此譯言長毛也蟹螫五高反蟹有二螫八足也字從蟲經文作鼇大龜也蘇偷婆此譯云大聚舊云塔者訛略也第三卷森竦所金反多木長㒵也下古文慫同先勇反竦上也黫黑又作同於閒反字書黑羊也經文從牛作𤚕非也突莫勒反說文突前也猶輕觸直進也今皆作啀喍五佳反下助佳反犬見齒也經文作睚眦瞋目也䥫鈇方于反說文鈇莖斫也鈇亦椹也亦撗斧也滂流普傍反三蒼滂沱也水多流㒵也第四卷顫動又作䡀同之膳反說文頑顫也三蒼頭不正也黑黶於簟反謂面黑子也說文中黑也第七卷虬螭渠周反下𠡠知反廣雅有角曰虬龍無角曰螭虬黑身無鱗甲螭若龍而黃者也第九卷陂濼筆皮反下匹博反陂池也下山東名為濼鄴東有鸕濼是也幽州呼為淀音殿也第十卷迦箄方爾反此名藿香也藿音呼郭反雜寶藏經第一卷礭然口角反周易夫𠃵礭然韓康伯曰礭堅㒵也黎元力奚反黎衆也元善也古者謂民曰善言善人因善為元故曰黎元言元元者非一民也瞤動古文旬同而輪反說文目搖動也惕惕𠡠歷反詩云心焉惕惕傳曰惕惕猶忉忉也懼也第二卷悼慨徒到可戴反悼傷也哀憐也慨大息也鑰匙今作𨷲同余酌反下方言作提又作匙同是支反關鑰也經文作蘥非體也又作𨥌聲類字與鉹同音昌紙反也又作柢並非也鞠躬居六居雄反𣫍身也經文作穹窮非體也第三卷𦘺丁都亭反丁強也𥼶名云丁壯也經文作𦘭都定反非也單孑居折反孑猶獨也字林無右臂曰孑是其義也讒古𠋫反搆合也亂也經文作婚媾之媾非體也諂詭居毀反不實也廣匹詭隨𢙣也亦欺也誑也第四卷畐塞普逼反方言畐滿也經文作逼誤也襤褸古文懢又作同力甘反謂衣敗也凡人衣破醜弊皆謂之襤褸經文作藍縷非體也銅魁苦回反說文羹斗也經文作鍆欄二形並非也第五卷金㼜又作盎同於浪反爾匹盎謂之郭𤩶曰即盆也躓䪺古文䠟躓二形今作同陟利反謂挫辱之也廣匹躓踏也侜張陟留反下知良反爾匹侜張誑也亦欺誑人也經文作倀非也啓門孔尚以為古文啓字埤蒼作同苦禮反啓開也第六卷今享籀文作享同虛兩反享當也經文作音響之響非也儻能𠡠朗反謂不定辝也經文作讜當朗反直言也讜非此義嚶鳴烏耕反爾匹丁丁嚶嚶相切直也謂兩鳥鳴以喻朋友切磋相正也嗷嗷五高反說文嗷嗷衆口愁也苛剋賀多反說文尤劇也煩擾也剋急也至欵或作欵同口緩反蒼頡篇欵誠重也又志純也欵愛也老瞎又作同呼轄反字書一目合也第七卷綏化斯佳反爾匹綏安也錏煆一加何加反說文錏煆頸飾也坐頭藏果反說文坐止也經文作於人反塞也非此義舊烏見反者非也禱賽都誥反說文告事求請為禱下蘇再反謂酬報也哂哂失忍反論語夫子哂之案哂小笑也經文作舊烏雞呼雞二反非也第八卷咨詢私遵反問也左傳訪問於善為咨咨親為詢咨問善道謂咨問親戚之義㤲腹又作愜同虛頰反說文丘涉反恐息也經文作攝非也甲胄古文䩜同除救反廣雅兜鍪也亦言鞮鍪也㖑言呼戒反㖑喝恚聲也經文作喈音皆非字義也覷其又作狙同千絮反字林窺觀也亦覗也廣匹覷視也眼眠又作瞑同莫田反說文瞑翕也爾匹翕合也嘻師徒結反人名也鄙𢌀思裂反鄙陋也𢌀黷也亦私居非公會之服也狡猾古飽反胡刮反𢙣黠也方言凡小兒多詐或謂之猾巢窠又作萪薖二形同苦和反廣匹窠巢也𢪔言都禮反拒也謂拒推也扳上又作攀同普斑反廣匹扳援也上及之言也普曜經第一卷迄今虛訖反爾匹迄至也四瀆徒木反爾匹水注澮曰瀆說文溝也又邑中曰瀆也愚戅都絳反說文愚癡也戅愚也蕩滌徒朗徒的反蕩滌灑器物也說文滌灑也軒窗許言反軒樓板也亦檻上板也障風日者也鏺樹補沫反國名也依字兩刃有木柄可以刈草也帑藏𠡠朗反周成難字音蕩說文帑金幣所藏府也櫳疏力公反蒼頡篇櫳疏也說文房室曰疏也疏亦窗也第一卷髀踵蒲米反下古文踵今作踵同之重反說文足跟也廣匹踵迹也篋笥𦙃吏反說文盛衣器也圓曰簞方曰笥也椸架古文提椸二形今作箷同余支反禮記男女不同椸架鄭玄曰竿謂之椸可架衣也鶩鴈音木爾匹舒鳬鶩野曰鳬家曰鶩鶩即鴨也芬葩普花反說文芬芳也葩花也取其盛㒵也咳笑古文孩同胡來反說文咳小兒笑也第四卷委儋丁甘反委積也儋何也謂委積相儋負也鵁鶄音交精鳥名也群飛如雌雞似鳬高足也咬骨又作䶧同五狡反廣匹䶧齧也經文作嚛火屋反說文食辛也樂非字義也寮屬又作僚同力條反爾匹寀寮官也郭𤩶曰同官為寮亦僚友也喁喁魚凶反說文衆口上見也淮南子云群生莫不喁喁然仰其德也第五卷不喋丁計反蒼頡篇云噴鼻也經文作𠲣非也寶垜徒果反通俗文積土曰垜說文堂孰也緹他禮反說文帛赤黃色也淺絳也一染謂之縓緹也縓音且反珠璣居衣反說文珠之不圓者也或曰小珠也訛言古文蒍訛吪三形同五戈反詩云民之訛言箋云訛僞也訛亦詭言也蒺䔧自栗力尸反爾匹薋蒺䔧即布地𦽦生子有三角者也經文作𨪏錤未見所出錤音基鎡錤鋤也非今所用也第六卷誾𨵩古文𧥥同魚巾反說文誾誾和恱而爭也禮記誾誾和敬之㒵也經文作狺字與㹞同音牛佳牛巾二反犬聲也又作唁冝箭反並非此用嫈嫇乙莖莫莖反字林心態也亦細視也經文作𥌽𥇋非體也䫌頭普米反說文傾頭也蒼頡篇頭不正也從容且容反謂詳審間匹之㒵也廣匹從容舉動也恢廓又作同苦回反字林恢大也廓空也拍臏又作臏同扶忍反說文膝骨曰𩪯也𧆞又作兕二形同音似又音徐姊反爾匹似牛郭𤩶曰一角青色重千斤也和埴時力反黏土曰埴𥼶名埴膩也如脂之膩也裁古文𪲟不㩵三形同五割反爾匹載也餘也謂木有殘餘載出名曰𪲟也第七卷屯蹇陟倫反說文屯難也蹇挂㝵也林邠古文豳二形今作邠同府貧反樹名也禮貺許誑反爾匹貺賜也郭𤩶曰謂賜與也修行道地經第一卷大較古文攉同古學反粗略也廣雅較猶眀也拔栽子來反栽植也今時名草木植曰栽扁鵲蒲顯反古之良醫也姓鄭案漢書韋昭曰大山小盧人也名越人魏桓侯時醫也蒼頭漢書蒼頭應劭曰秦稱民曰黔首黔黑也首頭也奴曰蒼頭非純黑以別於民也鬱㒵於勿反爾匹鬱氣也亦哀思也下古文㒵貌二形今作貌同莫效反容㒵也亦見也又作謂眩也音莫報反經文作覆之𭥗假借也諸藏才浪反積蓄也如庫藏也人有五藏謂肝肺脾心腎也經文作非體也譖人側禁反廣雅譖毀也亦讒也一曰旁入曰譖也𧌲蛛古文作鼅蛛二形同音知株謂有草𧌲蛛有土𧌲蛛也經文作𧑱非也嗽喉所角反謂嗽吮也經文作𡂡或作非也湩現竹用都洞二反通俗文乳汁曰湩今江南人亦呼乳為湩經文作𡣢奴罪反非也銀柴經文從口作𡁬喍二形誤也第二卷蟠結薄寒反廣匹蟠曲也亦委也噤齘渠錦反下胡戒反說文齘齒相切也方言齘怒也郭𤩶曰言噤齘也雚葦胡官反細葦也葦秀然後為雚葦也飛鳥甫韋反言鳥飛揚也經文從犬作犵誤也第三卷黿鼉魚袁反下徒何反經文作魭䰿二形非體也如麵莫遍反言其碎未如麵也經文作蔑聲之誤也䥫鈼渠王反通俗文繅車曰𨌃繅音桑勞反燔之又作㸋同扶袁反加火曰燔燔亦燒也乾也䥫丳字苑初眼反謂以籤貫肉𬉹之者也籤音且廉反第四卷不訾又作𢋀同紫斯反訾量也經文作資非也九韶古文𪔓同視招反舜樂名也韶紹也言舜能紹繼堯之德也尚書簫韶九成是也第五卷擭草於反廣匹持也謂握取之也稱錘直危反廣匹錘謂之權即稱錘也鴟猪尺反下陟於反鴟張大也言此人𩿍張大如猪也摶掩纂文云博六博用六箸六棊謂之六博掩擈掩跳錢戲也俗謂之射數或云射意也櫪㯕力的反下乘奚反通俗文𦒱囚具謂之櫪㯕字林押其指也臠臠力轉反肉臠也經文作𦟪𦟪非也步搖𥼶名云上有垂珠步則搖動者也經文作瑤非也秸草古八反秸槀也糊口又作𩚩同戶姑反方言寄食也江淮之閒謂寓食為糊爾匹糊饘也郭𤩶曰即糜也饘音之然反生經第一卷鋃鐺力當都唐反說文鋃鐺鎖也經文作狼當非體也淑女時六反詩云窈窕淑女傳曰淑美也淑善也震越梵言也此譯云衣服也訶譴去戰反廣匹譴責也怒也說文訶大言而怒也睢𠮧許隹反聲類睢䂄大視也謂張目𠮧呼也䂄音况縛反捼彼奴和奴回二反說文捼摧也又亦兩手相切也調譺魚戒反廣匹譺調也謂相啁也蒼頡篇譺欺也通俗文大調曰譺是也誘餘首反誘教引也相勸也下私律反說文誘也廣匹謏也經文作恤憂也恤非此義謏音私酉反習𢗗又作翼世反字林習也蒼頡篇眀也郭𤩶曰狃𢗗復為也俘囚妨愚反尚書俘厥寶玉孔安國曰俘取也嗚噈古文作同子六子合二反聲類噈亦嗚也第二卷諄那古文訰同之閏反此譯云碎末謂人名也鞕五更反下胡浪反風名也字未詳所出也殟殙於沒反下莫昆反聲類欲死也說文暴無知也蕱偈所交反昧𭙴丁賀反鞬陀紀言反褅徒計反鎧翰口賚反說文鎧甲也下胡旦反周易白馬翰如王弼曰鮮潔其馬翰如也第三卷歡呼古文作吅又作喧同虛袁反廣匹喧鳴也聲類喧譁也喧聲驚呼也翕眼呼及反猶眨眼也翕合也亦𣫍也經文從目作䁯書無此字眨音㽵狹反樗樹𠡠於反摴𢙣木也大不中繩墨小不中規矩也蠱狐餘者反說文狐妖獸鬼所乘有三德其色中和小前大後死必首丘也拘翼梵言憍尸迦是也此本應作翅後誤作翼失其義也㩲古文𧩑同息與反通俗文多意謂之㤖字林㤖知也㤖音張呂反廩賈又作㐭同力甚反三蒼藏米曰廩也憫泣眉隕反憂㒵也憫憫然也第四卷踧踖子六反下子亦反字林踧踖不進也一曰畏敬也謂恭敬之㒵也第五卷鉗口昆反下巨炎反說文髡剃也鉗束䥫在頸者也經文作𩬚非也觸嬲奴晈反謂𤲶亂也案𤲶猶料也亦弄也讒哳側轄中轄二反啁哳鳥悲也搏踏補莫反下又作踏同徒盍反搏手搏也踏足踐也唉痾於來反說文譍聲也蒼頡篇唉𠯋也字書𢢔譍也下又作痾同於何反𠯋音於禮反陰持入經上卷𢙉悶古文作同莫本反字林悶煩也蒼頡篇悶悶也亦憤也方言眩悶也朝鮮洌水之閒煩悶謂之謨漫下卷已分甫墳反分隔也經文作份彼陳反說文份份質備也字與斌彬同溝港古侯反下古項反謂須陀洹也此言入流亦名至流亦名預流言溝港者取其流𠁅也睡瞑又作眠同亡田反說文瞑目翕也眠寐也臥也中本起經上卷拘鄰此譯云阿若名已知拘鄰者姓也初度五人名也一名拘鄰二名頗陛三名跋提四名十力迦葉五名摩男拘利屏營卑營反謂惶遽也廣匹屏營佂伀也經文作併甫政反說文併最也併非此義最音才句反下卷妖冶余者反謂傲雅自得㽵飾鮮眀之㒵也狂憨呼濫反字書憨愚也郭𤩶曰鵽鳥憨急謂虛勇也靈柩渠救反小爾匹有尸謂之柩空棺謂之𭣋禮記在棺曰柩鄭玄柩之言究也白𧆞通曰柩之言久也久不復變也焜煌胡本反下胡光反方言焜盛也郭𤩶曰焜煌盛㒵也煌眀也蒼頡篇煌光也經文作輝字與暉同虛歸反輝光也輝非此用恂恂私巡反論語恂恂如也王肅曰溫恭㒵也廣雅恂恂敬也爾匹恂恂戰栗也斑駮又作辬同補顏反說文辬駮也蒼頡篇辬文㒵也雜色為斑經文作斒方閒反斒斕也斕音力閒反興起行經上卷曰麩正體作麩古文作同妨虞反杖敲蒼頡訓詁作同苦交反下擊也經文作撓非也達磨多羅禪經上卷發之忍反跡也轉也輿後撗木也今謂發車跡轉也分逵又作馗同奇龜反爾匹九達謂之逵郭𤩶曰四道交出復有旁通者也孱焉仕簡反謂仁謹之㒵也亦𢡼弱為孱廣匹孱𢙣也將暨聲類古文泉同其器反左傳猶懼不暨注曰暨至也爾匹暨不及也暨與也一匱渠愧反匱土籠也匱亦匣也𨶩衆胡臘反說文𨶩閇也閃鑠式染反下舒酌反閃鑠暫見也經文作非也爾炎梵言爾炎此譯云所知亦云應知也梯楴他弟反下𠡠細反經云心之住𠁅也瀸壞子鹽反通俗文淹漬謂之瀸洳字林瀸漬也貧窶瞿𢈔反爾雅窶貧也字書空也窶者無禮也下卷塵塺武該武賀二反通俗文熟土曰塺塺亦塵也敗壞也伏雞又作匐同扶畜反謂雞傴伏其𡖉也方言雞伏𡖉而未孚皆是也䠋骨今作髀同蒲米反說文股外曰髀也江南音必爾反義足經上卷草葌又作菅䔵二形同古顏反聲類葌蘭也說文香草也欲𧥮又作𠯞同都禮反說文𠯞呵也蒼頡篇𠯞欺也遍徇又作𢓈同辝遵反𢓈循也亦巡行也行走宣令曰徇說文行示曰徇字從彳也厄至猗革反蒼頡篇厄困也說文厄隘也凡遇灾難遭苦毒皆曰厄鮮眀又作鮮同思錢反廣匹鮮好也鮮亦善也不嬌几小反說文嬌擅也假詐也國語其形嬌誣賈逵曰非先王之法曰嬌加誅無罪曰誣字從手今皆作著汙一孤反字林濁水不流曰汙謂行潦之水也大曰潢小曰汙勞來說文作𠡠同力代反爾匹來勞也郭𤩶曰相約𠡠亦為勞也揵為舍人曰勞力極也來強事也廣匹𠡠謹也勤也詩云神所勞矣箋云勞來猶佐助也漢書勞來不怠也經文作倈非也名𭟵古文恿𭟵二形今作勇同踰腫反勇謂果决也知死不避曰勇也恐懾聲類作㒤同止葉反廣匹懾懼也字書失常也說文心服也喑唶於禁反下子夜反喑喈猶嘆聲也經文作咋壯白士白二反咋咋然聲也亦咋齧也指力舟反說文𣫍收也爾匹𣫍聚也經文作劒誤也蹶地居月居衛二反說文蹶僵也廣匹僵臥也經文作蹴千六反說文蹴踏也偉風于匪反說文偉奇也經文作胡憒反非體也洞然古文同迵二形同徒凍反謂洞徹也經文作烔徒東反烔熱也烔非此義也下卷不据據於反廣匹据斷也說文口手共有所作曰拮椐鵙摩公覓反人名也依字鵙伯勞也俞曰翼珠反尚書帝曰俞往哉俞然也相然譍也䁆忽古文暗隌二形今作暗同於感反說文暗不眀也廣匹暗暗暗也暗也彼暹私簾反暹謂進取也苦槖古文𡇈同撻各反蒼頡篇云囊之無底者也說文槖囊也亦衣也脊犎如槖因以名焉鼓𪖞字冝作㰆蒲戒反謂㰆囊也煆家用吹火令熾者也經文作𪖞未詳字所出蚱蜢側挌反下莫綆反蚱蜢字書云淮南名去父也即蟾蜍也郭𤩶曰蝦蟇類居陸地者也蟲湯會始𨦣二反說文蟬蛇所解皮也廣匹復育也字林蟬皮也不嫫莫奴反說文醜者也楚辝𡠜母姣而自好也姣音古卯反稱冤古文作冤怨惌三形今作宛同於元反說文冤屈也廣雅冤枉也冤曲也亦思念煩冤也毗耶娑問經卷上訓狐關西呼為訓侯山東謂之訓狐經文作熏胡非體也皯䵴古旱反下與證反通俗文面梨黑曰皯䵴面點黑也經文作𩈅𪓱非也下卷胸膺又作同於凝反說文膺胸也謂乳上骨也萎蔫於危反下於言反萎槀也說文蔫烟也纖長思廉反言纖小也細也經文作櫼所咸反說文好手㒵也𨚗先比丘經上卷撓撈呼高反下路高反聲類撓攪也方言撈取也和鄲都蘭反寺名也浙米思歷反江南言浙中國言洮經文作錫非體也兩埻之尹反說文射臬也廣匹埻的射的也射侯者也以熊𧆞之皮飾其側方制之以為埻經文作準同之尹反說文準平也准非字體吹笳或作葭同古遐反今卷笳葉吹之因以名也穫麥胡郭反說文刈禾也經文作獲誤也欲躃脾赤反謂躃倒也連𢴲呼結反廣匹𢴲束也埤蒼圍係也言急束也說文作䩤誥經文作䩐皆一也下卷儲偫直於反下古文作庤䝰𤲵三形同除里反說文偫待也儲偫具也博叉正言縛茤河第四河也經文作博叉噱叉皆訛也噱渠略反經文從言作𧬷誤也屈無衢物反說文屈無尾也屈短也評之皮柄反字書評訂也評平議也訂音唐頂反刎口古文伆同亡粉反刎割也經文從口作吻非體也丙午歲高麗國大藏都監奉𠡠雕造
