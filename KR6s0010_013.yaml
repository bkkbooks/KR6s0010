body:
  text: 沙門玄應撰般泥洹經罪業報應教化地獄經五百弟子自説本起經迦旃延説法沒盡偈經僧護因緣經過去現在因果經奈女祇域經太子本起瑞應經𠁅𠁅經修行本起經胞胎經阿蘭若習禪法經過去佛分衛經摩登伽經舍頭諫經大迦葉本經樓炭經婦人遇𦍬經大般涅經辨意長者子所問經佛般泥洹經四自侵經普法義經七女經所欲致患經梵六十二見經遺教經寂志果經懈怠耕者經梵志阿跋經優填王經七佛父母姓字經佛入涅金剛力士哀戀經梵志頗羅延問種尊經佛滅度後金棺葬送經阿難問佛事吉凶經阿難分別經罪福報應經見正經業報差別經摩訶迦葉度貧女經五母子經中心經阿遬達經龍王兄弟經玉耶經沙曷比丘功德經盂蘭盆經樹提伽經雜藏經盧至長者經琉璃王經燈指因緣經力士移山經諫王經大愛道般泥洹經五王經波斯匿王太后崩塵土坌身經未羅王經四諦經佛大僧大經閻羅王五天使者經耶經長壽王經時非時經阿那律八念經栴檀樹經魔嬈亂經新嵗經𩓋吒和羅經梵摩喻經鸚鵡經輪轉五道罪福報應經雜阿含經未生怨經七𠁅三觀經十八泥犁經比丘聽施經泥犁經馬有八態經般泥洹經沷野於梏反字林云溉灌名澆也濕也亦美也有憾胡紺反廣雅憾怨恨也字林憾不安也禮賂力故反賂遺也謂以物相請謁也腆美古文作腆同他典反方言腆重也東齊之間謂之腆廣雅腆至也腆厚也善也玄黮敕感反玄赤黑色也黮黤黮不眀淨也并既食布攬反人名書無此字應誤作也疑猒食字耳勗勉許玉靡辨反方言齊魯謂勉日勗勵也勉勸強也補繕是戰反廣雅修截繕治也説文繕補也不啻施豉反更多也經文作翅羽之翅非也五百弟子自説本起經僥值古堯反漢書晉灼音義曰僥遇也謂願求親遇也燕麥又作燕同一見反爾匹蘥雀麥注云即燕麥也經文作鷖伊奚反鷖氶鳥非此用也傅飾方務反傅猶塗附也傅藥傅粉皆是也餼施古文槩同虛氣反以牲日餼餼猶稟給也埤蒼餼饋也字書餼餉也俱談徒含反或作具談經中多云瞿曇皆是梵言輕重也賣姓謨稗反梵言俱盧也一本作薄經文作敻誤也訶䣯側於反梵言摩訶䣯此譯云大長也殷皮於斤反詩云殷其盈矣傳曰殷衆也殷大也又於艱反赤黑色為殷此借音耳敷愈翼珠反繤文作孚瑜言美色也方言怤愈恱也繫𢴲呼結反埤蒼圍係也通俗文束縛謂之𢴲蒞吒古文作蒞同音力四力季二反孚譴字體作䞯同芳務反禮記無䞯往鄭玄曰䞯疾也廣雅䞯行也下去戰反譴責也輕𨗿亡角反𨗿遠也方言𨗿離也漸也廣也亦盛也僧護因緣經僶俯又作黽同亡忍反下無辨反謂自強為之也𭴥疼又作炒炒三形同初狡反方言炒火乾也秦晉之間或謂之炒經文作非也奈女祇域經一栽子來反謂草木植曰栽此謂木可栽種者也瘤節力周反説文瘤腫也聲類瘤瘜肉也今取其義其杪繞反通俗文樹鋒曰杪杪亦微小也除拼卑政反廣雅拼猶除也言拼譡除治也經文作屏非體也譡音丁浪反應襲古文作㦻同辝立反襲受也又合也仍也廣雅襲及也騙上匹扇反文云謂躍上馬也睚眥吾懈魚計二反廣雅睚裂也下靜計反説文目崖也謂裂眥瞋目之貌也經文作睨五悌反邪視也睨非此義蛇蠆丑芥反螫蟲也或名蠆或名蠍也蠆音他達反音力割反雇錢書皆作顧同公護反案雇猶顧䀎答報之也𠁅𠁅經虞受今作娛同牛俱反白虎通曰虞樂也言天下之民皆有樂也廣雅虞安也有也修行本經焰𤌣古文作火同俾堯反説文火飛也胞胎經胚胎普才反説文婦孕一月為胚二月為胎爾匹胎始也方言胎養也樹荄古來反説文草根也方言東齊謂薤根為荄䩕五更反下胡浪反成壞身中風名也過去佛分衛經至奏梵言三拔致此云發趣今言至奏皆一義也戀嫪力到反説文嫪婟也聲類嫪惜也謂戀不能去也婟音胡故反潺湲士訕士捲二反潺湲字林流貌也湲音于㩲反大迦葉本經開披正字作㱟同普彼反繤文云㱟折也披猶分也經文作擺補買反手擊也𭸰非此義婦人遇𦍬經佂伀惶遽也江湖之間凡窘卒怖遽皆謂之佂伀七女經羅轒扶分反字比丘羅轒經文從貴作轒非也梓棺又作榟同即理反古者殷人上梓字林梓揪也古史云考陽作木棺有虞氏用瓦棺捾完也關也所欲致患經怫鬱父勿反字林怫鬱心不安也戰𩑣字體作顫又作𢥇同之見反下又作𤴨同有富反説文顫𩑣謂飼此囚恣反説文飼糧也廣雅餧飼也謂以食供設人曰飼經文作飴借音耳車轢力各力的二反蒼頡篇轢輾也説文車所踐也拜謁於歇反爾匹告謁請也謁白也四自侵經不肖先妙反禮記其子不肖鄭玄曰不似也言不似其先故曰不肖謂儜𢙣之類也佂伀之盈反古文伀同之容反方言離桊居院反説文謂牛鼻環也字書桊牛拘也姑妐字體仙伀同之容反釋名俗謂舅章為伀辨意長者子所問經鼎沸都挻反左傳曰昔夏之方有德也貢金九牧鑄鼎四方亂離加鎗鼎之沸也劈口補格反廣雅劈分也謂手劈開也經文作柏非也恭恪古文愙同苦各反恪敬也字林恪恭也掉動不定也遺教經媟慢相列反方言媟狎也郭璞曰相親狎也媟亦慢也嬻也嬻易也踔擲今冝借音他吊反字體作跳跳擲也韻集跳越也暫替古文暫不久也下他計反爾匹替廢也止也郭璞曰替廢亦止住也隄塘古文作隄同都奚徒奚二反隄限也積土為封限也埤蒼長沙謂隄為塘懈怠耕者經選耎柔選耎猶須也呂氏云少選俗謂之選耎言推託不肯為也優填王經皮韜吐勞反韜藏也説文劒衣也辟從脾尺反韓詩或辟四方辟除也謂從者也不計居詣反謂計算也計謀也經文作係非體也倱伅又作混沌二形同胡本徒反謂不通類也通俗文大而無形曰倱伅遲其除致反案遲欲其疾也遲猶望也經文作幼稚之稚非也毒除禁反山海經女凡之山多䲳郭璞曰大如雕紫緑色長頸赤喙食蛇也以羽畫酒即煞人也仆僵蒲勒反下居良反説文仆䪺也謂前覆也僵偃也謂却偃也身𭥗亡報反𭥗蒙也案蒙猶荷也被也佛入涅金剛力士哀戀經蜇螫知列反字書蜇螫也廣雅蜇痛也下音呼各反瞑眩又作眠同亡田莫見二反下古文作迿眴二形同胡蠲胡麵二反方言凡飲藥而毒悶東齊謂之𭿜眩嘶碎又作𧬊𤺊二形同先奚反埤蒼聲散也亦悲聲也佛滅度後金棺葬送經𮑭身茨液反案𮑭猶豸𮑭也周易𮑭用白茅是也骨力舟反説文收也亦藏也爾匹聚也廣雅取也經文作撿非體也㽃瓳普安侯徒二反廣雅㽃瓳㼾甎也埤蒼大甎也表子盈反爾匹注旄首曰郭璞曰載旄於竿頭也國語為車服旗章以之賈逵曰表也取其摽識也欣懌以𬉹反爾匹怡懌樂也郭𤩶曰怡心之樂也懌意解之樂也字林懌怡也購鉢古候反説文以財有所求也廣雅購償也燔身扶袁反説之燔燒也加火曰燔廣雅燔乾也眀踰𢈔俱反廣雅踰度也亦越也勝也經文作跨非也陵遲古文作掕本作麥同力蒸反淮南子云山以陵遲故能高案陵遲猶靡迤陂陀也平易不峭峻者也見正經包育説文亦作育字同餘祝反説文養子使從善也育亦長也覆育也生也挻土舒延反淮南云陶人之剋挻埴許叔重曰挻揉也埴土也挻擊也亦和也鄧㧊敷廢反説文削朴也蒼頡篇㧊札也謂削木㧊也蝮蜟扶福反下夷六反字林蝮蜟蟬皮也猶蛣𧏞變為蟬也廣雅蝮蜟也音他外始鋭二反謂蛇皮也經文作輹育非體也臭茹如庶反案茹亦臭也今謂腇敗為茹也腇音乃罪反𮊵𦡱又作臞同渠駒反爾匹臞瘠也説文少肉也摩訶迦葉度貧女經米潘敷袁反蒼頡篇甘汁也説文潘浙米汁也江北名泔江南名潘經文作䊩非也中心經脆不清嵗反説文脆少血易斷也廣雅脆弱也脆猶腝也經文作毳非也音乃困反翾飛今作蠉同呼全反説文小飛也周書翾飛蠕動是也龍王兄弟經耳際子例反廣雅際方也爾匹際捷也謂相接續也乃臣奴改反爾匹乃乃也郭𤩶曰乃即乃字也説文乃往也聲類乃至也沙曷比丘功德經陷此古文錎同陷猶墜入也亦沒也説文陷高下也笥中胥吏反説文盛衣器曰笥也圓曰簞方曰笥也闓化口哀反説文闓開也廣雅闓化也聲類此亦開字樹提伽經不㤿又作㤿同於驗反意滿也文云意足曰㤿是也黤黤烏感反説文黤青黑也黤黤不眀也黤忽也婀婆烏我蒱我反謂僂腰背而行也經文作玀𤝯非也庵屋於含反謂庵廬也廣雅庵舍也鎢錥於胡餘六反廣雅鎢錥謂之銼亦云鈳䥈也經文作非也銼音才木反力和反鈳古我反䥈莫朗反或作鎢䥈或作鎑䥈或作鈷䥈蜀人言𡌚皆一也字林小釜也鎑音古盍反鈷音古𡌚七臥反盧至長者經密弆羌女丘呂二反弆藏也通俗文密藏曰弆物儩又作澌同𭜧漬反方言鋋賜盡也物空盡曰瀃燈指因緣經蕭森今作摻同所金反説文多木長貌也子胤振反爾匹胤繼也亦嗣也説文子孫相承續曰胤言番育之謂也喟然又作嘖同口愧反説文大息也歎聲也罄竭古文罄同可定反説文器中空也爾匹罄盡也經文作磬樂器名也飲酣古文作佄同胡甘反樂酒曰酣漢書應劭曰不醉不醒曰酣孑然居折反案孑猶孤獨也説文無右臂曰孑國語胡有孑然是也䁍陷苦洽反説文目陷也廣雅䁍陷也經文作抓掐之掐非體也抓側交反捃拾又作攗同居運反方言捃取也猜疑古文猜二形今作猜同來反案猜亦疑也廣雅猜懼也方言猜恨也端礭又作碻埤蒼作塙同苦學反周易夫𠃵礭然韓康伯曰礭堅貌也經文作胡族反觳盡也非此義也譸張又作酬嚋侜三形同竹尤反譸張誑也相欺惑也上翳又作翳同一計反説文注云目病生翳也喁喁古文顒同牛胸反説文衆口上見也謂羣生仰其德也詩云顒顒昂昂傳曰顒顒溫貌也諫王經黼黻弗禹反下甫物反考工記畫繪之事白黑謂之黼黑與青謂之黻爾匹黼章也斧謂之黼郭𤩶曰黼文畫為斧形也字從薾音知稚反經文從首作𩠤非也恇娘丘方反下而羊反説文煩擾也謂煩恐惶遽也楚辝遭此世之恇娘是也葆羽又作䎂同補道反漢書羽葆謂合聚五色羽名為葆也闐闐又作嗔同徒堅反詩云振闐闐言盛貌也亦羣行聲也五王經了𠄏又作同丁晈反言𠄏懸也趙魏之間曰𠄏郭璞曰了𠄏懸貌也陜山胡夾反案陜迫隘不廣大也説文陜隘也茫茫莫荒反茫茫遠貌也茫然謂曰不了也經文作𥆨呼光反不眀也兩通侹直古文作頲同他頂反平直曰侹經文作非也檻車下斬反釋名云檻車施蘭檻以格猛獸之車也經文作轞車聲轞也𣚊箭而注反謂張弓糯箭也經文作澍非體也末羅王經震悚又作候同思勇反字林悚惶遽經文作聳非也佛大僧大經不滋聲類作孖同子思反説文滋益也滋蕃長也經文作孳説文孳孳汲汲也妖蠥冝列反説文衣服歌謠之怪謂之妖禽獸蟲蝗之怪謂之蠥蠥災也諡比神至反説文行之迹也從言益聲白虎通曰諡之言列也釋名云諡申也物在後為申言名之於人也鷹鸇之然反爾匹風鸇郭𤩶曰鷂屬也又征鳥也齊人呼擊征也小鷂也齮䶩丘奇丘倚二反蒼頡篇齊人謂齧咋為齮齮齧也許慎云側齧也下竹皆反齧挽曰䶩咬齧又作咬同五狡反廣雅咬齧也説文齧也儲偫直於反下除理反説文儲偫具也亦待也惕惕敕歷反詩傳曰惕惕猶切切也亦懼也愁也噫乎又作譩同於凞反謂歎傷之聲也菚其則賢反字林表識書也一曰表職書曰箋俘取妨虞反國語而安俘女賣逵曰伐國取人曰俘耶祇經恢𪪺又作㷇同苦回反字林恢大也瞁吒况伇反通俗文驚視曰瞁經文作狊呼赤反説文大視也掔我三蒼亦牽字苦田反引前也廣雅牽挽也連也時非時經釪𬎞案字義冝作于填二形填音徒見反國名也栴檀樹經躊躇又作踟蹰同腸留腸知二反下腸於腸誅二反廣雅躊躇猶豫也又亦住足也亦躑躅也跢地丁賀反江南俗音帶謂倒地也拍煞普挌反廣雅拍擊也釋名拍摶也以手摶其上也今謂拍其上而死也經文作操摽非也憮然莫禹反怪愕之意也論語夫子撫然何晏曰為其不達己意而非之也新歲經如鶡何葛反似雉而大青色有毛角相鬪而死噲樂苦壞反蒼頡篇此亦字也字林快善也自愛經攘衣而羊反謂攘除衣袂出臂也袂音世反揮涕許歸反説文揮奮也揮灑也爾匹揮竭也注云揮振去水為竭也經文作指麾非體也輪轉五道罪福報應經麋麂莫悲反下又作同羇雉反説文麋鹿屬也麂似麞而大㺜毛狗足也㺜音乃交反聸耳丁藍反説文垂耳也經文作耽丁含反説文耳大也亦耽樂也經文作儋負之儋非體也白𪁒亡項反埤蒼𪁒殦也怪鳥也鉤鵅古侯反下加額反爾匹怪𩿍南陽名鉤鵅晝伏夜行鳴為怪也淫豫翼庶反蒼頡篇豫佚也國語豫樂也未生怨經涕泗息利反詩云涕泗滂沱傳曰自鼻出曰泗也自目曰涕瘦眚字苑作㾪同所景反釋名眚痟也如病痟瘦也眚者猶人眚瘦也桀逆奇列反案諡法曰賊人多纍曰桀劉凞曰多以𢙣逆纍賢人也十八泥犁經倅略倉對反依字倅副也廣雅倅盈也又作體蒲本反焯熱之藥反廣雅焯熱也經文作晫都角反晫明也𨻼牢方奚反説文𨻼牢也獄也所以拘非者也牢從非陛省聲經文作捭非體也泥犁經竹錍字冝作篦補奚反以竹為篦打捶者也鞭挕丁頰反俗語也謂打挕也經文作䩞他頰反鞍飾也䩞非此義鈇櫍方于反説文莝斫也公羊傳曰不忍加之鈇質何休曰斬腰之罪也蒼頡篇鈇椹也亦撗斧也下之逸反埤蒼櫍椹也經文作鑕非也蟲豸直爾反爾足有足謂之蟲無足謂之豸罪業報應教化地獄經莝碓且臥反詩云莝之株之傳曰莝茤也謂斬茤所以養馬者也經文作銼説文折傷也頑痺今作痺同婢利反説文足氣不至也經文作痺俾利反痿痺不能行也煻煨徒郎反下烏回反通俗文熱灰謂之煻煨尉窠又作薖同口和反謂窠窟也取其義矣嚻外許朝反嚻猶虛也嚻亦喧譁也循大似均反説文循行也爾匹循自也郭𤩶曰自猶從也案此亦巡字略同鞠頰渠六反案鞠謂聚也字冝作趜通俗文體不申謂之趜迦旃延説法沒盡偈經彶彶居及反説文彶彶急行也廣雅伋伋遽也券別區万反説文券契也券別之書以刀其旁故曰契也釋名云大書中破別之也過去現在因果經小乘重譯第一卷斾兜蒲帶反國名也正言迦毗羅跋兜譯云迦毗羅者蒼色也跋兜者住𠁅也苗裔古文作同餘制反説文裔衣裾也以子孫為苗裔者取下垂義也裔亦遠也字從衣從冏音女滑反自禁記林居鴆二反禁猶制也止也言制不禁也鳳翳於麗反山海經云北海有蛇山山有鳥五彩飛至蔽日名曰翳鳥廣雅鳳屬也怵惕恥律反尚書怵惕唯厲孔安國曰怵惕懷懼也倉頭漢書蒼頭應劭曰𥘿稱民曰黔首黔黑也首頭也蒼頭者非純黑以別於人也第二卷旅力力舉反方言宋魯謂力曰旅旅田力也郭璞曰謂耕墾也詩云旅力方剛是也昕赫虛斤反説文昕旦明也曰將出也赫盛也揵陟巨焉反馬名也應云建他歌譯云納也噴鳴古文作噴同普寸反説文鼓鼻也蒼頡篇噴吒也俯而噴𠈟而鳴也然今作同魚反説文高大貌也經作屹未見所出第三卷老姥又作媽同亡古反字書媽母也今以女老者為姥也魯瀾洛安反爾匹大波為瀾小波為淪言渙瀾也太子本起瑞應經上卷錢雇書皆作顧同光護反雇猶答蹇償報之言也謂錢得者也漢書數招顧攉金錢文曰請託以金錢自顧賣漢書賣官關內侯顧五百万者之皆是也復饗虛掌反謂設禮以飲賔也又加羹飯曰饗饗亦勸強也椸架又作箷埤蒼作施同餘支反竿謂之椸椸可以架衣也蒼頡篇椸格也亦衣桁也經文作簃音丈支反風霽子詣反説文霽止也今南陽人哹雨止為霽也疆埸古文疅疆二形今作疆同紀良反疆界也下以赤反埸畔也畷也廣雅疆埸界也畷音豬衛反謂兩陌間道也難暨古文作泉其器反暨及也至也與也踒傷烏臥反通俗文足跌傷曰踒蒼頡篇挫足為踒史記踒人不忘起是也經文作𤷧非體也入笱姑厚反謂取魚簿曰笱字從竹賁識彼寄反五道神名也依字賁者飾隱遁今作遁𨔵二形同徒䪺反廣雅遁避也去也説文遁遷也亦退還也逃也和埴時力反黏土曰埴釋名云埴者膱也如脂之膱也超踔丑白丑角二反字冝作𧻀謂半步曰𧻀下卷栽古文作㩵木三形同五割反爾匹餘也載也言木餘載生栽也喑唶又作諳同於禁反下又作諧同子夜反説文喑唶大聲也聲類喑唶大呼也修行本起經下卷曲蟺音善即丘蚓也亦名蜜蟺江東呼為寒蚓熊徐姊反爾匹似牛注云一角青色重千斤也擭持於號反廣雅擭持也謂握取之也砰大普萌反字書砰大聲也經文作軯車名也軯非此義阿蘭若習禪法經上卷蟻垤徒結反垤蟻也方言垤封場也楚郢以南蟻土謂之垤僥幸古堯反下胡耿反謂非其所得而得之也不撓乃飽反説文撓擾也廣雅撓亂也聲類撓攪也迦憊排戒反梵言也此譯云智智者知世因知盡道故名世智世智知世也請質之逸反廣雅質問也亦正也又中正元邪曰質也下卷𤻘疹於近之忍反繤文云𤻘疹捶痕也經文作朕非也躓礙珍四反通俗文物不利曰躓經文作礩非也摩登伽經上卷媛於身反親也爾匹美女為媛郭𤩶曰所以結好媛也謂依倚援助也頻蹙子六反謂迫促蹙也急也近也經文作蹴且六反蹴踏也非今所用爆其古文作暴𦢊二形同方孝反亦皮散起也財弊古文作幣同脾制反弊帛也財所以資生者也中卷絳緘敕夷反下古咸反賖耽書遮反下或作同都含反鮫魚今作蛟同古肴反説文海魚山海經漳水多鮫郭𤩶曰䱜屬也皮有珠文而堅尾長三四尺末有毒螫人皮可以飾刀劒也下卷𦲭蓋子立反以草蓋屋為𦲭説文𦲭茨也𦲭覆也彤華古文赨蚏二形同徒宗反説文飾也廣雅彤赤也織總且公反通俗文輕絲曰總也酒孽魚列反説文牙米也清麥覆之使生牙也蟄蟲持立反説文蟄藏也蟲至冬即蟄隱不出也獸有淺毛亦蟄熊羆等也迦啅陟握反麥鬻又作鬻古文粥今作粥同之六反説文粥麋也舍頭諫經嚾猶又作虈喚二形同呼灌反也通俗文大呼曰嚾也龍目本草云一名益智其大者似檳榔生南海山谷荔枝力漬反樹大生江旁子皮如𦋺肌如豬肪也槲樕胡木反下又作樕同桑屋反槲樕撲也山木也蜜似盈徒當二反説文以飴和饊曰諧稠胡皆反下吳口反諧和也耦合也對也經文作喈𧪓非體也樓炭經第一卷噭嚾又作譥二形同古吊反噭呼也鳴也第二卷梟𣩊古堯反説文梟不孝鳥也冬至日捕梟𣩊之磔竹格反張磔也經文作掉疑誤也當盧字冝作顱同力胡反言馬面當顱刻金為之所謂鏤鐊也詩注云眉上曰陽刻金飾之今當盧是也帞頭莫格反方言南楚江湘之間曰帞頭自關西𥘿晉之間曰絡頭字書帞額巾也字從巾經文徒堆作陌非字體也八柧古胡反也通俗文木四方為稜八稜為柧言珠有八稜也諸署時去反位也署官也治事府寺曰署署猶置也第四卷麮丘語反字書麥甘粥也蒼頡篇煮麥也第五卷嶔崟綺金反下冝金反謂山阜之勢高下倚傾也經文作嶔峨音俄非也大般涅經悲憹今皆作㤕同奴道反憹憂痛也氛翳古文作氛同敷雲反説文氣祥氣也吉凶之先見者也調謔許虐反謂相調戲也謔亦喜樂也吞他痕反下時世反説文吞咽也齧也涯岸説文作崖同五佳反爾匹涘為崖謂水邊也又云重崖岸兩崖纍者為岸波湍土桓反説文湍疾瀨也水流沙上也瀨淺水也瀨音賴瞞羅莫安反仙人名也下卷兜婆或言偷婆或言塔婆或言藪斗波正言窣覩波開拓古文祏坼二形今作拆同他各反柘亦開也佛般泥洹經射埻之允之閏二反通俗文射堋曰埻埻中木曰的鄰陬古文聚二形今作聚同才句反廣雅聚居也乘桴扶留反論語乘桴浮於海馬融曰編竹木也大者曰筏小者曰桴拔擢徒卓反蒼頡篇擢柚也廣雅擢出也亦引也竹𥫳字冝從草作芳聚落名也有㲲又作㲲同徒頰反字林㲲毛布也下卷𭙿渡力制反爾匹由帶以上為厲由自也胞𮊄補交反下武貧反大臣名也經文作𤇜非也胸胸許恭反胸胸沸撓之聲也漢書胸胸數千人聲是也經文從水作洶非也梓薪又作榟同資里反字林梓楸也經文作樺非體也樟薪之羊反豫樟木也生七年而可知也極大木也𣑮薪奴含反爾匹梅𣑮郭𤩶曰似杏實而酸葉似桑也金㨁又作同直吏反爾匹值謂之傳郭𤩶云戶持璅植也䪺槍且羊反案槍猶抵也至也謂頭䪺至地也經文從足作蹌爾匹蹌蹌動也蹌非經意嗷嗷五高反説文衆口愁也詩云哀鳴嗷嗷傳曰未得安集嗷嗷然也弔唁又作唁讞這三形同冝箭反韓詩弔生曰唁亦弔失國曰唁普法義經許諄之閏之純二反説文告曉之熟也諄亦佐也亦誠懇貌也水矜居陵反詩傳曰矝慎也危也矝矜懼也經文從心作矜非體也梵六十二見經鞬橛冝作𢳚建言反文字集云𢳚樗蒱采名也下巨月反落毦仁志反以毛羽為毦飾若今刀矟毦也寂志果經夷專都桓反又作湍人名也應云阿夷他梵言訛轉也此譯云來屏毖音祕虛誕達坦反誕欺也亦大也謾也不實也謾音莫官反區疑去虞反區別也區區亦小貌也又𠁅所也雞鶩莫族反爾匹舒鳬鶩郭𤩶曰即鴨也饐口古文作饐同於吏反論語食饐而餲孔安國曰饐餲臭味變也餲音烏芥反羇縶又作同豬立反縶絆也亦拘執也懲改直陵反廣雅懲止也梵志阿跋經倣徨蒱光反下胡光反倣徨俳佪也埤蒼倣徨仿佯也圭銖古携反下市珠反六十四黍為一圭四圭曰撮十二粟而重一分十二分重一銖也酗醟又作酗同許具反下禹命反以酒為凶謂之酗通俗文耽酒曰酗酗酒曰醟也櫛梳又作楖同側瑟反説文櫛比之總名也彎弧戶都反説文木弓也周易黃帝氏作弦本為弧剡木為矢以威天下也匪惶又作遑同戶光反遑睱也廣雅惶遽也謂忩遽也夷火故反人名也依字又作號謣也昆弟又作罤同孤魂反説文周人謂兄為昆七佛父母姓字經槃裱方廟反依字領巾也多鞬陀紀言反梵志頗羅延問種尊經駏驉渠語反下許居反謂似騾而小牛父馬子者也阿洫虛逼反人名依字水之通川者也阿難問事佛吉凶經蒙籠莫公反下盧紅反蒙籠謂不眀了也經文作曚曨力董反曨眀也曨非此義阿難分別經諀訾匹爾反下資爾反通俗文難可謂之諀訾經文作啤誤也罪福報應經麋麈之乳反似鹿而大尾可以為拂也鵂鶹許牛反下力周反亦名鉤鵅即𩿍也夜見晝伏業報差別經螽蝗古文同止戎反詩云螽斯羽傳曰螽蟴蜙蜎也亦即蝗也音胡光反蜙蜎音先恭反下斯驢反勦健仕交反謂徑速捷健曰勦説文作健也五母子經慷愾口葬反下苦代反慷愾大息也亦士不得志也阿遬達經阿遬籀文作遬古文作𧫷今作速同桑鹿反人名也玉耶經弭伏又作弭同亡爾反弭止也弭亦安也狺狺又作㹞同魚巾魚佳二反狺狺犬聲也盂蘭盆經盂蘭盆此言訛也正言烏藍婆拏此譯云倒懸案西國法至於衆僧自恣之曰盛設供具奉施佛僧以救先亡倒懸之苦以彼外書云先亡有罪家復絶嗣無人祭神請救則於鬼𠁅受倒懸之苦佛雖順俗亦設祭儀乃教於三寶田中深起功德舊云盂瓫是貯食之器此言誤也往餉尸尚反廣雅餉遺也説文餉饋也饋餉也錠燭音定及殿韻集鐙有足曰錠無足曰鐙經文作挺非也鉢和羅飯獨證自誓經云鉢和蘭亦梵言輕重耳此譯云自恣食也汪洋烏光反下似羊反大水廣無極也説文汪洋深廣也六種親屬漢書以奉六親應邵曰六親者父母兄弟妻子也雜藏經醞酒於運反醞釀也蒼頡篇酒母也廣雅醞投也資輸子離反廣雅資貨也蒼頡篇資財也説文小罰以財自贖也漢律民不徭資又以資為郎皆是也經文從言作訾訾量也訾非此義琉璃王經樓由力士名也此譯云愛或言欲也剗足又作鏟同初簡反廣雅剗削也聲類剗平也夷滅餘之反左傳夷杜預曰夷煞也亦毀也愶將虛業反方言脅鬩懼也謂以威力相恐懼也鬩郭𤩶音呼隔反廣雅愶怯也公羊傳曰愶于齊劉兆曰脅畏迫也今皆作脅進邁莫芥反説文邁遠行也廣雅邁往也叨穢吐刀反謂貪財曰叨貪食曰餮案叨亦貪也通語也説文俗作叨臚脹力豬反腹前曰臚言所以養心膂也臚亦膚也下又作脹同豬亮反腹滿也贈贈敷鳳反助哀之物也車馬曰贈小匹饋死曰贈白虎通曰贈之言赴也所以相赴佐也下在鄧反玩好曰贈所以助生送死追思重終也贈送也增也殪入古文作同於計反爾匹殪死也煞也亦盡也漢書音義云一發而死曰殪荄枯古來反方言東齊謂根曰荄説文草根也傷斃古文斃弊二形今作弊同脾世反説文弊仆也驍勇古堯反廣雅驍健也亦勇急也説文良馬駿名也經文作苦交反窅不平也非字義窅音烏包反槯杠音江旗之竿也廣雅云天子杠高九仞十二旒至也經文作低誤也韅攝又作𩎌同呼見反左傳晉車七百乘韅靷鞅絆杜預曰在背曰韅在胸曰靷在頸曰鞅在足曰絆下攝之涉反帶韅又作䩙同火見反著腋者也釋名云韅也撗經其腹下也蒼頡解詁韅馬腹帶射珥如志反蒼頡篇珠在耳也耳璫垂珠者也楚辝撫長劒兮玉珥王逸曰珥劒鐔也鐔音餘諶反聲類劒口也毛睫又作睫同子葉反説文目旁毛也㤄駭胡騃反蒼頡篇駭驚也廣雅駭起也剋捷茨獵反毛詩一月二捷傳曰捷勝也亦獲也軍得勝曰捷也格上加額反蒼頡篇格椸也椸架也力士移山經勠力吕掬反國語勠力一心賈逵曰勠力并力也陳力也銘譽莫庭反謂鐫刻金石以記功德者也銘名也言有功者書其功於太常也蹶舉居月反謂蹶擲之也爾匹蹶動也郭𤩶曰蹶搖之貌也亦驚駭急疾之貌也蹶起也蔑屑無結反下先結反埤蒼𢰟拭滅也餒餓奴罪反論語耕也餒在其中鄭玄曰餒亦餓也霖雨力金反爾匹久雨謂之淫淫謂之霖謂三日以上也大愛道般泥洹經諄那古文訰同之閏反此譯云碎末謂人名也經文作𣮢誤也阜息扶有反曰阜厚也阜亦盛也大也蒼頡篇山庳而大也波斯匿王太后𡶤塵土坌身經期以之反禮記百年曰期鄭玄曰期猶要也養也孝子要盡養之道而已也四諦經熱變碑院反變化也易也更也經文作誤也書無此字咽瘤力周反説文瘤腫也經文從口作𠺕非也閻羅王五天使者經閻羅或名閻磨羅應言夜磨盧迦此譯云雙世也竊謂苦樂並受號之為雙也刓刻又作園同五桓反刓削也廣雅刓斷也刓鏤也裹蘊於雲反謂聚草蕘束之以火者漢書來薀乞火是也蕘音而消反火𬋘又作同力照反説文𬋘大𬉹也長壽王經徇園辝俊反徇猶巡也爾匹徇遍也説文徇行示也阿那律八念經緘簏胡緘古咸二反説文緘篋也廣雅篋謂之緘字書木篋也癇癲核間反聲類小兒癲也下都賢反廣雅癲狂也魔嬈亂經鵁在古茅反説文鵁鶄也羣飛尾如雌雞食之治風賴吒和羅經黈羅剾吒國古文作紏斢二形同他口反剾烏溝反辝訣古穴反訣別也通俗文云死別曰訣梵摩喻經如又作同之視反平也直也細於礪皆磨石也披纚今作縱同山綺反案森纚好貌也颯纚長袖貌也纚篩也颯音桑答反鸚鵡經吟哦又作訡牛金反下吾歌反江南謂諷詠為吟哦門閾古文作侐同吁域反爾匹抶謂之閾郭𤩶曰門限雜阿含經陬中古文聚聚二形今作聚同才句反廣雅聚居也田家徒堅反爾匹田土也説文陳樹稻穀曰田也經文作佃徒見徒年二反説文佃中也春秋傳曰乘中佃謂一轅車也佃非此義具談徒南反經中多作瞿曇此因仙人名為姓也又幐徒隥反謂通徹囊也經文作扠鄧非也𫕈一挈苦節反挈猶提也説文挈懸持也挈擊也憂悶古文同莫本反説文悶煩也蒼頡篇悶悶也憂惱奴道反説文有所恨痛也今汝南人有所恨言大惱今皆作惱也矢溺又作屎説文作𮏗同式旨反糞矢也下正體作浘屎二形同乃吊反經文作溺假借耳屠墟冝作盂同禹俱反盂器也兊兒徒外反兊恱也見也又兊形謂隋面一頭廣一頭狹也隋音湯果反儇儇咋咋許緣反謂家道未成也又作諎同壯白反咋咋然聲也七𠁅三觀經柱亦陟柱反謂支柱也經文從足作跓俗字也頂𩕳乃冷反蒼頡篇頂顛也字苑頭上也今俗呼頂為頂𩕳比丘聽施經孚哹匹于反孚疾也呼召也命也殟殟烏沒反説文暴無知也聲類欲死馬有八態譬人經車軨又作軨同力庭反説文車間撗木也即車軨子也摩杪桑何反聲類摩挲猶門摸也吸羲及反廣雅吸飲也下時制反齧也食也䫌頭普米反説文傾頭也蒼頡篇不正也
