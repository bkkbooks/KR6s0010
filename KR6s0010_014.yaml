body:
  text: 翻經沙門玄應撰四分律第一卷律藏力出反梵言毗𡰱或言鞞泥迦或言毗那耶或云鼻那夜或云毗奈耶皆由梵言輕重聲之訛轉也此譯云離行行亦道也謂此行能離𢙣道因以名焉或譯云滅能滅𢙣也或云化度言梵經化度衆生也或云調伏貪瞋癡也即文殊淨行經云曉了貪欲名為律是也案爾匹律法也謂法則也又云律銓也法律所以銓量輕重也又云律常也言可常行也釋名云律者縲也縲𠕀人心使不得放肆也言尸羅者此云止得謂止𢙣得善也舊譯云清淨及性善者皆義𥼶也縲音力追反縲繫也稽首字詁古文同苦禮反白虎通曰所以稽首何稽至也首頭也言頭至地也三蒼稽首頓首也說文下首也周禮太祝辨九拜一曰首是說戒古薤反戒亦律之別義也梵言三婆囉此譯云禁戒者亦禁義也廣匹戒備也周易以此齊戒韓康伯曰灑心曰齊防患曰戒字體從持戈以戒不虞字意也又作同巨龍反諷誦福鳳反諷謂詠讀也誦謂背文也𦊱礙又作罫同胡罫反字書礙也說文礙止也垣牆于煩反四周牆也𥼶名云垣援也人所依阻以為援衛也牆障也所以自障蔽也飈火俾遙反小火也案字體作熛說文熛飛火也三蒼迸火也吕氏春秋云突泄一熛焚宮燒𧂐是也醒者思反字林醉解也除愈古文愈同乳反說文愈病瘳也方言差愈也身康恪剛反康安也字林𠇾也爾匹康樂也難詰去質反廣匹詰貴也說文詰問也飢饉占文𩚮又作饑同几治反爾匹穀不熟為飢𬞞不熟為饉春秋穀梁傳曰二穀不外謂之飢三穀不外謂之饉五穀不外謂之大飢說文飢餓也梵行凡泛反梵言梵摩此云清淨或曰清潔正言寂靜葛洪字苑云梵潔也取其義矣故二梵本云裒羅那地耶譯言舊第二雜心論云衆具及第二是也髮被皮寄反被謂被帶也亦衣被也律文有作披張之披非也袈裟舉佉反下所加反韻集音加沙字本從毛作𣮫㲚二形葛洪後作字苑始改從衣案外國通稱袈裟此云不正色也諸草木中若皮若葉若花等不成五味難以為食者則名迦沙此物染衣其色濁赤故梵本五濁之濁亦名迦沙天笁比丘多用此色或言緇衣者當是初譯之時見其色濁因以名也又案如幻三昧經云晉言無垢穢又義云離塵服或云消瘦衣或稱蓮花服或言閒色衣皆隨義立名耳真諦三藏云袈裟此云赤血色衣言外國雖有五部不同並皆赤色言青黑木蘭者但點之異耳利㦸居逆反字林有枝兵器也周禮㦸長六尺釋名㦸格也言旁有枝格也伺之埤蒼作覗同𣷢犛𦙃吏二反廣匹伺𠋫也亦察也狙也狙音千絮反羯磨居謁反此譯云作法辦事優波離問經作劒暮此梵言訛也和上菩內戒經作和闍皆于闐國等訛也應言郁波弟耶夜此云近誦以弟子年小不離於師常逐常近受經而誦也又言塢波柁耶此云親教舊譯云知罪知無罪名為和上也塢音於古反柁音徒我反阿闍梨經中或作阿祇利皆訛也應言阿遮利夜此云正行又言阿遮利耶此云䡄範舊云於善法中教授令知名阿闍梨也君持經中或作軍遲此云瓶也謂雙口澡灌律文作鍕𨨲非也羅以拙反十二遊經云此言王舍城應云羅闍義是料理以王代之謂能斷理人民也揭梨醘此云舍中也在摩伽國中城名也陶師又作同大勞反史記陶瓦器也蒼頡篇陶作瓦家也舜始為陶于河濵是也案西域地多卑濕不得為窯但纍壞器露燒之耳亦借音為姚柴薪仕佳反禮記牧祑薪柴以供郊廟鄭玄曰大可析謂之薪小者合束謂之柴薪施炊柴以給燎也相率所律反謂將領行也率導引也瓶沙王此言訛也正言頻婆羅此云形牢是摩伽陀國王也𣑭㰚叉白反說文編竪木也㰚又作籬杝二形同力支反通俗文柴垣曰杝木垣曰𣑭釋名云以柴作之疏離離然也律文作𣑮楀非體也𣑮音南𢯺音矩親厚古文同胡苟反案厚者不薄也重也律文或作友于久反說文友同志也廣匹友愛也親也隨作皆得若邏力賀反屬也謂遊兵以禦寇者也韻略云邏謂循行非違也律文作儸非體也第二卷吹毳充芮反字林細毛也詩有毳衣古者天子大夫服之循行邦國劫貝或云劫波育或言劫婆娑正言迦波羅此譯云樹花名也可以為布高昌名㲲㲲是衣名𦋺賔以南大者成樹以北形小狀如土葵有殼剖以出花如柳絮可紉以為布用之為衣也紉音女反差羅波𡰱或作叉羅波膱或云識羅半𡰱此譯云灰水摩測俱反或云蘇摩或言讖磨此云布衣應言草衣案外國傳云彼少絲麻多用婆叔迦果及草羊毛野蠶等為衣也嵐婆力含反或作鉢耽娑婆此是國從國名衣也頭頭衣或言頭求羅衣亦云頭鳩羅衣此云細布也杙上余職反爾匹𢴠謂之杙郭𤩶曰杙橛也樴音徒得反市肆相利反古今注云肆陳也店置也肆所以陳貨粥之物也店所以置貨粥之物也肆亦列也謂列其貨賄於市也船舫甫妄反說文作方汸二形爾匹舫舟也郭𤩶曰并兩舟也通俗文連舟為舫是也律文有作枋音方說文枋木可作車枋非字義櫓𦨣又作櫓櫓二形同力古反船旁大曰櫓所以進船也又船上樓櫓也筏𦨣通俗文作𦪑韻集作橃同扶月反方言𥱼謂之筏編竹木浮於河以運物者南土名𥱼北人名筏也𥱼音蒲佳反水獺他曷他轄二反說文形如小犬水居食魚者也律文作狚丁曷反字林獵狚獸名也似狼赤首狚非字體獦音古曷反失收摩羅或作失守善見律文鰐魚也長二丈餘有四足似鼉齒至利有禽鹿入水齧𦝫即斷或云煞子魚猴江梵言未迦吒此云猴賀邏䭾此云池在毗舍離菴羅園側昔猴共集為佛穿池今言江者譯人義立耳如言恆河亦作恆江也咄男丁兀反字林咄相謂也字書咄叱也倚發府越反謂機發也機主發之機也說文射發也律文作撥補沫反廣匹撥除也亦棄也撥非此義𢙣獸爾匹音義云狩亦獸字二足而羽曰禽四足而毛曰獸蛇螫或亦反字林蟲行毒也關西行此音又呼各反山東行此音蛆知列及南北通語也僧伽藍此言訛也正言僧伽囉磨此云衆園狎習古文𧆥狹二形同胡甲反近也習也謂附而近之習其所行也律文作浛非體也祠天似茲反爾匹祠祭也又春祭曰祠也汙身烏故紆莁二反說文汙穢也塗汙也釋名云汙汙也如汙渥也捫摸莫昆莫本二反聲類捫摸也字林捫撫持也案捫摸謂執持物也㮏髀古文䠋同蒲米反說文股外也北人用此音又音方爾反江南行此音律文作䏶俗字也草秸又作秸鞂二形同公八反秸槀也說文秸禾槀去其皮祭天以為𮑭也律文作𦮽古木反禾𥢶也𦮽非此用第三卷摩䤈呼奚反譯云大自在天也唄匿蒲芥反梵言婆師此言讚歎言唄匿者疑訛也婆借音蒲賀反創孔古文創刃二形今作創同初良反說文創傷也禮記頭有創則沐是也又音楚亮反創始也非今所取今皆作瘡近字耳摶食徒丸反說文摶圜也通俗文手團曰摶是也律文作揣說文揣量也音都果反北人行此音又初委反江南行此音揣非字義適意尸亦反廣匹適善也謂事物善好稱人心也所保古文賲𠍂三形同補道反說文保養也亦守也華梵言摩羅此譯云音蠻案西域結師多用蘇摩那花行列結之以為條貫無問男女貴賤皆此㽵嚴諸經中天寶花亦等皆是也律文作非體也乾消古寒反下古文消同思遙反說文消盡也律文作𤴲非也痔病直理反後病也釋名痔食也蟲食之也里巷周禮五家為鄰五鄰為里謂二十五家也里居也居方一里之中也汝曹又作同自勞反曹輩也群也兩翅古文𦑧𦐊二形同施豉反說文翅翼也磔手古文㡯同知格反廣匹磔張也磔開也通俗文張申曰磔又亦披磔也律文作搩渠列反字林強暴也又作𨃥未詳何出填滿古文填同徒堅反廣匹填塞也淹漬在賜反通俗文水浸曰漬說文漬漚也隄防古文䧑同都奚反爾匹隄謂之梁李巡曰隄防障也漢書無隄之輿韋昭曰積土為封限也所認而振反失物者而識之口認律文作訒仞二形非體也革屣古文𩎉𩌦𨁾三形同所倚所解二反聲類屣鞮屬也拼地補耕反今謂彈繩墨為拼也江南名抨音普庚反補時補胡反淮南子云曰行至于悲谷也今日加申時是也唾壺戶孤反說文圓器也觸嬈奴了反三蒼嬈弄也說文嬈擾戲弄也第四卷羝羊丁奚反三蒼𦍞特羊也廣匹雄羊也典領又作同丁薾反廣匹典主也欶太又作嗽同所角反吮也通俗文含吸曰嗽律文作𡂡俗字也老邁或作邁同莫芥反廣匹邁歸往也說文遠行也老耄古文𠅸耄二形今作耗同莫報反禮記八十曰耄鄭玄曰耄惛忘也左傳老將智耄又及之杜預曰耄亂也適生說文之赤反之也謂始也近也迸石古文跰或作𧻓同斑孟反迸謂散走也自襞并尺反廣匹襞詘也說文韏衣也詘音屈韏音差阮反四疊徒頰反三蒼疊重也又作褻字林重衣也二形通用律文作惵簡牒也牒非字義疼痛又作痋𦙭二形同徒冬反聲類作癑說文痋動痛也下里閒音騰第五卷溉灌哥賚反說文溉灌也灌注也摘花都革反蒼頡篇以指摘取也律文作擲字林他狄反擲除也又呈亦反投擲也並非此義倡伎齒楊反說文倡樂也蒼頡篇倡俳也俳說皮皆反說文俳戲也案俳者樂人所為戲笑以自怡恱也律文作啡匹愷反唾也啡非此義聚落古文𨞮二形同才句反邑落名也小鄉曰聚廣匹落居也謂人所聚居也漢書元燔聚落是也跳躑他吊直雕二反下遲亦反韻集跳越也今言跳躑是也第六卷三衣僧伽梨此音訛也應云僧伽致或云僧伽𦙁譯云合成云重謂割之合成又重作也此一衣必割截成餘二衣或割不割若法密部說諸有部等多則不割若聖辨部大衆部等則割若不割者直安怗角及以鈎紐而已也鬱多羅僧或云郁多囉僧伽或云優多羅僧或作漚多羅僧亦梵言訛轉耳此譯云上著衣也著謂與身相合言於常所服中最在其上故以名也或云覆左肩衣也安多會或作安多衛或作安多婆娑或作安陀羅跋此譯云中宿衣謂近身住也或云裹衣也更又作𧴵同莫𠋫反三蒼𧴵換易也爾匹𧴵賈市買也郭𤩶曰交易物為𧴵詩云抱布𧴵絲是也中曬又作方言曬暴也乾物也郭𤩶音霜智反北土行此音又所隘反江南行此音五穀案禮記月令天子春食麥鄭玄曰麥實有孚甲屬木夏食菽菽豆也菽實孚甲堅全屬水季夏食稷稷五穀之長屬土土中央秋食麻麻實有文理屬金冬食黍黍秀舒散屬火皆順時而食之以安其性也敞露齒掌反蒼頡篇敞高顯也說文平治高大可遠望也律文作閶音昌楚辝天門也亦西風名也閶非此義儲積直於反三蒼儲備也畜物以為備曰儲說文儲偫也稸也待也偫音直里反線栟補莖反栟彈也律文作絣字與𨖾同百莖反字林無文綺也徒跣達胡反下千典四典二反以腳踐土也三蒼作踱又作跅同大各反爪扴又作擖同工八反說文擖刮也第七卷嚴駕古文挌同加睱反字林馬在軛中日駕廣匹駕行也駕乘也擲解他狄反謂除也挑擲也擲剔也應怗他頰反通俗文題賦曰怗說文怗帛書署也律文作楪徒頰反方言禪衣也楪非此用暴薾蒲穀反說文暴晞乾也薾古文作絸同公殄反蝅縈絲也以斤居銀反說文斤斫木也國語斤钁也釋名斤謹也板廣不可得削又有節則用此斤之所以詳謹令平滅斧跡也律文作釿魚斤反蒼頡蒼釿㓵也又音牛紖反說文釿劑也劑音子隨反翦刀也釿非此義細銼且臥反說文折傷也案銼猶斫也律文作挫非也塗埵都果反字林堅土也羺羊奴溝反埤蒼䍲𦏌胡羊也通俗文羊卷毛謂䍲𦏌䍲音女佳反𭣋鉢叉覲反𭣋亦親也隱𭣋裏中也作椙莫報反頭衣也作𧙕古文襪或作怽三形同無發反足衣也第八卷分牻亡江反說文白黑雜毛牛也今多作尨犬多毛也詩云無使尨也吠是也染劈方麥反說文劈撝也撝裂也廣匹劈分也第九卷懺悔此言訛略也書無懺字應言叉磨此云忍謂容恕我罪也半月又磨增長戒根逋沙他此云增長戒名鉢羅帝提舍耶寐此云我對說謂相向說罪也舊名布者訛略也譯為淨住者義翻也五綴張衛反說文綴合著也綴連也閾內許域反又音域爾匹柣謂之閾郭𤩶曰門限也柣音千結反戶扉字書一扉日戶兩扉曰門又在於堂室曰戶在於宅區域曰門律文作𨵈未見所出作繀蘇對反方言繀車趙魏閒謂之歷鹿橛上渠月反廣匹橛杙也杙音以職反第十卷震烈離折反說文烈火猛也廣匹烈盛也中之移反說文圜器也一名𧣞應劭注漢書云受四外律文作枝條之枝非字義也觛音徒亶反𥮬中他朗反說文大筒也以木若凡為之短關於桶律文作檔當朗反廣匹茱萸也檔非此用戶向許亮反三蒼向北出牖也亦窗也什物時立反什謂會數之名也亦聚也雜也資生之物也今人言家産器物猶云什物物即器也江南名什物此土名五行史記舜作什器於壽丘漢書貧民賜田宅什物是也打擈匹木反通俗文連杖曰撲第十一卷萎𩚅說文囚志反糧也廣匹萎𩚅也蒼頡訓詁𩚅飽也謂以食人曰𩚅萎音於僞反律文作飼俗字也摩抆古文捪同亡粉反抆拭也律文或作捫捫摸也䞈金古文𧵥同俱僞反廣匹䞈賭也說文䞈貨也毀呰子爾反說文呰呵也禮云呰者莫不知禮之所生鄭玄曰口毀曰呰禿瞎今作同呼轄反字書一目合也皮韋于非反字林柔皮也野干案子虛賦云騰遠射干司馬郭𤩶注並云射干似狐而小能緣木射音夜又作野甘膳上扇反說文具食也廣匹膳肉也儀禮膳進也鄭玄注周禮云膳之言善也今時美物亦曰珍膳俹臥於嫁反韻集曰倚俹也今言俹息却俹並是也謦咳空頂苦代二反通俗文利喉曰謦字從言律文作磬咳音苦徑反樂器名也下胡來反嬰咳也並非字體第十二卷掘地渠勿反說文掘搰也謂以物發地也搰音胡沒反钁古文同竹角反說文斫斫也掐傷枯狹反或作㓣同枯洽反通俗文爪按曰掐韻集㓣入也江南有㓣寶器當作此竿蔗音干下又作柘同諸夜反今蜀人謂之竿蔗甘蔗通語耳自炒古文鬻焣𤌉四形今作崔實四民月令作炒古文奇字作同初狡反方言熬焣前𤌈火乾也說文熬也黑縹匹眇反𥼶名云淺青色也有天縹骨縹各以其色言之也毳紵或作苧同直吕反說文檾屬細者為絟布白而細曰紵亦草名也絟音七泉細細葛布也檾者苦逈反何與余據反會及暨皆與也覆苫舒鹽反爾匹白蓋謂之苫李巡曰編菅以覆屋曰苫一音舒焰反苫亦覆也憒𡗚公對反下𡰱孝反說文憒亂也韻集𡗚猥也猥衆也律文作閙俗字也百臘力盍反案風俗通曰漢曰臘臘獵也獵取禽獸祭先祖也此嵗終祭神之名也經中言臘佛者即此義也或曰臘者接也新故交接也諸經律中亦名嵗如新嵗經等也爾匹注云一終名嵗又取嵗星行一次也夏曰嵗商曰祀周曰年唐虞曰載皆據一終為名今比丘或言臘或云夏或言雨同其事也案天笁多雨名雨安居從五月十五日至八月十五日也此方言夏安居從四月十五日至七月十五日各就其事制名也第十三卷相遺余季反廣匹遺與也謂以玩好物與人曰贈遺也尉治或作尉同於謂反說文從上安下也亦所以尉申繒也田殖時力反蒼頡篇殖種也廣匹殖積也撩理力條反通俗文理亂謂之撩理謂橑捋整理也今多作料量之料字也捋音力活反第十四卷斟酌古文斟同之任反說文酙勺也國語王斟酌焉賈逵曰斟猶取也酌行也廣匹斟酌益也律文作酙未見跟劈古文䤨𤖼二形字林匹狄反破也關中行此音說文音隱披厄反江南通行二音𧷮賈公戶反周禮九職六曰𧷮賈鄭玄云行曰𧷮𠁅曰賈白𧆞通曰賈者固也言固物以待民來求其利也今皆作商貪餮又作飻同他結反說文貪也舊律本多作叨飻他勞反案左傳縉雲氏有不才子貪於飲食𭥗于貨賄𣫍積不知紀極人民謂之叨飻杜預曰貪財曰叨貪食曰飻哯出古文咞同下殄反說文不歐而吐也今謂小兒吐乳為哯鉢𥁄補沫反鉢多羅又云波多羅此云薄謂治厚物令薄而作此器也鉢亦近字下羽俱反說文飯器也律文作釪古文鏵字音胡𠂢反犂鏵也鏵非此用孔古文二形同呼亞反說文𦉑裂也坼也第十五卷賦與方句反廣匹賦布也平均也爾匹賦斑也斑遍布與也律文作傅師傅也又作付付囑也並非此義餅黏女廉反說文黏相著也三蒼黏合也甘饌說文饌或作饌同仕眷反具食也饌飲食也脫過吐活吐外二反廣匹脫可也爾也謂不定之辝也須銚古文鐎同余招反廣匹鋗謂之銚說文溫器也似鬲上有鐶山東行此音又徒吊反江南行此音銚形似鎗而無腳上加踞龍為襻也鋗哷玄反鬲音歷毛氀字林力于反也通俗文毛布曰氀又所俱反㲒氀也音瞿辮髮三蒼亦編字同平典反說文辮交織也蕤汁汝誰反爾匹棫白桵郭𤩶曰小木叢生有㓨實紫赤可食本草作蕤今桵核是也字從生豕聲棫音域嬉戲虛之反說文僖樂也蒼頡篇嬉戲笑也澆灒子旦反說文汙灑也江南言潛山東言音子見反通俗文傍沾曰湔也若𥱼又作棑同父佳反廣匹云𥱼𣻜筏也今編竹木以水運為𥱼𥘿人名筏江南名𥱼𣻜音敷掉臂徒吊反廣匹掉動也說文掉搖也皰沸淮南子作靤同彭孝反說文面生熱氣也通俗文體蛘沸曰㿎沮音扶分才與反江南呼沸子山東名㿎沮律文作疱䶌二形未見所出掃音翼麥穅也唯晉陽秋有人姓姚名作此字諸書所無倣徉字林音房下余章反廣匹倣徉從倚也案倣徉猶俳佪也櫨棟祿都反說文欂櫨柱上枅也三蒼柱上方木曰枅一名㧺山東江南皆曰枅自陕以西曰㧺𥼶名云櫨在屋端都盧負屋之重也下都弄反說文棟屋極也周易上棟下宇是也今山東呼棟為檼音一靳反𥼶名云棟中也居屋之中也欂音蒲麥反不禁急林居鴆二反案禁猶制也第十八卷口噤古文吟同渠飲反閇口為噤挃者猪栗反廣匹挃㓨也謂以指觸人也手摶補各反摶猶拊拍也廣匹摶擊也𥼶名云四指廣博以擊之也罰謫扶發反說文罪之小者曰罰廣匹罰折伏也字從刀從詈謫說文都革反罰也字林過責也方言謫罪過也通俗文罰罪者曰謫律文作㒀非也第十九卷褚繩古文䘢同竹與反謂以綿裝衣也支肩今作榰同音枝支猶薦也貧匱渠愧反禮記即財不匱鄭玄曰匱乏也詩云孝子不匱傳曰匱竭也刳刮口孤反謂空其中也方言刳也音他歷也鏢鑽匹燒反說文刀削未銅也𥼶名云矛下頭曰鐏音在困反江南名也關中謂之鑽音子亂反律文作𨮬𨰭非體也玦㺲居穴反左傳金寒玦離杜預曰玦如環而玦不相連也㺲或作鈕女九反廣匹印㺲謂之鼻今像此也作匕卑以反通俗文匕或謂之匙說文所以取飯也衣𮢏音滑撗礙也未詳字出案通俗文堅硬不消曰礣砏音莫八胡八反今山東謂骨綰紐者為礣砏子蓋取此為綰音烏板反藥篦必奚反今眉篦𢰔頭篦皆作此奄地又作弇掩掩三形同淹儼反廣匹弇覆也細𮂨之涉反廣匹褶襞也今言褶疊是也通俗文便縫曰褶今裙褶亦冝作此褶音輒腳腨又作同時兖反字林腨腓腸也脅肋力得反說文脅骨也字從肉律文作勒說文馬頭絡銜者勒非今用第二十卷尻不苦高反說文尻脽也三蒼尻髖也脽音誰脽肘區放反橫舉肘也未詳字出此應俗語禮云並坐不撗肱是也律文或作尩二形並未詳戾身力計反字林戾曲也字從犬出戶而身曲戾也趍行又作趨同且反𥼶名云疾行曰趍疾趍曰走禮記惟薄之外不趍鄭玄曰行而張足曰趍堂上不趍為其近也爾足堂下謂之趍是也挑取他堯反聲類挑抉也謂以手抉取物也抉音於穴反蘃葉如捶反廣匹藥華也謂華䰅頭點是也第二十一卷椑桃音卑似柿南土有青黃兩種荊州謂之烏椑吸飯古文歙吸二形今作吸同許及反廣匹吸飲也𦧇飯又作同食爾反謂以舌取食也木屐又作跂同渠逆反下律文有革屐欽婆羅屐等說文屐屩也𥼶名帛屐以帛為之然則屐屩古時同類也漢書袁盎屐行七十里是也三蒼木屩也孔叢曰孔穿曳長裙振方屐見平原君此似木屐也異苑云介子推抱樹燒死晉文公伐以制屐也屩音居虐反持鉾古文𢦵鉾二形今作矛同莫侯反說文酋矛長二丈建於兵車也酋自由反第二十五卷若揃古文劗鬋翦三形同姊踐反字林揃搣也亦斷也挽出古文挽同無遠反說文引車也縷爾匹傳撗目孫炎云三輔曰結縷今關西饒之俗名句屢草也律文作茄案茄說文加歌二音爾匹荷芙渠其莖茄此則於義無施字未詳所出一本作茄蘆音力胡反爾匹葭蘆郭𤩶曰即葦也蘆當誤耳汪水烏黃反汪池也通俗文亭水曰汪也第二十六卷祝樝說文作酬之授反詛也古文今作詛同側據反𥼶名云柷屬也以善𢙣之辝相屬著也詛阻也謂使人行事阻限於言也泛長古文汜同麩劒反說文泛浮也廣匹泛普也律文作泛古文渢同扶弓反亦浮也摸法或作摹同莫奴反聲類摸法也謂掩取象也第二十七卷舂磨字林作䃺同亡佐反郭𤩶注方言云磑即磨也世本輸斑作磑北土名也江南呼磨紡績古文績同子狄反字林績𦂝也𧈪笑古文𦏿同尺移反廣匹𧈪輕也謂相輕笑也乳哺蒲路反哺含食也嚼食也律文作餔補故反申時食也第二十八卷厭禱於舟反字苑云眠內不祥也山東音於葉反字從廠音呼旱反禱都導反禱請也請於鬼神也廣匹禱謝也說文告事求福為禱也不案於旦反案亦瞻視也察行也或曰案尋也第二十九卷䘢髁口化反三蒼尻骨也字林䯊也𦝫骨也口亞反今以䯊為髁律文作胯口故反股也又作跨字林跨踞也二形並非此義隈𠁅於回反說文一由反水曲隩也隈隱蔽之𠁅也又作庡烏輩反字林庡翳也通俗文奧內曰庡今言庡地庡𠁅並是也作屧古文屟今作䕈同思頰反說文履之薦也本音他頰反今江南女婦猶著屟子製如芒屟而卑下也第三十一卷䫃䀎亡見反說文邪視也方言自關而西𥘿晉之閒曰䀎四徼古吊反四門巷也即曆中四激白是其事也角刀古文斠同古卓反廣匹角量也說文斠平外斛也毹又作㲒氀二形字苑作氍㲣同強朱雙朱反聲類云毛席也釋名作裘溲通俗文織毛蓐曰毹細者謂之毾㲪凸髖徒結反抱𤩶子曰凸起也下又作臗同苦丸苦昆二反說文髀上也廣匹臗豚也埤蒼臗尻也律文作非也芬馥扶福反字林馥香氣也書讖楚蔭反三蒼讖祕密書也出河洛說文讖驗也謂占後有效驗也第三十二卷泠而歷經反泠然清涼㒵也泠然亦解悟之意荷抌古文同胡我反又音何何負也說文何儋也鼾睡下旦反說文臥息聲也字苑呼干反江南行此音律文作𭆺嚊𮋖三形非也齘齒下介反說文齒相切也三蒼鳴齒也律文作嗐未詳字出寱語音藝說文寱眠言也聲類不覺妄言也舊律本多作㦣讆二形三蒼于劌反𧧢言也又音牛例反廣匹㦣寱也𧨆音光反撿髮居儼反廣匹撿甲也括也括束也繫也訕若所姦反依字訕謗也第三十三卷潦水音老謂聚雨水為汙潦水也漱口所霤反說文漱蕩口也禮記雞初鳴咸盥漱是也十擻又作藪同蘇走反郭𤩶注方言曰斗擻舉也難字曰斗擻也江南言斗擻北人言音都穀反下蘇穀反律文作抖捒二形抖與拯字同下捒音縛捒也又作抖之𢈔反抖也捒山厄反捒木名也並非字義茹菜攘舉攘慮二反廣匹茹食也撓令火刀反字林撓擾也漢書留犂撓酒是也扂戶通俗文作𠂼門𠂼也蒼頡篇作橝音簟持也𨷲牡亡後反說文關下牡也案為牡牡所以封固關令不可開也第三十四卷輕躁又作躁同子到反躁擾也亦動也釋名躁燥也如物燥則飛揚也迫難古文𤽐同補格反廣匹迫陜也急㒵也案迫猶逼也遲其或作迡籕文作遲同除致反案迡待也漢書遲待天眀是也又除梨反遲晚也第三十五卷犍黃又作二形同居言反字書犍𡧱也通俗文以刀去陰曰犍租賦古文同方務反說文賦𣫍也廣匹賦稅也爾匹賦量也郭𤩶曰賦稅所以平量也方言賦動也賦稅所以擾動也痶瘓𠡠顯𠡠管反言髮病也瘊病相承呼溝反未詳何證律文多作㿈於恭反說文㿈腫也睞眼力代反說文目瞳子不正也蒼頡篇內視也瞷眼古文同胡間反說文戴眼也蒼頡篇目病也爾匹馬一眼白曰疥㿋又作𤹊同桑到反廣匹㿋瘡也通俗文皮起曰㿋淡陰徒甘反謂胸上液也醫方多作淡飲逼切千結反廣匹切近也亦切急也切迫也揵椎梵言臂吒揵稚臂吒此云打揵稚所打之木或檀或桐此無正翻彼無鍾磬故也舊經多作揵遲此亦梵言訛轉也冝作稚稚音直致反但稚椎字形相濫故誤也第三十七卷若榺始孕反說文持機經者也三蒼經所居機榺也毾㲪他盍反廣匹蒼頡云毾㲪毛有文章也釋名云施之大牀前小搨上所以登上牀因以為名焉第三十八卷皮革古文𠦶愅諽三形同古核反說文獸去毛曰革革更也獸皮治去毛變更之故以為皮革字也革者更也字從三十從口口為國邑也國三十年而法更別取別異之意也口音韋不串說文作遘又作摜誥幻文作慣同公患反串習也第三十九卷須剗古文鏟同初簡反說文鏟平䥫也今方刃施柄者也漫跟莫干反此假借也字體作鞔跟或作𣥦古恩反說文跟足踵也斑豆江南有此豆也角長熟乃斑也戶樞齒榆反爾匹摳謂之椳郭𤩶曰門扉摳也廣匹摳本也椳音五回反皮連古文聮同力錢反廣匹連續也亦連合也律文作縺力煎反字林縷不解也菴鞮疑為靸鞮字苑素合都奚反今江南謂靴無頸者為靸廣匹鞮履也鞮革履也第四十卷患喋又作䶍同丁計反蒼頡篇噴鼻也詩云願言即喋菚云汝思我心如是我即喋今俗喋云人道我此亦古遺語耳賔坘直飢反或作邠坘邠音府旻反案梵本云阿那他賔荼揭利呵跛底此云給孤獨長者門閫又作梱同苦本反說文梱門橛也三蒼梱門限也䬫糊音提胡通俗文酪蘇謂之䬫糊律文作醍音體字書醍酒也醐尋撿所無此應近作耳紺色古憾反說文帛染青而揚赤色也𥼶名云紺含也謂青而含赤色也逼厈𩿍亦反三蒼厈推也漢書乘輿厈車馬音義曰厈不用也案厈猶疏遠也亦指也寺庿風俗通曰寺司也廷之有法度者也諸侯所止皆曰寺廣匹寺治也三蒼寺官舍也字體從寸從土聲𥼶名云寺嗣也治事者相嗣續於其中也韓詩鬼神所居曰廟白𧆞通曰廟者㒵也先祖之尊㒵也今取其義出古文之字著褶時入反謂大袖衣也禮記君為褶衣鄭玄曰褶夾也𥼶名褶襲也言覆上之名也夾音工洽反行縢徒登反禮記注云幅行縢也江南廝伇者有此物亦謂之行緾釋名云言以裹腳可跳騰輕便也牛說文音茅西南夷長髦牛也今隴西出此牛也髦音毛第四十一卷車輿諸庶二反說文車輿也亦捴稱車曰輿一日車無輪曰輿律文作舉對舉也落發甫越反發猶放也去也說文射發也詩云發彼有的是也中的知仲反下的又作㢩說文作的眀也同都歷反射質也謂的然眀見也今射𡊤中珠子是也射鞚口弄反難字曰鞚馬鞚也貯器張呂反說文貯積也所以盛貯者也貯蓄也謂蓄藏之也結㲨字林而容反毛𦋺也律文作緝字書亦字音而用反鞍毳飾也作虛偃反蒼頡篇云布帛張車上為第四十二卷𢇲米字體作穈亡皮反呂氏春秋曰飯之美者有陽山之穄高誘曰關西謂之𢇲州謂之穄律文有作𥝰字音述堅韌今作韌同而振反通俗文柔堅曰韌若癬又作㿅同先善反說文乾瘡也今有乾濕兩種也苦又作瘑同古和反韻集曰瘡病也春發者謂之燕秋發者為𪽫𠧸鹽力古反天生曰𠧸人生曰鹽古者宿沙初煮鹽涎沫又作涎㵪𣼞唌四形同似延反慕欲口液也鼠攬胡𮡜反說文攬攏也攏牢也一曰圈也蚰蜒或作蝣𧊽二形同由延二音說文亦名入耳北燕曰音女六女𦙁反鈹刀匹皮反說文大針也醫家用以破㿈也胞胎補茅反說文胞兒生裹也於爾今作同而是反詩云百君子菚云爾汝也或作你奴履反你我也泔汁音甘說文泔潘也謂浙米汁也江北名泔江南名潘音翻蕩滌古文同徒朗徒的反通俗文澡器謂之蕩滌得尊字書作樽說文酒器也尊以奉之律文作鐏音在困反矛㦸下銅鐏也鐏非此義第四十三卷㓟皮音皮廣匹㓟剝也循勺囚倫反循行也謂流下也揵茨毗𡰱母經譯言中䥫鉢也或作建鎡亦是梵言輕重耳律文作𨩲㘹非也臽孔音陷說文小阱也廣匹臽坑也䔖芰又作茤同渠智反說文芰䔖也律文作非也又作奩小學篇作同力沾反韻集曰所以𣫍物也說文鏡也今江南亦有粉奩棊奩也激發經歷反流急曰激激感也輾治又作輾莊子車輪不跡地作跡同女展反說文輾轢也怨仇古文逑同渠牛反三蒼怨耦曰𬽦爾匹𬽦讎匹也服字林隱行也爾匹匿竄也郭𤩶曰謂逃竄也字體從彳妙之妙人第四十六卷噫自乙戒反說文飽出息也禮記不敢噦噫是也駏驉巨虛二音似騾而小牛父馬子也嫌隙古文𡭽同丘逆反隙舋也說文隙壁際孔也寶渚之反爾匹小洲曰渚李巡曰四方有水獨高可𠁅故曰渚𭦟今莫槃反高昌謂聞為𭦟此應是也律文有作聞勿雲反說文聞知聲也第四十八卷祇衼字苑巨兒之移反法服也或作竭支或言僧迦支又作僧迦鵄梵言訛轉也正言僧腳崎此云覆腋衣也或言瞿修羅此云圖也像其衣形立二名也此二衣西國亦著但非淨耳蠱道公戶反聲類弋者反說文蠱腹中蟲也謂行蟲毒字從蠱在血字意也第四十九卷令卷奇員反詩云有卷者阿傳曰卷曲也詭語俱毀反謂變詐也三蒼詭譎也廣匹詭欺也疏向山於反疏通也說文作𤱐𤱐窗也字從匹匹足也從曲象其形也門戶牑皆所以引通諸物故從匹匹取通行意也匹山反捉脛古文脛同下定反字林腳胻也釋名云脛莖也窳墯余乳反爾匹窳勞也郭𤩶曰勞苦者多墯窳也言懶人不能自起如瓜瓠在地不能自立故字從瓜又懶人恆在室中故從穴也警心古文憼警二形同居影反謂戒慎也警戒也廣匹警不安也律文作景大也光眀也景非此音達嚫叉覲反經中或作大櫬梵言訛也案尊婆須蜜論亦作檀櫬此云財施解言報施之法名曰達櫬導引福地亦名達櫬又西域記云達𭣋拏者右也或言䭾器𡰱以用右手受人所施為其生福故從之立名也經中言福田者是也律文從口作嚫近字也媟嬻古文絬媟𣊓泄四形今作𢌀同先結反謂鄙媟也方言媟狎也郭𤩶曰相親狎也媟𢢔也㑥也下古文䢱嬻二形今作黷同徒木反通俗文相狎習謂之媟嬻茜草古文蒨茜二形今作𦵻同千見反說文茅搜也血所生故搜字從鬼案茜可以染絳也不耐奴代反三蒼耐忍也字本從刀杜林改從寸禁滿溫器名也尋撿文字所無未詳何出此應外國語耳或鎑䥈訛也鎑音古盍反䥈音莫朗反須籤七廉反說文籤貫也𨦣也第五十卷縫𮈮於近反𮈮衣也通俗文合袟曰𮈮作著古文䇡同直慮反廣匹策謂之箸律文作𣛰鐯二形同知略反爾匹斫謂之𣛰𣛰钁也𣛰非字義策音古俠反蝙蝠方眠方目反方言蝙蝠服翼蟙爅靈鼠四者一物方別名也崔豹古今注云蝙蝠一名仙鼠一名飛鼠五百嵗色白朏重集物則頭垂故謂之倒掛蝙蝠食之神仙蟙音織䘃音墨律文作蝮非也櫺子力丁反說文窗楯閒子也今言窗櫺車櫺是也撗字林渠例反木釘也廣匹釘也江南或謂之律文作揭說文巨列反揭猪杙也作棬去㩲反鄭玄注禮云屈木為之謂之捲律文作𢮙非體也㝯客奇驕反字林㝯寄也廣匹㝯客也律文作僑說文僑高也廣匹僑才也僑非此義鵽鳥竹刮反爾匹鵽鳩冠雉郭𤩶曰大如鴿似雌雉鼠腳岐尾為鳥憨急群飛出北方沙漠俗名突雀生蒿菜之閒汲水金及反說文汲引水也廣匹汲取也𢲞橰音結高通俗文機汲謂之𢲞橰䦨格羹額反蒼頡篇格椸架也椸音移𢍶取九万反說文抒漏也𢍶舀也舀音弋少反第五十一卷作把補駕反謂刀把也正音補匹反說文把握也亦把持也單手為把刀鞘小爾匹作鞘諸書作削同思誚反說文削刀鞞也方言劒削關東謂之削關西謂之鞞音餅江南音嘯中國音笑鞔著莫干反蒼頡篇鞔覆也今謂覆蓋為鞔周禮棧車無革鞔是也律文作縵漫二形假借也撚髭乃殄反通俗文手捏曰撚兩指索之也聲類撚緊也律文作捏乃結反字林捏捺也令翹巨遙反廣匹翹舉也眼瞼居儼反字略云謂目外皮也耳璫都堂反釋名云穿耳施珠曰璫綜練子送反說文機縷持絲交者也綜習也第五十二卷椎鉆巨廉反通俗文煆具曰鉆律文作鉗以䥫有所束也亦頸鉗也㰆囊埤蒼作同蒲戒反東觀漢記因水為排音義曰煆家排也鏇器似反說文鏇圓爐也難字作擐謂以繩轉軸裁木為器也𪱽閣蒲萌反三蒼棧閣也通俗文連閣曰𪱽挾鉢胡頰反說文挾持也爾匹挾藏也亦懷挾也相棖說文作樘柱也音隱紂𢈔反字統作棖文庚反棖觸也又嫽敞敞觸亦作敞音文衡反律文作棠徒當反三蒼杜梨也棠非字義作桄古文撗二形同音光聲類作輄車下撗木也今車牀及梯舉下撗木皆曰桄是也若祖舍反綴也細竹也通俗文綴衣曰指㧺古文𩎽同徒答反說文韋㧺也今之射𩎽是也赭土之也反三蒼赭赤土也白墠字林音善即白土也亦名堊案吳普本草云白堊一名白善是也撗郭胡觥反說文闌木也律文作宏胡萌反大也屋深向也宏非此義郭恢郭也在外廓落之稱也若撈借音力導反關中名磨山東名撈編𣗥為之以平塊也𪗪食又作齝毛詩傳作呞同𠡠之反爾匹牛曰齝郭𤩶云食已復出嚼之也集音式之反今陕以西皆言詩也雜糅古文𩚖粈二形同拏救反廣匹𩚖雜也說文粈雜飯也作錔他匝反說文以金銀有所覆冒也毛㲖字林先要反毛㒵也通俗文毛茂謂之𣬸㲖案字義冝作𢀋音所革反毛𢀋也亦蠅𢀋也犎牛漢書西域傳有封牛鄧展曰脊上有肉鞍如橐駝又獻一封駝鄭氏曰脊上有封也難字作犎犎牛也音妃封反今有此牛形小髆上有犎牛是也第五十三卷博掩博博戲也用六箸六棊謂之六博掩圍棊也纂文云擈掩跳錢戲也俗人謂之射意一曰射數亦云博戲掩取人財物也拍石彈棊也拍音普白反諛諂以朱反周書面從曰諛㽵子不擇是非而言謂之諛律文作諭古文諭今作喻同翼樹反告也譬諫也羖羊公戶反三蒼夏羊羖䍽也亦羯也牂𦍞作桑反字林牝羊也三蒼吳羊也彗星古文𥱵篲二形同囚芮反爾匹彗星為搶𥼶名云星光稍稍似彗也律文作簡之非也挽音叉銜反搶叉衡反月蝕神職反周易云月盈即蝕𥼶名云日月虧日蝕稍稍侵虧如蟲食草木葉也第五十五卷䐑中相承古侯反腳曲也未詳何出此應俗語耳陂池筆皮反池也山東名濼音正各反鄴有鸕礫今關中亦名濼幽州名淀音徒見反第五十六卷篅上市緣反說文判竹圓以盛穀者也律文作簞音丹笥也一曰小筐也又作蕇音典爾匹蕇亭歷也剸拱徒端反通俗文截斷曰剸律文作揣股閒古文骰同公戶反說文骰髀也𥼶名云股者固也為強固也第五十七卷企床古文同丘豉反𥼶名云企啓也啓開也言自延竦之時摳機皆開張也律文從山作仚火延反說文人上山㒵也亦古文危字但此二字人多致或所以具𥼶也疝病所姦反說文疝腹痛也第六十卷稊稗又作荑說文作第同徒犂反似稗布地穢草也今俗云稊子是也稗蒲懈反說文禾別也草之似穀者也秕筶卑以反穀不成者也律文有作粃補尸反方言吂粃不也𦮽古木反通俗文禾𥢶謂之𦮽䅵䅵音奴穀之若二反吂音莫光反遍扣祛後反扣擊也律文作叩說文亰兆藍田有叩鄉地名也此假借耳而㽄蘇奚反通俗文瓦病而璺璺而聲散曰㽄方言㽄聲散也律文作屖先啼反說文屖遲也屖非此用璺音問躓丁禮反下貞示反廣匹觸也躓踏也言觸踏人也傎蹶又作蹎𧽍二形同都田反廣匹傎倒也傎覆反倒也蹶或作躝同居月巨月二反說文蹶僵也僵仰臥也
