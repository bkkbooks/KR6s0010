front:
  text: 大唐眾經音義序納終南太一山𥼶氏自法王命駕導之者九乘𪪺傳聲教統之者三藏然則指月之喻無爽於恒規因言之義有契於常則所以實相窅冥開宗於文字㩲道綜御崇尚於方言且夫一音各解惟聖之筌蹄隨緣別悟在凡之准的西梵天語遂古莫虧東華人言㳂時遷𧵍至如說文在漢字止九千韻集出唐言增三萬代代繁廣符六文而生時時間發寄八體而陳迹求其本據諒在前摸覈其離廣誠歸物議夫以佛教東翻六百餘載舉其綱紐三千餘軸隨部出音聞之徃說殷鑒群錄未曰大觀然則必也正名孔君之貽誥隨俗言晤𥼶父之流慈非相無以引心非聲無以通解有大慈恩寺玄應法師愽聞強記鏡林菀之宏摽窮討本支通古今之㸦體故能讎挍源流勘時代刪雅古之野素削澆薄之浮雜悟通俗而顯教舉集略而騰美真可謂文字之鴻圖言音之龜鏡者也貞觀末曆𠡠召㕘傳宗經正緯咨為實錄因譯尋捃拾藏經為之音義注𥼶訓解援引群籍證據卓明煥然可領結成三自前代所出經論諸音依字直反曾無迫顧致失教義寔迷匡俗今所作者全異恒倫隨字刪定隨音徵引并顯唐梵方言翻度雅鄭推十代之紕紊定一期之風法文非詞費務在綱正恐好異者輙復略之斯則得於要約失於義本救弊開信終掩玄化故重陳委想無昧焉序之云尒
