body:
  text: 翻經沙門玄應撰正法華經阿闍世王經悲華經等集眾德三昧經大悲分陁利經集一切福德經大方等念佛三昧經廣愽嚴淨不退轉經念佛三昧經佛說阿惟越致遮經楞伽經勝思惟梵天所問經入楞伽經思益梵天所問經遮𡰱乹子經持心梵天所問經菩行方便境界經度世經大般泥洹經漸俻經大哀經十住經虛空藏經如来興顯經阿差末經羅摩伽經无盡意經菩本業經寶女經諸菩求佛本業經菩淨行經道神足无極變化經無言童子經寶如来三昧經仛真阤羅𡰱經四童子經持世經方等般泥洹經𪪺道廣顯經哀泣經阿耨達龍王經慧上菩問大善權經普超三昧經文殊師利現寶藏經正法華經第一卷盧楴徒帝𠡠細反或作俱盧楴人名也此譯云賣姓焰明字詁古文燄今作爓三蒼作焰同餘贍反說文火行微燄然也經文作㷿許凡反埤蒼㷿味辛也字𮏑㷿𦳫也㷿非此義𦳫音力割反蒸民之外反尒定蒸眾也天生蒸民是也闊又作同苦迴反字林大也闊遠也暨今聲類云古文作泉同其器反字林暨及也亦至也霍然呼郭反案霍然忽急疾之㒵也經文作㸌非體也修子夘反或作纘尒疋纘継也謂継修前業也煜爚又作焴同餘祝反光明盛㒵也經文作昱鑠非體也斒斕又作霖斑二形同補閒反下又作𢿻同力閒反通俗文文章謂之斒斕經文作斑蘭非體也溥演疋古反此古文普字詩傳曰溥大也亦遍也較略古文攉同古學反較粗略也廣雅較明也明喆又作哲同知列反尒疋哲智也宋齊間語也若繕市戰反說文繕補也三蒼繕治也繕之言善也謿話竹交反下又作譮𦧵二形同胡反聲類訛言也堊飾烏各反尒疋牆謂之堊郭璞云白土飾牆也鐃鏡奴交反下音竟未詳所出案周礼金錞以和鼓金鐃以正鼓應是錞音常均反拊抃麩主反拊拍也下又作拚同皮變反說文拊手曰抃也第二卷㣿惕之若反下他狄反㣿惕者謂憂懼也亦痛也未聆力丁反蒼頡篇聆聽也耳所聽曰聆也軒窓虛言反楚辝注云軒樓上扳障風曰者也鑠如書斫反閃鑠也言忽霍蹔明也孚出又作䞯同芳務反孚疾也廣雅䞯行也慍恨於問反慍𭜨也說文慍怒也亦恚也帑藏湯朗反周成難字音蕩說文帑金幣所藏之府者也𭫲棟所龜反下都弄反尒疋桷謂之𭫲𭫲即椽也棟屋極也山東呼棟為𬃡音於靳反軒闥他曷反廣雅闥門也謂側門也虺蛇古文虫螝二形今作虺同呼鬼反毒蟲也韓非子曰蟲有虺者一身兩口爭食相齕遂相煞也齕音齧也蝮螫疋六反下呼各反蝮有牙㝡毒鼻上有針是也經文作蝠誤也竄經文或作𠚏此應逋字補胡逋逃也廣雅逋竄也鳴呼火胡反字林呼外息也呼召也喚也經文作㖟啾唧子由反下資栗反蒼頡篇眾𡗚聲也經文作㗧乃結反怒也㗧非此義圂廁胡困反圂廁也亦豕所居也廁清也雜也窠窟又作薖萪二形同苦和反小疋云雞所乳謂窠菟之所息謂之窟經文作萂非也摣掣又作柤同側伽反摣又也經文作𪙉千何反齒參差也𪙉非此用齮齧丘奇反漢書韋昭音墾蒼頡篇云齊人謂齧咋為齮側齧也羯羠囚几反徐廣曰羯羠並犍羊也埌力宕反通俗文丘謂之壙埌鳩洹諸經或作鳩垣或作仇桓皆梵音訛也此譯云大身鬼拔扈蒲沫反下胡古反漢書音義曰扈拔扈也謂自縱恣也䥫喙又作顪同許穢反通俗文獸口曰喙喙亦通語也尸骸乎皆反骨之捴名也經文作𡱍非也燔燒又作同扶元反毛曰炮加火曰燔燔亦燒也恇孃丘方反下而羊反說文恇孃煩擾也謂煩恐惶遽經文從心作懹人向反懹憚也難也懹非此義烏殟烏沒反說文暴無知也聲類烏殟欲死也灰燼又作同似進反燒木餘曰燼經文作藎草之藎非體也又作誤也𬉹𬋘又作同力照反今江北謂𬉹手足為𬉹𬋘經文作燎非體也噉食又作啖㗖二形同達敢反噉食也經文作骰骸二形並非也奔騖亡付反騖疾馳也廣雅騖奔也蜈蚣音吴公字林蝍蛆也甚能制虵經文作非也蚔蛆渠支反下知列反說文蚔䖯也䖯蠆也毒虫也廣雅蛆毒虫也經文作螑非也䖯音圭盲聵牛快反生聾曰聵又無識曰聵經文作膭胡對反𦘺也膭非今用燒焫又作𤑔同而恱反蒼頡篇𤑔燒然也免𣸫又作濟同子第反濟渡也益也勱勵古文勱今作勉同靡辯反勱強也謂自勸強也下力制反相勸勵也勉力為勵擾馴如小如照二反擾安也說文牛柔謹曰擾故字從牛下似均反廣雅馴善也亦從也說文謂養鳥獸使服習謂之馴經文從手作擾下作偱非字體也縶紲又作𮩴同知立反下又作緤同息列反縶絆也拘執也紲馬韁也所以縶制畜畜牲者皆曰紲紲繫也謗訕所姧反蒼頡篇訕非也謗毀也蠱狐聲類弋者反書中多作野狐此古字通用也黤黮烏感他感反黤黮不明也經文作黕丁感丁甚二反垢濁也黕非今用痋燥又作𦙭疼二形同徒冬反聲類作癑說文痋動痛也下蘇倒反𤍜乾也經文作痋瘮非也癘瘡又作癩同力帶反字林𢙣疾也憂瘀於務反廣雅瘀病也瘀傷也經文作瘶非也喚哳陟黠反楚辝嘲哳鳥鳴也案字義冝作㕭烏交反江南以多聲為㕭咋咋音仕白反黧黮力奚反下𠡠感反通俗文班黑謂之黧黮好仵又作迕悟二形同吾故反觸仵也聲類迕逆不遇也第三卷靖聽又作𩇕竫靜妌四形同自井反謂安定無聲也葐蒀扶文反下紆文反葐蒀香氣也亦盛皃也經文作芬薀非也流宕達浪反說文宕過也通俗文迵過日宕是也㝯停奇驕反字林㝯寄也經文作僑高也才也僑非正體致印於振反印可也說文印王信也蒼頡篇印驗也嬉遊又作僖同虛之反說文嬉樂也戲笑也經文作繥非也祚胤在故反下與振反祚祿位也胤継嗣也經文作𥹁非也飢餒奴罪反三蒼餒餓也經文作𩚛未見所出訾計又作𢋀同子反說文訾量也思也經文作貲貨之貲非字意也冝用榆共反蒼頡篇用以也經文作角非也卬卬又作昂昂同五反昂昂恭敬之㒵也睹又作猪同陟驢反下除例反方言関之東西謂䐗為鷄鶩音木尒疋野曰鳬家曰鶩鶩即鴨也經文作稚非也出內奴對反字書內入也經文從人作納非也煩冤古文作冤惌二形今作𭓩同於元反說文冤屈也廣雅冤枉也經文作婉非字體也𭍠口又作嗇同使力反眾㒵也田夫謂之𭍠人亦積也剓身又作剺同力咨反三蒼剓劃也經文作𨤲身非字體林麓古文㯟同力穀反謂林属於山曰麓詩云瞻彼旱麓傳曰山足也樛木居虬反詩云南有樛木注云謂木枝下垂曲者也䅥䅥又作𥠹同居竭反詩傳䅥䅥長也說文禾舉出苗也豊羡辝箭反周礼注云羡饒也亦餘也經文作薿非也㕮咀方父反又音撫下側呂反謂以物拍碎也肧胎普才反說文婦孕一月為肧二月為胎胎始也養也探本他含反說文遠取也探摸也宣叶又作恊同胡𥇱反叶合也同也和也斐粲敷尾反詩傳曰斐文章㒵也粲明也鮮盛㒵也第四卷𧰟䀎又作艶同餘瞻反下莫見反艶美色也䀎邪𨁍也經文作醘盻二形誤也奕奕余石反奕奕光明之德也廣雅奕奕盛也字從大嗟嘆子邪反下𠡠且反嗟嘆謂大息也經文作非也開䦱又作𨷕同于彼反字林䦱開也闢也經文作閙誤也𮊵又作二形同蒲戒反通俗文疲極曰疲劣也諄諄之閠之純二反說文告曉之熟也諄諄誠懇之㒵也綺𡣶徂且反說文自好也聲類𡣶綺也通俗文服飾鮮盛謂之𡣶經文作纘非也第五卷解懌以石反尒疋怡懌樂也字林懌怡也不嫪力報反通俗文意若曰嫪說文嫪婟也謂戀不能去也裨體說文作埤或作同避移反埤增也厚也助也淳化時均反言專一不雜也三蒼淳濃也經文作享誤也求眺他吊反說文眺視也亦望也察也崖底丁礼反底猶下也經文作音直移反山名也又作𡵒子結反說文陬禺而高山之節也洮汏徒刀反下音太通俗文浙米謂之洮汏廣雅汏洗也浙音思歷反第六卷墟䧫丘魚反墟居也民之所居曰墟下古文𨞮二形今作聚同才句反廣雅聚居也謂人所聚居也潀流在公反詩云鳬鷖在潀傳曰水會𠁅也說文小水入大水也調馴似均反善也亦從也經文作裝偱非也敬達又作馗同奇龜反妙法華中大愛道是也第七卷音韶古文𪔓同視柖反舜樂名也韶之言紹也隿射今作弋同余力反弋繳射也獵也繳音之若反綢繆直周反下莫侯反詩傳曰綢繆猶緾綿也調譺吾戒反通俗文大調曰譺譺欺也蹉踖千何反下子亦反踧踖也踖字應誤冝作錯千各反蹉不正也錯誤失也勞廢府吠反廢退也罷止也經文作廄非也窺𨵦丘規反下弋珠反說文窺𨵦小視也稽古文同苦礼反下乘朗反稽至也頟也謂頟至地也詢法又作𧪂同思遵反左傳諮親為詢詢問親慼之議也貧窶瞿矩反詩傳曰窶者無礼也字書寠空也元元言元元者非一民也古者謂民曰善人因善為元故曰元經文作忨五喚反忨食也忨非今義悶幅普力蒲力二反幅億猶盈滿也薨殪呼𪪺反廣雅薨亡也諸侯曰薨下古文作同於計反謂一發而死曰殪殪亦死也第八卷𩚢餬徒奚反下戶孤反通俗文酪酥謂之𩚢餬經文作𮠺非也塞𪖵一弄反埤蒼鼻病也經文作非也𭪿鴉資髓反下於加反鴉鳥也經文從亞作鵶非也鵁鶄音交精似鳬而脚高毛冠人家養之以厭火灾也嚾呼又作嚻喚二形同呼換反喚𠮧呼也享餼虛掌反下虛氣反享獻也儀礼以牲曰餼餼猶稟給也字書餼餉也經文作饗非字體也第九卷號咷徒勞反號咷大泣也經文作啅陟角反啅非字義厭鬼於舟反蒼頡篇云伏合人心曰厭亦眠內不祥也雜糅古文粈䏔二形同女救反今以異色物相㕘曰糅也寶瑛於京反廣雅水精謂之石瑛瑛亦玉光也饕餮古文䬢叨二形同他勞反下又作飻同他結反貪財曰饕貪食曰飻第十卷謿讛相承魚世反此應作譺五戒反大調也生靤又作皰同蒲孝反說文皰面生氣也經文作䶌庖二形非也悲華經第一卷郅之一反下奴礼反頞緹烏割反下他礼反羅陁經又從口作咃非也拏都礼反下奴加反經文作𣭄非也阿俾甫尒反由褅徒計反離絁式移反羅齲丘禹反褘陁於冝反多茤渠義反嗐哆𠡠轄反阿挮他第反大悲分陁利經第一卷波义或言毗㽞义訛也具言鼻溜波阿叉舊譯云雜語一義也正言醜眼西方天王名也提惔徒甘反𭣣蒲戒反螕以補奚反阿昵女乙反湏抳女几反邏啜市恱反多眯莫礼反𦳄下毘典反一音便師薜蒲計反酣伽下甘反𡂡咩所角反下尒反阿慉虛六反桔略音結第四卷鈗婆丈心反童子名也依字蒼頡篇䤞𠚏属也第五卷嗒然土合反精靈失其所也㽵子哈然似喪其偶是也鬻賣又作儥賣二形同餘六反周礼儥賣也言物有定價則買者来跨馬苦罵反字林跨踞也亦躡也大方等大集菩念佛三昧經第一卷楣棖靡飢反下宅庚反尒疋楣謂之梁謂門上撗梁也棖謂之揳注云門兩旁木也樞𨶩齒榆反下胡蠟反尒疋戶樞也說文𨶩閇也魁偉苦迴反下于鬼反魁大也偉奇也應邵曰魁丘墟壯大之意也第二卷亭傳徒丁反陟戀反漢家因秦十里一亭亭㽞也傳驛也𤏖燼子廉反下似進反𤏖吴楚之閒謂火滅為𤏖燼火餘也經文作𤒯第四卷無謇居展反方言謇吃也楚語也言不通利謂之謇吃第五卷㽄破又作𤺊同先奚反聲類㽄聲散也第六卷門闑又作臬同魚列反尒疋橜謂之闑即門限也廝伇新移反廝下也字書廝伇也謂賤伇也第八卷法鞉又作鼗鞀二形同徒刀反鞉如鼓而小持其柄搖之者也鏝陁莫反池名也依字泥鏝也第九卷烗熱口戒反廣疋烗熾也今人言烗譡亦作烗譡音都浪反第十卷黏汙又作䊀同女沾反糊物相著曰粘也倉廩又作商同力甚反藏穀曰倉藏米曰廩印璽思紫反天子之玉印也璽信也亦神器也念佛三昧經第一卷剌夵盧曷反下陟家反聲聞弟子名也胄胤治又反下翼刃反胄後也胤継也子孫相承継也應邵曰胄緒也連續也字從八八引長之也云象世継相重也第二卷氤氳一隣反下紆文反元氣也謂天地未分之始氣也渟流狄經反埤蒼水止曰渟也沠別普懈反說文水之邪流別也廣雅水自汾出名沠也第三卷分衛此言訛也正言荼夜此云食團謂行乞食也京畿或作圻同渠衣反周礼方千里曰國畿畿限也慴伏徒頰反分疋慴懼也郭璞曰即𢙢懾也懾音之涉反楞伽阿跋多羅寶經第一卷楞伽山名也正言䮚迦䮚音力鄧反阿跋多羅寶此云入謂入此山中而住說此經也海濱父人反字林濱水崖也錯繢胡對反論語繪事後素鄭玄曰繪畫也五采也瞪矚直耕反通俗文直視曰瞪第四卷譚婆徒南反今借為徒紺反謂西國食狗宍人也入楞伽經第三卷樚櫨又作𨏔轤二形同力木力胡反即今用之汲水者也因榍又作𢰟同先結反江南言櫼子林反𢰟通語也第四卷打摑書或作馘同古麦反此亦假借耳第八卷又作同乎戒反說文菜也似𦊨𮊁古文二形同子邪反尒疋兔謂之𦊕注云𦊕遮也遮取兔也𮊁音古也機發說文射發也機主發之機也經文作䚨収繳具也屍陁林正言尸多婆那此名寒林其林幽邃而寒因以名也在王舍城側死人多送其中今捴指棄死之𠁅名屍陁林者取彼名也第九卷䕞𦿆力盎反下徒盎反埤蒼毒草也經文作蓎非體也珂乳枯何反螺属也潔白如雪經文作䯊軻二形非也大遮𡰱乹子經第三卷虫螟莫瓶反尒疋食苗心曰螟食葉曰言虫啖禾所在之名也音徒得反第四卷銛利息廉反廣疋銛利也刀𨦣為銛也纖長思廉反方言纖小也細謂之纖經文作韯非也𫁒曲烏華反廣雅窪下也說文窪小水也熠燿弋入辝立二反下餘灼餘照二反熠鮮明也字林熠光盛也燿照菩行方便境界神通變化經中卷茲基書中作羡似箭反此草如細荻北方多饒此草大般泥洹經第一卷哀慟徒貢反論語顏回孔子哭之慟馬融曰慟哀過也澡漱所霤反說文漱盪口也經文作嗽誤也寮孔力彫反蒼頡篇寮小空也經文作遼遠之遼非體也豪古文作𥝕同無方反謂其纖利如禾也經文作釯非也第二卷羅𡨥口𠋫反尚書𭁵賊姧宂范甯集解曰𡨥謂群行攻剽者也說文𭁵暴也廣疋𭁵鈔也𡬽音芳妙反祖送宗古反尒疋祖始也詩云仲山自出祖祖者將行犯軷之祭也軷音蒲達反長訣古穴反訣絕也通俗文與死者辝曰訣訣亦別也第三卷𤜴鼠余繡反似猴而大蒼黑色能捕鼠為物健墋濁初錦反通俗文云沙土入食中曰墋第四卷瞿師案中本起經云瞿師羅者此譯云美音攘臂而羊反攘除也謂除衣袂出臂也袂音世反𡩷默石經為古文燕同一見反說文𡩷安也謂安息㒵也經文作譆虛基反痛聲也譆非此用第五卷堅凷今作塊同苦對反說文堅土也三蒼土塊也来又作兕二形同音似又徐姉反尒疋似牛一角青色重千斤者烏奚反炮者烏高反第六卷猛烈力折反說文烈火猛也廣疋烈熱也爛也𦬣藥無徃反正言莽草有毒出幽州人或擣和食置水中魚皆死浮出取食之無妨大哀經第一卷開䦱字詁今作𨷕同于彼反廣疋䦱開闢也三蒼𨷕小開門也淟池他典反字林淟垢濁也第二卷憺怕徒濫反下普白反憺安也怕靜也經文作憛他紺反憛豫愁也又作潭徒南反潭深也二形並非字義第四卷祈際渠機反說文地圻咢也經文從水作沂魚衣反麤濇且孤反下古文歰今作濇同所及反歰者不滑也第五卷晧昊胡老反廣疋晧晧明也尒疋晧光也下胡老反天氣廣大也虫蟻又作螘同魚綺反蟻一名蚍蜉經文作䗁非也䗁音其蟻反第六卷汜流又作渢泛二形同孚劒反說文汜濫也謂普也吹笙所京反世本隋作笙說文笙也象物貫地而生也經文作𣢡非搵取烏悶反說文搵沒也亦入也謂以物入中日搵也詹堂之鹽反此香樹出廣州煎作之彼土人和水浴衣亦堪和香第七卷攄其𠡠於反攄舒也廣雅攄張也虛空藏經第四卷咼面口蛙反通俗文邪戾曰咼經文從口旁作喎非字體也櫨欂力胡反下蒲麦薄各二反說文欂櫨柱上枅也廣雅欂謂之枅枅柱上方木也一名㭼亦名音子結反亦名㭓亦名槉廣異名也㭓音皮變反槉音疾枅音鷄第五卷輨轄古緩反下又作牽鎋二形同胡反方言轄亦鎋轄也轄謂軸頭䥫也經文作管非字體也旒幢字書作統同吕周反旌旗之垂車者也經文作𦃓非也第八卷矖婆力計反叶婆胡頰反經文從田作誤也多咩亡婢反經文作㖒非也阿差末經第一卷浩晧字林工早反燒也亦水大也下胡老反日出光也第四卷麼麼莫可反三蒼麼微也亦細小也謂微細小䖝也經文有作耒耒非也竪籀文作竪同殖𢈔反小兒也謂悖小人也侏倀冝作譸張又作詶嚋侜三形同竹尢反譸張誑也謂相欺惑也經文作侏音朱侏儒也下倀𠡠良反倀狂也並非字體第五卷怛然他祖反說文怛安也廣疋坦平也經文作憻非也眷戀居院反眷反䫃視也經文作慻非也芬葩普花反說文芬芳也葩華也聲類取其盛皃也大猷餘周反方言東齊謂猷曰道又亦圖也若也順也第七卷誘𮗼餘首反下私律反誘𮗼教也引也相勸也經文作憂恤之恤非此義也村渃又作落同力各反廣雅落居也人所聚居也無盡意經第二卷䫌面普米反說文䫌傾頭也經文作俾非體也第四卷勸又作同都木反尒疋正也謂御正之也方言理也察也寶女經上卷餱糧胡溝反字林餱乾飯也經文從米作糇非體也下卷鞠閔居六反鞠養也愛也告也閔音眉殞反閔傷痛也侁侁所隣反說文侁侁徃来行㒵也亦行聲也嫺睒胡閒反說文嫺雅謂淹靜也今並為閑字菩淨行經上卷恂恂私遵反恂恂溫恭㒵也廣疋恂恂敬也尒疋恂恂戰慄也𡾟嶮又作隵二形同許奇反案嶮巇顛危也經文作嶬非也無言童子經上卷亹亹亡匪反亹亹猶微微也亦進㒵也下卷荏若又作集同而甚反柔木也廣疋荏荏弱也亦溫柔也下字冝作弱伅真陁羅所問經伅真徒損反字又作屯徒門反此譯云神人也王名如意生王也虞樂今作娛同疑區反娛亦樂也廣雅虞安也白虎通曰虞樂言天下之民皆有樂也無請且領反廣疋請求問也經文作倩非體也四竇徒闘反水道也竇決也空也經文作𤅋𠏡𠏡聲類俗仙字同私延反詩云屢舞𠏡𠏡傳曰𠏡𠏡醉舞㒵也經文作誤也衣裓孤得反即衣襟也經文作𮖀非也其此字習誤已久冝作分布二字謂以黃金分布閒錯其閒也自呼火胡反謂氣息出曰呼經文作㖟非字體也般遮旬或言五旬般遮此云五即五神通也唵錍烏荅反下普迷反和鞮都奚反蚑多巨儀反婆妿古何反姐眵子也反下充支反印駐治具徵具二反謂授記也蒼頡篇印信也駐止也說文駐馬立也持世經第三卷骨幹字體作䯎同古岸反廣疋䯎謂之肋謂脅骨也䯎體也亦骸骨也𪪺道廣顯三昧經第二卷蔚有於謂反文章也廣疋蔚數也文綵繁數也景風居影反八風中南方曰景風風動虫生也第四卷力贔古文奰𢘍𡘉三形今作㔗同皮反說文贔壯大也謂作力怒也詩云不醉而怒曰贔輕驫文音徒荅反又音風幽反廣疋驫驫走也阿耨達龍王經質疑之逸反廣疋質問也經文從言作䜠非也撓滅火高反說文撓擾也謂撓攪也經文作𦳁非也邵德時曜反說文邵高也日昳徒結反謂曰反也黶然於簟反謂無聲也普超三昧經上卷無圻魚斤巨機二反菩名也經文從水作沂音魚衣反歆慕許金反詩云無然歆羡傳曰歆羡貪羡也國語民歆而得之賈逵曰歆貪也喟而又作㕟同口恠口愧二反說文喟大息也歎聲也鏗然又作㧶頼二形同口耕反廣疋𩒷𩒷堅正也大魃蒲末反忽又作倐𨁀二形同書育反急疾之㒵也怵惕𠡠律反下又作悐同他狄反怵惕悚懼也不歆許金反字林神食氣也祭祀鬼神也皆享虛掌反享受也亦當也震懾聲類作㒤同止葉反廣雅懾懼也滅莫荒反遠㒵也經文有作𣉪呼晃反精覈又作覈今作核同胡𮧓反說文𦒱實事也亦審𩅢之也三篋苦恊反謂聲聞緣覺菩為三也未孚疋于反字林孚信也亦生也堂堂漢書項岱曰堂堂高大㒵也無棼扶雲反龍王名也依字棼屋棟也下卷四植直吏反柱也三蒼戶旁柱日㨁植亦懸薄柱也阿闍世王經上卷阿俞翼珠反鳩遬蘇穀反皆比丘名也唵嗒烏感反下他荅反仳仾疋視反三昧名也依字仳別也仳倠醜面也倠音許唯反下卷之垛徒果反謂土榻也文云吴人以積土為垛也犇走古文𩦥今作奔同補門反疾走也𥼶名奔變也有急變奔赴也金鈚又作錍鎞二形同普啼反义名也等集眾德三昧經上卷慷慨正作愾二形同苦莾反下苦代反大息也一云壯士不得志也那羅延晉言鉤鎻力士也移都計反亦言維摩羅移晉言離垢大力士名也觀銓又作硂同七泉反銓謂銓量輕重也稱謂之銓車釭又作𨊧同古紅反說文釭謂車轂口䥫也𣧑悖又作凶同許恭反下古文誖愂二形同蒲沒補潰二反悖乱也亦逆也功績今作勣同子歷反聲類云勣亦功也及遆又作递遆二形同徒礼反謂更易交遆也典誥古到反尒疋誥告也亦謹也所以約謹戒眾也勞来說文作𠡠同力代反漢書勞来不怠也亦約𠡠也經文作賜賚之賚非字體也或作俫非也邀迭又作徼同古堯反又於遙反邀要也呼召也亦求也下徒結反更代也中卷播殖又作譒匊三形同補佐反播種也經文作番非也集一切福德經中卷蠆他達反下勒達反廣雅蠆蚔𧉉也經文作䖧非字體也蚔音巨冝反廣愽嚴淨不退轉輪經第二卷蹎蹶又作𧽍二形同丁賢反下居月反蹎蹶猶䪺仆也仆音蒲北反佛說阿惟越致遮經上卷㰍䟽力公反廣疋房㰍舍也說文房室曰䟽䟽亦窓也中卷吶其又作訥同奴骨反訥遅䤜也說文訥訒難也戰𩑌字體作顫又作𢥇同之見反下又作𤴨同有富反說文顫𩑌謂掉動不定也經文作痏音于䡄反瘡也痏非今用下卷𤑏煑古文𤌈二形又作同扶逼又方言𤌈火乾也說文以火乾肉曰𤌈經文作烳逋古反火行也烳非此義勝思惟梵天所問經第六卷多軼徒結反摩䶩竹皆反摩忂求俱反𣛲離𠡠於反垔婆於仁反婆系胡詣反潛婆所姧反思益梵天所問經第四卷麑𣅀迷反梯他計反緹他礼反堙婆於仁反麴鴩徒結反提詫𠡠嫁反持心梵天所問經第一卷𤳖黨補單反字林云𤳖部也謂𤳖類也又作般假借也第三卷桴筏又作艀同扶流反謂編木者也小泭曰桴大者曰筏也第四卷徯徑又作蹊同胡鷄反通俗文邪道曰徯步道曰徑經文有作谿徑末踟直知反揥𠡠詣反吚扶許伊反錍拔普迷反揭提渠謁反䁥偈女乙反度世經第三卷擾搣子公反下音滅捉頭曰㨑除毀曰搣經文作揔非也唾濺又作灒𠵖二形同子旦反說文水汙灑曰濺也第四卷驂駕忩叄反說文駕四馬也旁馬曰𩥵居右為𩥵乘者𬾨非常也經文作㕘非體也鴹案漢書食貨志此亦翔字音似羊反飛而不動曰翔翔徉也彷佯也經文從𮧓作䳬非也第五卷𡬺靳古昂反下居近反𡬺堅鞕也靳柔𦨔也募索謨故武句二反說文廣求為募句誄力水反第六卷騙象疋面反字略云躍上馬也經文作䮠誤也都較古文攉同古學反粗略也廣疋較明也亦比校也䩭絆又作羇同居猗反革絡馬頭曰羇羇撿也下音半馬絆也漸𬾨經第一卷慺慺力俱反字書慺慺謹敬之㒵也屋宇古文㝢籕文作𢉠同于甫反說文屋邊檐也𥼶名宇羽也如鳥羽翼自䨱蔽也左傳失其宇注云於國則四垂為宇宇亦屋溜也居也眇眇亡紹反眇眇遠也亦深大也經文作妙非體也篡逆义患反說文逆而奪取曰字從厶音私算聲算乘管反蒼頡篇自營為厶弒君之法理無外聲故字從厶第四卷惶又作同莫荒反遽也人晝夜作無日用月無月用火常思明故字從明或曰人思天曉故字從明也婉戀力反詩傳曰婉戀美好㒵也亦少㒵也第五卷勤懿乙利反美也十住經第一卷攏檻力東反下胡𪒠反廣疋攏牢也㩜圈也圈音渠遠反如来興顯經第二卷丘垤徒結反方言楚郢以南蟻土謂之垤郢以井反鳴呦於州反詩云鹿鳴是也經文作非也第三卷沆莫朗反下胡朗反通俗文水廣大謂之漭沆賄賂力故反賂遺也謂以物相請謁也鶱翥許言反下之庶反說文鶱翥飛舉也掏出徒勞反通俗文捾出曰掏捾音烏活反羅摩伽經上卷波毓由掬反經中多作育字或言刧貝高昌名㲲西阿於何反詩云傳曰曲陵曰阿阿謂山曲隈𠁅也菩本業經不僑奇驕反經中多作不驕樂天見𨚎丁礼反說文属國舍也蒼頡篇云𨚎舍也亦通語也諸菩求佛本業經盡儩又作澌同斯漬反方言儩盡也物空盡也𫗙遺古文餽同渠愧反說文饋餉也遺與也因坘直飢反帝𥼶名也或言因提梨同一義也梵言輕重耳道神足無極變化經第四卷𡻬嶽仕角反下語角反寶如来三昧經上卷銚鐄以招反冝作焜煌胡本反下胡光反方言焜盛也蒼頡篇煌光也言焜焜熾盛也煌煌光明也經文作銚溫器名也鐄非此義下卷枝棭以石反言相似也經文從玉作玻𤥿非也四童子經上卷惋歎烏喚反字略云惋歎驚異也噢咿於六反下於祇反埤蒼噢咿內悲也亦痛念之聲也垂䫂丁可反廣疋䫂醜㒵也經文從足作跢都賀反跢倒也跢非此用蚍蜉音毗浮尒疋蚍蜉大者螘螘有赤蟻飛蟻方等般泥洹經上卷拍臏又作髕同扶忍反說文膝骨曰髕三蒼膝盖也面側救反謂不襵也經文作借字也量跡又作蹟迹二形同子亦反足跡也經文作跤非也潺撗仕山仕環二反水流㒵也字書潺湲流㒵也輔弼扶禹反輔助也下又作㢸三形同皮筆反弼正也下卷卑冝作廝𭜧移反字書廝伇也謂賤伇者也廝微也下也經文作音斯福也非此義嵩𤠞思隆反下又作豼同婢尸反國名也阿𢰔义甲反佛名也經文從禾作𥠞應誤也羯鴨案諸經皆作鶡鴨胡割反下又作鵪同於甲反鶡似雉而大青色有毛角若闘死乃止也故武人戴鶡冠以象之也經文作羯音居謁反羊也此應誤也哀泣經上卷器械核誡反漢書制器械之品應劭曰內盛曰器外盛曰械一曰有盛曰械無盛曰器器亦用也如踞居御反踞蹲也有箕踞也經文作倨非體也勤仂六翼反字書仂勤也今皆為力字慧上菩問大善㩲經上卷振于古文𢈫拒二形同諸胤反小尒疋振救也說文振舉也亦發也贍反聲類或作𩟋同時熖反贍助也字書贍足也謂周足也過闋三蒼古文作𨶫同苦穴反說文事已曰闋𨶫亦止息也終也雨霽子詣反通俗文雨止曰霽今南陽人呼雨止為霽殫盡多安反尚書乃殫文祖注云殫盡也縲紲力追反下息列反縲繫也紲索也所以拘罪人也蔭庇又作同於禁反下方利反蔭草覆也庇自蔽也摧拉或作摺同力荅反廣疋摺折也說文拉敗也偕偕古骸反詩云與子偕老傳曰偕俱也偕偕亦強壯之㒵也迄今虛乞反尒疋迄至也四錠音定又音殿聲類云有足曰錠無足曰鐙下卷半粒音立通俗文穀曰粒豆曰皂皂音逼經文作廩非也文殊師利現寶藏經上卷騏驥渠基反下又作𩥉同居致反說文馬有青驪文似棊也驥千里馬也孫陽所相者也赤驥也曲枝𣅀移反樹枝柯也經文作掖誤也中卷𡕎䖝丁故反字林木中虫也穿食人器物者也𤲶固又作嬲諸經作嬈同奴了反𤲶擾戲弄也𤲶𢙉也摩登伽經作擾蟲謂厭蠱也經中有作䫃非體也蠱音古字林音故
