body:
  text: 翻經沙門玄應撰十誦律僧祇律五分律十誦律第一卷攫其九縛反說文攫扟也蒼頡篇攫摶也言狩瞋則攫也扟音居逆反㲨被而容反字林㲨𦋺也謂古具垂毛者也律文或作䩸而用反說文鞌毳飾也戶印地點反通俗文門鍵曰印蒼頡篇作橝橝持也鍵音巨展反方言關東謂之鍵關西謂之鑰髁肋口化反字林髁䯊也謂𦝫骨也䯊音口亞反下郎得反說文脅骨也字從肉從力作肋律文從𮧓作勒說文馬頭絡銜者也勒非字體也犢車徒穀反古名羊車𥼶名云羊祥也祥善也善飾之車今犢車是也柁樓大我反𥼶名云舩尾曰柁柁拖也在後見拖曳也拖音他字從手柁從木蛭䖝之逸反尒雅蛭蟻江東名蟣音巨機反謂入人皮中食血者也律文作𧓳非也狌狌又作猩同所亰反字林能言鳥也山海經曰人面豕身能言語今交阯封溪縣有之狀如貒豚聲如小兒啼也貒音土桓反二丑白反謂半步曰𧻧律文作踔丑白𠡠角二反𧿒踔行不前也𧿒丑甚反第二卷作弶渠向反字書施於道為弶也律文作非也鼾眠下旦反說文臥息聲也字菀呼于反江南行此音也律文作哻𭆺嚊三形非體也第三卷皰癬又作㿅同私淺反字林乾痬也癬有乾濕兩種𥼶名㿅徙也侵滛移徙𠁅曰癬也故青徐人謂癬為徙頭綃私遙反通俗文生絲繒曰綃謂頭鬚也掉衣徒吊反廣雅掉振搖動也律文作挑𠡠堯反挑扶也挑非字義鍪钁又作鐰同且消反方言趙魏閒謂𠚏為鍫𠚏音楚洽反第六卷一丳字菀初眼反今之𬉹肉丳也𣮧布莾反謂毛布也字林𦋺之方文者曰𣮧律文作𣯟非也第七卷襵縫之涉反謂襵疊也廣雅襵襞也緶縫曰襵也木牓補莽反謂以木貫身立以大褾上牓人善𢙣以視之也律文作搒補盲反弓輔也榜非此義一籽治呂反說文機持緯者即今筬也曾子母投杼下機是也筬音成蒲秘反說文乾飯也一曰熬大豆與米者也律文從麦作非體也殆而徒𭾢反近也禮記殆將病注云殆幾也第九卷釤鍬所鑒反字書釤大鎌也下千消反方言趙魏之閒謂𠚏為鍫勦疾說文作同仕交反健也謂勁速勦健也第十卷萹豆布疋綿二反其葉可治霍乱人家多種之也咽病又作胭同一千反謂咽喉病也第十一卷孔𦉑古文二形同呼亞反說文𦉑裂也坼也齘齒下界反說文齒相切也三蒼鳴齒也律文作吤非也䆿語魚祭反聲類眠內不覺妄言也𥯤棧仕諫反說文棧𪱽也廣雅棧閣也通俗文板閣曰棧是也櫂子徒角反俗音徒格反郭𤩶曰謂木无枝柯梢擢長而煞者也合霤力救反謂屋擔前水下之𠁅也今合霤為堂也木簀阻𮧓反簀棧也謂以木為棧非竹𥯤也第十二卷鵽肉竹刮反尒雅注云今鵽大如鴿似雌雉鼠脚也鶉肉市均反說文鸙鶉也鸙音含反第十三卷歠粥古文吷同昌恱反說文歠飲也歠欱也匙匕卑以反一名柶通俗文匕或謂之匙方言作㮛同是移反柶音四又作𬫌昌紙反非也第十四卷牙旗渠基反夏后尚牙謂刻為牙飾因以名焉𥼶名云熊𮓜為旗軍將所建象其猛如狩眾期其下也日昳徒結反曰仄也第十五卷經恤又作䘏同湏律反尒雅恤憂也亦収也謂人財物振恤之也水穾他沒反謂水湯流壞物者也箭栝古活反𥼶名云箭其末曰栝栝會也謂絃會也若茜又作𦵻蒨二形同千見反說文茅蒐也人血所生可以染絳字從草西聲律文作箋子前反表識書者菚非此義也第十六卷掃篲又作彗同囚𨦣蘇醉二反說文掃竹所以用掃者也擢臂徒卓反蒼頡篇擢抽也廣雅擢出也亦引也謂抽臂泅也捊水或作抱同蒲交反說文引取也通俗文作掊手把曰掊也字從手第十七卷髓餅思累反𥼶名云烝餅湯餅索餅髓餅等各隨形以名之也律文作䭉思累弋累二反字書䭉登也方言飴或謂之餚䭉非此義登音一月反豆飴也酒澱徒見反澱滓也律文作瞖非也陽病養良反周書云陽詐也通俗文作詳虛辝也漢書作陽不真也經文作佯似羊反佯弱也佯非此義第十八卷磨貝補盖反西域衣名也門闑又作臬同魚烈反尒雅撅謂之臬注云門閫也謂門限也第十九卷粰𮇶又作𥹷音浮㽞廣雅粰榴饊也今謂薄粥也官稟補錦反說文稟賜也廣雅稟也鐃鏡奴交反廣雅和鑾鐃鐸鈴也下鏡未詳疑誤應作錞市均反周禮金錞和皷也唼唼租盍反謂食作聲也第二十一卷贅頭諸芮反通俗文體目曰肬贅𥼶名云贅属也撗生一肉属著體也小曰肬大曰贅指又作𤷚同竹足反謂手足中寒作瘡者也九頺又作㾽同堂雷反陰病也𥼶名陰腫曰頺氣下頺也又曰疝亦言詵詵引小腹急痛也疝音山瞎𥌒正作𣎅同火鎋反字書一目合也下公戶反无目謂之𥌒𥌒皷也𡨋𡨋如皷皮也㞇烏對反下他對反謂廢風也律文從癈作㾯㾼非也瘭疽必遙反下千余反廣蒼㿈成為瘭疽瘡名也第二十三卷革又作𩉥古文作㻆同胡犬反車𩉥也謂大車縳槅者也廣雅謂之䩭槅音古厄反䩭居冝反律文作伭非也第二十六卷炱煤徒来反下云才反煙塵也通俗文積烟以為炱煤律文作𤐽烸非體也言魚列反說文牙米也謂漬穀麦等生㸦者也𦘺丁都亭反丁強也𥼶名丁壯也言物體皆壯徤也奉餉式尚反廣雅餉遺也餉饋也俟夏又作竢同事几反尒雅俟待也蝗䖝胡光胡孟二反螽也謂蝩䖝者也蝩音之容反𮏀芰又作茤同渠寄反尒雅𮏀蕨塵注云即水中𮏀也文作芡音渠撿反芡鷄頭也摒譡方侫反下丁浪反通俗文除物曰摒譡摒除也伊甯奴定反苦諦也多他盡也攘舍而羊反第二十七卷氀衣力俱反通俗文毛布曰氀廣雅氀𦋺槀草公道反說文槀稈也即乾草也衣雷反𥼶名死三日生者成𦚣曰摧也言傷摧也有錫有疑有繐也繐音嵗第二十八卷汗篦布奚反刮汙篦也律文作捭此借音耳戶排蒲皆反謂木𨷲開戶者也律文作䤵非也捩曬力結反下所懈反謂暴乾也第三十三卷麑魚音迷謂大身魚也其類有四種㸦相吞也第三十四卷櫺子盧丁反櫺子也通俗文䟽門曰櫺亦車櫺是也懸㿈醫方皆作膺謂喉中肉也大魁苦迴反說文羹斗也律文作𣛣鐦二形非餛飩胡昆反下徒昆反廣雅餛飩餅也第三十六卷門閫又作梱同苦本反禮記不入於閫注云閫門限也弭耳古文𢏱同尒反謂耳臥為弭也陂澤筆皮反大池也山東名濼音疋莫反幽州名淀淀音殿下直格反水聚曰澤𥼶名云兖州人謂澤為掌言水亭𠁅如掌中也澤潤也宰人祖殆反禮記宰夫為獻主注云宰夫主膳食之官聲類宰治也律文作牢非也第三十七卷振擺又作捭同捕買反說文反手擊為擺也步靫楚佳反𥼶名云步叉人所帶以箭靫其中也𭢛箭而注反亦言捻箭也今言𭢛莝𭢛物皆作此字也掊刮蒲交反通俗文手把曰掊律文作刨近字耳耳圈去員反謂耳璫之類也或以金銀玉等為之也指屈衢勿反說文無尾也屈短也淮南云屈奇之服許叔重曰屈短也奇長也今取其義𠁅拼補苓反拼彈也律文作絣無文綺也不勻弋均反說文調勻也指𩎽今作㭼同徒荅反說文指㧺以皮為之今射𩎽是也水竇徒遘反𦒱工記竇高三尺注云宮中水道也說文竇空也謂孔空也第三十八卷滌食徒的反通俗文澡器曰盪滌說文滌洒也牛呞又作𪗪齝二形同勑之式之二反尓疋牛曰齝謂食已復出也𤛆牛工包反西南夷長尾牛也律文作猫非體也紐又作𩉥古文作㻆同胡犬反謂車𩉥𩉥物皆作此廣疋謂之䩭嚏故又作䶍同丁計反蒼頡篇噴鼻也辮帶父反說文交辮也通俗文織繩曰辮辮織也施𭞽虛偃反謂布帛張車上曰𧓵他達反下勒達廣雅𧓵蚔𧓵蝎也豌豆一丸反廣雅豌豆瑠豆也字從豆瑠音㽞三碣渠列反說文特立石也謂三石攴釜者也門楣美飢反尓雅楣謂之梁注云門上撗梁也施𪱽蒲萌反通俗文連閣曰𪱽𪱽亦閣也閣謂重屋也第三十九卷屐支又作跂同巨逆反說文屐屩也屐有草屐帛屐等也屩居反木桶湯動反通俗文受漆者曰桶可以盛食等也幖幟昌志反私記為幟舊音皆知識同更无別音也作捲去員反屈木為之謂之捲經文作椦非也獺皮他遏他轄二反說文形如小犬水居食魚者也律文作狙非也狙多達反又作𧖆蛆噠等形並非也鱣魚古文䱳同知連反大黃魚也口在頷下體無鱗甲肉黃大者長二三丈江東呼為黃魚是也第四十卷漚令於𠋫反說文久漬也律文作膒非體也匈凹烏狹反字菀云凹䧟也蒼頡篇作容墊下也匈凸徒結反字菀云凸起者也築時古文𮆒同陟逐反說文築擣也尒雅築㓨也𠧸薄字體作樐同力古反下蒲古反樐大楯也蔡雍獨断日天子大駕出陳𠧸薄也喑噫於禁乙戒反喑噫大呼也說文飽息也律文作嗌非也𣓈襠音兩當𥼶名云其一當匈其一當背因以名之也第四十六卷作縈一瓊反通俗文績曰縈縈旋也作緍亡巾反說文釣魚繳也尒雅緍綸也郭𤩶曰江東謂之緍繳音之若反第四十七卷蛆毗子餘反土𨹃徒果反字林小堆也吴人謂積土為𨹃字體從𠂤香匳正字作同力占反說文鏡也謂方底者也江南有粉匳香匳棊匳等是也纔得在灾反纔僅也劣也不久也廣雅纔暫也議仲謂伯仲兄弟也伯長也仲中也櫨拱來都反說文欂櫨柱上枅也一名㭼亦名㭓亦名槉欂音薄麦反枅古奚反㭼徒荅反㭓皮變反袟音疾第四十八卷鐵砧又作椹二形同猪金反鈇砧也律文作鈂丈心反𠚏属也裓來孤得反謂衣襟也𢙣賤烏故反謂憎𢙣也下茨箭反廣雅賤卑也經文作汙濺非也濺音子旦反激列古歷反流急日激激發也感激也第四十九卷慲莫槃反說文慲忘也亦慲兜也律文作僈非也遏截烏曷反蒼頡篇遏遮也尒雅遏止也郭璞曰今以逆相止為遏也詭語居毀反謂不實也詭𢙣也詭欺也譎詭奇𪫦也第五十卷黔虵古文鳹同渠占渠今二反嵯梨徂娥反第五十二卷穄米子裔反說文穄穈也似黍而不粘者閞西謂之麇麇音亡皮反時𮊞又作沛同子礼反廣雅𮊞漉也謂𮊞出其汁也律文作擠子詣反排也擠非字義灑散所解反如水之灑地也律文作攦非也第五十三卷𥱼筏又作𥴖同蒲佳反方言𥴖謂之筏南方名𥱼北人名筏第五十四卷餘𩞀古文𩞀糂𩜱四形今作同桒感反說文以米和羹也一曰粒也律文作䊏非也第五十六卷潢池胡光反說文久積水池也大曰潢小曰洿濁水也第五十七卷牛脬普包反通俗文尿本曰脬說文旁胱也樵薪才焦反說文樵木也亦薪也字從木從焦聲也㼾𤭔力穀反下又作塼同脂緣反狹長者謂之㼾甎第五十八卷汙飾屋孤反汙塗也飾修治抆飾也杖鑽祖亂反謂杖端頭若骨鐵等也經文作繤組也豍豆布迷反廣雅豍豆䝀豆也刀匣今作押同胡甲反說文匣匱也今謂盛刀劒者也湏鑰息于反鏁湏也下余酌反說文開下壯也第六十卷挽紖古文緣二形同丈忍反說文牛索也𬽦者古文逑同渠牛反怨𫀽曰𬽦尓疋𬽦讎匹也到矴都定反謂柱下石也律文作碠非也捉瑱古文同他見反周禮弁師掌冤玉填玉笄注云瑱塞耳者也𥼶名云瑱鎮也懸當耳旁不欲使人妄聽自鎮重也或名充耳笄音鷄更適書亦反尒疋適往也謂適事夫家也適歸也僧祇律第一卷依怙胡古反尒疋怙恃也韓詩云無父何怙怙頼也無母何恃恃負也筞謀古文三形同初革反筞亦謀也下莫𬾃反謀論也諮事為謀謂諮事之難易也各舋渠九反詩云畏各箋云咎猶罪過也尒疋咎病也說文咎灾也亦𢙣也下義鎮反瑕舋𠍴過也亦罪也黎庶力奚反尒疋黎庶烝多師𣄆眾也即襞卑伇反字林韏衣也謂襞褺衣韏音羌阮反四褺徒俠反通俗文重衣曰褺也輕躁又作趮同子到反躁動也躁櫌也謂不安靜也潛微無非反尒雅幽匿蔽微也注云謂逃也又微止也字從寵䩭又作𦌭羇二形同居猗反說文𮧓絡馬頭曰羇釋名羇撿持也所以撿持制之也禍酷古文俈嚳焅三形同苦䔍反酷極也說文嚳急也告之甚也謂暴虐也愻悌蘇寸反字林愻順也謙也下大帝大礼二反愷悌樂也易也善事兄曰悌也第三卷芋根禹句反說文大葉實根驚人者也故謂之芋蜀多此物可食其大者謂之蹲𩿍竹筥又作𥰠同力紀吕二反字林筥𥳓也飯器受五外𥘿謂筥方言南楚謂之筲趙魏謂之𥰠郭𤩶曰盛飯筥也聲類筥箱也亦盛杯噐籠曰筥筲音所交反篙㰅古豪反謂㓨舩竹也長二丈以鐵為鏃下他狄反擿猶剔撥也㭬杙都角反下又作弋同餘軄反尒雅𢴠謂之杙注云即橛也樴音徒得反堅勁居盛反說文勁強也字從巠從力巠胡頂反水冥巠也薄膌又作瘠同才積反說文膌瘦也亦薄也律文作𮑭非體也用他得徒得二反字林求也說文從人求也第四卷倪樓吾奚五礼二反國名也磯激居依反埤蒼水中磧石也廣雅磯磧也下古狄反急流也抐壯幼反下女六反通俗文縮小曰㾭物不申曰樎枘律文作𭽭𥀝未見所出聸耳丁藍反說文耳垂也又作都含反說文耳大也咩咩又作嘪同尒反說文羊鳴也誇說又作𡘆同苦𤓰反諡法曰華言無實曰誇誇相誕也謂憍恣過制自夸大也鏇師囚反謂以繩䂓物者也說文圓鑪也欲杼時汝除吕二反說文杼挹也蒼頡篇杼取也出也廣雅杼渫也舀也舀音餘遶反第五卷萎黃於危反詩云無草不死無木不萎箋云草木猶有萎槀也聲類云萎木草菸也律文作痿痿痺謂不能行也深榛土巾反案說文藂木曰榛廣雅木藂生曰榛也草藂生曰薄是也輅上又作路同力故反𥼶名云路亦車也金玉等路各隨其所飾立名謂之路者言行於道路也水灒子旦反說文汙灑也江南言灒山東言湔𨏔轤又作摝攎二形同力木力胡反蒼頡篇三輔舉水具也汲水者也第六卷趌𧽸居列居逸二反下居月反繤文云趌𧽸竪也亦跳起也第七卷扣瓫說文作敂同苦後反論語以杖扣其脛孔安國曰扣擊也唃耳相承音古學反耳邊語也未詳何出鶬鵠又作𩀞同七唐反尓雅鶬糜鴰郭𤩶曰即鶬鴰也鵠胡沷反警宿居影反謂警戒也亦起也廣雅警警不安也律文作景非體也踟躕直知反下直誅反踟躕躑躅也亦住足也廣疋猶豫也躑音馳亦反躅馳足反睩瞬力穀反睩視㒵也下尸閏反目開合數搖也第九卷茜色又作蒨𦵻二形同且見反筎藘也律文作箋表之箋非也手㨑祖公反通俗文手捉頭曰㨑也窳墯榆乳反尒疋窳勞也郭璞曰勞苦者多惰窳也或作懈古賣反庵𢢔於含反廣雅庵舍也埤蒼庵𢈠也𢈠音且漬反啾啾子修反蒼頡篇眾聲也啾啾鳴聲也紃羊似均昌緣二反紃謂雜也縷也第十卷㩜匱胡𪒠反㩜攏也㩜圈也燈盛時征反在器日盛案盛謂今之杯盂也左傳酒一盛言器也僦賃子溜將六二反通俗文雇載曰僦下女鴆反晃煜又作晄古文熿同胡廣反說文晃明也廣雅晃暉也光也下由掬反說文熀曜也廣疋煜熾也埤蒼煜盛皃也苲作側挌反案笮猶𡑅也今謂苲出汁也亦狹也說文苲迫也得𥑐烏狹反謂自上加下也又作𡑅𡑅鎮也第十一卷齒木案梵本云彈多抳瑟彈多此云齒抳瑟此云木謂齒木也長者十二指短者六指也多用竭陁羅木作之今此多用楊枝為無此木也掃篲又作彗字林囚芮反謂掃竹也律文作槥于桂反廣雅㨹裂也舍勒此譯云衣或言內衣也營署時庶反營謂經營也署猶置也說文部署也亦官也第十三卷痏痏諸書作侑文作幃案通俗文于罪反痛聲曰痏驚聲曰㒄㒄音于簡反律文從口作喡喂二形非也音除救反第十四卷中折又作𣂔同思狄反聲類析劈也說文破木也亦分也字從木斤意也完出胡官反說文完全也生黴無悲反通俗文物傷濕曰撥開及謂發楊也撥亦除也棄也律文作柿疋沬反謂水物也非此義也朝菌奇殞反尓雅中馗菌郭𤩶曰地也似盖今江東呼為土菌音審呵叱齒逸反方言呵怒也陳謂之呵案叱猶呵也禮記尊客之前不叱㺃是也第十五卷𭡁築又作杈同𠡠佳反通俗文拳手桎曰也挾先胡頰反尓雅挾藏也注云今江東通言也謂懷意也律文作恊和之恊非也秸泥古八反秸即槀也律文作𦮽古木反禾穀𥢶也米潘敷煩反字林浙米汁也律文作䊩𭻫二形非也嘲話又作啁同竹包反蒼頡篇啁調也謂相戲調也漢書俱在左右談調而已是也第十六卷食棧仕板反說文棧𪱽也廣雅棧閣也謂置食器於其上也洮米徒刀反案洮猶汰也通俗文淅米謂之洮汰說文汰洗也汰音太浙音思歷反㭄去所隣反說文從上挹取也通俗文減上取曰㭄也石壜徒南反猶瓷坩也律文作埮非也坩口甘反若卷古文𩓫捲觠三形今作卷同渠員反卷曲也竹篙方言作𣝏音高謂㓨舩竹也淮南以篙測江許叔重曰謂㓨舩竹長二丈以䥫為鏃者也第十七卷山坡又作陂同普何反案陂陀猶靡迤也今山陂土陂陂皆是也迤弋是反𩬇舜字體作音書閏反廣雅𩬇謂之漢書韋昭音蠢鄭玄注禮記云乱髮也音舜鎗銚餘招反溫器也律文有作鐎子消反聲類溫器也有柄即刁斗也說文鐎鐎斗也字林云容一斗以銚無緣也欬瘶苦戴反說文逆氣也下作欶同蘇豆反蒼頡篇齊部謂欶曰欬刵劓讓記反廣雅刵截耳也下又作㓷同魚器反說文㓷决鼻也尚書無或㓷刵人孔安國曰㓷割鼻也刵截耳也麻籸所巾反通俗文物滓曰籸字從米奚用胡鷄反蒼頡篇奚何也疥瘙蘇到反蒼頡篇瘙疥也廣雅瘙瘡也蘆荻又作藡同徒歷反即薕荻也堪為薄者也葦未秀者為蘆薕公銜反木札側黠反木皮也律文有作敷廢反說文削朴也朴札也謂削木也二形通用又作㩌非也撥聚補達反撥理也亦發楊㒵也廣雅撥除也撥亦棄也律文作跋非體也若秸公八反尚書三百里納秸服孔安國秸槀也服槀伇也若穰如羊反說文黍䅀也禾穰也䅀音良計反第十八卷藍澱徒見反尒雅澱謂之垽郭𤩶曰澱滓也江東呼為垽音魚靳反倒孑居列反尒雅蜎蠉郭𤩶曰井中蛣蟨赤䖝也一名孑下通俗文蜎化為蚊是也蜎音狂兖反蠉香兖反蛣音結蟨居月反汪水烏黃反通俗文亭水曰汪尒疋汪池也栟毳補𥝷反下昌芮反栟彈繩墨也毳羊細毛也拳攉渠員反下苦角反說文攉敲擊也字從手從霍第十九卷并擩而注反謂擩莝擩箭擩物等皆作此字磓𡑅又作搥同丁迴反謂投下也廣雅搥擿也下於甲反自上加下也弶古犬反下渠向反字書施於道曰弶以繩取物曰也㑌脚去誑反謂脚曲也書無此字應俗作耳聳耳古文竦𢥠慫三形同所項湏奉二反方言聳聾也郭𤩶曰言無所聞常聳耳也聳又竦也謂驚悚也掩襲古文㦻同辝立反左傳凡師輕曰襲注云掩其不俻也甎坏又作𤬭同疋才反字林凡未燒者曰坏泥烏黃反通俗亭水曰汪謂汪池之泥律文作洸古皇反洸涌也洸洸聲也洸非此義第二十卷𭫲棟所龜反尓雅捔謂之𭫲郭𤩶曰即掾也亦名桷亦名橑音力道反棟都弄反說文屋極也一名極亦名檼亦名桴檼音於靳反櫨力胡反說文柱上枅也下蒲麦蒲各二反廣雅謂之枅枅衡今作𣓖同結奚反蒼頡篇柱上方木也一名㭼亦名㭓亦名槉亦名楶音子結反田或作鈄都口反此冝作斗字第二十一卷見齗魚斤反說文齒肉也蒼頡篇齒根也𤴨頭古文鈂𤴨𩑌三形今作疣同有霤反說文𩑌顫也謂顫掉不正也顫又作戰律文作痏非體也第二十二卷刳四口孤反方言刳也說文刳判也周書刳木為舟謂空其腹也上概古載反周禮師女宮而濯概鄭玄曰摡拭也字從手律文從木作槩平斗斛之槩非此義也羹臛呼各反楚辝露鷄臛王逸注有菜曰羹無菜曰臛也以䂓反㗘㗱又作同補洛反下子立反說文噍㒵也廣蒼㗘噍聲也䯉䯉於滑反說文咽中氣息不利也律文作非也蟥蜂胡光反尓雅蛂蟥蛢注云甲䖝也大如𮓜豆綠色江東呼為黃瓶蛂音扶結反斗藪又作擻同蘇走反通俗文斗藪謂之䅽律文作𧘞梀非體也䅽音都穀反音速圂廁胡困反廣雅圊圂庰廁也下惻吏反廁亦圊也釋名云圂者言溷濁也或曰清言至穢𠁅冝常修治使潔清也廁者人雜廁在上非一也第二十三卷礓石居良反形如薑也通俗文地多小石謂之礓礫也字從石從畺也屋擔又作𢸴同餘占反說文擔𢱧也亦名屋亦名連尒雅擔謂之摘摘亦也𢱧音毗摘音都歷反項顀直追反說文頟出也今用其義律文作未見所出侏儒之于而于反通俗文侏儒曰矬謂極短人也第二十四卷懟恨古文譵同大淚反尒雅懟怨也亦忿也齵齒五溝反蒼頡篇齒重生也說文齒不正也謂高下不齊平也律文作齵丘禹反說文齒蠹也齲非此義蠹音丁故反第二十七卷㪣戶又作毃同苦交反謂下打者也說文㪣撗撾也猥多烏罪反字林猥眾也廣雅猥䪺也捦又作襟同渠林反說文急持衣襟也埤蒼捦捉也瓷匙方言從木作提同是支反謂𬂭飯者也律文作𨥌昌紙反紙𩰿也𨥌非此義𩰿音自林反第二十八卷持䩸字書作縙同而用反案毳飾也又作㲨而容反字林㲨𦋺也䍧羊祖郎反字林牡羊也三蒼注云䍧吴羊也不耻挌反字林裂也亦分也律文作卓非體也第二十九卷是挻式延反謂作泥物也挻擊也挻柔也埴土也水湔又作㵶同子見反通俗文傍沾曰湔山東名也江南言灒音子旦反第三十卷紡績古文作勣同子狄反字林績𦂝也欝詶又作譸同涉尤反比丘名也三蒼詶亦酬字也第三十一卷今臉力占反廣雅懸熟也臉生血也穀夷軄反謂穀麦糠皮也律文作芅草名也𬋘已又作同力鳥反字林𬋘𬉹也律文作燎力彫力吊二反𨓍燎也燎非此義福羅正言布羅此譯云短靿靴靿音烏豹反𤴨手又作𩑌同于救反謂顫𤴨搖動不安也第三十二卷漱卑所霤反或言蘇卑或言優婆斯皆訛轉也正言鄔波斯此云近善女人鄔音一古反喟嘆又作欳同口愧口𪫦二反大息也謂歎聲也第三十四卷狼䟺又作跋同補盖反狼䟺猶蹎䟺也說文䟺步也聲類蹎䟺也婆𠲿所學反星名也欶指又作嗽同所角反俗文含吸曰嗽嗽亦吮也䤍青莫奚反埤蒼𮡅䤍醬敗壞也醬敗則䤍生也𮡅音普木反廁篦補奚反小學篇篦刷也謂刮刷也今眉篦等皆作此也甌別烏侯反甌器也方言盆之小者謂之甌施系奚計反謂屧系履系等皆作系律文作縘𦮐二形非體也屧音思頰反青無悲反通俗文物傷濕曰律文作湄澿二形非字體也次下卷生同㰍䟽力同反說文㰍房室之䟽也䟽窓也廣雅㰍舍也律文作籠非體也第三十五卷䋫卷側耕反說文䋫縈繩也江汅之閒謂縈収繩為䋫䋫亦屈也汅音善反欱烟呼帀反欱猶飲取也說文欱歠也歠音昌恱反𢾊觸又作敞棖樘橙四形同文𢖍反敞亦觸也當敧居儀反通俗文以箸取物曰敧箸音治慮反謦欬口頂反下苦代反通俗文利喉曰謦說文欬逆氣也字從言從欠律文從石從口作磬咳二形非體也連又作䶍同丁計反蒼頡篇噴鼻也詩云願言即箋云汝思我心如是即也今俗云人道我此古遺語也砏砏胡瞎反字指云礣砏雷大聲也律文作榾古忽反埤蒼狗猾木名也中作箭笴也榾非此義礣音莫八反笴音古旱反第三十六卷𧰟於驕反說文巧也又女子壯㒵淑好也下又作艶同餘贍反方言秦晉之閒謂美為𧰟𧰟光也姑伀故胡反白𮓜通曰姑者故也故老人之稱也說文姑母也下之容反𥼶名俗謂舅章曰伀言是己所敬見之伀遽自肅齊第三十八卷殆壞徒改反廣疋殆敗也尓疋殆危也殆亦幾也近也擊敲又作敲同口交反謂下擊也說文撗撾也律文作栳非也第三十九卷佉啁羅床此譯云小長牀啁音竹交反敲盤口交反謂相擊打也盤謂鈴盤也第四十卷罯瘡於感於合二反說文覆也律文作菴草名也菴非此用竹亡反竹膚也聲類篾也今中國蜀土人謂竹篾為也撥衣又作拔同補末反通俗文三尺衣謂之撥也跋渠此譯云部謂部類也或言群同其義也五分律第一卷厭蠱於舟反下字林音固說文厭合也蒼頡篇伏合人心曰厭蠱周禮庶氏掌除毒蠱注云毒蠱䖝物病𡧱人者也謂䖝行毒也律文作固非也養𩚅今作食同囚恣反說𩚅糧也廣疋餧𩚅也謂以食供養人曰𩚅字從食從人律文作飼近字也餞送才翦反說文送去也謂以飲食送人曰餞字從食律文作踐履之踐非體也僅而渠鎮反字林僅財能也僅亦劣也銜淚下衫反凡在內而未發者皆曰銜言銜恨銜淚等皆是也享福虛兩反享受也亦當也說文享獻也字從高省篆文作又音呼羹反醊祠說文餟同張芮反酹祭也酹力外反字林謂以酒澆地祭也魔麾字詁今作撝同呼皮反楚辝舉手日麾謂手指之也歌謠招反說文獨歌也尓雅徒歌為謠徒空也和埴時力反尚書厥土赤埴墳孔安國曰黏土曰埴也䄯梁今作楣同古奚反蒼頡篇柱上方木一名㭼亦名櫨欂音蒲麦反戶楣靡飢反尒疋楣謂之梁郭璞曰門上撗梁也第二卷作穽古文阱汬二形同才性反廣雅穽坑也謂穿地為䧟以取獸也僶俛亡忍下無辯反謂自強為之也律文作僈非也險隵又作巇同許奇反險隵危也律文作囐五達反皷聲也獻非此義晏安烏見反說文晏安也字從女又作宴安尓雅安止也定也蒼頡篇安靜也說文作侒𡩷也第三卷允合弋准反周易允外大吉王弼曰允當也允亦信也尒雅允誠也共賭又作同都杜反通俗文錢戲曰賭也礧佛力對反謂以石投佛也今言礧石是也第四卷驚惋烏翫反謂惋歎驚異也愜意苦頰反愜可也字林愜快也第五卷垔灑於仁反下所解反字應作惡於故反即㽵飾也𭽀麗旦反廣雅𭽀明也𭽀亦鮮盛㒵也律文作𭹵非體也下勒計反廣雅麗好也麗謂花靡也歠粥又作吷同昌恱反說文歠飲也歠欱也欱音火洽反第六卷輟我猪劣張衛二反止也尓雅輟己也論語耰而不輟是也耰音於牛反誣說武于反說文加言也誣欺也妄也誣亦𠕀也木簀側𮧓反說文牀棧也尓雅簀謂之音側几反郭璞曰即牀板也第七卷蔚然於謂反廣雅蔚茂也茂盛也援助于眷反援謂依援護助之言也第八卷介意居薤反周易憂悔若者存孚介韓康伯曰介纖介也劉瓛曰介也貪𩚎又作餮同他結反說文貪也謂貪食曰𩚎䏣弊千余反謂䏣妬也蠅子曰䏣泅戲又作汓同似由反說文水上浮也今江南呼拍浮為泅也澆灒又作𠵖湔二形同子旦反說文水汙灑也第九卷狼朚又作同莫剛反朚遽也通俗文時務曰律文作狽非體也鞅掌於兩反詩云王事鞅掌傳曰失容也箋云鞅荷也謂捧之也負荷捧持以趍走促遽失容儀也作今作熾同尺志反幖也通俗文私記曰幟廣雅幟幡也墨子以為長丈五廣半幅曰幟也第十卷企行古文𠈮同祛䜴反通俗文舉踵曰企企望也字從止遝水他帀反埤蒼𡄤歠也律文作嗒非體也第十四卷索鐎今作銚同子消反韻集云鐎溫噐也三足有柄字林云鐎容一斗似銚銚又音遙一音徒吊反擲捘又作荾二形同先戈反謂織㨑行緯者也或虜力古反虜獲取也服也戰而俘獲也虜掠𡙸取物也屋霤力救反說文屋水流下也凡水下𠁅皆曰霤第十五卷窺𨵦丘䂓弋珠反說文窺小視也自貽以之反尓雅貽遺也注云謂相㱕遺也以砥軄夷反山海經崦嵫山多礪郭𤩶曰磨石也崦音於廉反嵫子辝反跨馬苦罵反字林跨踞也亦躡也說文跨渡也憩止說文作愒同却厲反尓雅憩息也皆躓陟利反礩礙也通俗文不利曰躓限至曰礙第十七卷自炮字書作炰同父包反說文毛𬉹肉也詩云炰之燔之傳曰以毛曰炰是也亦裹燒也吃人九乞反說文言難也重言也第十八卷樌頭古患反謂貫其頭也青虹古文作肛同胡公反說文螮蝀也狀似䖝字從䖝俗呼為美人螮音帝蝀音董第二十卷脅諸字體作愶同虛業反謂以威力相𢙢懼也雷達丁反尓雅疾雷為霓郭𤩶曰雷之急激者也蒼頡篇礔礰也霓音五結反畦畔下圭反說文五十為畦今之畦菜畦等也律文有作塍食䒱反稻田畦也毛𣮧布莾反字林𦋺方文者曰𣮧謂毛布也律文作𣯟非體也拘欇之涉反或言拘執梵言訛轉耳謂𦋺之垂毛者第二十一卷鏟髮又作剗同初簡反廣雅剗削也聲類剗平也屯門徒昆反廣雅屯聚也屯亦陳也等屧思恊反屧謂履属也律文作𤓖非體也作靿一豹反靴靿也律文作𩍓俗語也書無此字第二十二卷鱣脂知連反尓疋鱣大魚也似鱏而短鼻口在頷下江東呼為黃魚亦鯉也長者二三丈鱏音徐林反鼻長七八寸重千斤用麴去六反方言江淮陳楚之閒謂之苗音曲注云楚語轉耳糂米古文作糝籀文作同桒感反說文米和羹也律文作䊏非也第二十四卷斧剉旦臥反謂剉斫也說文折傷也律文作銼才戈反小釜也又音族相揩口皆反廣雅揩摩也字從手第二十五卷錍箭普啼反方言箭廣長而薄廉者謂之錍人邏力賀反韻略云邏巡行非違也戍属也謂遊兵以禦者也律文作儸力歌反𠌮儸也𠌮音之耶反泥鏝又作槾二形同莫槃反尓雅鏝謂之杅郭璞曰泥鏝也杅音烏第二十六卷奠食徒見反奠陳也獻也廣雅奠薦也調也䑔之符發反廣雅䑔春也埤蒼䑗米也通俗文擣細曰䑗音蕩三捼三蒼奴迴反手按也說文捼摧也一日兩手相切也翻翻又作翻同疋元反廣雅翻翻飛也亦盛㒵也律文作𭻫非也第二十七卷輙呞又作𪗪齝二形同勑之之二反尒疋牛曰呞注云食已復出嚼之也庖𢊍蒲交反庖之言包也厨庖屋也蒼頡篇主食者也筴箸古俠反字林公洽反筴亦箸也下丈庶反飯𢻕也筴亦取也律文作挾藏之挾非體也𢍶水居万反通俗文汲取曰𢍶說文杼漏也莝草千臥反謂斬茤𩚅馬者也詩云乘馬在廄莝之秣之傳曰莝茤也第二十九卷作渠記反所以聮綴簪記之也躂脚他末反字林足跌曰躂取其義矣第三十卷勗勉許玉反方言齊魯謂勉曰勗滋尚書勗哉夫子孔安國曰勗勉勵也謂勸強也阿哹疋尢反梵言也依字吹哹也甲辰歲高麗國大藏都監奉𠡠彫造
